##06092019----select tot_unit_id,coalesce(totalpara,0) as totalpara,coalesce(dropped,0) as dropped,(coalesce(totalpara,0)-coalesce(dropped,0)) as balanceparas ,coalesce(replysent,0) as replysent,coalesce(replyna,0) as replyna ,coalesce(transfer,0) as transfer,coalesce(unit_code) as unit_code  from ( (select  coalesce(ircag.sub_para_unit_id,0) as tot_unit_id,coalesce(count (cag_para_id),0) totalpara   from  irparas.cag_master  ircag   where  ircag.delete_flag=false    and ircag.is_latest=true   and ircag.transfer_flag=false    group by ircag.sub_para_unit_id) tot    left join  ( select  coalesce(ircag.sub_para_unit_id,0) as replysent_unit_id,coalesce(count (cag_para_id),0) replysent  from irparas.cag_master  ircag     where  ircag.delete_flag=false  and ircag.is_latest=true  and ircag.transfer_flag=false and  ircag.para_status_id=4  group by ircag.sub_para_unit_id ) replysent   on (tot.tot_unit_id=replysent.replysent_unit_id)  left join    ( select  coalesce(ircag.sub_para_unit_id,0) as replyna_unit_id,coalesce(count (cag_para_id),0) replyna  from irparas.cag_master  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true    and ircag.transfer_flag=false  and  ircag.para_status_id=2   group by ircag.sub_para_unit_id) replyna  on (tot.tot_unit_id=replyna.replyna_unit_id) left join     (select  coalesce(ircag.sub_para_unit_id,0) as transfer_unit_id,coalesce(count (cag_para_id),0) transfer from irparas.cag_master  ircag where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true   group by ircag.sub_para_unit_id ) transfer on (tot.tot_unit_id=transfer.transfer_unit_id) left join  ( select  coalesce(ircag.sub_para_unit_id,0) as dropped_unit_id,coalesce(count (cag_para_id),0) dropped from irparas.cag_master ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false and  ircag.para_status_id = 3  group by ircag.sub_para_unit_id) dropped on (tot.tot_unit_id=dropped.dropped_unit_id) left join  unit_master um on (tot.tot_unit_id=um.unit_id and um.delete_flag=false)) totalquery  order by unit_code,totalpara,balanceparas

##select distinct ircag.unit_id,um.unit_code,coalesce(tot.totalgist,0) as totalgist, coalesce((coalesce(tot.totalgist,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent ,coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped  from  irparas.cag_master_gist ircag  inner join (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) totalgist  from  irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false  group by ircag.unit_id) tot on (ircag.unit_id=tot.unit_id)  left join      ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) replysent    from irparas.cag_master_gist ircag    where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false  and  ircag.paras_status_id=4    group by ircag.unit_id) replysent   on (ircag.unit_id=replysent.unit_id)       left join    ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) replyna from irparas.cag_master_gist ircag  where  ircag.delete_flag=false  and ircag.is_latest=true  and ircag.transfer_flag=false   and  ircag.paras_status_id=2   group by ircag.unit_id) replyna   on (ircag.unit_id=replyna.unit_id)      left join     (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist ircag       where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true   group by ircag.unit_id ) transfer   on (ircag.unit_id=transfer.unit_id) left join  ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) dropped from irparas.cag_master_gist ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false   and  ircag.paras_status_id = 3  group by ircag.unit_id) dropped   on (ircag.unit_id=dropped.unit_id)   left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false) order by unit_code,totalgist,balance ;

SELECT_CAG_ABSTRACT_UNIT=select distinct ircag.unit_id,coalesce(ircag.circle_id,0) as circle_id,coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id,coalesce(tot.totalparas,0) as totalparas,coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent ,coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped,um.unit_code|| ' Unit ' as unit_code,coalesce(cm.circle_name,'0')  as circle_name,coalesce(dm.division_name,'0') as division_name  ,coalesce(sm.subdivision_name,'0') as subdivision_name,um.unit_code as unit_name  from  irparas.cag_master_gist ircag inner join (  select coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) as totalparas from irparas.cag_master_gist  ircag where  ircag.delete_flag=false   and ircag.is_latest=true  and transfer_flag=false  and ircag.unit_id<>0 and (ircag.circle_id =0 or ircag.circle_id is null )  and (ircag.division_id =0 or ircag.division_id is null )  and  (ircag.subdivision_id =0 or ircag.subdivision_id is null)  group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) tot   on (ircag.unit_id=tot.unit_id and coalesce(ircag.circle_id,0)=tot.circle_id and coalesce(ircag.division_id,0)=tot.division_id and coalesce(ircag.subdivision_id,0)=tot.subdivision_id)    left join    ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) replysent from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false  and  ircag.paras_status_id=4   and ircag.unit_id<>0 and (ircag.circle_id =0 or ircag.circle_id is null )  and (ircag.division_id =0 or ircag.division_id is null )and  (ircag.subdivision_id =0 or ircag.subdivision_id is null)   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replysent   on (ircag.unit_id=replysent.unit_id and coalesce(ircag.circle_id,0)=replysent.circle_id and coalesce(ircag.division_id,0)=replysent.division_id and coalesce(ircag.subdivision_id,0)=replysent.subdivision_id)   left join     ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id , coalesce(count (cag_gist_id),0) as replyna from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false  and  ircag.paras_status_id=2   and ircag.unit_id<>0 and (ircag.circle_id =0 or ircag.circle_id is null )  and (ircag.division_id =0 or ircag.division_id is null )and  (ircag.subdivision_id =0 or ircag.subdivision_id is null)   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replyna   on (ircag.unit_id=replyna.unit_id and coalesce(ircag.circle_id,0)=replyna.circle_id and coalesce(ircag.division_id,0)=replyna.division_id and coalesce(ircag.subdivision_id,0)=replyna.subdivision_id)   left join     (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true    and ircag.unit_id<>0 and (ircag.circle_id =0 or ircag.circle_id is null )  and (ircag.division_id =0 or ircag.division_id is null )and  (ircag.subdivision_id =0 or ircag.subdivision_id is null)   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) transfer   on (ircag.unit_id=transfer.unit_id  and coalesce(ircag.circle_id,0)=transfer.circle_id and coalesce(ircag.division_id,0)=transfer.division_id and coalesce(ircag.subdivision_id,0)=transfer.subdivision_id) left join    ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) dropped from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=false and  ircag.paras_status_id =3   and ircag.unit_id<>0 and (ircag.circle_id =0 or ircag.circle_id is null )  and (ircag.division_id =0 or ircag.division_id is null )and  (ircag.subdivision_id =0 or ircag.subdivision_id is null)   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) dropped   on (ircag.unit_id=dropped.unit_id and coalesce(ircag.circle_id,0)=dropped.circle_id and coalesce(ircag.division_id,0)=dropped.division_id and coalesce(ircag.subdivision_id,0)=dropped.subdivision_id)   left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false)    left join  circle_master cm on  (ircag.circle_id=cm.circle_id and cm.delete_flag=false)    left join  division_master dm on (ircag.division_id=dm.division_id and um.delete_flag=false)   left join  subdivision_master sm on (ircag.subdivision_id=sm.subdivision_id and um.delete_flag=false) where ircag.unit_id=? 
 
SELECT_CAG_ABSTRACT_CIRCLE= select distinct ircag.unit_id,ircag.circle_id,case when (ircag.division_id=0 or ircag.division_id is null) then -1 when (ircag.division_id!=0 or ircag.division_id is not null) then ircag.division_id end as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(tot.totalparas,0) as totalparas, coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' SE Office' as unit_code,coalesce(cm.circle_name,'0')  as circle_name,coalesce(dm.division_name,'0') as division_name  ,coalesce(sm.subdivision_name,'0') as subdivision_name , um.unit_code|| ' SE Office' as unit_name  from irparas.cag_master_gist ircag     inner join      (  select coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) as totalparas    from  irparas.cag_master_gist  ircag    where  ircag.delete_flag=false    and ircag.is_latest=true and transfer_flag=false     and ircag.unit_id<>0  and ircag.circle_id<>0 and (ircag.division_id =0 or ircag.division_id is null ) and  (ircag.subdivision_id =0 or ircag.subdivision_id is null )      group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) tot     on (ircag.unit_id=tot.unit_id and ircag.circle_id=tot.circle_id and coalesce(ircag.division_id,0)=tot.division_id and coalesce(ircag.subdivision_id,0)=tot.subdivision_id)      left join   ( select  coalesce(unit_id,0) as unit_id,coalesce(circle_id,0) as circle_id, coalesce(division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.section_id=2  and irpm.unit_id<>0   and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) secb   on (ircag.unit_id=secb.unit_id and ircag.circle_id=secb.circle_id and (coalesce((ircag.division_id),0)=secb.division_id) and coalesce(ircag.subdivision_id,0)=secb.subdivision_id)  left join   ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) replysent from irparas.cag_master_gist ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false  and  ircag.paras_status_id=4  and ircag.unit_id<>0   and ircag.circle_id<>0 and (ircag.division_id =0 or ircag.division_id is null ) and  (ircag.subdivision_id =0 or ircag.subdivision_id is null )   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replysent   on (ircag.unit_id=replysent.unit_id and ircag.circle_id=replysent.circle_id and coalesce(ircag.division_id,0)=replysent.division_id and coalesce(ircag.subdivision_id,0)=replysent.subdivision_id)   left join     ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) replyna from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id=2  and ircag.unit_id<>0  and ircag.circle_id<>0 and (ircag.division_id =0 or ircag.division_id is null ) and  (ircag.subdivision_id =0 or ircag.subdivision_id is null )   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replyna   on (ircag.unit_id=replyna.unit_id and ircag.circle_id=replyna.circle_id and coalesce(ircag.division_id,0)=replyna.division_id and coalesce(ircag.subdivision_id,0)=replyna.subdivision_id)   left join    (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true    and ircag.unit_id<>0   and ircag.circle_id<>0 and (ircag.division_id =0 or ircag.division_id is null ) and  (ircag.subdivision_id =0 or ircag.subdivision_id is null )   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) transfer   on (ircag.unit_id=transfer.unit_id and ircag.circle_id=transfer.circle_id and coalesce(ircag.division_id,0)=transfer.division_id and coalesce(ircag.subdivision_id,0)=transfer.subdivision_id) left join   ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) dropped from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false   and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id =3  and ircag.unit_id<>0   and ircag.circle_id<>0 and (ircag.division_id =0 or ircag.division_id is null ) and  (ircag.subdivision_id =0 or ircag.subdivision_id is null )   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) dropped   on (ircag.unit_id=dropped.unit_id and ircag.circle_id=dropped.circle_id and coalesce(ircag.division_id,0)=dropped.division_id and coalesce(ircag.subdivision_id,0)=dropped.subdivision_id)   left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false)   left joi