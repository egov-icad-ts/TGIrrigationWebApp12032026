_cat_id ) breachcnt  on (totbv.unit_id=breachcnt.unit_id and totbv.circle_id=breachcnt.circle_id  and totbv.division_id=breachcnt.division_id  and totbv.subdivision_id=breachcnt.subdivision_id and totbv.section_id=breachcnt.section_id and totbv.post_id=breachcnt.post_id  and totbv.form_data_sentdate=breachcnt.form_data_sentdate and totbv.comp_cat_id=breachcnt.comp_cat_id )   left join (  select count (distinct mtf1.form_data_id) as dmcnt, mtf1.form_data_sentdate,  coalesce(unit_id,0) as unit_id ,coalesce(mtf1.circle_id,0) as circle_id  ,coalesce(mtf1.division_id,0) as  division_id,coalesce(subdivision_id,0) as subdivision_id,mtf1.section_id, 	mtf1.post_id, mtf1.comp_cat_id  from  invom.mi_tank_form20data  mtf1   where mtf1.delete_flag=false and mtf1.is_latest=true   and mtf1.damage_type=2   group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.section_id, 	mtf1.post_id, mtf1.form_data_sentdate,mtf1.comp_cat_id ) damagecnt   on (totbv.unit_id=damagecnt.unit_id and totbv.circle_id=damagecnt.circle_id  and totbv.division_id=damagecnt.division_id and totbv.subdivision_id=damagecnt.subdivision_id and totbv.section_id=damagecnt.section_id and totbv.post_id=damagecnt.post_id and totbv.form_data_sentdate=damagecnt.form_data_sentdate  and totbv.comp_cat_id=damagecnt.comp_cat_id)  inner join unit_master um   on (totbv.unit_id=um.unit_id and um.delete_flag=false )  inner join circle_master cm  on (totbv.circle_id=cm.circle_id and cm.delete_flag=false )  inner join division_master dm  on (totbv.division_id=dm.division_id and totbv.circle_id=dm.circle_id and dm.delete_flag=false ) inner join subdivision_master sm  on (totbv.subdivision_id=sm.subdivision_id and totbv.division_id=sm.division_id and sm.delete_flag=false ) inner join taskmanagement.subposts tsp on (totbv.post_id=tsp.postid and tsp.post_status='ACTIVE' ) left join section_master secm  on (totbv.section_id=secm.section_id and secm.delete_flag=false)      where   ((extract (year from totbv.form_data_sentdate ) =? )  or  ( ( totbv.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( totbv.form_data_sentdate  <= to_date(?,'DD/MM/YYYY'))   )    )

