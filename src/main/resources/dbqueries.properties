UPDATE_REPLY_CAG= UPDATE irparas.cag_replys  SET   cag_reply=?, cag_remarks=?, cag_reply_date=?,  update_user_name=?, update_date=now(),   edit_flag=true   WHERE cag_reply_id=?

UPDATE_CAG_PARAS_TRANSFER= UPDATE irparas.cag_master_gist    SET cag_gist_para=?,  financial_year=?,    unit_id=?, division_id=?, circle_id=?, subdivision_id=?, paras_status_id=?,  para_number=?, transfer_unit_id=?, transfer_circle_id=?, transfer_division_id=?, transfer_subdivision_id=?, auditdate_from=?,  auditdate_to=?, discuss_pac=?, edit_flag=true, edit_date=now(), transfer_flag=true,  edit_user_id=?, edit_user_name=? WHERE  cag_gist_id=? 

INSERT_CAG_STATUS=INSERT INTO irparas.cag_status( cag_para_id, cag_gist_id, cag_para_remarks, is_latest,delete_flag, created_by, created_date, cag_para_status_id) VALUES ( ?, ?, ?, true, false, ?, now(), ?);

UPDATE_OLD_CAG_STATUS=UPDATE irparas.cag_status SET  is_latest=false, delete_flag=false,  update_by=?, update_date=now() WHERE  cag_para_id=? and is_latest=true and delete_flag=false
################CAG Paras Report
SELECT_CAG_ABSTRACT_COUNT=select financial_year,para_number,icmg.cag_gist_id, coalesce(totalcag.totalparacag,0) as totalparacag,(coalesce(totalcag.totalparacag,0) -coalesce(droppedcag.droppedcagparas,0) ) as balanceparas, coalesce(replynotsent.replynotsentparas,0) as replynotsentparas, coalesce(replybyce.replybyceparas,0) as replybyceparas, coalesce(replybyenci.replybyenciparas,0) as replybyenciparas, coalesce(replybysecyag.replybysecyagparas,0) as replybysecyagparas, coalesce(replybysecycont.replybysecycontparas,0) as replybysecycontparas,coalesce(droppedcag.droppedcagparas,0) as droppedcagparas, coalesce(discusspac.discusspacparas,0) as replybysecycontparas, coalesce(pacincl.pacinclparas,0) as pacinclparas, coalesce(unitlist.unit_name,'NA') as pacinclparas from irparas.cag_master_gist icmg  inner join  (select count(icm.cag_para_id) as totalparacag,icm.cag_gist_id from irparas.cag_master icm inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true group by icm.cag_gist_id) totalcag on (icmg.cag_gist_id=totalcag.cag_gist_id) left join  (select count(icm.cag_para_id) as replynotsentparas ,icm.cag_gist_id from irparas.cag_master icm inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=20 group by  icm.cag_gist_id) replynotsent  on (icmg.cag_gist_id=replynotsent.cag_gist_id) left join (select count(icm.cag_para_id) as replybyceparas,icm.cag_gist_id from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=7 group by icm.cag_gist_id) replybyce on (icmg.cag_gist_id=replybyce.cag_gist_id) left join (select count(icm.cag_para_id) as replybyenciparas,icm.cag_gist_id from irparas.cag_master icm inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=8 group by icm.cag_gist_id) replybyenci on (icmg.cag_gist_id=replybyenci.cag_gist_id) left join (select count(icm.cag_para_id) as replybysecyagparas,icm.cag_gist_id from irparas.cag_master icm inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=9  group by icm.cag_gist_id) replybysecyag on (icmg.cag_gist_id=replybysecyag.cag_gist_id) left join (select count(icm.cag_para_id) as replybysecycontparas,icm.cag_gist_id from irparas.cag_master icm inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=10 group by icm.cag_gist_id) replybysecycont  on (icmg.cag_gist_id=replybysecycont.cag_gist_id) left join  (select count(icm.cag_para_id) as droppedcagparas,icm.cag_gist_id from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=3  group by icm.cag_gist_id) droppedcag on (icmg.cag_gist_id=droppedcag.cag_gist_id)   left join (select count(icm.cag_para_id)as discusspacparas,icm.cag_gist_id from irparas.cag_master icm where icm.delete_flag=false and icm.is_latest=true and icm.discuss_pac=true group by  icm.cag_gist_id) discusspac on (icmg.cag_gist_id=discusspac.cag_gist_id) left join (select count(icm.cag_para_id) as pacinclparas,icm.cag_gist_id from irparas.cag_master icm where icm.delete_flag=false and icm.is_latest=true and icm.pac_incl=true group by  icm.cag_gist_id ) pacincl on (icmg.cag_gist_id=pacincl.cag_gist_id) inner join ( SELECT  cag_gist_id,string_agg(um.unit_name,',') as unit_name,string_agg(cum.unit_id::text,',') as unitlist FROM irparas.cagpara_unit_map cum inner join unit_master um on (cum.unit_id=um.unit_id and um.delete_flag=false)  where cum.delete_flag=false and cum.is_latest=true group by  cag_gist_id) unitlist on (icmg.cag_gist_id=unitlist.cag_gist_id) where icmg.delete_flag=false and icmg.is_latest=true  order by financial_year ;

SELECT_CAG_ABSTRACT_COUNT_BYUNIT=select financial_year,para_number,icmg.cag_gist_id,coalesce(totalcag.totalparacag,0) as totalparacag, (coalesce(totalcag.totalparacag,0) -coalesce(droppedcag.droppedcagparas,0) ) as balanceparas,  coalesce(replynotsent.replynotsentparas,0) as replynotsentparas,coalesce(replybyce.replybyceparas,0) as replybyceparas,  coalesce(replybyenci.replybyenciparas,0) as replybyenciparas,  coalesce(replybysecyag.replybysecyagparas,0) as replybysecyagparas,  coalesce(replybysecycont.replybysecycontparas,0) as replybysecycontparas,  coalesce(droppedcag.droppedcagparas,0) as droppedcagparas,  coalesce(discusspac.discusspacparas,0) as replybysecycontparas,   coalesce(pacincl.pacinclparas,0) as pacinclparas,   coalesce(um.unit_name,'NA') as unitname  from irparas.cag_master_gist icmg  inner join  (select count(icm.cag_para_id) as totalparacag,  icm.cag_gist_id,icum.unit_id   from irparas.cag_master icm    inner join irparas.cag_status ics     on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)    inner join irparas.cagpara_unit_map icum    on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)     where icm.delete_flag=false and icm.is_latest=true group by icm.cag_gist_id,icum.unit_id) totalcag     on (icmg.cag_gist_id=totalcag.cag_gist_id)     left join  (select count(icm.cag_para_id) as replynotsentparas ,icm.cag_gist_id ,icum.unit_id  from irparas.cag_master icm   inner join irparas.cag_status ics   on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum    on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=20 group by  icm.cag_gist_id,icum.unit_id) replynotsent  on (icmg.cag_gist_id=replynotsent.cag_gist_id and totalcag.unit_id=replynotsent.unit_id)  left join (select count(icm.cag_para_id) as replybyceparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm   inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum    on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=7 group by icm.cag_gist_id,icum.unit_id) replybyce  on (icmg.cag_gist_id=replybyce.cag_gist_id and totalcag.unit_id=replybyce.unit_id)   left join (select count(icm.cag_para_id) as replybyenciparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm inner join irparas.cag_status ics   on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum    on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=8  group by icm.cag_gist_id,icum.unit_id) replybyenci  on (icmg.cag_gist_id=replybyenci.cag_gist_id and  totalcag.unit_id=replybyenci.unit_id)  left join (select count(icm.cag_para_id) as replybysecyagparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm inner join irparas.cag_status ics   on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum    on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=9   group by icm.cag_gist_id,icum.unit_id) replybysecyag  on (icmg.cag_gist_id=replybysecyag.cag_gist_id and   totalcag.unit_id=replybysecyag.unit_id)  left join (select count(icm.cag_para_id) as replybysecycontparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum  on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=10 group by icm.cag_gist_id,icum.unit_id ) replybysecycont  on (icmg.cag_gist_id=replybysecycont.cag_gist_id and  totalcag.unit_id=replybysecycont.unit_id) left join  (select count(icm.cag_para_id) as droppedcagparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true) inner join irparas.cagpara_unit_map icum on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=3  group by icm.cag_gist_id,icum.unit_id ) droppedcag  on (icmg.cag_gist_id=droppedcag.cag_gist_id and  totalcag.unit_id=droppedcag.unit_id)  left join (select count(icm.cag_para_id)as discusspacparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm inner join irparas.cagpara_unit_map icum  on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true) where icm.delete_flag=false and icm.is_latest=true and icm.discuss_pac=true  group by  icm.cag_gist_id,icum.unit_id) discusspac  on (icmg.cag_gist_id=discusspac.cag_gist_id and totalcag.unit_id=discusspac.unit_id ) left join (select count(icm.cag_para_id) as pacinclparas,icm.cag_gist_id ,icum.unit_id  from irparas.cag_master icm  inner join irparas.cagpara_unit_map icum   on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true  and icm.pac_incl=true  group by  icm.cag_gist_id,icum.unit_id ) pacincl  on (icmg.cag_gist_id=pacincl.cag_gist_id and totalcag.unit_id=pacincl.unit_id ) inner join unit_master um on (totalcag.unit_id=um.unit_id and um.delete_flag=false )  where icmg.delete_flag=false and icmg.is_latest=true  

SELECT_CAG_REPORT_YEAR=SELECT distinct financial_year FROM irparas.cag_master_gist order by financial_year;

