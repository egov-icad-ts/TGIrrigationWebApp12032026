SELECT_USER_EMP_DATA=select tue.user_emp_id,tue.user_id,tue.password,tue.emp_id, tem.employeename  as employeename, tem.email,tem.phone_no,fulldata.*  from taskmanagement.users_emp tue inner join  taskmanagement.employee_mst tem on (tue.emp_id=tem.empid and tem.delete_flag=false and tem.is_latest=true) inner join ( select post,unit,circle,division,sub_division,section,ppe.designation,emp_id::int,d.designation_name,coalesce(um.unit_code,'unit_name') as unit_name, coalesce(cm.circle_name,'NA') as circle_name,coalesce(dm.division_name,'NA') as division_name,coalesce(sdm.subdivision_name,'NA') as subdivision_name, coalesce(sm.section_name,'NA') as section_name,1 as usercat,'NA' as od_type  from taskmanagement.present_post_emp ppe  inner join taskmanagement.subposts  sp  on (ppe.post=sp.postid and sp.post_status='ACTIVE')  inner join taskmanagement.designation_mst d  on (ppe.designation=d.designation_id and d.delete_flag=false)  inner join unit_master um   on(ppe.unit=um.unit_id and um.delete_flag=false)  left join circle_master cm  on(ppe.circle=cm.circle_id and  cm.delete_flag=false)  left join division_master dm   on (ppe.division=dm.division_id and dm.delete_flag=false )  left join subdivision_master sdm  on(ppe.sub_division=sdm.subdivision_id and  ppe.division=sdm.division_id and sdm.delete_flag=false)  left join section_master sm   on (ppe.section=sm.section_id and ppe.sub_division=sm.sub_division_id and ppe.division=sm.division_id and sm.delete_flag=false ) where ppe.delete_flag=false and ppe.is_latest=true union  select post,unit,circle,division,sub_division,section,sp.designation,emp_id::int,d.designation_name,coalesce(um.unit_code,'unit_name') as unit_name, coalesce(cm.circle_name,'NA') as circle_name,coalesce(dm.division_name,'NA') as division_name,coalesce(sdm.subdivision_name,'NA') as subdivision_name, coalesce(sm.section_name,'NA') as section_name,2 as usercat,'NA' as od_type   from taskmanagement.additional_charge tac   inner join taskmanagement.subposts  sp  on (tac.post=sp.postid and sp.post_status='ACTIVE')  inner join taskmanagement.designation_mst d  on (sp.designation=d.designation_id and d.delete_flag=false)  inner join unit_master um   on(tac.unit=um.unit_id and um.delete_flag=false)  left join circle_master cm  on(tac.circle=cm.circle_id and  cm.delete_flag=false)  left join division_master dm  on (tac.division=dm.division_id and dm.delete_flag=false )  left join subdivision_master sdm  on(tac.sub_division=sdm.subdivision_id and tac.division=sdm.division_id and sdm.delete_flag=false) left join section_master sm   on (tac.section=sm.section_id and tac.sub_division=sm.sub_division_id and tac.division=sm.division_id and sm.delete_flag=false )  where (tac.to_date is null or tac.to_date>=now() )   union   select post_id,teod.unit_id,teod.circle_id,teod.division_id,teod.sub_division_id,teod.section_id,sp.designation,emp_id::int,d.designation_name, coalesce(um.unit_code,'unit_name') as unit_name,  coalesce(cm.circle_name,'NA') as circle_name,coalesce(dm.division_name,'NA') as division_name,coalesce(sdm.subdivision_name,'NA') as subdivision_name, coalesce(sm.section_name,'NA') as section_name,4 as usercat,coalesce(od_type,'NA') as od_type   from taskmanagement.employee_on_diversion teod   inner join taskmanagement.subposts  sp  on (teod.post_id=sp.postid and sp.post_status='ACTIVE')  inner join taskmanagement.designation_mst d  on (sp.designation=d.designation_id and d.delete_flag=false) inner join unit_master um   on(teod.unit_id=um.unit_id and um.delete_flag=false) left join circle_master cm  on(teod.circle_id=cm.circle_id and  cm.delete_flag=false)  left join division_master dm  on (teod.division_id=dm.division_id and dm.delete_flag=false )  left join subdivision_master sdm  on(teod.sub_division_id=sdm.subdivision_id and teod.division_id=sdm.division_id and sdm.delete_flag=false)  left join section_master sm   on (teod.section_id=sm.section_id and teod.sub_division_id=sm.sub_division_id and teod.division_id=sm.division_id and sm.delete_flag=false ) where islatest='Y' and isdelete='N' and (cancelled_on is null and  (od_to_date is null or  od_to_date>=now() ))  ) fulldata  on (fulldata.emp_id::int=tue.emp_id::int and tue.delete_flag=false and tue.is_latest=true)  where tue.user_id =? and tue.password=? union    select userid::text,username,password,0,'NA','NA','0',coalesce(post_id,0) as post ,coalesce(tu.unit_id , 0) as unitid,  coalesce(tu.circle_id,0) as circleid,         coalesce(tu.division_id,0)as divisionid,  coalesce(tu.subdivision_id,0)as subdivisionid  , coalesce(tu.section_id,0)as section_id,0,0,'NA', coalesce(um.unit_name,'--') as unitname, coalesce(cm.circle_name,'--') as circlename, coalesce(dm.division_name,'--')  as divisionname,coalesce(sdm.subdivision_name,'--')  as subdivisionname,coalesce(sm.section_name,'--')  as sectionname,3 as usercat,'NA' as od_type  from taskmanagement.users  tu inner join unit_master um        on (um.unit_id=tu.unit_id and um.delete_flag=false) left join circle_master cm  on ( cm.circle_id=tu.circle_id and cm.delete_flag=false) left join division_master dm   on ( dm.division_id=tu.division_id and dm.delete_flag=false ) left join subdivision_master sdm   on (sdm.subdivision_id=tu.subdivision_id and sdm.division_id=tu.division_id and sdm.delete_flag=false) left join section_master sm  on (tu.section_id=sm.section_id and tu.subdivision_id=sm.sub_division_id and tu.division_id=sm.division_id and sm.delete_flag=false )  where tu.username=? and tu.password=?
