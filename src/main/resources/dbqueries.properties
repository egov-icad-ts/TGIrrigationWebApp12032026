 SELECT_INVOM_RES_ABSTRACT_UNIT= select distinct irdam1.unit_id, coalesce(restankscount,0) as restotal , coalesce(restankstotal,0) as ressubmitted  ,  coalesce(restankstotalunsat,0) as ressubmittedunsat , coalesce(restankstotalpoor) as ressubmittedpoor , coalesce(restankstotalfair,0) as ressubmittedfair , coalesce(restankstotalsat,0) as ressubmittedsat ,um.unit_name, irdam1.freq_year,irdam1.freq_operation,0 as circle_id,'na' as circle_name , 0 as division_id, 'NA' as division_name , 0 as subdivision_id, 'NA' as subdivision_name,0 as section_id, 0 as post_id, 'NA' as post_name,0 as rescubcondition,coalesce(ressub1.condition_dam_id,0) as cnd1, coalesce(ressub2.condition_dam_id,0) as cnd2,coalesce(ressub3.condition_dam_id,0) as cnd3,coalesce(ressub4.condition_dam_id,4) as cnd4 from invom.invom_res_dam_ann1_mst1 irdam1 inner join  ( select sum (rescount) as restankscount  , unit_id  from  (( select coalesce(count(distinct res_id),0) as rescount,irum.unit_id  as unit_id   from invom.invom_res_unit_map irum  inner join invom.invom_reservoirs  ir on (ir.res_id=irum.reservoir_id and irum.delete_flag=false and irum.is_latest=true)      where ir.delete_flag=false  and is_nrld=true  group by irum.unit_id ) union  all  (  select count(distinct imt.tank_id_mk) as rescount,ts.unit_id   as unit_id from invom.invom_mi_tanks  imt    inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')   where   imt.delete_flag=false and imt.is_latest=true and is_nrld=true  group by ts.unit_id )    ) restanks  group by unit_id    ) restanktotal  on (irdam1.unit_id=restanktotal.unit_id)  left  join  ( select sum (restotal) as restankstotal  , unit_id ,freq_operation,freq_year from ( (select count(distinct irdam1.reservoir_id) as restotal, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true   group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year) union all (select count(distinct irdam1.tank_id) as restotal, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year   from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)      where irdam1.delete_flag=false and irdam1.is_latest=true    group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year ) ) restankssub group by  unit_id ,freq_operation,freq_year ) ressub   on(irdam1.unit_id=ressub.unit_id and irdam1.freq_operation=ressub.freq_operation and irdam1.freq_year=ressub.freq_year )  left join ( select sum (restotalunsat) as restankstotalunsat  , unit_id ,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalunsat, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year ,irdam1.condition_dam_id   from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=1  group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) union all (select count(distinct irdam1.tank_id) as restotalunsat, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id    from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)    where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=1   group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) as restanksub1 group by  unit_id , freq_operation,freq_year,condition_dam_id  )ressub1   on(irdam1.unit_id=ressub1.unit_id and irdam1.freq_operation=ressub1.freq_operation and irdam1.freq_year=ressub1.freq_year )      left join ( select sum (restotalpoor) as restankstotalpoor  , unit_id ,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalpoor, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year , irdam1.condition_dam_id   from invom.invom_res_dam_ann1_mst1 irdam1    inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=2  group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id  ) union all  ( select count(distinct irdam1.tank_id) as restotalpoor, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id   from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=2   group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub2 group by  unit_id , freq_operation,freq_year,condition_dam_id  ) ressub2   on(irdam1.unit_id=ressub2.unit_id and irdam1.freq_operation=ressub2.freq_operation and irdam1.freq_year=ressub2.freq_year )    left join ( select sum (restotalfair) as restankstotalfair  , unit_id ,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalfair, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id    from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=3  group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) union all (select count(distinct irdam1.tank_id) as restotalfair, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year, irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1  inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)    where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=3   group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub3 group by  unit_id , freq_operation,freq_year,condition_dam_id ) ressub3   on(irdam1.unit_id=ressub3.unit_id and irdam1.freq_operation=ressub3.freq_operation and irdam1.freq_year=ressub3.freq_year )     left join ( select sum (restotalsat) as restankstotalsat  , unit_id ,freq_operation,freq_year,condition_dam_id  from (( select count(distinct irdam1.reservoir_id) as restotalsat, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,  irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=4  group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id  ) union all (select count(distinct irdam1.tank_id) as restotalsat, irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year, irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1    inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=4   group by irdam1.unit_id , irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub4 group by  unit_id , freq_operation,freq_year,condition_dam_id ) ressub4  on(irdam1.unit_id=ressub4.unit_id and irdam1.freq_operation=ressub4.freq_operation and irdam1.freq_year=ressub4.freq_year )    inner join unit_master um   on (restanktotal.unit_id=um.unit_id and um.delete_flag=false)    where  irdam1.freq_year=? and irdam1.freq_operation=?   
