jectid=pm.project_id and pm.delete_flag=false)  group by projectid ) pmt  on (pa.projectid=pmt.projectid  )   inner join ( select t2.projectid,string_agg(um.unit_name, ' ,') as unit_name   from ( select distinct projectid, cpachild2.unit_id   from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t2   inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.projectid) pmu  on (pa.projectid=pmu.projectid   )  inner join (select t4.projectid,string_agg(dms.district_name, '   ,') as district_name   from ( select distinct projectid,cpachild4.district_id,mandal_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true ) t4   inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.projectid) dm  on (pa.projectid=dm.projectid    )  inner join ( select t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name  from ( select distinct projectid,district_id,mandal_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4   inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)  group by t4.projectid) mm  on (pa.projectid=mm.projectid )  inner join  ( select t4.projectid,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name  from ( select distinct projectid,const_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cps  on (t4.const_id=cps.constituency_id and cps.delete_flag=false) group by t4.projectid ) cp  on (pa.projectid=cp.projectid  )  order by project_name,mandal_name

SELECT_TOTAL_MANDAL_CONST=select pa.const_id,cm.constituency_name,pa.district_id,pa.mandal_id,  pa.ayacut_created,pa.stableayacut,pa.remarks ,pmt.project_name,pmu.unit_name,  packs.package_name,dm.district_name,coalesce(mm.mandal_name,'NA') as mandal_name,  pa.irrigated_ayacut,pa.contemplated_ayacut  from (select pat.const_id,pat.district_id,pat.mandal_id,  round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,  string_agg(pat.remarks, ' ,') as remarks   from components.project_ayacut  pat where pat.delete_flag=false and pat.is_latest=true  group by pat.const_id,pat.district_id,pat.mandal_id) pa  inner join (select t.const_id,t.district_id,t.mandal_id,string_agg(pm.project_name, ' ,') as project_name  from ( select distinct const_id, district_id ,mandal_id,projectid   from  components.project_ayacut   cpachild  where delete_flag=false and is_latest=true ) t   inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false)   group by t.const_id ,t.district_id,t.mandal_id) pmt   on (pa.const_id=pmt.const_id  and pa.district_id=pmt.district_id and pa.mandal_id=pmt.mandal_id)  inner join ( select t2.const_id,t2.district_id,t2.mandal_id,string_agg(um.unit_name, ' , ') as unit_name   from ( select distinct const_id,district_id,mandal_id, cpachild2.unit_id  from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t2   inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.const_id,t2.district_id,t2.mandal_id) pmu    on (pa.const_id=pmu.const_id and pa.district_id=pmu.district_id and pa.mandal_id=pmu.mandal_id )  inner join (select t3.const_id,t3.district_id,t3.mandal_id, string_agg(cps.pkg_name, ',') as package_name  from ( select distinct const_id,district_id,mandal_id, cpachild3.pack_id   from  components.project_ayacut   cpachild3 where delete_flag=false and is_latest=true ) t3  left join package_mst cps  on (t3.pack_id=cps.pkg_id and cps.deleteflag=false)   group by t3.const_id,district_id ,mandal_id) packs  on (pa.const_id=packs.const_id   and pa.district_id=packs.district_id  and pa.mandal_id=packs.mandal_id)  inner join (select t4.const_id,t4.district_id,t4.mandal_id,string_agg(dms.district_name, ' ,') as district_name  from ( select distinct const_id,cpachild4.district_id,mandal_id  from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true ) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.const_id ,t4.district_id,t4.mandal_id) dm  on (pa.const_id=dm.const_id   and pa.district_id=dm.district_id and pa.mandal_id=dm.mandal_id)  inner join (select t4.const_id,t4.district_id,t4.mandal_id,string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name  from ( select distinct const_id,cpachild4.district_id,mandal_id   from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int and t4.district_id=mms.district_id  and mms.delete_flag=false)  group by t4.const_id ,t4.district_id,t4.mandal_id) mm   on (pa.const_id=mm.const_id   and pa.district_id=mm.district_id and pa.mandal_id=mm.mandal_id)  inner join constituency_mst_new  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false )  where pa.district_id=? and pa.const_id=?

SELECT_PROJECT_MAN_VILLAGE_TOTAL=select pa.projectid,cp.constituency_name, pa.ayacut_created,pa.stableayacut,pa.remarks , pmt.project_name, pmu.unit_name, dm.district_name, coalesce(mm.mandal_name,'NA') as mandal_name , pa.contemplated_ayacut,pa.irrigated_ayacut,pa.district_id, pa.mandal_id,pa.village_id,coalesce(village_name,'NA') as village_name  from ( select pat.projectid,pat.district_id, pat.mandal_id, pat.village_id, round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut,  string_agg(pat.remarks, ' ,') as remarks   from components.project_ayacut  pat   where pat.delete_flag=false and pat.is_latest=true   group by pat.projectid,pat.district_id,  pat.mandal_id,pat.village_id) pa   inner join   ( select distinct projectid, district_id, mandal_id ,village_id,string_agg(pm.project_name, ' ,') as project_name    from ( select distinct projectid,district_id, mandal_id,village_id   from  components.project_ayacut   cpachild2   where delete_flag=false and is_latest=true ) t   inner join project_mst pm  on (t.projectid=pm.project_id and pm.delete_flag=false)    group by projectid,district_id,mandal_id,village_id ) pmt  on ( pa.projectid=pmt.projectid and pa.district_id=pmt.district_id  and pa.mandal_id=pmt.mandal_id  and pa.village_id=pmt.village_id)   inner join ( select t2.projectid,district_id,mandal_id,village_id,string_agg(um.unit_name, ' ,') as unit_name  from ( select distinct projectid, cpachild2.unit_id ,district_id,mandal_id,village_id   from  components.project_ayacut   cpachild2   where delete_flag=false and is_latest=true ) t2    inner join unit_master um   on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.projectid,district_id,mandal_id,village_id) pmu   on (pa.projectid=pmu.projectid and pa.district_id=pmu.district_id  and pa.mandal_id=pmu.mandal_id and pa.village_id=pmu.village_id )   inner join (select t4.projectid,t4.district_id,mandal_id,village_id,string_agg(dms.district_name, '   ,') as district_name  from ( select distinct projectid,cpachild4.district_id,mandal_id,village_id   from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true ) t4   inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.projectid,t4.district_id,t4.mandal_id,t4.village_id) dm   on (pa.projectid=dm.projectid and pa.district_id=dm.district_id  and pa.mandal_id=dm.mandal_id   and pa.village_id=dm.village_id )   inner join ( select t4.projectid,t4.district_id,t4.mandal_id,village_id,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name   from ( select distinct projectid,  district_id,mandal_id ,village_id   from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true) t4   inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)    group by t4.projectid,t4.district_id,t4.mandal_id,t4.village_id) mm   on (pa.projectid=mm.projectid  and pa.district_id=mm.district_id    and pa.mandal_id=mm.mandal_id  and pa.village_id=mm.village_id)      inner join   ( select t4.projectid,t4.district_id,mandal_id,village_id,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name  from ( select distinct projectid,const_id,district_id,mandal_id,village_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4   inner join constituency_mst_new cps  on (t4.const_id=cps.constituency_id and cps.delete_flag=false)  group by t4.projectid,t4.district_id,mandal_id,village_id ) cp   on (pa.projectid=cp.projectid and pa.district_id=cp.district_id  and pa.mandal_id=cp.mandal_id  and  pa.village_id=cp.village_id)   left join  (select t5.projectid,t5.district_id,t5.mandal_id,t5.village_id,  string_agg(coalesce(vms.vname,'NA'), ' ,') as village_name from ( select distinct projectid,district_id,mandal_id,village_id from  components.project_ayacut   cpachild5 where delete_flag=false and is_latest=true) t5 left join villages_mst_new vms on (t5.village_id=vms.vcode::int and t5.mandal_id=vms.mcode::int and t5.district_id=vms.dcode::int) group by t5.projectid ,t5.district_id,t5.mandal_id,t5.village_id) vm  on (pa.projectid=vm.projectid  and pa.district_id=vm.district_id and pa.mandal_id=vm.mandal_id and pa.village_id=vm.village_id)   union all   select pa.projectid,cp.constituency_name,  pa.ayacut_created,pa.stableayacut,'NA', pmt.project_name || ' Total Ayacut' as project_name, pmu.unit_name,  district_name, mandal_name ,  pa.contemplated_ayacut,pa.irrigated_ayacut,-1 as district_id,-3,-2 as village_id,'NA'  as village_name from ( select pat.projectid,   round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut, round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut, string_agg(pat.remarks, ' ,') as remarks  from components.project_ayacut  pat    where pat.delete_flag=false and pat.is_latest=true  group by pat.projectid) pa   inner join ( select distinct projectid, string_agg(pm.project_name, ' ,') as project_name   from ( select distinct projectid   from  components.project_ayacut   cpachild2  where delete_flag=false and is_latest=true ) t   inner join project_mst pm   on (t.projectid=pm.project_id and pm.delete_flag=false)   group by projectid ) pmt  on (pa.projectid=pmt.projectid  )   inner join ( select t2.projectid,string_agg(um.unit_name, ' ,') as unit_name   from ( select distinct projectid, cpachild2.unit_id   from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t2   inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.projectid) pmu  on (pa.projectid=pmu.projectid   )  inner join (select t4.projectid,string_agg(dms.district_name, '   ,') as district_name   from ( select distinct projectid,cpachild4.district_id,mandal_id   from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true ) t4    inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.projectid) dm  on (pa.projectid=dm.projectid    )   inner join ( select t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name  from ( select distinct projectid,district_id,mandal_id   from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true) t4   inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)  group by t4.projectid) mm  on (pa.projectid=mm.projectid )  inner join  ( select t4.projectid,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name  from ( select distinct projectid,const_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cps  on (t4.const_id=cps.constituency_id and cps.delete_flag=false) group by t4.projectid ) cp  on (pa.projectid=cp.projectid  )  order by project_name,mandal_name,village_name

