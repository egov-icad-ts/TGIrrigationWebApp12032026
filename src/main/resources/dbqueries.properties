t_id ) breachcnt  on (totbv.unit_id=breachcnt.unit_id and totbv.circle_id=breachcnt.circle_id  and totbv.division_id=breachcnt.division_id  and totbv.subdivision_id=breachcnt.subdivision_id and totbv.section_id=breachcnt.section_id and totbv.post_id=breachcnt.post_id  and totbv.form_data_sentdate=breachcnt.form_data_sentdate and totbv.comp_cat_id=breachcnt.comp_cat_id )   left join (  select count (distinct mtf1.form_data_id) as dmcnt, mtf1.form_data_sentdate,  coalesce(unit_id,0) as unit_id ,coalesce(mtf1.circle_id,0) as circle_id  ,coalesce(mtf1.division_id,0) as  division_id,coalesce(subdivision_id,0) as subdivision_id,mtf1.section_id, 	mtf1.post_id, mtf1.comp_cat_id  from  invom.mi_tank_form20data  mtf1   where mtf1.delete_flag=false and mtf1.is_latest=true   and mtf1.damage_type=2   group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.section_id, 	mtf1.post_id, mtf1.form_data_sentdate,mtf1.comp_cat_id ) damagecnt   on (totbv.unit_id=damagecnt.unit_id and totbv.circle_id=damagecnt.circle_id  and totbv.division_id=damagecnt.division_id and totbv.subdivision_id=damagecnt.subdivision_id and totbv.section_id=damagecnt.section_id and totbv.post_id=damagecnt.post_id and totbv.form_data_sentdate=damagecnt.form_data_sentdate  and totbv.comp_cat_id=damagecnt.comp_cat_id)  inner join unit_master um   on (totbv.unit_id=um.unit_id and um.delete_flag=false )  inner join circle_master cm  on (totbv.circle_id=cm.circle_id and cm.delete_flag=false )  inner join division_master dm  on (totbv.division_id=dm.division_id and totbv.circle_id=dm.circle_id and dm.delete_flag=false ) inner join subdivision_master sm  on (totbv.subdivision_id=sm.subdivision_id and totbv.division_id=sm.division_id and sm.delete_flag=false ) inner join taskmanagement.subposts tsp on (totbv.post_id=tsp.postid and tsp.post_status='ACTIVE' ) left join section_master secm  on (totbv.section_id=secm.section_id and secm.delete_flag=false)      where   ((extract (year from totbv.form_data_sentdate ) =? )  or  ( ( totbv.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( totbv.form_data_sentdate  <= to_date(?,'DD/MM/YYYY'))   )    )


SELECT_TANK_FDR_ABSTRACT_DETAIL=select distinct mtf.tank_id_mk,  imt.tank_name ,imt.district_id,dm.district_name,imt.mandal_id,coalesce(mm.mandal_name,'NA') as mandal_name, imt.village_id, coalesce(vmn.vname,'NA') as village_name ,imt.ac_id,cmn.constituency_name, coalesce(mtf.unit_id,0) as unit_id, um.unit_code, coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name, coalesce(mtf.subdivision_id,0) as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name, to_char( mtf.form_data_sentdate, 'dd/mm/YYYY') as tsfcFormDate,  mtf.form_data_id,mtf.post_id,tsp.post_name,coalesce(mtf.damage_type,0) as damage_type,mtf.comp_cat_id , 'NA' , imt.tank_code,imt.tank_geo_tag,imt.ayacut_acres,mtf.approx_cost_permanent,mtf.approx_cost_temporary,mtf.rain_qty,mtf.rain_date,mtf.rain_rg_station,mtf.restored,detaildata.srcname,detaildata.breachlength  from  invom.mi_tank_form20data mtf  inner join invom.invom_mi_tanks  imt on (mtf.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)  left join (select form_data_id, sum( GREATEST(irr_src_ch_to_km - irr_src_ch_frm_km, 0) * 1000  ) as breachlength ,  string_agg(mtfis.form_irr_src, ',') AS srcname from  invom.mi_tank_form20detail mtfd inner join invom.mi_tank_form_irr_sources mtfis on (mtfd.form_irr_src_id=mtfis.form_irr_src_id and mtfis.delete_flag=false) where mtfd.delete_flag=false and mtfd.is_latest=true   group by form_data_id) detaildata on (mtf.form_data_id=detaildata.form_data_id)  inner join districts_mst dm  on  (imt.district_id=dm.district_id and dm.delete_flag=false ) inner join constituency_mst_new cmn  on  (imt.ac_id=cmn.ac_code and cmn.delete_flag=false ) left join villages_mst_new vmn on  (imt.district_id=vmn.dcode::int and imt.mandal_id = vmn.mcode::int and imt.village_id=vmn.vcode::int  ) inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' ) inner join mandal_mst mm  on  (imt.district_id=mm.district_id and imt.mandal_id = mm.mcode::int and  mm.delete_flag=false ) inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master divm  on (mtf.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false) where mtf.delete_flag=false  and mtf.is_latest=true  and  (  (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?) or (( mtf.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( mtf.form_data_sentdate  <= to_date(?,'DD/MM/YYYY')))  )  


SELECT_RESERVOIR_FDR_ABSTRACT_DETAIL=  select distinct mtf.res_id,  imr.res_name ,imr.district_id,dm.district_name,imr.mandal_id, coalesce(mm.mandal_name,'NA') as mandal_name, imr.village_id,  coalesce(vmn.vname,'NA') as village_name ,  0,'NA', coalesce(mtf.unit_id,0) as unit_id, um.unit_code,  coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name,  coalesce(mtf.subdivision_id,0) as subdivision_id ,   coalesce(sdm.subdivision_name,'NA') as subdivision_name,  to_char( mtf.form_data_sentdate, 'dd/mm/YYYY') as tsfcFormDate,   mtf.form_data_id,mtf.post_id,tsp.post_name,coalesce(mtf.damage_type,0) as damage_type ,  mtf.comp_cat_id , coalesce(imr.village_name,'NA') ,0,0,0,mtf.approx_cost_permanent,mtf.approx_cost_temporary,mtf.rain_qty,mtf.rain_date,mtf.rain_rg_station,mtf.restored,detaildata.srcname,detaildata.breachlength    from  invom.mi_tank_form20data mtf  inner join invom.invom_reservoirs  imr on (mtf.res_id=imr.res_id and imr.delete_flag=false and imr.is_latest=true)   left join (select form_data_id, sum( GREATEST(irr_src_ch_to_km - irr_src_ch_frm_km, 0) * 1000  ) as breachlength ,  string_agg(mtfis.form_irr_src, ',') AS srcname from  invom.mi_tank_form20detail mtfd inner join invom.mi_tank_form_irr_sources mtfis on (mtfd.form_irr_src_id=mtfis.form_irr_src_id and mtfis.delete_flag=false) where mtfd.delete_flag=false and mtfd.is_latest=true   group by form_data_id) detaildata on (mtf.form_data_id=detaildata.form_data_id)  inner join districts_mst dm  on  (imr.district_id=dm.district_id and dm.delete_flag=false )   left join villages_mst_new vmn  on  (imr.district_id=vmn.dcode::int and imr.mandal_id = vmn.mcode::int and imr.village_id=vmn.vcode::int  )  inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' )  inner join mandal_mst mm  on  (imr.district_id=mm.district_id and imr.mandal_id = mm.mcode::int and  mm.delete_flag=false ) inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master divm   on (mtf.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false)  where mtf.delete_flag=false  and mtf.is_latest=true  and  (  (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?) or (( mtf.form_data_sentdate >=to_date(?,'DD/MM/YYYY')  ) and  ( mtf.form_data_sentdate  <= to_date(?,'DD/MM/YYYY')))  )  


SELECT_CANAL_FDR_ABSTRACT_DETAIL= select distinct mtf.canal_id,  imc.canal_name ||'@' ||canal_type||' Canal' || '@ch.From'|| coalesce(chainage_fromkm,0.0)||'km@ch.To'|| coalesce(chainage_tokm,0.0) ,icl.district_id,dm.district_name,icl.mandal_id, coalesce(mm.mandal_name,'NA') as mandal_name, icl.village_id,  coalesce(vm.vname,'NA') as village_name ,  0,'NA', coalesce(mtf.unit_id,0) as unit_id, um.unit_code,  coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name,  coalesce(mtf.subdivision_id,0) as subdivision_id ,  coalesce(sdm.subdivision_name,'NA') as subdivision_name,   to_char( mtf.form_data_sentdate, 'dd/mm/YYYY') as tsfcFormDate,   mtf.form_data_id,mtf.post_id,tsp.post_name,coalesce(mtf.damage_type,0) as damage_type ,  mtf.comp_cat_id , coalesce(icl.village_name,'NA'),0,0,0,mtf.approx_cost_permanent,mtf.approx_cost_temporary,mtf.rain_qty,mtf.rain_date,mtf.rain_rg_station,mtf.restored,detaildata.srcname,detaildata.breachlength   from  invom.mi_tank_form20data mtf  inner join invom.invom_canals  imc on (mtf.canal_id=imc.canal_id and imc.delete_flag=false and imc.is_latest=true)  inner join invom.invom_canals_location icl on (mtf.canal_loc_id=icl.canal_loc_id and icl.delete_flag=false and icl.is_latest=true)  left join (select form_data_id, sum( GREATEST(irr_src_ch_to_km - irr_src_ch_frm_km, 0) * 1000  ) as breachlength ,  string_agg(mtfis.form_irr_src, ',') AS srcname from  invom.mi_tank_form20detail mtfd inner join invom.mi_tank_form_irr_sources mtfis on (mtfd.form_irr_src_id=mtfis.form_irr_src_id and mtfis.delete_flag=false) where mtfd.delete_flag=false and mtfd.is_latest=true   group by form_data_id) detaildata on (mtf.form_data_id=detaildata.form_data_id)  inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)   left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )   inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' )    inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master divm   on (mtf.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false) inner join invom.invom_canal_types  ict on (imc.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false)  where mtf.delete_flag=false  and mtf.is_latest=true  and  (  (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?) or (( mtf.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( mtf.form_data_sentdate  <= to_date(?,'DD/MM/YYYY')))  )  

