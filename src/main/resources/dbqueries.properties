flag=false)  group by t4.const_id ,t4.projectid ) dm  on (pa.const_id=dm.const_id  and pa.projectid=dm.projectid ) left join (select t4.const_id,t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), ' , ') as mandal_name from ( select distinct const_id,cpachild4.projectid,mandal_id  from  components.project_ayacut   cpachild4) t4   inner join mandal_mst mms on (t4.mandal_id=mms.mandal_id and mms.delete_flag=false)  group by t4.const_id ,t4.projectid) mm  on (pa.const_id=mm.const_id  and pa.projectid=mm.projectid ) inner join constituency_mst  cm  on (pa.const_id=cm.constituency_id and cm.delete_flag=false )  where pa.const_id in (select constituency_id from constituency_mst where old_districtid=?)   union all  select pa.const_id,cm.constituency_name||' '||'Total Ayacut',-3, pa.ayacut,pa.stableayacut,pa.reamarks ,pmt.project_name, pmu.unit_name, packs.package_name,dm.district_name,'NA' from  (  select pat.const_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut ,round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,string_agg(pat.remarks, '  ,') as reamarks  from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true   group by pat.const_id)pa 	 inner join (select t.const_id,string_agg(pm.project_name, ' ,') as project_name  from ( select distinct const_id, cpachild.projectid  from  components.project_ayacut   cpachild ) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false)   group by t.const_id ) pmt   on (pa.const_id=pmt.const_id )   inner join (select t2.const_id,string_agg(um.unit_code, ' ,') as unit_name from ( select distinct const_id, cpachild2.unit_id  from  components.project_ayacut   cpachild2) t2  inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)  group by t2.const_id ) pmu   on (pa.const_id=pmu.const_id ) inner join (select t3.const_id,string_agg(cps.package_name, ' ,') as package_name from ( select distinct const_id, cpachild3.pack_id  from  components.project_ayacut   cpachild3) t3   left join components.packs cps on (t3.pack_id=cps.pack_id and cps.delete_flag=false)      group by t3.const_id ) packs  on (pa.const_id=packs.const_id )    inner join (select t4.const_id,string_agg(dms.district_name, ' ,') as district_name from ( select distinct const_id, cpachild4.district_id  from  components.project_ayacut   cpachild4) t4   inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.const_id ) dm  on (pa.const_id=dm.const_id ) inner join constituency_mst  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false )  where pa.const_id in (select constituency_id from constituency_mst where old_districtid=?) order by constituency_name

SELECT_DIST_MAN_PROJ=select pa.district_id, dm.district_name,pa.mandal_id, coalesce(mm.mandal_name,'NA') as mandal_name ,pa.projectid,pmt.project_name,pmt.project_type_id,pmt.project_type, pa.contemplated_ayacut , pa.ayacut_created, pa.stableayacut, pa.irrigated_ayacut, pmu.unit_name,  pa.remarks ,   cp.constituency_name  from (select pat.district_id,pat.mandal_id,pat.projectid,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut , round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut ,   string_agg(pat.remarks, '  ,') as remarks   from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true   group by pat.district_id,pat.mandal_id,pat.projectid) pa   inner join (select t.district_id,t.mandal_id,t.projectid,pm.project_type_id,pt.project_type,string_agg(pm.project_name, '  ,')  as project_name  from ( select distinct district_id,mandal_id, projectid   from  components.project_ayacut   cpachild  where  delete_flag=false and is_latest=true ) t   inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false)  inner join project_type pt on (pm.project_type_id=pt.project_type_id)   group by t.district_id ,t.mandal_id,t.projectid,pm.project_type_id,pt.project_type) pmt  on (pa.district_id=pmt.district_id and pa.mandal_id=pmt.mandal_id and  pa.projectid=pmt.projectid )   inner join (select t2.district_id,t2.mandal_id,t2.projectid,string_agg(um.unit_name, '  , ') as unit_name  from ( select distinct district_id,mandal_id,projectid, cpachild2.unit_id    from  components.project_ayacut   cpachild2   where  delete_flag=false and is_latest=true) t2  inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.district_id,t2.mandal_id,t2.projectid) pmu  on (pa.district_id=pmu.district_id and pa.mandal_id=pmu.mandal_id and pa.projectid=pmu.projectid  )  inner join (select t4.district_id,t4.mandal_id,t4.projectid,string_agg(dms.district_name, ' , ') as district_name  from ( select distinct district_id,mandal_id,projectid from  components.project_ayacut   cpachild4  where  delete_flag=false and is_latest=true) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.district_id ,t4.mandal_id,t4.projectid ) dm   on (pa.district_id=dm.district_id and pa.mandal_id=dm.mandal_id  and pa.projectid=dm.projectid )  inner join (select t4.district_id,t4.mandal_id,t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), ' , ') as mandal_name  from ( select distinct district_id,mandal_id,cpachild4.projectid   from  components.project_ayacut   cpachild4  where  delete_flag=false and is_latest=true) t4   inner join mandal_mst mms  on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)  group by t4.district_id ,t4.mandal_id,t4.projectid) mm   on (pa.district_id=mm.district_id and pa.mandal_id=mm.mandal_id  and pa.projectid=mm.projectid )    inner join   ( select t4.district_id,mandal_id,t4.projectid,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name  from ( select distinct district_id,mandal_id,projectid,const_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4   inner join constituency_mst_new cps  on (t4.const_id=cps.constituency_id and cps.delete_flag=false)  group by t4.district_id,mandal_id,projectid ) cp    on (pa.district_id=cp.district_id and pa.mandal_id=cp.mandal_id and pa.projectid=cp.projectid )   where pa.district_id=?  union all   select pa.district_id,dm.district_name as district_name , pa.mandal_id as mandal_id, mm.mandal_name||'   '||pa.project_type||'   Total Ayacut' as mandal_name, -1 as project_id, 'NA' as project_name, pa. project_type_id as project_type_id,pa.project_type as project_type, pa.contemplated_ayacut, pa.ayacut_created, pa.stableayacut, pa.irrigated_ayacut,  'NA', 'NA',   'NA'   from  (  select pat.district_id,pat.mandal_id,pt.project_type_id,pt.project_type, round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,   round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut ,   round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,  string_agg(pat.remarks, '  ,') as reamarks   from components.project_ayacut  pat  inner join project_mst pm on (pat.projectid=pm.project_id and pm.delete_flag=false)  inner join project_type pt on (pm.project_type_id=pt.project_type_id)  where pat.delete_flag=false and pat.is_latest=true    group by pat.district_id,pat.mandal_id,pt.project_type_id )pa  inner join (select t4.district_id,t4.mandal_id,t4.project_type_id,string_agg(dms.district_name, ' ,') as district_name   from ( select distinct cpachild4.district_id,mandal_id,pt.project_type_id   from  components.project_ayacut   cpachild4   inner join project_mst pm on (cpachild4.projectid=pm.project_id and pm.delete_flag=false)   inner join project_type pt on (pm.project_type_id=pt.project_type_id)    where cpachild4.delete_flag=false and cpachild4.is_latest=true  ) t4   inner join districts_mst dms   on ( t4.district_id = dms.district_id and dms.delete_flag=false)  group by t4.district_id,t4.mandal_id,t4.project_type_id ) dm   on (pa.district_id=dm.district_id  and pa.mandal_id=dm.mandal_id and pa.project_type_id=dm.project_type_id)  inner join ( select t4.district_id,t4.mandal_id,t4.project_type_id,  string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name    from ( select distinct district_id,  mandal_id,pt.project_type_id    from  components.project_ayacut   cpachild4    inner join project_mst pm on (cpachild4.projectid=pm.project_id and pm.delete_flag=false)   inner join project_type pt on (pm.project_type_id=pt.project_type_id)    where cpachild4.delete_flag=false and cpachild4.is_latest=true) t4     inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)   group by t4.district_id,t4.mandal_id,t4.project_type_id) mm    on (pa.district_id=mm.district_id  and pa.mandal_id=mm.mandal_id and pa.project_type_id=mm.project_type_id)    where pa.district_id=?   union all    select pa.district_id,dm.district_name as district_name ,   pa.mandal_id as mandal_id,   mm.mandal_name||'   Total Ayacut ( Major  and  Medium )   ' as mandal_name,   -5 as project_id,   'NA' as project_name,   0 as project_type_id,  'NA' as project_type,   pa.contemplated_ayacut,   pa.ayacut_created,   pa.stableayacut,   pa.irrigated_ayacut,   'NA',   'NA',   'NA'   from  (  select pat.district_id,pat.mandal_id,  round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,   round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,   round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut ,   round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,   string_agg(pat.remarks, '  ,') as reamarks   from components.project_ayacut  pat   where pat.delete_flag=false and pat.is_latest=true    group by pat.district_id,pat.mandal_id )pa   inner join (select t4.district_id,t4.mandal_id,string_agg(dms.district_name, ' ,') as district_name   from ( select distinct cpachild4.district_id,mandal_id    from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true ) t4   inner join districts_mst dms   on ( t4.district_id = dms.district_id and dms.delete_flag=false)   group by t4.district_id,t4.mandal_id ) dm    on (pa.district_id=dm.district_id  and pa.mandal_id=dm.mandal_id )   inner join ( select t4.district_id,t4.mandal_id,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name  from ( select distinct district_id,  mandal_id  from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true) t4    inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)    group by t4.district_id,t4.mandal_id) mm    on (pa.district_id=mm.district_id  and pa.mandal_id=mm.mandal_id )   where pa.district_id=?  order by district_name,mandal_name,project_type  

