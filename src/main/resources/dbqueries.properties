,coalesce(t2.circle_id,0) as circle_id,  string_agg(cm.circle_name, ' ,') as circle_name   from ( select distinct  cpachild2.unit_id ,coalesce(circle_id,0) as circle_id   from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t2  inner join circle_master cm on (t2.circle_id=cm.circle_id and t2.unit_id=cm.unit_id and cm.delete_flag=false)   group by t2.unit_id,t2.circle_id) pcu  on (pa.unit_id=pcu.unit_id  and pa.circle_id=pcu.circle_id )   inner join ( select unit_id,coalesce(t3.circle_id,0) as circle_id, string_agg(cps.pkg_name, ' , ') as package_name  from ( select distinct projectid, cpachild3.pack_id,unit_id, coalesce(circle_id,0) as circle_id  from  components.project_ayacut  cpachild3   where delete_flag=false and is_latest=true ) t3   left join package_mst cps on (t3.pack_id=cps.pkg_id and t3.projectid=cps.project_id and cps.deleteflag=false)   group by t3.unit_id,t3.circle_id) packs   on (pa.unit_id=packs.unit_id  and pa.circle_id=packs.circle_id  )   inner join   (select t4.unit_id,coalesce(circle_id,0) as circle_id,string_agg(dms.district_name, '   ,') as district_name   from ( select distinct unit_id,coalesce(circle_id,0) as circle_id,cpachild4.district_id  from  components.project_ayacut   cpachild4    where delete_flag=false and is_latest=true ) t4    inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.unit_id,t4.circle_id) dm   on (pa.unit_id=dm.unit_id  and pa.circle_id=dm.circle_id   )   inner join  ( select t4.unit_id,coalesce(circle_id,0) as circle_id,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name   from ( select distinct unit_id,coalesce(circle_id,0) as circle_id,district_id,mandal_id  from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4   inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)  group by t4.unit_id,t4.circle_id) mm   on (pa.unit_id=mm.unit_id and pa.circle_id=mm.circle_id )  inner join  ( select t4.unit_id,coalesce(circle_id,0) as circle_id,  string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name   from ( select distinct unit_id,coalesce(circle_id,0) as circle_id,const_id   from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4   inner join constituency_mst_new cps   on (t4.const_id=cps.constituency_id and cps.delete_flag=false)  group by t4.unit_id,t4.circle_id ) cp  on (pa.unit_id=cp.unit_id and pa.circle_id=cp.circle_id  )   union all    select pa.unit_id,-3,  cp.constituency_name,  pa.ayacut_created,pa.stableayacut,'NA',  pmt.project_name || ' Total Ayacut' as project_name, pmu.unit_name,  coalesce(packs.package_name,'NA') as package_name,district_name, mandal_name ,  pa.contemplated_ayacut,pa.irrigated_ayacut,  -3,   'No Circle' as circle_name,  'No Division' as division_name  from ( select pat.unit_id,  round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut, string_agg(pat.remarks, ' ,') as remarks   from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true  group by pat.unit_id) pa   inner join ( select distinct unit_id, string_agg(pm.project_name, ' ,') as project_name  from ( select distinct projectid,unit_id  from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t   inner join project_mst pm  on (t.projectid=pm.project_id and pm.delete_flag=false)   group by t.unit_id ) pmt  on (pa.unit_id=pmt.unit_id  )  inner join  ( select t2.unit_id,string_agg(um.unit_name, ' ,') as unit_name   from ( select distinct  cpachild2.unit_id   from  components.project_ayacut   cpachild2   where delete_flag=false and is_latest=true ) t2   inner join unit_master um on 