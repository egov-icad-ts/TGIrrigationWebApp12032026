data_sentdate,mtf1.comp_cat_id ) damagecnt   on (totbv.unit_id=damagecnt.unit_id and totbv.circle_id=damagecnt.circle_id   and totbv.form_data_sentdate=damagecnt.form_data_sentdate  and totbv.comp_cat_id=damagecnt.comp_cat_id)  inner join unit_master um   on (totbv.unit_id=um.unit_id and um.delete_flag=false ) inner join circle_master cm  on (totbv.circle_id=cm.circle_id and cm.delete_flag=false ) where    ((extract (year from totbv.form_data_sentdate ) =? )  or  ( ( totbv.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( totbv.form_data_sentdate  <= to_date(?,'DD/MM/YYYY'))   )    )


