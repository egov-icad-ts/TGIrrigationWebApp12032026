SELECT_EMP=select emp_id, first_name||' '||last_name as emp , tem.unit_id,tem.circle_id,tem.division_id,tem.subdivision_id,tem.phone_num_1,tem.designation_id, tem.emp_hrms,tem.post_id,tdm.designation_name,coalesce(um.unit_name,'0') as unitname, coalesce(cm.circle_name,'0') as circlename, coalesce(division_name,'0') divisionname ,  coalesce(subdivision_name,'0') as subdivisionname from  taskmanagement.emp_mst tem inner join  unit_master um on (tem.unit_id=um.unit_id) left join  circle_master cm on (tem.circle_id=cm.circle_id ) left join  division_master dm on (tem.division_id=dm.division_id)  left join  subdivision_master sdm  on (tem.subdivision_id=sdm.subdivision_id) inner join taskmanagement.designation_mst tdm on (tem.designation_id=tdm.designation_id)  where tem.delete_flag=false and tem.is_latest=true 
           
