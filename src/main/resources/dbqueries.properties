(respondent_name,'--')||' '||coalesce(respondent_address,'--')))  , '-')      as respondent from cases_respondents   cr , respondent_mst rm  where cr.respondent_id=rm.respondent_id   and cr.delete_flag=false and rm.delete_flag=false group by case_id ) cr    on (cm.case_id=cr.case_id) inner join    (select   cra.case_id, array_to_string(array_agg((r_advocate_name||' '||coalesce(r_advocate_address,'--')))  , '-')   as resadv    from cases_res_advocates   cra , respondent_advocate_mst ram  where cra.r_advocate_id=ram.r_advocate_id and cra.delete_flag=false    and ram.delete_flag=false group by case_id) cra  on (cm.case_id=cra.case_id)   where   cm.delete_flag=false  and case_court_id =?   order by case_id ;




