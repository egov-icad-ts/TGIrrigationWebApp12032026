g_para_id) as replybyceparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum   on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=7  group by icm.cag_gist_id,icum.unit_id) replybyce  on (icmg.cag_gist_id=replybyce.cag_gist_id and totalcag.unit_id=replybyce.unit_id) left join (select count(icm.cag_para_id) as replybyenciparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm inner join irparas.cag_status ics   on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)  inner join irparas.cagpara_unit_map icum  on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=8 group by icm.cag_gist_id,icum.unit_id) replybyenci  on (icmg.cag_gist_id=replybyenci.cag_gist_id and  totalcag.unit_id=replybyenci.unit_id)  left join (select count(icm.cag_para_id) as replybysecyagparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm inner join irparas.cag_status ics   on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=true)   inner join irparas.cagpara_unit_map icum  on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  where icm.delete_flag=false and icm.is_latest=true and ics.cag_para_status_id=9    group by icm.cag_gist_id,icum.unit_id) replybysecyag  on (icmg.cag_gist_id=replybysecyag.cag_gist_id and   totalcag.unit_id=replybysecyag.unit_id)  left join (select count(icm.cag_para_id) as replybysecycontparas,icm.cag_gist_id,icum.unit_id  from irparas.cag_master icm  inner join irparas.cag_status ics  on (icm.cag_para_id=ics.cag_para_id and ics.delete_flag=false and ics.is_latest=t