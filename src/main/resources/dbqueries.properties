r, mtf1.post_id   from  invom.mi_tank_form20data  mtf1    inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)    	     where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=1  group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.post_id, yr ) breachcnt  on (mtf.post_id=breachcnt.post_id  and EXTRACT(YEAR FROM mtf.form_data_sentdate)::int =breachcnt.yr) left join (   select count (distinct mtf1.tank_id_mk) as dmcnt,  EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr, mtf1.post_id   from  invom.mi_tank_form20data  mtf1   inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=2  group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.post_id, yr ) damagecnt  on ( mtf.post_id=damagecnt.post_id and EXTRACT(YEAR FROM mtf.form_data_sentdate)::int =damagecnt.yr)  where mtf.delete_flag=false and mtf.is_latest=true and EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?



GET_TANK_DISTRICT_FORM20_ABSTRACT=select distinct  dm.district_name , round(coalesce(  totbv.pca/100000,0),2) as pcatot, round(coalesce(  totbv.tca/100000,0),2) as tcatot,  round((coalesce((totbv.pca + totbv.tca)/100000,0)),2) as reptot, round( coalesce(totbv.fbv/100000,0.0),2) as fbv,coalesce(  totbv.cnt,0) as cnt,  coalesce(breachcnt.brcnt,0) as brcnt,coalesce(damagecnt.dmcnt,0) as dmcnt,totbv.yr as fyear, um.unit_name,  totbv.district_id  from  (   select count (distinct mtf1.tank_id_mk) as cnt,  EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr, sum(mtf1.form_data_book_value) as fbv , sum(mtf1.approx_cost_permanent   ) as pca, sum(mtf1.approx_cost_temporary) as tca,  coalesce(imt.district_id,0) as district_id  from  invom.mi_tank_form20data  mtf1  inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)  where mtf1.delete_flag=false and mtf1.is_latest=true  group by imt.district_id, yr ) totbv  left join (  select count (distinct mtf1.tank_id_mk) as brcnt, EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr,  coalesce(imt.district_id,0) as district_id   from  invom.mi_tank_form20data  mtf1    inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)   where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=1  group by imt.district_id, yr ) breachcnt   on (totbv.district_id=breachcnt.district_id   and totbv.yr =breachcnt.yr)  left join (   select count (distinct mtf1.tank_id_mk) as dmcnt,  EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr,  coalesce(imt.district_id,0) as district_id   from  invom.mi_tank_form20data  mtf1   inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)    where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=2  group by imt.district_id, yr ) damagecnt   on (totbv.district_id=damagecnt.district_id  and totbv.yr =damagecnt.yr)  inner join ( select t2.district_id, string_agg(um.unit_name, ' ,') as unit_name ,t2.yr   from    ( select distinct imt.district_id, mtf1.unit_id ,EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr  from  invom.mi_tank_form20data  mtf1  inner join invom.invom_mi_tanks imt  on ( mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true )  where mtf1.delete_flag=false and mtf1.is_latest=true ) t2  inner join unit_master um on ( t2.unit_id=um.unit_id and um.delete_flag=false)  group by t2.district_id,t2.yr ) um   on (totbv.district_id=um.district_id  and totbv.yr =um.yr)   inner join districts_mst dm on  (totbv.district_id=dm.district_id and dm.delete_flag=false)  where  totbv.yr=?  union select  'Districts Total' , round(coalesce(  totbv.pca/100000,0),2) as pcatot, round(coalesce(  totbv.tca/100000,0),2) as tcatot,  round((coalesce((totbv.pca + totbv.tca)/100000,0)),2) as reptot, round( coalesce(totbv.fbv/100000,0.0),2) as fbv,coalesce(  totbv.cnt,0) as cnt,  coalesce(breachcnt.brcnt,0) as brcnt,coalesce(damagecnt.dmcnt,0) as dmcnt,totbv.yr as fyear, 'NA', 0  from  (   select count (distinct mtf1.tank_id_mk) as cnt,  EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr, sum(mtf1.form_data_book_value) as fbv , sum(mtf1.approx_cost_permanent   ) as pca, sum(mtf1.approx_cost_temporary) as tca    from  invom.mi_tank_form20data  mtf1  inner join invom.invom_mi_tanks imt   on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)    where mtf1.delete_flag=false and mtf1.is_latest=true  group by  yr ) totbv    left join (  select count (distinct mtf1.tank_id_mk) as brcnt, EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr    from  invom.mi_tank_form20data  mtf1    inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)   where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=1  group by  yr ) breachcnt   on ( totbv.yr =breachcnt.yr)    left join (   select count (distinct mtf1.tank_id_mk) as dmcnt,  EXTRACT(YEAR FROM mtf1.form_data_sentdate)::int as yr   from  invom.mi_tank_form20data  mtf1   inner join invom.invom_mi_tanks imt on (mtf1.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)    where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=2  group by  yr ) damagecnt   on ( totbv.yr =damagecnt.yr)       where  totbv.yr=?
 
   
