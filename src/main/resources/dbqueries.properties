SELECT_RES_UNIT_MAP=SELECT reservoir_unit_id, irum.unit_id, irum.circle_id, irum.division_id, irum.subdivision_id,irum.res_code, irum.project_id, coalesce(irum.package_id,0) as package_id , workinsp_no, luscur_no, remarks, irum.user_id,irum.user_name,um.unit_code,cm.circle_name,dm.division_name,sdm.subdivision_name,ir.res_name, pm.project_name,coalesce(pkg.package_name,'NA') as package_name   FROM inventory.reservoir_unit_map  irum   inner join unit_master um on (irum.unit_id=um.unit_id and um.delete_flag=false)   inner join circle_master cm on (irum.circle_id=cm.circle_id and cm.delete_flag=false)   inner join division_master dm on (irum.division_id=dm.division_id and dm.delete_flag=false)   inner join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false)  inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true) inner join project_mst pm on (irum.project_id=pm.project_id and pm.delete_flag=false )   left join components.packs pkg on (irum.package_id=pkg.pack_id and pkg.delete_flag=false )  where irum.delete_flag=false and irum.is_latest=true and irum.unit_id=?

SELECT_RES_ABSTRACT=select restot.unit_id,coalesce(restot.restotal,0) as restotal ,coalesce(reson.resongoing,0) as resongoing ,coalesce(rescomp.rescompleted,0) as rescompleted ,um.unit_code from  (select count(distinct res_code) as restotal, unit_id from inventory.reservoir_unit_map  irum where irum.delete_flag=false and irum.is_latest=true group by unit_id) restot left join (select count(distinct irum.res_code) as resongoing,unit_id from inventory.reservoir_unit_map irum inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false)  where irum.delete_flag=false and irum.is_latest=true and ir.res_status_id=1 group by unit_id)reson on (restot.unit_id=reson.unit_id) left join (select count(distinct irum.res_code)as rescompleted,unit_id from inventory.reservoir_unit_map irum inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true and ir.res_status_id=2 group by unit_id )rescomp on(restot.unit_id=rescomp.unit_id) inner join unit_master um on (restot.unit_id=um.unit_id and um.delete_flag=false) order by unit_code
#12012020###select restot.unit_id,restot.restotal,reson.resongoing,rescomp.rescompleted,um.unit_code from  (select count(distinct res_code) as restotal, unit_id from inventory.reservoir_unit_map  irum where irum.delete_flag=false and irum.is_latest=true group by unit_id) restot left join (select count(distinct res_code) as resongoing,unit_id from inventory.reservoir_unit_map irum inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false)  where irum.delete_flag=false and irum.is_latest=true and ir.res_status_id=1 group by unit_id)reson on (restot.unit_id=reson.unit_id) left join (select count(distinct res_code)as rescompleted,unit_id from inventory.reservoir_unit_map irum inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true and ir.res_status_id=2 group by unit_id )rescomp on(restot.unit_id=rescomp.unit_id) inner join unit_master um on (restot.unit_id=um.unit_id and um.delete_flag=false)

SELECT_RES_UNIT_MAP_BY_RESCODE=SELECT reservoir_unit_id, irum.unit_id, irum.circle_id, irum.division_id, irum.subdivision_id,irum.res_code, irum.project_id, coalesce(irum.package_id,0) as package_id , workinsp_no, luscur_no, remarks, irum.user_id,irum.user_name,um.unit_code,cm.circle_name,dm.division_name,sdm.subdivision_name,ir.res_name, pm.project_name,coalesce(pkg.package_name,'NA') as package_name   FROM inventory.reservoir_unit_map  irum   inner join unit_master um on (irum.unit_id=um.unit_id and um.delete_flag=false)   inner join circle_master cm on (irum.circle_id=cm.circle_id and cm.delete_flag=false)   inner join division_master dm on (irum.division_id=dm.division_id and dm.delete_flag=false)   inner join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false)  inner join inventory.reservoirs ir on (irum.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true) inner join project_mst pm on (irum.project_id=pm.project_id and pm.delete_flag=false )   left join components.packs pkg on (irum.package_id=pkg.pack_id and pkg.delete_flag=false )  where irum.delete_flag=false and irum.is_latest=true and irum.res_code=?

SELECT_RES_UNIT_MAP_BYMAPID=SELECT reservoir_unit_id ,unit_id, circle_id, division_id, subdivision_id, res_code, project_id, coalesce(package_id,0), workinsp_no, luscur_no,  coalesce(remarks,'NA'),  user_id, user_name FROM inventory.reservoir_unit_map where  delete_flag=false and is_latest=true and  reservoir_unit_id=? 









SELECT_RES_TOTAL=SELECT distinct irum.unit_id, irum.res_code,res_name,um.unit_name,circlenames.circle_name,divisionnames.division_name,  subdivisionnames.subdivision_name,projnames.project_name,packnames.package_name,irs.res_status  FROM inventory.reservoir_unit_map irum inner join inventory.reservoirs ir   on (irum.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  inner join   unit_master um  on ( irum.unit_id=um.unit_id and um.delete_flag=false) left join ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name from  inventory.reservoir_unit_map  irum  left join circle_master cm  on(irum.circle_id=cm.circle_id and cm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) circlenames  on (irum.res_code=circlenames.res_code)  left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name from  inventory.reservoir_unit_map  irum   left join division_master dm   on ( irum.division_id=dm.division_id and dm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) divisionnames  on (irum.res_code=divisionnames.res_code)  left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name from  inventory.reservoir_unit_map  irum left join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) subdivisionnames   on (irum.res_code=subdivisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name from  inventory.reservoir_unit_map  irum   left join project_mst pm  on (irum.project_id=pm.project_id and pm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) projnames  on (irum.res_code=projnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(package_name,'0'))) , ',') as package_name from  inventory.reservoir_unit_map  irum  left join components.packs cp  on (irum.package_id=cp.pack_id and cp.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) packnames   on (irum.res_code=packnames.res_code)  inner join inventory.reservoir_status irs on (ir.res_status_id=irs.res_status_id and irs.delete_flag=false)  where irum.delete_flag=false and irum.is_latest=true and irum.unit_id=?

SELECT_RES_ONGOING=SELECT distinct irum.unit_id, irum.res_code,res_name,um.unit_name,circlenames.circle_name,divisionnames.division_name,  subdivisionnames.subdivision_name,projnames.project_name,packnames.package_name,irs.res_status FROM inventory.reservoir_unit_map irum inner join inventory.reservoirs ir   on (irum.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true and ir.res_status_id=1)  inner join   unit_master um  on ( irum.unit_id=um.unit_id and um.delete_flag=false) left join ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name from  inventory.reservoir_unit_map  irum  left join circle_master cm  on(irum.circle_id=cm.circle_id and cm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) circlenames  on (irum.res_code=circlenames.res_code)  left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name from  inventory.reservoir_unit_map  irum   left join division_master dm   on ( irum.division_id=dm.division_id and dm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) divisionnames  on (irum.res_code=divisionnames.res_code)  left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name from  inventory.reservoir_unit_map  irum left join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) subdivisionnames   on (irum.res_code=subdivisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name from  inventory.reservoir_unit_map  irum   left join project_mst pm  on (irum.project_id=pm.project_id and pm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) projnames  on (irum.res_code=projnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(package_name,'0'))) , ',') as package_name from  inventory.reservoir_unit_map  irum  left join components.packs cp  on (irum.package_id=cp.pack_id and cp.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) packnames   on (irum.res_code=packnames.res_code) inner join inventory.reservoir_status irs on (ir.res_status_id=irs.res_status_id and irs.delete_flag=false)   where irum.delete_flag=false and irum.is_latest=true and irum.unit_id=?

SELECT_RES_COMPLETED=SELECT distinct irum.unit_id, irum.res_code,res_name,um.unit_name,circlenames.circle_name,divisionnames.division_name,  subdivisionnames.subdivision_name,projnames.project_name,packnames.package_name,irs.res_status  FROM inventory.reservoir_unit_map irum inner join inventory.reservoirs ir   on (irum.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true and ir.res_status_id=2)  inner join   unit_master um  on ( irum.unit_id=um.unit_id and um.delete_flag=false) left join ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name from  inventory.reservoir_unit_map  irum  left join circle_master cm  on(irum.circle_id=cm.circle_id and cm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) circlenames  on (irum.res_code=circlenames.res_code)  left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name from  inventory.reservoir_unit_map  irum   left join division_master dm   on ( irum.division_id=dm.division_id and dm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) divisionnames  on (irum.res_code=divisionnames.res_code)  left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name from  inventory.reservoir_unit_map  irum left join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) subdivisionnames   on (irum.res_code=subdivisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name from  inventory.reservoir_unit_map  irum   left join project_mst pm  on (irum.project_id=pm.project_id and pm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) projnames  on (irum.res_code=projnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(package_name,'0'))) , ',') as package_name from  inventory.reservoir_unit_map  irum  left join components.packs cp  on (irum.package_id=cp.pack_id and cp.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) packnames   on (irum.res_code=packnames.res_code)  inner join inventory.reservoir_status irs on (ir.res_status_id=irs.res_status_id and irs.delete_flag=false)  where irum.delete_flag=false and irum.is_latest=true and irum.unit_id=?

