SELECT_COMP_CAP_ALLLIFTS=select cc.component_id, component_name, coalesce(a.smallconnectload,0) as smallconnectload,coalesce(a.smallactualload,0) as smallactualload ,coalesce(b.mediumconnectload,0) as mediumconnectload ,coalesce(b.mediumactualload,0) as mediumactualload ,coalesce(c.majorconnectload,0) as majorconnectload ,coalesce(c.majoractualload,0) as majoractualload from components.components  cc left join  (select  component_id,sum(coalesce(connect_load_motor_pump_mw,0)) as smallconnectload ,sum(coalesce(actual_load_motor_pump_mw,0)) as smallactualload from  components.component_info where comp_category=2 and delete_flag=false and is_latest=true and motor_pump_capacity_id=1 group by component_id) a on (cc.component_id=a.component_id) left join  (select  component_id,sum(coalesce(connect_load_motor_pump_mw,0)) as mediumconnectload ,sum(coalesce(actual_load_motor_pump_mw,0)) as mediumactualload from  components.component_info  where comp_category=2 and delete_flag=false and is_latest=true and motor_pump_capacity_id=2 group by component_id ) b on (cc.component_id=b.component_id) left join  (select  component_id,sum(coalesce(connect_load_motor_pump_mw,0)) as majorconnectload,sum(coalesce(actual_load_motor_pump_mw,0)) as majoractualload from  components.component_info  where comp_category=2 and delete_flag=false and is_latest=true and motor_pump_capacity_id=3 group by component_id) c on (cc.component_id=c.component_id)  where status_id=?
SELECT_COMP_GOOGLEMAPQUERY=select component_id,component_name,ccc.comp_category_name,discharge_cusecs,pipe_dia_meters,length_pressuremain_kms,no_of_rows,total_lift_mts,total_liftting_period_days,total_lifting_tmc,total_power_with_auxilary,sub_station_cap_hv||'/'||sub_station_cap_lv as sub_station_capacity,from_location,cc.status_id,status,status_color,from_location||','||dm.district_name as address from components.components cc, districts_mst dm ,components.component_category ccc,components.status_master csm where project_id=? and cc.delete_flag=false  and (cc.district_id=dm.district_id and dm.delete_flag=false) and (cc.comp_category::integer=ccc.comp_category_id and ccc.delete_flag=false) and (cc.status_id=csm.status_id and csm.delete_flag=false) order by cc.offtake_chainage; 
SELECT_COMP_EDITORDEL=Select component_id ,  component_name ,   component_parent_id ,   level_id ,   comp_category ,   offtake_chainage ,   component_direction ,   component_length ,   component_from_km ,   component_to_km ,     cc.project_id ,   package_id ,     discharge_cusecs ,   pipe_dia_meters ,   length_pressuremain_kms ,   no_of_rows ,   static_head_mts ,   dynamic_head_mts ,   total_lift_mts ,   total_liftting_period_days ,   total_lifting_tmc ,   mddl_mts ,   delivery_level ,   power_each_motor ,   total_power_motor ,   auxilary_power ,   total_power_with_auxilary ,   sub_station_cap_hv||'/'||sub_station_cap_lv as sub_station_capacity , from_location ,   to_location ,   cc.status_id ,   remarks,  csm.status,   comp_category_name,     pm.project_name, cc.unit_id,um.unit_name   from components.components  cc inner join  components.component_category ccc     on (cc.comp_category::integer=ccc.comp_category_id and ccc.delete_flag=false)  left join  components.status_master csm   on   (cc.status_id=csm.status_id and csm.delete_flag=false ) left join project_mst pm   on(cc.project_id=pm.project_id) left join unit_master um on (um.unit_id=cc.unit_id)   where cc.project_id=? and cc.delete_flag=false order by  offtake_chainage
SELECT_COMP_EDIT=Select cc.component_id ,  cc.component_name ,   cc.component_parent_id ,   cc.level_id ,   cc.comp_category ,   cc.offtake_chainage ,   cc.component_direction ,   cc.component_length ,   component_from_km ,   component_to_km ,     cc.project_id ,  coalesce(ccpm.package_id,1) as package_id  ,    discharge_cusecs ,   pipe_dia_meters ,   cc.length_pressuremain_kms ,   no_of_rows ,   static_head_mts ,   dynamic_head_mts ,   total_lift_mts ,   total_liftting_period_days ,   total_lifting_tmc ,   mddl_mts ,   delivery_level ,   power_each_motor ,   total_power_motor ,   auxilary_power ,   total_power_with_auxilary ,   sub_station_cap_hv||'/'||sub_station_cap_lv as sub_station_capacity , from_location ,   to_location ,   cc.status_id ,   remarks,  csm.status,   comp_category_name,    pm.project_name,cc.unit_id, cc.sub_station_cap_hv,cc.sub_station_cap_lv ,ccpm.comp_pack_map_id from components.components  cc inner join  components.component_category ccc     on (cc.comp_category::integer=ccc.comp_category_id and ccc.delete_flag=false)  left join  components.status_master csm   on   (cc.status_id=csm.status_id and csm.delete_flag=false )  left join project_mst pm   on(cc.project_id=pm.project_id)   left join components.component_package_map ccpm on (ccpm.component_id=cc.component_id)   where cc.component_id= ?	and cc.delete_flag=false 
SELECT_COMP_MON_POWER_EDIT=select comp_mon_powerid,ccmp.project_id,ccmp.component_id,total_units_consumed,fixed_cost_rupees,net_bill_cost,to_char(present_bill_date,'dd/mm/yyyy') as present_bill_date,ccmp.remarks,present_unit,present_bill_cost,penality_cost,additional_deposit,to_char(bill_due_date,'dd/mm/yyyy') as bill_due_date ,to_char(disconnection_date,'dd/mm/yyyy') as disconnection_date ,cc.component_name,pm.project_name,um.unit_name  from components.component_monthly_power ccmp inner join  components.components cc on (ccmp.component_id=cc.component_id and cc.delete_flag=false) inner join  project_mst  pm on (ccmp.project_id=pm.project_id) inner join unit_master  um on (ccmp.unit_id=um.unit_id and um.delete_flag=false)  where ccmp.delete_flag=false and ccmp.is_latest=true  and cc.component_id=ccmp.component_id and ccmp.component_id=?
SELECT_COMP_MON_POWERID=select comp_mon_powerid,ccmp.project_id,ccmp.component_id,total_units_consumed,fixed_cost_rupees,net_bill_cost,to_char(present_bill_date,'dd/mm/yyyy') as present_bill_date,ccmp.remarks,present_unit,present_bill_cost,penality_cost,additional_deposit,to_char(bill_due_date,'dd/mm/yyyy') as bill_due_date ,to_char(disconnection_date,'dd/mm/yyyy') as disconnection_date ,cc.component_name  from components.component_monthly_power ccmp , components.components cc   where ccmp.delete_flag=false and ccmp.is_latest=true  and cc.component_id=ccmp.component_id and ccmp.comp_mon_powerid=?
SELECT_COMP_MON_AYACUT_DEL=SELECT comp_mon_ayacutid, projectid,  present_ayacut_created, cma.component_id, cma.remarks,coalesce(to_char(ayacutmonth,'dd/mm/yyyy'),'0') as  ayacutmonth, present_ayacut_contemplated,  cma.district_id, cma.mandal_id, cma.village_id,cma.const_id,cma.unit_id,um.unit_name,pm.project_name,dm.district_name,mm.mandal_name,vm.village_name,cm.constituency_name,cc.component_name  FROM components.component_monthly_ayacut  cma inner join project_mst pm  on (cma.projectid = pm.project_id and pm.delete_flag=false) inner join unit_master um on (cma.unit_id=um.unit_id and  um.delete_flag=false) inner join districts_mst  dm on (cma.district_id=dm.district_id and  dm.delete_flag=false) inner join mandal_mst mm on (cma.mandal_id=mm.mandal_id and mm.delete_flag=false) left join village_mst vm on (cma.village_id=vm.village_id and vm.delete_flag=false) inner join constituency_mst cm on (cma.const_id=cm.constituency_id and cm.delete_flag=false) inner join components.components cc on (cma.component_id=cc.component_id and cma.delete_flag=false) WHERE cma.component_id=? AND cma.delete_flag=false AND cma.is_latest=true ;
SELECT_COMP_MON_AYACUT_EDIT=SELECT comp_mon_ayacutid, projectid, present_ayacut_created, component_id,  remarks, coalesce(to_char(ayacutmonth,'dd/mm/yyyy'),'0') as  ayacutmonth, present_ayacut_contemplated, cma.district_id, mandal_id, village_id,const_id,unit_id,cm.old_districtid FROM components.component_monthly_ayacut cma  inner  join  constituency_mst cm  on (cma.const_id=cm.constituency_id and cm.delete_flag=false)    WHERE comp_mon_ayacutid=? AND cma.delete_flag=false AND cma.is_latest=true ;
SELECT_COMP_INPUT_P_A_DEL=select cc.component_name,cpad.comp_power_ayacut_id ,cpad.component_id,cpad.project_id,cpad.stage_id,cpad.phase_id,cpad.annualpower_consumed,cpad.ayacut_acres,cpad.financial_year,newcc.parentcompName,pkm.pkg_name   from components.components cc inner join  components.component_power_ayacut_data cpad on(cc.component_id=cpad.component_id and cc.delete_flag=false and cpad.delete_flag=false and cpad.is_latest=true) inner join  ( select cc.component_id as compId, cm.component_id as parentcompid,cm.component_name as parentcompName  from components.components  cc ,(select component_parent_id ,component_id,component_name from components.components ) cm  where cc.component_parent_id=cm.component_id) newcc  on (cc.component_id=newcc.compId) left join (select pkg_name,component_id from package_mst pm  inner join  components.component_package_map ccmp  on (ccmp.package_id=pm.pkg_id and ccmp.delete_flag=false and ccmp.is_latest=true and pm.deleteflag=false)  ) pkm   on (cc.component_id=pkm.component_id) where cpad.project_id=? and cc.delete_flag=false and is_latest=true 
#select cc.component_name,cpad.comp_power_ayacut_id ,cpad.component_id,cpad.project_id,cpad.stage_id,cpad.phase_id,cpad.annualpower_consumed,cpad.ayacut_acres,cpad.financial_year from components.components cc inner join  components.component_power_ayacut_data cpad on(cc.component_id=cpad.component_id and cc.delete_flag=false and cpad.delete_flag=false and cpad.is_latest=true) where cpad.project_id=?
SELECT_MOTOR_COMP_INPUT=select comp_info_id, component_id , project_id, no_motors_pumps,connect_load_motor_pump_mw,actual_load_motor_pump_mw,pump_motor_rpm,motor_pump_make_id,pump_motor_make_name,motor_pump_type_id,pump_motor_type_name,type_motor_pump,motor_pump_capacity_id,pscapacity_name,status_id,motor_pump_status,comp_power_ayacut_id from components.component_info  cci inner join  components.pump_motor_type_mst cpmtm on (cci.motor_pump_type_id=cpmtm.pump_motor_type_id and cpmtm.delete_flag=false and cci.type_motor_pump in ('P','B')) inner join components.pump_motor_make_mst cpmmm on (cci.motor_pump_make_id=cpmmm.pump_motor_make_id and  cpmmm.delete_flag=false and cci.type_motor_pump in ('P','B')) inner  join components.pscapacity_mst cpm on (cci.motor_pump_capacity_id =cpm.pscapacity_id  and cpm.delete_flag=false)inner  join components.motor_pump_status mps on (cci.status_id= mps.motor_pump_status_id and mps.delete_flag=false) where cci.delete_flag=false  and cci.is_latest=true and  cci.project_id=?
SELECT_PUMP_COMP_INPUT=select comp_info_id, cci.component_id , cci.project_id,connect_load_motor_pump_mw,actual_load_motor_pump_mw,pump_motor_rpm,motor_pump_make_id,pump_motor_make_name,motor_pump_type_id,pump_motor_type_name,type_motor_pump,motor_pump_capacity_id,pscapacity_name,cci.status_id,motor_pump_status, cci.pump_name, pm.project_name , um.unit_name,cc.component_name  from components.component_info  cci left join  components.pump_motor_type_mst cpmtm on (cci.motor_pump_type_id=cpmtm.pump_motor_type_id and cpmtm.delete_flag=false ) left join components.pump_motor_make_mst cpmmm on (cci.motor_pump_make_id=cpmmm.pump_motor_make_id and  cpmmm.delete_flag=false )left  join components.pscapacity_mst cpm on (cci.motor_pump_capacity_id =cpm.pscapacity_id  and cpm.delete_flag=false) left  join components.motor_pump_status mps on (cci.status_id= mps.motor_pump_status_id and mps.delete_flag=false) left join project_mst pm on (cci.project_id= pm.project_id and pm.delete_flag=false)  left join unit_master  um on (cci.unit_id=um.unit_id and um.delete_flag=false) inner join components.components  cc on  (cc.component_id=cci.component_id and cc.delete_flag=false) where cci.delete_flag=false  and cci.is_latest=true and cci.component_id=?
###select comp_info_id, component_id , project_id, no_motors_pumps,connect_load_motor_pump_mw,actual_load_motor_pump_mw,pump_motor_rpm,motor_pump_make_id,pump_motor_make_name,motor_pump_type_id,pump_motor_type_name,type_motor_pump,motor_pump_capacity_id,pscapacity_name,status_id,motor_pump_status,comp_power_ayacut_id from components.component_info  cci inner join  components.pump_motor_type_mst cpmtm on (cci.motor_pump_type_id=cpmtm.pump_motor_type_id and cpmtm.delete_flag=false and cci.type_motor_pump in ('M','B')) inner join components.pump_motor_make_mst cpmmm on (cci.motor_pump_make_id=cpmmm.pump_motor_make_id and  cpmmm.delete_flag=false and cci.type_motor_pump in ('M','B'))inner  join components.pscapacity_mst cpm on (cci.motor_pump_capacity_id =cpm.pscapacity_id  and cpm.delete_flag=false) inner  join components.motor_pump_status mps on (cci.status_id= mps.motor_pump_status_id and mps.delete_flag=false) where cci.delete_flag=false  and cci.is_latest=true and cci.project_id=?
