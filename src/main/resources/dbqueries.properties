 select distinct const_id,district_id,mandal_id,unit_id,projectid, cpachild3.pack_id    from  components.project_ayacut   cpachild3) t3 left join components.packs cps on (t3.pack_id=cps.pack_id and cps.delete_flag=false)  group by t3.const_id,district_id ,mandal_id,t3.unit_id,t3.projectid) packs  on (pa.const_id=packs.const_id  and pa.district_id=packs.district_id  and pa.mandal_id=packs.mandal_id and pa.unit_id=packs.unit_id and pa.projectid=packs.projectid)  inner join (select t4.const_id,t4.district_id,t4.mandal_id,t4.unit_id,t4.projectid,string_agg(dms.district_name, ' ,') as district_name from ( select distinct const_id,cpachild4.district_id,mandal_id,unit_id,projectid  from  components.project_ayacut   cpachild4) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.const_id ,t4.district_id,t4.mandal_id,t4.unit_id,t4.projectid) dm  on (pa.const_id=dm.const_id   and pa.district_id=dm.district_id and pa.mandal_id=dm.mandal_id and pa.unit_id = dm.unit_id and pa.projectid=dm.projectid)   left join (select t4.const_id,t4.district_id,t4.mandal_id,unit_id,projectid,string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name from ( select distinct const_id,cpachild4.district_id,mandal_id,unit_id,projectid   from  components.project_ayacut   cpachild4) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mandal_id and mms.delete_flag=false) group by t4.const_id ,t4.district_id,t4.mandal_id,unit_id,projectid) mm  on (pa.const_id=mm.const_id   and pa.district_id=mm.district_id and pa.mandal_id=mm.mandal_id and pa.unit_id=mm.unit_id and pa.projectid=mm.projectid) inner join constituency_mst  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) where pa.projectid=? order by cm.constituency_name,dm.district_name,mandal_name 

