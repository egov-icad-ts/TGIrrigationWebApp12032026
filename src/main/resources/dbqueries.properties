s.deleteflag=false) group by t3.district_id,projectid ) packs on (pa.district_id=packs.district_id and pa.projectid=packs.projectid ) inner join ( select t4.district_id,t4.projectid,   string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name  from ( select distinct district_id,projectid,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4 inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int and mms.delete_flag=false)  group by t4.district_id ,t4.projectid ) mm  on (pa.district_id=mm.district_id and pa.projectid=mm.projectid ) inner join (select t4.district_id,t4.projectid, coalesce(string_agg(cmn.constituency_name, ' ,'),'NA') as constituency_name from ( select distinct const_id,projectid, cpachild4.district_id  from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cmn on (t4.const_id=cmn.constituency_id and cmn.delete_flag=false )  group by t4.district_id,t4.projectid) cm  on (pa.district_id=cm.district_id and pa.projectid=cm.projectid) inner join districts_mst  dstm  on (pa.district_id=dstm.district_id and dstm.delete_flag=false)  union all select pa.district_id,-3, pa.ayacut_created,pa.irrigated_ayacut,pa.stableayacut, pa.reamarks, dstm.district_name||' '||'Total Ayacut' as district_name,'NA','NA','NA','NA','NA', pa.contemplated_ayacut  from  ( select pat.district_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created, round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut , round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut , round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut  , string_agg(pat.remarks, '  ,') as reamarks from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true  group by pat.district_id  )  pa  inner join ( select t.district_id,string_agg(pm.project_name, ' ,') as project_name from ( select distinct district_id, cpachild.projectid   from  components.project_ayacut   cpachild where delete_flag=false and is_latest=true ) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false) group by t.district_id  ) pmt  on (pa.district_id=pmt.district_id ) inner join ( select t2.district_id, string_agg(um.unit_name, ' ,') as unit_name from ( select distinct district_id, cpachild2.unit_id  from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true) t2 inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false) group by t2.district_id  ) pmu  on (pa.district_id=pmu.district_id ) inner join ( select t3.district_id,  coalesce(string_agg(cps.pkg_name, ' ,'),'NA') as package_name from ( select distinct district_id, cpachild3.pack_id  from  components.project_ayacut   cpachild3 where delete_flag=false and is_latest=true) t3 left join package_mst  cps on (t3.pack_id=cps.pkg_id and cps.deleteflag=false) group by t3.district_id ) packs on (pa.district_id=packs.district_id  ) inner join ( select t4.district_id, string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name  from ( select distinct district_id,mandal_id  from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int  and mms.delete_flag=false) group by t4.district_id  ) mm  on (pa.district_id=mm.district_id ) inner join (select t4.district_id, coalesce(string_agg(cmn.constituency_name, ' ,'),'NA') as constituency_name from ( select distinct const_id, cpachild4.district_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cmn on (t4.const_id=cmn.constituency_id and cmn.delete_flag=false ) group by t4.district_id) cm  on (pa.district_id=cm.district_id ) inner join districts_mst  dstm on (pa.district_id=dstm.district_id and dstm.delete_flag=false ) order by district_name ,project_name,unit_name




SELECT_PROJ_AYACUT_DELETE=SELECT coalesce(um.unit_name,'NA') as unitname, coalesce(pm.project_name,'NA') as projectname,coalesce(cp.pkg_name,'NA') as package_name,coalesce(cm.constituency_name,'NA')as constituency_name, coalesce(dm.district_name,'NA')as district_name,coalesce(mm.mandal_name,'NA') as mandal_name ,coalesce(vm.vname,'NA') as village_name ,cpa.p_ayacutid, cpa.projectid, coalesce(cpa.pack_id,0)as pack_id, coalesce(cpa.ayacut_created,0.0) as ayacut_created, coalesce(cpa.stabilized_ayacut,0.0), cpa.remarks, cpa.district_id, cpa.const_id,  coalesce(cpa.mandal_id,0) as mandal_id, coalesce(cpa.village_id,0) as village_id , cpa.unit_id,coalesce(cpa.irrigated_ayacut,0.0) as irrigated_ayacut,coalesce(cpa.contemplated_ayacut,0.0) as contemplated_ayacut,coalesce(cmo.circle_name,'NA') as circle_name,coalesce(dmo.division_name,'NA') as division_name,coalesce(cpa.circle_id,0) as circle_id , coalesce(cpa.division_id,0) as division_id  FROM components.project_ayacut cpa   left join  unit_master  um  on (cpa.unit_id =um.unit_id and um.delete_flag=false)   left join   project_mst pm   on (cpa.projectid=pm.project_id  and pm.delete_flag=false)  left join package_mst cp   on (cpa.pack_id=cp.pkg_id and cp.deleteflag=false)  left join districts_mst dm    on (cpa.district_id=dm.district_id and dm.delete_flag=false)  left join  constituency_mst_new cm  on (cpa.const_id=cm.constituency_id and cm.delete_flag=false)  left  join  mandal_mst mm on (cpa.mandal_id=mm.mcode::int and cpa.district_id=mm.dcode::int and  mm.delete_flag=false)   left join villages_mst_new vm on  (cpa.district_id=vm.dcode::int  and cpa.mandal_id=vm.mcode::int and  cpa.village_id=vm.vcode::int  ) left join circle_master cmo on (cpa.unit_id=cmo.unit_id and cpa.circle_id=cmo.circle_id and cmo.delete_flag=false)  left join division_master dmo on  (cpa.circle_id =dmo.circle_id and cpa.division_id = dmo.division_id and dmo.delete_flag=false)      where cpa.delete_flag=false and cpa.is_latest=true and cpa.unit_id=?

