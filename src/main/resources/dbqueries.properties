INSERT_FAILED_ACCESS_LOGS=insert into access_logs (username, logged_in_time,ip_address, is_latest,remarks_on_logout,failed_attempts)( select ?,now(),?,false,'log in un-successful.Invalid UserName/Password',case when max(failed_attempts) is null then 1 else max(failed_attempts)+1 end  from access_logs where username=? and DATE_TRUNC( 'DAY',TO_DATE((to_char(logged_in_time,'dd-MM-yyyy')),'dd-MM-yyyy'))=DATE_TRUNC( 'DAY',current_date));

INSERT_ACCESS_LOG_ON_LOGIN = insert into access_logs (username, logged_in_time, ip_address, is_latest) values(?,now(),?,true);

UPDATE_USER_ACCESS_ON_LOGOUT = update access_logs set is_latest = false, logout_time  = now(), remarks_on_logout =?  where username = ? and is_latest =true ;

#UPDATE_USER_ACCESS_ON_SESSIONTIMEOUT = update access_logs set is_latest = false, logout_time = now(), remarks_on_logout = 'Logged out as session is expired/tried for another login attempt' where username = ? and is_latest = true; 

GET_LOGOUTDETAILS=Select max(logout_time) from access_logs WHERE username=? and is_latest = false;

#SELECT_USER_CONCURRENT_LOGIN = select count(username) from access_logs where username=? and is_latest='t' and logout_time is null and logged_in_time::date=now()::date;
SELECT_USER_CONCURRENT_LOGIN=select count(username) from access_logs where username=? and is_latest='t' and now()::date=logged_in_time::date and logout_time is null and now()::time <=(logged_in_time::time+interval '0 Hour 21 Minutes')

GET_LOGIN_ATTEMPT_COUNT=select COALESCE( max(failed_attempts),0) as attemptno from access_logs where logged_in_time::date=now()::date and username =?;
