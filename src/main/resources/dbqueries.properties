GET_REPLY_BY_PARA_REPLY_ID=select para_reply_id,para_id,TRIM(reply),reply_remarks,to_char(reply_date,'dd/mm/yyyy') as replydate ,coalesce(updated_user_id,0) as updated_user_id ,coalesce(updated_user_name,'NA') as updated_user_name,coalesce(created_user_id,0) as createuserid,coalesce(created_user_name,'NA') as created_user_name, para_sub_id from irparas.para_replys ipr where ipr.delete_flag=false and ipr.is_latest=true  and para_reply_id=?
