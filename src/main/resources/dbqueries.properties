FORM20_TANK_DATA_PDF_BY_ID=select  mtf.tank_id_mk,  imt.tank_name ,imt.district_id,dm.district_name,imt.ac_id,cmn.constituency_name, to_char(mtf.form_data_sentdate,'dd/Mon/YYYY') as tsfc_form_date, mtf.form_data_id, form_data_cause, coalesce(mtf.form_data_book_value,0) as book_val , to_char(mtf.form_date_damage,'dd/Mon/YYYY') as damage_date, coalesce(mtf.form_proposed ,'NA') as  form_proposed , coalesce(mtf.writeoff_proposed,0) as writeoff_proposed,   coalesce(mtf.action_for_writeoff,'NA') as writeoff_action, coalesce(mtf.breaches_scoures_wished,'NA') as breach_scoures, coalesce(mtf.ayacut_effected_acres,0) as ayacut_effected_acres, coalesce(mtf.ayacut_effect_value,0) as ayacut_effect_value, coalesce(mtf.approx_cost_permanent,0) as  approx_cost_permanent, coalesce(mtf.approx_cost_temporary,0) as  approx_cost_temporary, coalesce(mtf.action_taken_std_crops,'NA') as  action_taken_std_crops, coalesce(mtf.any_remarks ,'NA') as  any_remarks, coalesce(mtf.reg_left_chnn_acres,0) as  reg_left_chnn_acres, coalesce(mtf.reg_right_chnn_acres,0) as  reg_right_chnn_acres,   coalesce(mtf.reg_oth_acres,0) as  reg_oth_acres,   coalesce(mtf.rain_rg_station,'NA') as  rain_rg_station, coalesce(mtf.rain_qty,0) as  rain_qty, coalesce(to_char(mtf.rain_date,'dd/Mon/YYYY'),'NA' ) as rain_date, coalesce(mtf.quart_name ,'NA') as  quart_name, coalesce(mtf.quart_type ,'NA') as  quart_type, coalesce(mtf.bld_qut_type_name ,'NA') as  bld_qut_type_name,  coalesce(mtf.bld_desc_damage ,'NA') as  bld_desc_damage, mtf.form_date_damage_time, coalesce(mtf.unit_id,0) as unit_id, coalesce(um.unit_code,'NA') as unit_name, coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name, coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name, coalesce(mtf.subdivision_id,0) as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name, coalesce(imt.mandal_id,0) as mandal_id ,coalesce(mm.mandal_name,'NA') as mandal_name, coalesce(imt.village_id,0) as village_id , coalesce(vmn.vname,'NA') as village_name, coalesce(mtf.approx_cost_permanent + mtf.approx_cost_temporary,0) as  tot_value, coalesce(imt.tank_geo_tag,0), mtf.comp_cat_id ,'NA'  from  invom.mi_tank_form20data mtf  inner join invom.invom_mi_tanks  imt on (mtf.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) inner join districts_mst dm  on  (imt.district_id=dm.district_id and dm.delete_flag=false ) inner join constituency_mst_new cmn  on  (imt.ac_id=cmn.ac_code and cmn.delete_flag=false ) inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  inner join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false) inner join division_master divm  on (mtf.division_id=divm.division_id and divm.delete_flag=false) inner join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false) inner join mandal_mst mm  on  (imt.district_id=mm.district_id and imt.mandal_id = mm.mcode::int and  mm.delete_flag=false )  left join villages_mst_new vmn on  (imt.district_id=vmn.dcode::int and imt.mandal_id = vmn.mcode::int and imt.village_id=vmn.vcode::int  )  where mtf.delete_flag=false  and mtf.is_latest=true  and mtf.form_data_id=?

FORM20_RES_DATA_PDF_BY_ID=  select  mtf.res_id,  imr.res_name ,imr.district_id,dm.district_name,0,'NA', to_char(mtf.form_data_sentdate,'dd/Mon/YYYY') as tsfc_form_date, mtf.form_data_id, form_data_cause, coalesce(mtf.form_data_book_value,0) as book_val , to_char(mtf.form_date_damage,'dd/Mon/YYYY') as damage_date,    coalesce(mtf.form_proposed ,'NA') as  form_proposed , coalesce(mtf.writeoff_proposed,0) as writeoff_proposed,      coalesce(mtf.action_for_writeoff,'NA') as writeoff_action, coalesce(mtf.breaches_scoures_wished,'NA') as breach_scoures,     coalesce(mtf.ayacut_effected_acres,0) as ayacut_effected_acres, coalesce(mtf.ayacut_effect_value,0) as ayacut_effect_value,      coalesce(mtf.approx_cost_permanent,0) as  approx_cost_permanent, coalesce(mtf.approx_cost_temporary,0) as  approx_cost_temporary,   coalesce(mtf.action_taken_std_crops,'NA') as  action_taken_std_crops, coalesce(mtf.any_remarks ,'NA') as  any_remarks,      coalesce(mtf.reg_left_chnn_acres,0) as  reg_left_chnn_acres, coalesce(mtf.reg_right_chnn_acres,0) as  reg_right_chnn_acres,        coalesce(mtf.reg_oth_acres,0) as  reg_oth_acres,   coalesce(mtf.rain_rg_station,'NA') as  rain_rg_station, coalesce(mtf.rain_qty,0) as          rain_qty, coalesce(to_char(mtf.rain_date,'dd/Mon/YYYY'),'NA' ) as rain_date,  coalesce(mtf.quart_name ,'NA') as  quart_name, coalesce(mtf.quart_type ,'NA') as  quart_type, coalesce(mtf.bld_qut_type_name ,'NA') as  bld_qut_type_name,           coalesce(mtf.bld_desc_damage ,'NA') as  bld_desc_damage,            mtf.form_date_damage_time, coalesce(mtf.unit_id,0) as unit_id, coalesce(um.unit_code,'NA') as unit_name,            coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,            coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name,            coalesce(mtf.subdivision_id,0) as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name,            coalesce(imr.mandal_id,0) as mandal_id ,coalesce(mm.mandal_name,'NA') as mandal_name, coalesce(imr.village_id,0) as village_id ,             coalesce(vmn.vname,'NA') as village_name, coalesce(mtf.approx_cost_permanent + mtf.approx_cost_temporary,0) as  tot_value, 0 ,   mtf.comp_cat_id,coalesce(imr.village_name,'NA') 	from  invom.mi_tank_form20data mtf  inner join invom.invom_reservoirs  imr on (mtf.res_id=imr.res_id and imr.delete_flag=false and imr.is_latest=true) inner join districts_mst dm  on  (imr.district_id=dm.district_id and dm.delete_flag=false )  inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  inner join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false) inner join division_master divm  on (mtf.division_id=divm.division_id and divm.delete_flag=false)    inner join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id    and sdm.delete_flag=false) inner join mandal_mst mm     on  (imr.district_id=mm.district_id and imr.mandal_id = mm.mcode::int and  mm.delete_flag=false )      left join villages_mst_new vmn on  (imr.district_id=vmn.dcode::int and imr.mandal_id = vmn.mcode::int and imr.village_id=vmn.vcode::int  )      where mtf.delete_flag=false  and mtf.is_latest=true  and mtf.form_data_id=?


