id, array_to_string(array_agg(p_advocate_name)  , '-')   as petadv    from cases_pet_advocates   cpa , petitioner_advocate_mst ptam where cpa.advocate_id=ptam.p_advocate_id and cpa.delete_flag=false    and ptam.delete_flag=false group by case_id) cpa   on (cm.case_id=cpa.case_id)inner join   (select   case_id, array_to_string(array_agg((coalesce(respondent_name,'--')||' '||coalesce(respondent_address,'--')))  , '-')      as respondent from cases_respondents   cr , respondent_mst rm  where cr.respondent_id=rm.respondent_id   and cr.delete_flag=false and rm.delete_flag=false group by case_id ) cr    on (cm.case_id=cr.case_id) inner join    (select   cra.case_id, array_to_string(array_agg((r_advocate_name||' '||coalesce(r_advocate_address,'--')))  , '-')   as resadv    from cases_res_advocates   cra , respondent_advocate_mst ram  where cra.r_advocate_id=ram.r_advocate_id and cra.delete_flag=false    and ram.delete_flag=false group by case_id) cra  on (cm.case_id=cra.case_id)  left join (select   case_id, array_to_string(array_agg((coalesce(case_contact_name,'--')))  , '-')      as case_contact_name,array_to_string(array_agg((coalesce(case_contact_phone,'--')))  , '-')      as case_contact_phone from cases_contact_person   cp   where  cp.delete_flag=false and case_is_latest=true group by case_id ) as ccp on (ccp.case_id=cm.case_id)   where   cm.delete_flag=false and cm.unit_id =?   and cm.case_court_id =? and cm.case_date_filing is not null and   cm.case_id in (select distinct case_id from  cases_pet_advocates where advocate_id=? and is_latest=true and delete_flag=false )   order by case_id ;
