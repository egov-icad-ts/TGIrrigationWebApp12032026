cks.projectid  )  inner join (select t4.unit_id,t4.projectid,string_agg(dms.district_name, '  ,') as district_name  from ( select distinct unit_id,projectid,district_id   from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.unit_id ,t4.projectid) dm  on (pa.unit_id=dm.unit_id  and pa.projectid=dm.projectid )  inner join ( select t4.unit_id,t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name   from ( select distinct unit_id,projectid,district_id,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int and mms.delete_flag=false)   group by t4.unit_id ,t4.projectid ) mm   on (pa.unit_id=mm.unit_id  and pa.projectid=mm.projectid )  inner join ( select t4.unit_id,t4.projectid,string_agg(coalesce(cms.constituency_name,'NA'), ' ,') as constituency_name  from ( select distinct unit_id,projectid,const_id from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cms on (t4.const_id=cms.constituency_id and cms.delete_flag=false)   group by t4.unit_id ,t4.projectid) cm   on (pa.unit_id=cm.unit_id  and pa.projectid=cm.projectid )   union all  select pa.unit_id,-3, pa.ayacut_created,pa.irrigated_ayacut,pa.stableayacut,pa.reamarks, pmu.unit_name||' '||'Total Ayacut' as unit_name,  'NA','NA','NA','NA','NA' ,pa.contemplated_ayacut  from  ( select pat.unit_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,string_agg(pat.remarks, '  ,') as reamarks  from components.project_ayacut  pat where pat.delete_flag=false and pat.is_latest=true  group by pat.unit_id  )  pa  inner join (select t.unit_id,string_agg(pm.project_name, '  ,')  as project_name   from ( select distinct unit_id,projectid  from  components.project_ayacut   cpachild  where delete_flag=false and is_latest=true) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false) group by t.unit_id ) pmt  on (pa.unit_id=pmt.unit_id  )  inner join (select t2.unit_id,string_agg(um.unit_name, ' , ') as unit_name  from ( select distinct unit_id from  components.project_ayacut   cpachild2  where delete_flag=false and is_latest=true ) t2  inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)   group by t2.unit_id) pmu  on (pa.unit_id=pmu.unit_id  )  inner join (select t3.unit_id, coalesce(string_agg(cps.pkg_name, ' ,'),'NA') as package_name  from ( select distinct unit_id, cpachild3.pack_id   from   components.project_ayacut   cpachild3  where delete_flag=false and is_latest=true ) t3   left join package_mst cps  on (t3.pack_id=cps.pkg_id and cps.deleteflag=false)  group by t3.unit_id) packs  on (pa.unit_id=packs.unit_id  )  inner join (select t4.unit_id,string_agg(dms.district_name, '  ,') as district_name  from ( select distinct unit_id,district_id   from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true ) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.unit_id ) dm  on (pa.unit_id=dm.unit_id   )  inner join ( select t4.unit_id,string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name  from ( select distinct unit_id,district_id,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int and mms.delete_flag=false)   group by t4.unit_id  ) mm   on (pa.unit_id=mm.unit_id   )  inner join ( select t4.unit_id,string_agg(coalesce(cms.constituency_name,'NA'), ' ,') as constituency_name  from ( select distinct unit_id,const_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true ) t4  inner join constituency_mst_new cms on (t4.const_id=cms.constituency_id and cms.delete_flag=false)   group by t4.unit_id ) cm   on (pa.unit_id=cm.unit_id  )  order by unit_name,project_name
