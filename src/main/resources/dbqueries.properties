GET_CAG_REPLYS_GISTID= SELECT icr.cag_gist_id, icr.cag_para_id, coalesce(cag_reply,'NA') as cag_reply, coalesce(cag_remarks,'NA') as cag_remarks, to_char(icr.cag_reply_date,'dd/mm/yyyy') as cag_reply_date  , cag_reply_id ,  coalesce(icr.update_user_name,'NA') as  update_user_name, coalesce(icr.create_user_name,'NA') as create_user_name ,   'Explanatory note by'||' '||um.unit_name  as unit_name,icr.create_by_unit_id  FROM irparas.cag_replys icr inner join   ( select max(cag_reply_date) as cag_reply_date,cag_para_id,cag_gist_id,create_by_unit_id   from  irparas.cag_replys icr where icr.delete_flag=false and icr.is_latest=true  group by cag_para_id,cag_gist_id,create_by_unit_id) maxreplydate  on (icr.cag_gist_id=maxreplydate.cag_gist_id and icr.cag_para_id=maxreplydate.cag_para_id and icr.cag_reply_date=maxreplydate.cag_reply_date) inner join  unit_master um  on ( icr.create_by_unit_id=um.unit_id  and um.delete_flag=false)     where   icr.is_latest=true  and icr.delete_flag=false    and icr.cag_gist_id=?   order by cag_reply_date

GET_CAG_REPLYS_GISTID_BYUNIT=SELECT icr.cag_gist_id, icr.cag_para_id, coalesce(cag_reply,'NA') as cag_reply, coalesce(cag_remarks,'NA') as cag_remarks, to_char(icr.cag_reply_date,'dd/mm/yyyy') as cag_reply_date  , cag_reply_id ,  coalesce(icr.update_user_name,'NA') as  update_user_name, coalesce(icr.create_user_name,'NA') as create_user_name , CASE   WHEN (maxreplydate.unit_name ='NA'  ) THEN 'Explanatory note by'||' '||'ENC'     WHEN (maxreplydate.unit_name <>'NA'  ) THEN 'Explanatory note by'||' '||maxreplydate.unit_name    END AS unitname,icr.create_by_unit_id  FROM irparas.cag_replys icr inner join   ( select max(cag_reply_date) as cag_reply_date,cag_para_id, cag_gist_id,create_by_unit_id,coalesce(um.unit_name,'NA') as  unit_name from  irparas.cag_replys icr  left join  unit_master um  on ( icr.create_by_unit_id=um.unit_id  and um.delete_flag=false)  where icr.delete_flag=false  and icr.is_latest=true  group by cag_para_id,cag_gist_id,create_by_unit_id,unit_name) maxreplydate  on (icr.cag_gist_id=maxreplydate.cag_gist_id  and icr.cag_para_id=maxreplydate.cag_para_id  and icr.cag_reply_date=maxreplydate.cag_reply_date  and icr.create_by_unit_id=maxreplydate.create_by_unit_id)  where   icr.is_latest=true  and icr.delete_flag=false  and icr.cag_gist_id=?  


GET_CAG_REPLYS_FY =SELECT icr.cag_gist_id, icr.cag_para_id,to_char(icr.cag_reply_date,'dd/mm/yyyy') as cag_reply_date ,cag_reply_id ,  coalesce(icr.update_user_name,'NA') as  update_user_name,  coalesce(icr.create_user_name,'NA') as create_user_name , 'Reply by'||' '||um.unit_name  as unit_name,icr.create_by_unit_id  , to_char(icr.create_date,'dd/mm/yyyy') as create_date  FROM irparas.cag_replys icr  inner join   ( select max(cag_reply_date) as cag_reply_date,cag_para_id,cag_gist_id,create_by_unit_id  from  irparas.cag_replys icr  where icr.delete_flag=false and icr.is_latest=true group by cag_para_id,cag_gist_id,create_by_unit_id) maxreplydate  on (icr.cag_gist_id=maxreplydate.cag_gist_id and icr.cag_para_id=maxreplydate.cag_para_id  and icr.cag_reply_date=maxreplydate.cag_reply_date)  inner join  unit_master um  on ( icr.create_by_unit_id=um.unit_id  and um.delete_flag=false) inner join irparas.cag_master_gist icmg on (icr.cag_gist_id=icmg.cag_gist_id and icmg.delete_flag=false and icmg.is_latest=true)  where   icr.is_latest=true  and icr.delete_flag=false    and icmg.financial_year=?   order by cag_reply_date
GET_CAG_REPLYS_FY_BYUNIT =SELECT icr.cag_gist_id, icr.cag_para_id, to_char(icr.cag_reply_date,'dd/mm/yyyy') as cag_reply_date  , cag_reply_id ,  coalesce(icr.update_user_name,'NA') as  update_user_name, coalesce(icr.create_user_name,'NA') as create_user_name , CASE   WHEN (maxreplydate.unit_name ='NA'  ) THEN 'Reply by'||' '||'ENC'     WHEN (maxreplydate.unit_name <>'NA'  ) THEN 'Reply by'||' '||maxreplydate.unit_name    END AS unitname,icr.create_by_unit_id,to_char(icr.create_date,'dd/mm/yyyy') as create_date  FROM irparas.cag_replys icr inner join   ( select max(cag_reply_date) as cag_reply_date,cag_para_id, cag_gist_id,create_by_unit_id,coalesce(um.unit_name,'NA') as  unit_name from  irparas.cag_replys icr  left join  unit_master um  on ( icr.create_by_unit_id=um.unit_id  and um.delete_flag=false)  where icr.delete_flag=false  and icr.is_latest=true  group by cag_para_id,cag_gist_id,create_by_unit_id,unit_name) maxreplydate  on (icr.cag_gist_id=maxreplydate.cag_gist_id  and icr.cag_para_id=maxreplydate.cag_para_id  and icr.cag_reply_date=maxreplydate.cag_reply_date  and icr.create_by_unit_id=maxreplydate.create_by_unit_id) inner join irparas.cag_master_gist icmg on (icr.cag_gist_id=icmg.cag_gist_id and icmg.delete_flag=false and icmg.is_latest=true) where   icr.is_latest=true  and icr.delete_flag=false  and icmg.financial_year=?
#20122021SELECT icr.cag_gist_id, icr.cag_para_id, coalesce(cag_reply,'NA') as cag_reply, coalesce(cag_remarks,'NA') as cag_remarks,to_char(cag_reply_date,'dd/mm/yyyy') as cag_reply_date  , cag_reply_id ,coalesce(icr.update_user_id,0),  coalesce(icr.update_user_name,'NA'),  coalesce(icr.create_user_id,0) as create_user_id, coalesce(icr.create_user_name,'NA') as create_user_name , coalesce(icm.para_sequence,0) as para_sequence ,sub_para_number,icr.unit_id,um.unit_code	  FROM irparas.cag_replys icr , irparas.cag_master  icm ,unit_master um where icr.cag_para_id=icm.cag_para_id and icr.unit_id=um.unit_id and um.delete_flag=false and   icr.delete_flag=false and   icr.is_latest=true and icr.cag_para_id=?   order by icm.para_sequence, cag_reply_date

