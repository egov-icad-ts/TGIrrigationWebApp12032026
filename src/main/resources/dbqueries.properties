,   coalesce(dam_gallery_number,'NA') as dam_gallery_number ,coalesce(dam_gates_number_fine,0) as dam_gates_number_fine, coalesce(capacity_activestorage,0.0)::text as capacity_activestorage  FROM invom.invom_mi_tanks imt inner join  invom.invom_res_dam_ann1_mst1 irdam on (imt.tank_id_mk=irdam.tank_id and imt.delete_flag=false and imt.is_latest=true) where irdam.delete_flag=false and irdam.is_latest=true and irdam.res_ann1_mst1_id=? 


