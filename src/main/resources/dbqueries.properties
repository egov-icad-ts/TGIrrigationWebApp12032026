INSERT_PREV_NRLD_ANN_RECOMMENDATIONS= INSERT INTO invom.invom_res_dam_ann_recommendations( res_ann_mst1_id, res_ann1_mst2_id, res_dam_inspect_info_id, recommendations, delete_flag, is_latest,  create_date, create_user_name,  user_emp_id,res_dam_health_id , post_id , prev_res_dam_ann_recommend_id) select irdam1.res_ann1_mst1_id,coalesce(irdam.res_ann1_mst2_id,0) as res_ann1_mst2_id ,irdii.res_dam_inspect_info_id,recommendations,false,true,now(),?,?,coalesce(irdh.res_dam_health_id,0) as res_dam_health_id,?,res_dam_ann_recommend_id  from invom.invom_res_dam_ann_recommendations irdar left join  invom.invom_res_dam_ann1_mst2 irdam  on (irdar.res_ann1_mst2_id=irdam.prev_ann1_mst2_id and irdam.delete_flag=false and irdam.is_latest=true) left join invom.invom_res_dam_health irdh on  (irdar.res_dam_health_id=irdh.prev_res_dam_health_id and irdh.delete_flag=false and irdh.is_latest=true) inner join invom.invom_res_dam_inspect_info irdii on  (irdar.res_dam_inspect_info_id=irdii.prev_res_dam_inspect_info_id and irdii.delete_flag=false) inner join invom.invom_res_dam_ann1_mst1 irdam1 on (irdar.res_ann_mst1_id=irdam1.prev_mst1_id and irdam1.delete_flag=false and irdam1.is_latest=true) where irdar.delete_flag=false and irdar.is_latest=true and irdar.res_ann_mst1_id=?  and res_dam_ann_recommend_id not in (select coalesce(prev_res_dam_ann_recommend_id,0) as prev_res_dam_ann_recommend_id  from invom.invom_res_dam_ann_recommendations irdar where irdar.delete_flag=false and irdar.is_latest=true)

