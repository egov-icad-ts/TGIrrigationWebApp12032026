SELECT_COURT_CASE_TYPE_COUNT=select distinct cm.unit_id,coalesce(cf.casef,0),coalesce(jf.judgf,0), coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))   tobefile, coalesce(cdraft.cdraft,0),cm.case_type_id,cc.court_id_name,ct.case_type_name , cm.case_court_id    from  cases_master cm  left join (select unit_id ,count(counter_date_file) as contf,coalesce(case_type_id,0) as  casetypeid    from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id, cm.case_type_id)contf    on (cm.unit_id=contf.unit_id and cm.case_type_id=contf.casetypeid)    left join (select unit_id ,count(case_date_judgement) as judgf,coalesce(case_type_id,0) as  casetypeid     from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id, cm.case_type_id)jf on ( cm.unit_id=jf.unit_id and  cm.case_type_id=jf.casetypeid)  left join (select unit_id ,count(case_date_filing) as casef,coalesce(case_type_id,0) as  casetypeid     from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cm.case_type_id)cf on (cm.unit_id=cf.unit_id    and cm.case_type_id=cf.casetypeid)  left join (select unit_id ,count(draft_count_togp) as cdraft,    coalesce(case_type_id,0) as  casetypeid  from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id, cm.case_type_id) cdraft      on (cm.unit_id=cdraft.unit_id and cm.case_type_id=cdraft.casetypeid) inner join cases_courts cc on (cm.case_court_id =cc.court_id and cc.court_id_delete_flag=false ) inner join cases_types ct  on (cm.case_type_id=ct.case_type_id and cm.case_court_id=ct.court_id and ct.delete_flag=false )   where cm.case_type_id=? and cm.case_court_id=? order by cm.unit_id;

