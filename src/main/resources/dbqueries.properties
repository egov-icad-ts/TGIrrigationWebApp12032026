TANK_FEED_MAP_UNIT= select distinct tot.unit_id, coalesce(feed.fcnt,0) feed ,coalesce(notfeed.nfcnt,0)nfeed, (coalesce(feed.fcnt,0)+coalesce(notfeed.nfcnt) ) as feeddata,um.unit_name  from  (select fd.tank_id,ts.unit_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true ) tot  left join ( select  count(fd.tank_id) fcnt,ts.unit_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true) where    imt.delete_flag=false and imt.is_latest=true  and  fd.can_fed=true  group by ts.unit_id ) feed  on (tot.unit_id=feed.unit_id)  left join  ( select  count(fd.tank_id) nfcnt,ts.unit_id  from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and         fd.can_fed=false  group by ts.unit_id ) notfeed  on (tot.unit_id= notfeed.unit_id) inner join unit_master um on (tot.unit_id=um.unit_id and um.delete_flag=false)  order by unit_name
TANK_FEED_MAP_CIRCLE= select distinct tot.unit_id,tot.circle_id, coalesce(feed.fcnt,0) feed ,coalesce(notfeed.nfcnt,0)nfeed, (coalesce(feed.fcnt,0)+coalesce(notfeed.nfcnt) ) as feeddata,cm.circle_name from  (select fd.tank_id,ts.unit_id,ts.circle_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true ) tot  left join ( select  count(fd.tank_id) fcnt,ts.unit_id,ts.circle_id  from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')   inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and         fd.can_fed=true  group by ts.unit_id,ts.circle_id ) feed  on (tot.unit_id=feed.unit_id and tot.circle_id=feed.circle_id )  left join  ( select  count(fd.tank_id) nfcnt,ts.unit_id,ts.circle_id  from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')   inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and         fd.can_fed=false  group by ts.unit_id,ts.circle_id ) notfeed   on (tot.unit_id= notfeed.unit_id  and tot.circle_id=notfeed.circle_id )  inner join circle_master cm on (tot.unit_id=cm.unit_id and tot.circle_id=cm.circle_id and cm.delete_flag=false)  order by circle_name
TANK_FEED_MAP_DIVISION= select distinct tot.unit_id,tot.circle_id,tot.division_id, coalesce(feed.fcnt,0) feed ,coalesce(notfeed.nfcnt,0)nfeed, (coalesce(feed.fcnt,0)+coalesce(notfeed.nfcnt) ) as feeddata,dm.division_name from  (select fd.tank_id,ts.unit_id,ts.circle_id,ts.division_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE') inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true ) tot left join ( select  count(fd.tank_id) fcnt,ts.unit_id,ts.circle_id,ts.division_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and  fd.can_fed=true  group by ts.unit_id,ts.circle_id,ts.division_id ) feed  on (tot.unit_id=feed.unit_id and tot.circle_id=feed.circle_id and tot.division_id =feed.division_id)  left join  ( select  count(fd.tank_id) nfcnt,ts.unit_id,ts.circle_id,ts.division_id  from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and         fd.can_fed=false  group by ts.unit_id,ts.circle_id,ts.division_id ) notfeed   on (tot.unit_id= notfeed.unit_id  and tot.circle_id=notfeed.circle_id   and tot.division_id =feed.division_id)  inner join division_master dm on (tot.circle_id=dm.circle_id and tot.division_id=dm.division_id and dm.delete_flag=false)  order by dm.division_name
TANK_FEED_MAP_SUBDIVISION=select distinct tot.unit_id,tot.circle_id,tot.division_id,tot.subdivision_id, coalesce(feed.fcnt,0) feed ,coalesce(notfeed.nfcnt,0)nfeed, coalesce((coalesce(feed.fcnt,0)+coalesce(notfeed.nfcnt) ),0) as feeddata,sdm.subdivision_name from  (select fd.tank_id,ts.unit_id,ts.circle_id,ts.division_id,ts.subdivision_id  from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE') inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)   where    imt.delete_flag=false and imt.is_latest=true ) tot  left join ( select  count(fd.tank_id) fcnt,ts.unit_id,ts.circle_id,ts.division_id,ts.subdivision_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')  inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true  and         fd.can_fed=true  group by ts.unit_id,ts.circle_id,ts.division_id,ts.subdivision_id ) feed  on (tot.unit_id=feed.unit_id and tot.circle_id=feed.circle_id and tot.division_id =feed.division_id and  tot.subdivision_id =feed.subdivision_id)  left join  ( select  count(fd.tank_id) nfcnt,ts.unit_id,ts.circle_id,ts.division_id,ts.subdivision_id from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')   inner join invom.invom_mi_tank_feed_details fd on (imt.tank_id_mk=fd.tank_id and fd.delete_flag=false and fd.is_latest=true)  where    imt.delete_flag=false and imt.is_latest=true   and         fd.can_fed=false  group by ts.unit_id,ts.circle_id,ts.division_id,ts.subdivision_id  ) notfeed   on (tot.unit_id= notfeed.unit_id  and tot.circle_id=notfeed.circle_id   and tot.division_id =feed.division_id  and  tot.subdivision_id =feed.subdivision_id)  inner join subdivision_master sdm on (tot.circle_id=sdm.circle_id and tot.division_id=sdm.division_id and tot.subdivision_id=sdm.subdivision_id  and sdm.delete_flag=false)  order by sdm.subdivision_name

