SELECT_CANAL_BYUNITID=  select distinct ic.canal_name||'@'||canal_type||'@Ch.From'||coalesce(chainage_fromkm,0.0)||'@Ch.To'||coalesce(chainage_tokm,0.0)  as canal_name,ic.canal_id,icum.unit_id,icum.project_id,  coalesce(icl.district_id,0) as district_id ,   coalesce(icl.mandal_id,0) as mandal_id,    coalesce(icl.village_id,0) as village_id,     coalesce(icl.village_name,'NA') as village_remarks,     dm.district_name,     mm.mandal_name,     coalesce(vname,'NA') as village_name,icl.canal_loc_id, icum.circle_id,icum.division_id,icum.subdivision_id,icum.post_id     from invom.invom_canal_unit_map icum    inner join invom.invom_canals  ic on (ic.canal_id=icum.canal_id and icum.delete_flag=false and icum.is_latest=true)   inner join invom.invom_canal_types ict   on (ic.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false )    inner join invom.invom_canals_location icl on (ic.canal_id=icl.canal_id and icl.delete_flag=false and icl.is_latest=true)   inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)   left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )    where  icum.project_id=?  and ic.delete_flag=false and ic.is_latest=true    order by canal_name

