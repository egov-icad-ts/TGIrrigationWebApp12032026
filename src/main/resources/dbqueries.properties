id from irparas.paras_master irpm2 where irpm2.section_id=2 ) parasecb on ( parasecb.unit_id=irpm.unit_id  and irpm.para_id=parasecb.para_id) left join (select ipr.para_id,string_agg(  TRIM(reply), '  '  ORDER BY ipr.para_sub_id )  as reply,string_agg(ipr.reply_remarks,',') as reply_remarks  from irparas.para_replys ipr, (select max(reply_date) as replymax,para_id,para_sub_id from irparas.para_replys ipr where ipr.delete_flag=false and is_latest=true  group by para_id,ipr.para_sub_id ) maxdate where ipr.delete_flag=false and is_latest=true  and reply_date =maxdate.replymax and  ipr.para_id=maxdate.para_id   group by  ipr.para_id   order by para_id ) pr  on (irpm.para_id=pr.para_id )  left join ( SELECT para_id,para_sub_id,string_agg( doc_original_name, ' ,' ) AS docoriginalname FROM irparas.irparas_documents where delete_flag=false and is_latest=true group by para_id,para_sub_id) pd  on (irpm.para_id=pd.para_id )  where irpm.delete_flag=false and irpm.is_latest=true and irpm.section_id in (1,2)
