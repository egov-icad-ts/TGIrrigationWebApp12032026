GET_DAM_MST1_REMARKS_MST1ID= SELECT res_ann_review_id, irdamr.res_ann1_mst1_id, irdam.reservoir_id,    irdamr.is_latest, irdamr.unit_id, irdamr.circle_id, irdamr.division_id, irdamr.subdivision_id,        irdamr.project_id, irdamr.designation_id, irdamr.level_id, irdamr.submitted_to_empid, review_remarks, irdamr.tab_id, irdamr.emp_id, irdamr.post_id, irdamr.next_post_id, irdamr.section_id,     irdamr.next_emp_id,  irdio.inspect_office_name||'('|| to_char(irdii.inspect_date,'dd/mm/yyyy') ||')'  as inspect_office_name,remarks_incl,irdamr.res_dam_inspect_info_id ,tem.employeename||'('||tdm.designation_name||')' as  submittedto ,tem2.employeename||'('||tdm2.designation_name||')' as submitted_by  FROM  invom.invom_res_dam_ann_remarks  irdamr inner join invom.invom_res_dam_ann1_mst1 irdam    on (irdamr.res_ann1_mst1_id = irdam.res_ann1_mst1_id     and irdam.delete_flag=false and irdam.is_latest=true)     inner join invom.invom_res_dam_inspect_info irdii  on (irdii.res_dam_inspect_info_id=irdamr.res_dam_inspect_info_id and irdii.delete_flag=false) inner join   invom.invom_res_dam_inspect_office irdio  on (irdii.inspect_office_id=irdio.inspect_office_id and irdio.delete_flag=false) inner join taskmanagement.subposts tsp1  on(irdamr.next_post_id=tsp1.postid and tsp1.post_status='ACTIVE')   inner join taskmanagement.employee_mst tem  on (empid=irdamr.next_emp_id and tem.employee_status::int=1) inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp1.designation and tdm.delete_flag=false) inner join taskmanagement.subposts tsp2  on(irdamr.post_id=tsp2.postid and tsp1.post_status='ACTIVE')  inner join taskmanagement.employee_mst tem2  on (tem2.empid=irdamr.emp_id and tem2.employee_status::int=1)   inner join taskmanagement.designation_mst tdm2  on (tdm2.designation_id=tsp2.designation and tdm2.delete_flag=false)   where  irdamr.res_ann1_mst1_id=? and irdamr.delete_flag=false

#SELECT res_ann_review_id, irdamr.res_ann1_mst1_id, irdam.reservoir_id,    irdamr.is_latest, irdamr.unit_id, irdamr.circle_id, irdamr.division_id, irdamr.subdivision_id,        irdamr.project_id, irdamr.designation_id, irdamr.level_id, irdamr.submitted_to_empid, review_remarks, irdamr.tab_id, irdamr.emp_id, irdamr.post_id, irdamr.next_post_id, irdamr.section_id,        irdamr.next_emp_id,  irdio.inspect_office_name||'('|| to_char(irdii.inspect_date,'dd/mm/yyyy') ||')'  as inspect_office_name,remarks_incl,irdamr.res_dam_inspect_info_id  FROM  invom.invom_res_dam_ann_remarks  irdamr inner join invom.invom_res_dam_ann1_mst1 irdam    on (irdamr.res_ann1_mst1_id = irdam.res_ann1_mst1_id     and irdam.delete_flag=false and irdam.is_latest=true)     inner join invom.invom_res_dam_inspect_info irdii  on (irdii.res_dam_inspect_info_id=irdamr.res_dam_inspect_info_id and irdii.delete_flag=false) inner join   invom.invom_res_dam_inspect_office irdio  on (irdii.inspect_office_id=irdio.inspect_office_id and irdio.delete_flag=false)     where  irdamr.res_ann1_mst1_id=? and irdamr.delete_flag=false

