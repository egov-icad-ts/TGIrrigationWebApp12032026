SELECT_TANK_CHECKS_ABSTRACT_DISTRICT = select distinct dm.district_name,imtim.new_district_id,coalesce(tot.count,0) as totalcount,coalesce(eme.emecount,0) as emergencycount,coalesce(obs.obscount,0) as  observationcount , coalesce(org.orgcount,0) as orginalworkcount,coalesce(def.defcount,0) as defcount,imtim.mi_check_frequency_id,imtim.freq_year  from invom.invom_mi_tank_inspect_mst1 imtim   left join  ( SELECT count(distinct tank_id) as count,coalesce(new_district_id,0) as new_district_id ,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1    where imtim1.delete_flag=false and imtim1.is_latest=true   and tank_status_id in (1,2,3,4) group by imtim1.new_district_id ,mi_check_frequency_id,freq_year ) tot     on (imtim.new_district_id = tot.new_district_id and imtim.mi_check_frequency_id=tot.mi_check_frequency_id and imtim.freq_year=tot.freq_year ) left join ( SELECT count(distinct tank_id) as emecount,coalesce(new_district_id,0) as new_district_id,mi_check_frequency_id,freq_year  FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=2  group by imtim1.new_district_id,mi_check_frequency_id,freq_year) eme   on (imtim.new_district_id = eme.new_district_id and imtim.mi_check_frequency_id=eme.mi_check_frequency_id and imtim.freq_year=eme.freq_year )  left join ( SELECT count(distinct tank_id) as obscount,coalesce(new_district_id,0) as new_district_id,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=1   group by imtim1.new_district_id,mi_check_frequency_id,freq_year ) obs  on (imtim.new_district_id = obs.new_district_id and imtim.mi_check_frequency_id=obs.mi_check_frequency_id and imtim.freq_year=obs.freq_year) left join ( SELECT count(distinct tank_id) as orgcount,coalesce(new_district_id,0) as new_district_id,mi_check_frequency_id,freq_year  FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=4 group by imtim1.new_district_id ,mi_check_frequency_id,freq_year ) org on (imtim.new_district_id = org.new_district_id and imtim.mi_check_frequency_id=org.mi_check_frequency_id and imtim.freq_year=org.freq_year ) left join ( SELECT count(distinct tank_id) as defcount,coalesce(new_district_id,0) as new_district_id,mi_check_frequency_id,freq_year  FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=3  group by imtim1.new_district_id,mi_check_frequency_id,freq_year ) def  on (imtim.new_district_id = def.new_district_id and imtim.mi_check_frequency_id=def.mi_check_frequency_id  and imtim.freq_year=def.freq_year )  inner join districts_mst dm  on ( imtim.new_district_id=dm.district_id)  where imtim.delete_flag=false and imtim.is_latest=true   and imtim.freq_year=?  and imtim.mi_check_frequency_id=? order by dm.district_name,imtim.mi_check_frequency_id

#select  distinct imt1.new_district_id, coalesce(pre.pretankcount,0) as pretankcount , coalesce(post.posttankcount,0) as posttankcount ,coalesce(during.duringtankcount,0) as duringtankcount,dm.district_name ,  coalesce(prefreq,0) as prefreq ,coalesce(postfreq,0) as postfreq ,coalesce(duringfreq,0) as duringfreq ,imt1.freq_year    from  invom.invom_mi_tank_inspect_mst1 imt1 inner join districts_mst dm  on (imt1.new_district_id=dm.district_id)  left join (select count(distinct tank_id) as pretankcount ,new_district_id, imt1.mi_check_frequency_id as prefreq   from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=9   group by     new_district_id,imt1.mi_check_frequency_id )pre on (imt1.new_district_id=pre.new_district_id)     left join ( select count(distinct tank_id) as posttankcount , new_district_id,imt1.mi_check_frequency_id  as postfreq  from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=10   group by  new_district_id ,imt1.mi_check_frequency_id   )post   on (imt1.new_district_id=post.new_district_id)  left join (   select count(distinct tank_id) as duringtankcount , new_district_id,imt1.mi_check_frequency_id  as duringfreq  from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=11   group by  new_district_id,imt1.mi_check_frequency_id  ) during on (imt1.new_district_id=during .new_district_id)  where imt1.delete_flag=false and imt1.is_latest=true and imt1.freq_year=?

#select  distinct imt1.new_district_id, coalesce(pre.pretankcount,0) as pretankcount , coalesce(post.posttankcount,0) as posttankcount ,coalesce(during.duringtankcount,0) as duringtankcount,dm.district_name , coalesce(prefreq,0) as prefreq ,coalesce(postfreq,0) as postfreq ,coalesce(duringfreq,0) as duringfreq ,imt1.freq_year , imt1.mi_inpsect_mst1_id from  invom.invom_mi_tank_inspect_mst1 imt1 inner join districts_mst dm  on (imt1.new_district_id=dm.district_id) left join (select count(distinct tank_id) as pretankcount ,new_district_id, mi_inpsect_mst1_id ,imt1.mi_check_frequency_id as prefreq  from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=9   group by  new_district_id,mi_inpsect_mst1_id,imt1.mi_check_frequency_id )pre on (imt1.new_district_id=pre.new_district_id) left join ( select count(distinct tank_id) as posttankcount , new_district_id,imt1.mi_inpsect_mst1_id,imt1.mi_check_frequency_id  as postfreq from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=10  group by  new_district_id ,imt1.mi_inpsect_mst1_id,imt1.mi_check_frequency_id   )post   on (imt1.new_district_id=post.new_district_id)  left join (   select count(distinct tank_id) as duringtankcount , new_district_id,imt1.mi_check_frequency_id  as duringfreq   from  invom.invom_mi_tank_inspect_mst1  imt1 where imt1.delete_flag=false and imt1.is_latest=true and mi_check_frequency_id=11   group by  new_district_id,mi_inpsect_mst1_id,imt1.mi_check_frequency_id  ) during on (imt1.new_district_id=during .new_district_id)  where imt1.delete_flag=false and imt1.is_latest=true and imt1.freq_year=?

SELECT_TANK_UNIT_ABSTRACT_STATUS= select distinct coalesce(tot.count,0) as totalcount,coalesce(eme.emecount,0) as emergencycount,coalesce(obs.obscount,0) as  observationcount , coalesce(org.orgcount,0) as orginalworkcount,coalesce(def.defcount,0) as defcount,imtim.mi_check_frequency_id,imtim.freq_year,imtim.unit_id,um.unit_code, 0,'NA', 0,'NA',0 ,'NA',0,'NA',0,'NA' from invom.invom_mi_tank_inspect_mst1 imtim left join ( SELECT count(distinct tank_id) as count,coalesce(unit_id,0) as unit_id ,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id in (1,2,3,4) group by imtim1.unit_id ,mi_check_frequency_id,freq_year) tot   on (imtim.unit_id = tot.unit_id and imtim.mi_check_frequency_id=tot.mi_check_frequency_id and imtim.freq_year=tot.freq_year )   left join ( SELECT count(distinct tank_id) as emecount,coalesce(unit_id,0) as unit_id,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=2 group by imtim1.unit_id,mi_check_frequency_id,freq_year) eme   on (imtim.unit_id = eme.unit_id and imtim.mi_check_frequency_id=eme.mi_check_frequency_id and imtim.freq_year=eme.freq_year )  left join ( SELECT count(distinct tank_id) as obscount,coalesce(unit_id,0) as unit_id,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=1 group by imtim1.unit_id,mi_check_frequency_id,freq_year ) obs  on (imtim.unit_id = obs.unit_id and imtim.mi_check_frequency_id=obs.mi_check_frequency_id and imtim.freq_year=obs.freq_year)  left join ( SELECT count(distinct tank_id) as orgcount,coalesce(unit_id,0) as unit_id,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=4 group by imtim1.unit_id ,mi_check_frequency_id,freq_year ) org   on (imtim.unit_id = org.unit_id and imtim.mi_check_frequency_id=org.mi_check_frequency_id and imtim.freq_year=org.freq_year )  left join ( SELECT count(distinct tank_id) as defcount,coalesce(unit_id,0) as unit_id,mi_check_frequency_id,freq_year   FROM invom.invom_mi_tank_inspect_mst1 imtim1 where imtim1.delete_flag=false and imtim1.is_latest=true  and tank_status_id=3 group by imtim1.unit_id,mi_check_frequency_id,freq_year ) def  on (imtim.unit_id = def.unit_id and imtim.mi_check_frequency_id=def.mi_check_frequency_id and imtim.freq_year=def.freq_year )  inner join unit_master um  on (imtim.unit_id=um.unit_id and um.delete_flag=false  )  where imtim.delete_flag=false and imtim.is_latest=true   and imtim.freq_year=? and imtim.mi_check_frequency_id=?  

