e_master cm2 on (irpm3.circle_id=cm2.circle_id and cm2.delete_flag=false)  left join division_master dm2  on (irpm3.division_id=dm2.division_id and dm2. delete_flag=false) where irpm3.delete_flag=true and irpm3.is_latest=false )  trfrom on( trfrom.para_id=irpm.old_para_id  )  where  irpm.section_id in (1,2) and irpm.unit_id=? 

