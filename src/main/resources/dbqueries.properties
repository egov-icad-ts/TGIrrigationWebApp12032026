SELECT_TANK_CAP_AYACUT_DETAIL=select distinct mtic.tank_id, imt.tank_name ,coalesce(imt.ayacut_acres,0.0) as grossayacut,coalesce(imt.capacity,0.0) as grosscapacity, coalesce(mtic.available_capacity) as availcapacity , coalesce(mtic.ayacut_acres,0.0) as cultiayacut, EXTRACT(YEAR FROM mtic.inspect_date)::int as year ,coalesce(mtic.unit_id,0) as unit_id,um.unit_name,coalesce(mtic.circle_id,0) as circle_id,coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtic.division_id,0) as division_id ,coalesce(divm.division_name,'NA') as division_name, coalesce(mtic.subdivision_id,0) as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name  from invom.invom_mi_tank_inspect_capacity mtic   inner join invom.invom_mi_tanks  imt on (mtic.tank_id=imt.tank_id_mk  and imt.delete_flag=false and imt.is_latest=true) inner join unit_master um  on (mtic.unit_id=um.unit_id and um.delete_flag=false)   left join circle_master cm  on (mtic.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master divm    on (mtic.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master  sdm  on (mtic.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false)  where mtic.delete_flag=false and mtic.is_latest=true   and mtic.inspect_date=(select max(inspect_date) as inspect_date from invom.invom_mi_tank_inspect_capacity mtic2 where mtic2.tank_id=mtic.tank_id and EXTRACT(YEAR FROM mtic.inspect_date)=EXTRACT(YEAR FROM mtic2.inspect_date) and EXTRACT(YEAR FROM mtic2.inspect_date)::int=? order by inspect_date desc )  and EXTRACT(YEAR FROM mtic.inspect_date)::int=? 
