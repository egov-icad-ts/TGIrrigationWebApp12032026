SELECT_NRLD_RES_TOTAL=(SELECT distinct irum.unit_id,  irum.reservoir_id as reservoir_id,  res_name,  um.unit_name,   circlenames.circle_name,  divisionnames.division_name,  subdivisionnames.subdivision_name,  projnames.project_name   ,0 as tank_id,coalesce(ir.nrld_code,'0') as nrld_code FROM  invom.invom_reservoirs ir  inner join invom.invom_res_unit_map irum   on (ir.res_id=irum.reservoir_id and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true) inner join   unit_master um   on ( irum.unit_id=um.unit_id and um.delete_flag=false)   inner join   ( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name   from  invom.invom_res_unit_map irum1  left join circle_master cm  on(irum1.circle_id=cm.circle_id and cm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) circlenames    on (irum.reservoir_id=circlenames.reservoir_id)   left  join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name   from   invom.invom_res_unit_map irum1   left join division_master dm   on ( irum1.division_id=dm.division_id and dm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id )   divisionnames    on (irum.reservoir_id=divisionnames.reservoir_id)    left join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name    from    invom.invom_res_unit_map irum1   left join subdivision_master sdm on (irum1.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) subdivisionnames   on (irum.reservoir_id=subdivisionnames.reservoir_id)    left join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name   from   invom.invom_res_unit_map irum1   left join project_mst pm   on (irum1.project_id=pm.project_id and pm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) projnames   on (irum.reservoir_id=projnames.reservoir_id)   where irum.delete_flag=false   and irum.is_latest=true and  irum.unit_id=?

SELECT_ALL_NRLD_RES_TOTAL=(SELECT distinct irum.unit_id,  irum.reservoir_id as reservoir_id,  res_name,  um.unit_name,   circlenames.circle_name,  divisionnames.division_name,  subdivisionnames.subdivision_name,  projnames.project_name   ,0 as tank_id,coalesce(ir.nrld_code,'0') as nrld_code ,'Major/Medium'  as  ptype FROM  invom.invom_reservoirs ir  inner join invom.invom_res_unit_map irum   on (ir.res_id=irum.reservoir_id and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true) inner join   unit_master um   on ( irum.unit_id=um.unit_id and um.delete_flag=false)   inner join   ( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name   from  invom.invom_res_unit_map irum1  left join circle_master cm  on(irum1.circle_id=cm.circle_id and cm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) circlenames    on (irum.reservoir_id=circlenames.reservoir_id)   left  join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name   from   invom.invom_res_unit_map irum1   left join division_master dm   on ( irum1.division_id=dm.division_id and dm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id )   divisionnames    on (irum.reservoir_id=divisionnames.reservoir_id)    left join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name    from    invom.invom_res_unit_map irum1   left join subdivision_master sdm on (irum1.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) subdivisionnames   on (irum.reservoir_id=subdivisionnames.reservoir_id)    left join( select distinct reservoir_id,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name   from   invom.invom_res_unit_map irum1   left join project_mst pm   on (irum1.project_id=pm.project_id and pm.delete_flag=false)   where irum1.delete_flag=false and irum1.is_latest=true  group by reservoir_id ) projnames   on (irum.reservoir_id=projnames.reservoir_id)   where irum.delete_flag=false   and irum.is_latest=true 

SELECT_INVOM_RES_ANN2_BY_RESCODE=SELECT distinct irdam1.unit_id, irdam1.res_code,res_name,um.unit_code,circlenames.circle_name,divisionnames.division_name, subdivisionnames.subdivision_name,projnames.project_name,irs.res_status,irdam1.freq_year  FROM invom.invom_res_dam_ann2_mst1 irdam1  inner join invom.invom_reservoirs ir   on (irdam1.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  inner join   unit_master um  on ( irdam1.unit_id=um.unit_id and um.delete_flag=false)  left join   ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name  from   invom.invom_res_dam_ann2_mst1 irdia    left join circle_master cm  on(irdia.circle_id=cm.circle_id and cm.delete_flag=false)  where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) circlenames  on (irdam1.res_code=circlenames.res_code)   left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name    from   invom.invom_res_dam_ann2_mst1 irdia   left join division_master dm   on ( irdia.division_id=dm.division_id and dm.delete_flag=false)   where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) divisionnames  on (irdam1.res_code=divisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name  from   invom.invom_res_dam_ann2_mst1 irdia left join subdivision_master sdm on (irdia.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) subdivisionnames   on (irdam1.res_code=subdivisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name  from   invom.invom_res_dam_ann2_mst1 irdia   left join project_mst pm  on (irdia.project_id=pm.project_id and pm.delete_flag=false)  where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) projnames  on (irdam1.res_code=projnames.res_code) inner join invom.invom_reservoir_status irs on  (ir.res_status=irs.res_status_id and irs.delete_flag=false) where irdam1.delete_flag=false and irdam1.is_latest=true and irdam1.res_ann2_mst1_id=?





#### 13-08-2020  SELECT distinct irdia.unit_id, irdia.res_code,res_name,um.unit_code,circlenames.circle_name,divisionnames.division_name, subdivisionnames.subdivision_name,projnames.project_name,irs.res_status,irdia.year FROM invom.invom_res_dam_inspect_ann2 irdia  inner join invom.invom_reservoirs ir    on (irdia.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)    inner join   unit_master um  on ( irdia.unit_id=um.unit_id and um.delete_flag=false)   left join   ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name   from   invom.invom_res_dam_inspect_ann2 irdia    left join circle_master cm  on(irdia.circle_id=cm.circle_id and cm.delete_flag=false)   where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) circlenames  on (irdia.res_code=circlenames.res_code)   left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name    from   invom.invom_res_dam_inspect_ann2 irdia   left join division_master dm   on ( irdia.division_id=dm.division_id and dm.delete_flag=false)    where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) divisionnames  on (irdia.res_code=divisionnames.res_code)     left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name    from   invom.invom_res_dam_inspect_ann2 irdia left join subdivision_master sdm on (irdia.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )     where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) subdivisionnames   on (irdia.res_code=subdivisionnames.res_code)    left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name     from   invom.invom_res_dam_inspect_ann2 irdia   left join project_mst pm  on (irdia.project_id=pm.project_id and pm.delete_flag=false)    where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) projnames  on (irdia.res_code=projnames.res_code)   inner join invom.invom_reservoir_status irs on  (ir.res_status=irs.res_status_id and irs.delete_flag=false)      where irdia.delete_flag=false and irdia.is_latest=true and irdia.res_code=? and irdia.year=? and irdia.unit_id=?

SELECT_RES_ANN2_DETAIL_TABINFO=select res_ann2_mst2_id,res_ann2_mst1_id,irdam2.res_rec_check_id,res_rec_category_id,designation,remarks,irdam2.approv_status_id,ircr.res_rec_check,ias.approv_status from invom.invom_res_dam_ann2_mst2  irdam2 inner join invom.invom_res_check_rec ircr on(irdam2.res_rec_check_id=ircr.res_rec_check_id and ircr.delete_flag=false and ircr.is_latest=true) 	inner join invom.approv_status ias 		on(irdam2.approv_status_id=ias.approv_status_id and ias.delete_flag=false and ias.is_latest=true) 	 where irdam2.delete_flag=false and  irdam2.is_latest=true and  irdam2.res_ann2_mst1_id=? order by res_rec_category_id,res_rec_check_id
### 13082020select res_ann2_inspect_id,irdia.res_rec_check_id,res_rec_category_id,designation,remarks,irdia.approv_status_id,year,ircr.res_rec_check,ias.approv_status 	from invom.invom_res_dam_inspect_ann2  irdia inner join invom.invom_res_check_rec ircr on(irdia.res_rec_check_id=ircr.res_rec_check_id and ircr.delete_flag=false and ircr.is_latest=true) 		inner join invom.approv_status ias 	on(irdia.approv_status_id=ias.approv_status_id and ias.delete_flag=false and ias.is_latest=true)  where irdia.delete_flag=false and  irdia.is_latest=true and  irdia.res_code=? and irdia.year=? and irdia.unit_id=? order by res_rec_category_id,res_rec_check_id


SELECT_SCH_AEE_DAILY=select  distinct  irdia.unit_id ,irdia.res_code,irdia.designation_id, ir.res_name,um.unit_code, ird.res_designation,aeedaily.aee_daily,irdia.res_duty_frequency,totaldutycount.dutycount,to_char(irdia.inspect_date,'dd/mm/yyyy') as inspect_date  from invom.invom_res_dam_duty_inspect irdia inner join invom.invom_reservoirs ir on(irdia.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  inner join unit_master um on(irdia.unit_id = um.unit_id and um.delete_flag=false )  inner join invom.invom_res_designation ird on (irdia.designation_id=ird.res_designation_id and ird.delete_flag=false and ird.is_latest=true)  inner join (select count(res_dam_duty_id) as aee_daily,unit_id,res_code,designation_id,res_duty_frequency,inspect_date  from invom.invom_res_dam_duty_inspect  where delete_flag=false and is_latest=true  group by unit_id,res_code,designation_id,res_duty_frequency,inspect_date ) aeedaily on(irdia.res_code=aeedaily.res_code and irdia.res_duty_frequency=aeedaily.res_duty_frequency  and irdia.designation_id=aeedaily.designation_id ) inner join (select count( res_dam_duty_designation_map_id ) dutycount,designation_id,irdd.res_duty_frequency from  invom.invom_res_dam_duty_designation_map irdddm inner join  invom.invom_res_dam_duties  irdd on(irdddm.res_dam_duty_id=irdd.res_dam_duty_id and irdd.delete_flag=false and irdd.is_latest=true) where irdddm.delete_flag=false and irdddm.is_latest=true  and (not(irdd.res_duty_parent_id=0 and irdd.res_duty_has_child=true) or (irdd.res_duty_parent_id=0 and  irdd.res_duty_has_child=false)) group by designation_id,irdd.res_duty_frequency order by designation_id ) as totaldutycount   on(irdia.res_duty_frequency=totaldutycount.res_duty_frequency and irdia.designation_id=totaldutycount.designation_id)  where irdia.delete_flag=false and irdia.is_latest=true  and to_date(to_char(irdia.inspect_date,'dd/mm/yyyy'),'dd/mm/yyyy') between to_date( ? ,'dd/mm/yyyy') and to_date( ? ,'dd/mm/yyyy')  and irdia.res_duty_frequency=? and (irdia.designation_id=2 or irdia.designation_id=8 )  order by  inspect_date,um.unit_code,ir.res_name, ird.res_designation


SELECT_SCH_AEE_WEEKLY=select distinct  irdia.unit_id ,irdia.res_code,irdia.designation_id,ir.res_name,um.unit_code,ird.res_designation,count(res_dam_duty_id),irdia.res_duty_frequency ,totaldutycount.dutycount, to_char(start_date,'dd/mm/yyyy') as start_date,to_char(end_date,'dd/mm/yyyy') as end_date from invom.invom_res_dam_duty_inspect irdia inner join invom.invom_reservoirs ir on(irdia.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  inner join unit_master um on(irdia.unit_id = um.unit_id and um.delete_flag=false )  inner join invom.invom_res_designation ird on (irdia.designation_id=ird.res_designation_id and ird.delete_flag=false and ird.is_latest=true) inner join (select count( res_dam_duty_designation_map_id ) dutycount,designation_id,irdd.res_duty_frequency from  invom.invom_res_dam_duty_designation_map irdddm inner join  invom.invom_res_dam_duties  irdd on(irdddm.res_dam_duty_id=irdd.res_dam_duty_id and irdd.delete_flag=false and irdd.is_latest=true) where irdddm.delete_flag=false and irdddm.is_latest=true  and (not(irdd.res_duty_parent_id=0 and irdd.res_duty_has_child=true) or (irdd.res_duty_parent_id=0 and  irdd.res_duty_has_child=false)) group by designation_id,irdd.res_duty_frequency order by designation_id ) as totaldutycount  on(irdia.res_duty_frequency=totaldutycount.res_duty_frequency and irdia.designation_id=totaldutycount.designation_id) inner join (select d::date start_date, d::date+ 6 end_date     from generate_series(to_date( ? ,'dd/mm/yyyy'), to_date( ? ,'dd/mm/yyyy'), '7d'::interval) d ) weeks on( to_date(to_char(irdia.inspect_date,'dd/mm/yyyy'),'dd/mm/yyyy') between start_date and end_date ) where irdia.res_duty_frequency=?  group by  irdia.unit_id ,irdia.res_code,irdia.designation_id, start_date,end_date,irdia.res_duty_frequency,ir.res_name,um.unit_code,ird.res_designation,totaldutycount.dutycount

SELECT_SCH_AEE_DAILY_RES_INFO=SELECT distinct irdia.unit_id, irdia.res_code,res_name,um.unit_code,circlenames.circle_name,divisionnames.division_name,subdivisionnames.subdivision_name,projnames.project_name,irs.res_status   FROM invom.invom_res_dam_duty_inspect irdia   inner join invom.invom_reservoirs ir    on (irdia.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)   inner join   unit_master um  on ( irdia.unit_id=um.unit_id and um.delete_flag=false)  left join   ( select distinct res_code,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name  from   invom.invom_res_dam_duty_inspect irdia    left join circle_master cm  on(irdia.circle_id=cm.circle_id and cm.delete_flag=false)    where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) circlenames  on (irdia.res_code=circlenames.res_code)    left  join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name     from   invom.invom_res_dam_duty_inspect irdia   left join division_master dm   on ( irdia.division_id=dm.division_id and dm.delete_flag=false)  where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) divisionnames  on (irdia.res_code=divisionnames.res_code) left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name    from   invom.invom_res_dam_inspect_ann1 irdia left join subdivision_master sdm on (irdia.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )     where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) subdivisionnames   on (irdia.res_code=subdivisionnames.res_code)    left join( select distinct res_code,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name     from   invom.invom_res_dam_inspect_ann1 irdia   left join project_mst pm  on (irdia.project_id=pm.project_id and pm.delete_flag=false)    where irdia.delete_flag=false and irdia.is_latest=true  group by res_code ) projnames  on (irdia.res_code=projnames.res_code)   inner join invom.invom_reservoir_status irs on  (ir.res_status=irs.res_status_id and irs.delete_flag=false)   where irdia.delete_flag=false and irdia.is_latest=true and irdia.res_code=? and irdia.unit_id=? and irdia.designation_id=? and irdia.res_duty_frequency=?  
 

SELECT_SCH_INSPECT_INFO=select res_dam_duty_inpsect_id,irddi.res_dam_duty_id,irddi.res_duty_parent_id,inspect_date,irddi.res_duty_frequency,designation_id,remarks, 	res_dam_inspect_aprov_id,action_req,irddi.action_req_id,res_code,irddchild.res_dam_duty child,coalesce(irddparent.res_dam_duty,'NA') parent ,ird.res_designation, 	iar.action_name,ias.approv_status 	from  invom.invom_res_dam_duty_inspect irddi  	inner join invom.invom_res_dam_duties irddchild 	on (irddi.res_dam_duty_id=irddchild.res_dam_duty_id and irddchild.delete_flag=false and irddchild.is_latest=true ) 	left join invom.invom_res_dam_duties irddparent 	on (irddi.res_duty_parent_id=irddparent.res_dam_duty_id and irddparent.delete_flag=false and irddparent.is_latest=true ) 	left join invom.invom_res_designation ird 	on (irddi.designation_id = ird.res_designation_id and ird.delete_flag=false and ird.is_latest=true) 	left join invom.action_required iar on (irddi.action_req_id=iar.action_req_id and iar.delete_flag=false and iar.is_latest=true) inner join invom.approv_status ias 	on(irddi.res_dam_inspect_aprov_id=ias.approv_status_id and ias.delete_flag=false and ias.is_latest=true) 	where irddi.delete_flag =false and irddi.is_latest=true         
  
  
SELECT_BASIN_DATA=select basin_id,basin_name from  invom.invom_basins where delete_flag=false;

SELECT_PUMP_LINKS=select  pumplink_id, pump_link, basin_id  from invom.invom_pumpstation_links where delete_flag=false and is_latest=true;

SELECT_PUMP_STATIONS=select  pumpstation_id,pump_station,pump_link_id,unit_id,coalesce(circle_id,0) as circle_id,coalesce(division_id,0) as division_id,coalesce(subdivision_id,0) as subdivision_id  from  invom.invom_pumpstations where delete_flag=false and is_latest=true and pump_link_id=?


SELECT_PMP_MAIN_DAILY=select  distinct  ipmai.unit_id ,ipmai.basin_id,ipmai.designation_id,ipmai.pump_link_id,ipmai.pump_station_id,ip.pump_station,ipl.pump_link,um.unit_code, ird.res_designation,pumpdaily.countdaily,ipmai.duty_frequency,totaldutycount.dutycount,to_char(ipmai.inspect_date,'dd/mm/yyyy') as inspect_date,ipmai.inspect_hour   from invom.invom_pump_main_activity_inspect ipmai inner join invom.invom_pumpstations ip    on(ipmai.pump_station_id=ip.pumpstation_id and ip.delete_flag=false and ip.is_latest=true)    inner join invom.invom_pumpstation_links ipl   on (ipmai.pump_link_id=ipl.pumplink_id and ipl.delete_flag=false and ipl.is_latest=true)  inner join unit_master um on(ipmai.unit_id = um.unit_id and um.delete_flag=false )     left join invom.invom_res_designation ird on (ipmai.designation_id=ird.res_designation_id and ird.delete_flag=false and ird.is_latest=true)  inner join (select count(pump_activity_inspect_id) as countdaily,unit_id,pump_link_id,pump_station_id,duty_frequency,inspect_date,inspect_hour from invom.invom_pump_main_activity_inspect  where delete_flag=false and is_latest=true  group by unit_id,pump_link_id,pump_station_id,duty_frequency,inspect_date,inspect_hour  ) pumpdaily   on(ipmai.pump_station_id=pumpdaily.pump_station_id and ipmai.duty_frequency=pumpdaily.duty_frequency )inner join (select count( pump_maintain_activity_id ) dutycount,ipma.activity_frequency_id   from  invom.invom_pump_maintain_activities ipma  where ipma.delete_flag=false and ipma.is_latest=true  group by activity_frequency_id  ) as totaldutycount  on(ipmai.duty_frequency=totaldutycount.activity_frequency_id)  where ipmai.delete_flag=false and ipmai.is_latest=true  and to_date(to_char(ipmai.inspect_date,'dd/mm/yyyy'),'dd/mm/yyyy') between to_date( ? ,'dd/mm/yyyy') and to_date( ? ,'dd/mm/yyyy')  and ipmai.duty_frequency=?        order by  inspect_date,ipmai.inspect_hour,um.unit_code,ip.pump_station 


SELECT_PUMP_MAINTAIN_PUMP_INFO= SELECT distinct ipmai.unit_id, ipmai.pump_station_id,ip.pump_station,um.unit_code,circlenames.circle_name,divisionnames.division_name,subdivisionnames.subdivision_name,projnames.project_name  FROM invom.invom_pump_main_activity_inspect  ipmai  inner join invom.invom_pumpstations ip  on (ipmai.pump_station_id=ip.pumpstation_id and ip.delete_flag=false and ip.is_latest=true)    inner join   unit_master um   on ( ipmai.unit_id=um.unit_id and um.delete_flag=false)  left join     ( select distinct pump_station_id,array_to_string(array_agg(distinct(coalesce(circle_name,'0'))) , ',') as circle_name      from   invom.invom_pump_main_activity_inspect ipmai    left join circle_master cm  on(ipmai.circle_id=cm.circle_id and cm.delete_flag=false)         where ipmai.delete_flag=false and ipmai.is_latest=true  group by pump_station_id ) circlenames  on (ipmai.pump_station_id=circlenames.pump_station_id) left  join( select distinct pump_station_id,array_to_string(array_agg(distinct(coalesce(division_name,'0'))) , ',') as division_name  from   invom.invom_pump_main_activity_inspect ipmai   left join division_master dm   on ( ipmai.division_id=dm.division_id and dm.delete_flag=false)   where ipmai.delete_flag=false and ipmai.is_latest=true  group by pump_station_id ) divisionnames  on (ipmai.pump_station_id=divisionnames.pump_station_id) left join( select distinct pump_station_id,array_to_string(array_agg(distinct(coalesce(subdivision_name,'0'))) , ',') as subdivision_name  from   invom.invom_pump_main_activity_inspect ipmai left join subdivision_master sdm on (ipmai.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where ipmai.delete_flag=false and ipmai.is_latest=true  group by pump_station_id ) subdivisionnames   on (ipmai.pump_station_id=subdivisionnames.pump_station_id) left join( select distinct pump_station_id,array_to_string(array_agg(distinct(coalesce(project_name,'0'))) , ',') as project_name    from   invom.invom_pump_main_activity_inspect ipmai   left join project_mst pm  on (ipmai.project_id=pm.project_id and pm.delete_flag=false)      where ipmai.delete_flag=false and ipmai.is_latest=true  group by pump_station_id ) projnames  on (ipmai.pump_station_id=projnames.pump_station_id)  where ipmai.delete_flag=false and ipmai.is_latest=true and ipmai.pump_station_id=? and ipmai.unit_id=?  and ipmai.duty_frequency=?
 
SELECT_PUMP_MAINTAIN_INSPECT_INFO=select pump_activity_inspect_id,ipmai.pump_activity_id,to_char(ipmai.inspect_date,'dd/mm/yyyy') as  inspect_date,ipmai.duty_frequency,designation_id,remarks,inspect_aprov_id,pump_station_id, coalesce(ipma.pump_maintain_activity,'NA') activity ,ird.res_designation,  ias.approv_status,ipmai.inspect_hour  from  invom.invom_pump_main_activity_inspect ipmai inner join invom.invom_pump_maintain_activities ipma  on (ipmai.pump_activity_id=ipma.pump_maintain_activity_id and ipma.delete_flag=false and ipma.is_latest=true ) left join invom.invom_res_designation ird  on (ipmai.designation_id = ird.res_designation_id and ird.delete_flag=false  and ird.is_latest=true) inner join invom.approv_status ias 	on(ipmai.inspect_aprov_id=ias.approv_status_id and ias.delete_flag=false and ias.is_latest=true) where ipmai.delete_flag =false and ipmai.is_latest=true 

SELECT_PMP_MAIN_WEEKLY=select distinct  ipmai.unit_id ,ipmai.basin_id,ipmai.designation_id,ipmai.pump_link_id,ipmai.pump_station_id,ip.pump_station,ipl.pump_link,um.unit_code,ird.res_designation,count(pump_activity_id),ipmai.duty_frequency ,totaldutycount.dutycount, to_char(start_date,'dd/mm/yyyy') as start_date,to_char(end_date,'dd/mm/yyyy') as end_date from invom.invom_pump_main_activity_inspect ipmai inner join invom.invom_pumpstations ip on(ipmai.pump_station_id=ip.pumpstation_id and ip.delete_flag=false and ip.is_latest=true) inner join invom.invom_pumpstation_links ipl on(ipmai.pump_link_id=ipl.pumplink_id and ipl.delete_flag=false and ipl.is_latest=true) inner join unit_master um on(ipmai.unit_id = um.unit_id and um.delete_flag=false )  inner join invom.invom_res_designation ird on (ipmai.designation_id=ird.res_designation_id and ird.delete_flag=false and ird.is_latest=true) inner join (select count( pump_maintain_activity_id ) dutycount,activity_frequency_id from  invom.invom_pump_maintain_activities ipma where ipma.delete_flag=false and ipma.is_latest=true  group by activity_frequency_id ) as totaldutycount  on(ipmai.duty_frequency=totaldutycount.activity_frequency_id )  inner join (select d::date start_date, d::date+ 6 end_date     from generate_series(to_date( ? ,'dd/mm/yyyy'), to_date( ? ,'dd/mm/yyyy'), '7d'::interval) d ) weeks  on( to_date(to_char(ipmai.inspect_date,'dd/mm/yyyy'),'dd/mm/yyyy') between start_date and end_date )  where ipmai.duty_frequency=?  group by  ipmai.unit_id ,ipmai.basin_id,ipmai.pump_link_id,ipmai.pump_station_id,ipmai.designation_id, start_date,end_date,ipmai.duty_frequency,ip.pump_station,ipl.pump_link,um.unit_code,ird.res_designation,totaldutycount.dutycount 

