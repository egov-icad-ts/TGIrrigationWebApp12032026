SELECT_TASK_USERPOST=select  coalesce(um.unit_name,'--') as unitname,coalesce(cm.circle_name,'--') as circlename,coalesce(dm.division_name,'--') as divisionname,coalesce(sdm.subdivision_name,'--') as subdivisionname,emp.* from (        select userid,username,password,roleid,coalesce(projectid,0) as projectid ,        coalesce(package_id,0)  as packageid, coalesce(tu.unit_id , 0) as unitid,        coalesce(tu.circle_id,0) as circleid,         coalesce(tu.division_id,0)as divisionid,  coalesce(tu.subdivision_id,0)as subdivisionid      from taskmanagement.users tu   where tu.delete_flag=false and tu.is_latest=true and  tu.username=? and tu.password=?) emp inner join unit_master um        on (um.unit_id=emp.unitid and um.delete_flag=false) left join circle_master cm  on ( cm.circle_id=emp.circleid and cm.delete_flag=false) left join division_master dm   on ( dm.division_id=emp.divisionid and dm.delete_flag=false ) left join subdivision_master sdm   on (sdm.subdivision_id=emp.subdivisionid and sdm.delete_flag=false)  

