SELECT_TASK_ALL=select ttd.task_id,coalesce(task_title,'--') as task_title,coalesce(ttd.project_id,0) as project_id, coalesce(ttd.package_id,0) as package_id ,coalesce(ttd.unit_id,0) as unit_id ,coalesce(ttd.circle_id,0) as circle_id,coalesce(ttd.division_id,0) as division_id, coalesce(ttd.subdivision_id,0) as subdivision_id,coalesce(ttd.t_type_id,0) as t_type_id  , coalesce(ttd.priority_id ,0) as priority_id , coalesce(ttd.t_status_id,0) as t_status_id, tem.emp,tem.phone,  'CE '||'- '||coalesce(unit_remarks,'--')||'		'||'SE '||'- '||coalesce(se_remarks,'--')||'	'||  'EE '||'- '||coalesce(ee_remarks,'--')||' '||'DEE '||'- '||coalesce(dee_remarks,'--')||' '||'AEE '||  '- '||coalesce(aee_remarks,'--')    as remarks  ,  coalesce(to_char(assign_date,'dd/mm/yy'),'--') as assign_date,   coalesce(to_char(ttd.target_date,'dd/mm/yy'),'--')||', '||coalesce(tdate.target_date,'-') as target_date , coalesce(project_name,'--') as project_name,coalesce(pkg_name,'--') as pkg_name,  coalesce(unit_name,'--') as unit_name,coalesce(circle_name,'--') as circle_name,  coalesce(division_name,'--') as  division_name   ,coalesce(subdivision_name,'--') as  subdivision_name,  coalesce(t_type_name,'--') as t_type_name,coalesce(t_status_name,'--') as t_status_name ,    coalesce(priority_name,'--') as priority_name     from taskmanagement.task_data ttd     left join  project_mst pm  on (ttd.project_id=pm.project_id and pm.delete_flag=false)     left join  package_mst pkm on (ttd.package_id=pkm.pkg_id and pkm.deleteflag=false)  left join  unit_master um  on (ttd.unit_id=um.unit_id and um.delete_flag=false  )    left join circle_master cm  on (ttd.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master dm  on(ttd.division_id=dm.division_id and dm.delete_flag=false)  left join subdivision_master sdm  on (ttd.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )  inner join taskmanagement.priority tp  on  (ttd.priority_id=tp.priority_id  and  tp.delete_flag=false)  inner join  ( SELECT  task_id,array_to_string(array_agg((coalesce(emp,'NA')) order by designation_id )  , ',') as emp , array_to_string(array_agg((coalesce(phone,'NA')) order by designation_id )  , ',') as phone  FROM  ( ( select designation_id, TASK_ID,'SE - '||first_name||''||last_name as emp, 'SE - '||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_se=tem.emp_id  ))  UNION    (   select designation_id,  TASK_ID,'EE - '||first_name||''||last_name||'	'  as emp, 'EE - '||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_ee=tem.emp_id  ))  UNION       (select designation_id, TASK_ID ,'DEE - '||first_name||''||last_name  as emp , 'DEE - '||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_dee=tem.emp_id  ))  UNION ( select  designation_id, TASK_ID, 'AEE - '||first_name||''||last_name as emp , 'AEE - '||phone_num_1 as phone  from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_aee=tem.emp_id  )) ) TS  group by task_id  ) tem  on ((ttd.task_id=tem.task_id) ) inner join taskmanagement.task_status tts  on (ttd.t_status_id=tts.t_status_id and tts.delete_flag=false) inner join taskmanagement.task_type ttt  on (ttd.t_type_id=ttt.t_type_id and ttt.delete_flag=false) left join (select coalesce(task_id,0) as task_id , array_to_string(array_agg(coalesce(to_char(target_date,'dd/mm/yy'),'-') order by backup_id desc), ', ')as target_date from taskmanagement.task_data_backup  where delete_flag=false  group by task_id) tdate on (ttd.task_id=tdate.task_id) where ttd.delete_flag=false and ttd.is_latest=true order by  priority_id desc;
#select task_id,coalesce(task_title,'--') as task_title,coalesce(ttd.project_id,0) as project_id,coalesce(ttd.package_id,0) as package_id ,coalesce(ttd.unit_id,0) as unit_id ,coalesce(ttd.circle_id,0) as circle_id,coalesce(ttd.division_id,0) as division_id, coalesce(ttd.subdivision_id,0) as subdivision_id,coalesce(ttd.t_type_id,0) as t_type_id  ,coalesce(ttd.priority_id ,0) as priority_id , coalesce(ttd.t_status_id,0) as t_status_id, coalesce( responsible_person,0) as responsible_person,  'CE '||'  @'||coalesce(unit_remarks,'--')||' '||'SE '||' @'||coalesce(se_remarks,'--')||' '||'EE '||' @'||coalesce(ee_remarks,'--')||' '||'DEE '||' @'||coalesce(dee_remarks,'--')||' '||'AEE '||' @'||coalesce(aee_remarks,'--')    as remarks  ,coalesce(to_char(assign_date,'dd/mm/yy'),'--') as assign_date,coalesce(to_char(target_date,'dd/mm/yy'),'--') as target_date ,   coalesce(project_name,'--') as project_name,coalesce(pkg_name,'--') as pkg_name,coalesce(unit_name,'--') as unit_name,coalesce(circle_name,'--') as circle_name,coalesce(division_name,'--') as  division_name   ,coalesce(subdivision_name,'--') as  subdivision_name, coalesce(t_type_name,'--') as t_type_name,coalesce(t_status_name,'--') as t_status_name , coalesce(priority_name,'--') as priority_name , coalesce(designation_name,'--') as designation_name,first_name||''||last_name,coalesce(phone_num_1,'--') as phone_num_1  ,coalesce(email_id,'--') as email_id, coalesce(tem.emp_id,0)  from taskmanagement.task_data ttd left join  project_mst pm  on (ttd.project_id=pm.project_id and pm.delete_flag=false) left join  package_mst pkm on (ttd.package_id=pkm.pkg_id and pkm.deleteflag=false) left join  unit_master um  on (ttd.unit_id=um.unit_id and um.delete_flag=false  ) left join circle_master cm  on (ttd.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm  on(ttd.division_id=dm.division_id and dm.delete_flag=false) left join subdivision_master sdm  on (ttd.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) inner join taskmanagement.priority tp  on  (ttd.priority_id=tp.priority_id  and  tp.delete_flag=false) inner join taskmanagement.emp_mst tem  on (ttd.responsible_person=tem.emp_id  and   tem.delete_flag=false and tem.is_latest=true) inner join taskmanagement.designation_mst tdm  on (tem.designation_id=tdm.designation_id and   tdm.delete_flag=false ) inner join taskmanagement.task_status tts  on (ttd.t_status_id=tts.t_status_id and tts.delete_flag=false) inner join taskmanagement.task_type ttt  on (ttd.t_type_id=ttt.t_type_id and ttt.delete_flag=false)  where ttd.delete_flag=false and ttd.is_latest=true order by  priority_id desc;
SELECT_TASK_ALL_UNIT=select ttd.task_id,coalesce(task_title,'--') as task_title,coalesce(ttd.project_id,0) as project_id, coalesce(ttd.package_id,0) as package_id ,coalesce(ttd.unit_id,0) as unit_id ,coalesce(ttd.circle_id,0) as circle_id,coalesce(ttd.division_id,0) as division_id, coalesce(ttd.subdivision_id,0) as subdivision_id,coalesce(ttd.t_type_id,0) as t_type_id  , coalesce(ttd.priority_id ,0) as priority_id , coalesce(ttd.t_status_id,0) as t_status_id, tem.emp,tem.phone,  'CE '||'  @'||coalesce(unit_remarks,'--')||'	'||'SE '||' @'||coalesce(se_remarks,'--')||'	'||  'EE '||' @'||coalesce(ee_remarks,'--')||' '||'DEE '||' @'||coalesce(dee_remarks,'--')||' '||'AEE '||  ' @'||coalesce(aee_remarks,'--')    as remarks  ,  coalesce(to_char(assign_date,'dd/mm/yy'),'--') as assign_date,  coalesce(to_char(ttd.target_date,'dd/mm/yy'),'--')||', '||coalesce(tdate.target_date,'-') as target_date , coalesce(project_name,'--') as project_name,coalesce(pkg_name,'--') as pkg_name,  coalesce(unit_name,'--') as unit_name,coalesce(circle_name,'--') as circle_name,  coalesce(division_name,'--') as  division_name   ,coalesce(subdivision_name,'--') as  subdivision_name,  coalesce(t_type_name,'--') as t_type_name,coalesce(t_status_name,'--') as t_status_name ,    coalesce(priority_name,'--') as priority_name     from taskmanagement.task_data ttd     left join  project_mst pm  on (ttd.project_id=pm.project_id and pm.delete_flag=false)     left join  package_mst pkm on (ttd.package_id=pkm.pkg_id and pkm.deleteflag=false)  left join  unit_master um  on (ttd.unit_id=um.unit_id and um.delete_flag=false  )    left join circle_master cm  on (ttd.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master dm  on(ttd.division_id=dm.division_id and dm.delete_flag=false)  left join subdivision_master sdm  on (ttd.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false )  inner join taskmanagement.priority tp  on  (ttd.priority_id=tp.priority_id  and  tp.delete_flag=false)  inner join  ( SELECT  task_id,array_to_string(array_agg((coalesce(emp,'NA')) order by designation_id )  , '-') as emp , array_to_string(array_agg((coalesce(phone,'NA')) order by designation_id )  , '-') as phone  FROM  ( ( select designation_id, TASK_ID,'SE @'||first_name||''||last_name as emp, 'SE @'||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_se=tem.emp_id  ))  UNION    (   select designation_id,  TASK_ID,'EE @'||first_name||''||last_name||'	'  as emp, 'EE @'||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_ee=tem.emp_id  ))  UNION       (select designation_id, TASK_ID ,'DEE @'||first_name||''||last_name  as emp , 'DEE @'||phone_num_1 as phone from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_dee=tem.emp_id  ))  UNION ( select  designation_id, TASK_ID, 'AEE @'||first_name||''||last_name as emp , 'AEE @'||phone_num_1 as phone  from taskmanagement.task_data ttd,taskmanagement.emp_mst tem   where (ttd.responsible_aee=tem.emp_id  )) ) TS  group by task_id  ) tem  on ((ttd.task_id=tem.task_id) ) inner join taskmanagement.task_status tts  on (ttd.t_status_id=tts.t_status_id and tts.delete_flag=false) inner join taskmanagement.task_type ttt  on (ttd.t_type_id=ttt.t_type_id and ttt.delete_flag=false) left join (select coalesce(task_id,0) as task_id , array_to_string(array_agg(coalesce(to_char(target_date,'dd/mm/yy'),'-') order by backup_id desc), ', ')as target_date from taskmanagement.task_data_backup where delete_flag=false group by task_id) tdate on (ttd.task_id=tdate.task_id) where ttd.delete_flag=false and ttd.is_latest=true
#select task_id,coalesce(task_title,'--') as task_title,coalesce(ttd.project_id,0) as project_id,coalesce(ttd.package_id,0) as package_id ,coalesce(ttd.unit_id,0) as unit_id ,coalesce(ttd.circle_id,0) as circle_id,coalesce(ttd.division_id,0) as division_id, coalesce(ttd.subdivision_id,0) as subdivision_id,coalesce(ttd.t_type_id,0) as t_type_id  ,coalesce(ttd.priority_id ,0) as priority_id , coalesce(ttd.t_status_id,0) as t_status_id, coalesce( responsible_person,0) as responsible_person,  'CE'||'  @'||coalesce(unit_remarks,'--')||''||'SE'||' @'||coalesce(se_remarks,'--')||''||'EE'||' @'||coalesce(ee_remarks,'--')||''||'DEE'||' @'||coalesce(dee_remarks,'--')||''||'AEE'||' @'||coalesce(aee_remarks,'--')    as remarks  ,coalesce(to_char(assign_date,'dd/mm/yy'),'--') as assign_date,coalesce(to_char(target_date,'dd/mm/yy'),'--') as target_date ,   coalesce(project_name,'--') as project_name,coalesce(pkg_name,'--') as pkg_name,coalesce(unit_name,'--') as unit_name,coalesce(circle_name,'--') as circle_name,coalesce(division_name,'--') as  division_name   ,coalesce(subdivision_name,'--') as  subdivision_name, coalesce(t_type_name,'--') as t_type_name,coalesce(t_status_name,'--') as t_status_name , coalesce(priority_name,'--') as priority_name , coalesce(designation_name,'--') as designation_name,first_name||''||last_name,coalesce(phone_num_1,'--') as phone_num_1  ,coalesce(email_id,'--') as email_id, coalesce(tem.emp_id,0)  from taskmanagement.task_data ttd left join  project_mst pm  on (ttd.project_id=pm.project_id and pm.delete_flag=false) left join  package_mst pkm on (ttd.package_id=pkm.pkg_id and pkm.deleteflag=false) left join  unit_master um  on (ttd.unit_id=um.unit_id and um.delete_flag=false  ) left join circle_master cm  on (ttd.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm  on(ttd.division_id=dm.division_id and dm.delete_flag=false) left join subdivision_master sdm  on (ttd.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) inner join taskmanagement.priority tp  on  (ttd.priority_id=tp.priority_id  and  tp.delete_flag=false) inner join taskmanagement.emp_mst tem  on (ttd.responsible_person=tem.emp_id  and   tem.delete_flag=false and tem.is_latest=true) inner join taskmanagement.designation_mst tdm  on (tem.designation_id=tdm.designation_id and   tdm.delete_flag=false ) inner join taskmanagement.task_status tts  on (ttd.t_status_id=tts.t_status_id and tts.delete_flag=false) inner join taskmanagement.task_type ttt  on (ttd.t_type_id=ttt.t_type_id and ttt.delete_flag=false)  where ttd.delete_flag=false and ttd.is_latest=true 
