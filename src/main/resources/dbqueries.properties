false and is_latest=true) t4 inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int and t4.district_id=mms.dcode::int and mms.delete_flag=false) group by t4.const_id) mm  on (pa.const_id=mm.const_id  ) inner join constituency_mst_new  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) where pa.const_id in (select distinct constituency_id from  constituency_mst_new cmn inner join constituency_mandal_mapping  cmm  on (cmn.ac_code::int=cmm.acode::int) where dcode::int=?) order by constituency_name,district_name,mandal_name  
