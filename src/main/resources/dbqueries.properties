 as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name,            coalesce(icl.mandal_id,0) as mandal_id ,coalesce(mm.mandal_name,'NA') as mandal_name, coalesce(icl.village_id,0) as village_id ,             coalesce(vm.vname,'NA') as village_name, coalesce(mtf.approx_cost_permanent + mtf.approx_cost_temporary,0) as  tot_value, 0 ,mtf.comp_cat_id ,coalesce(icl.village_name,'NA')    from  invom.mi_tank_form20data mtf  inner join invom.invom_canals  imc on (mtf.canal_id=imc.canal_id and imc.delete_flag=false and imc.is_latest=true) inner join invom.invom_canals_location icl on (mtf.canal_loc_id=icl.canal_loc_id and icl.delete_flag=false and icl.is_latest=true)   inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)   left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )  inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  inner join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false) inner join division_master divm  on (mtf.division_id=divm.division_id and divm.delete_flag=false)    inner join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id    and sdm.delete_flag=false)  inner join invom.invom_canal_types  ict on (imc.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false)     where mtf.delete_flag=false  and mtf.is_latest=true  and mtf.form_data_id=?
