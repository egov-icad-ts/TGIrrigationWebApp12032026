INSERT_INTO_CAG_STATUS=INSERT INTO irparas.cag_status(cag_para_id, cag_gist_id, cag_para_remarks, is_latest, delete_flag, created_by, created_date,cag_para_status_id,create_by_unit_id ) VALUES ( ?, ?, ?, true, false, ?, now(),?,?);

UPDATE_CAG_STATUS_OLD=UPDATE irparas.cag_status  SET  is_latest=FALSE, delete_flag=false,  update_by=?, update_date=now()  WHERE  cag_para_id=? and is_latest=true and delete_flag=false


SELECT_PARAS_ABSTRACT_CIRCLE_BYCIRCLETOT=select distinct ptirpm.unit_id,case when (ptirpm.circle_id=0 or ptirpm.circle_id is null ) then -2      when (ptirpm.circle_id!=0 or ptirpm.circle_id is not null ) then ptirpm.circle_id end as circle_id ,-2 as division_id,-2 as subdivision_id,coalesce(tot.totalparas,0) as totalparas,coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb,  coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' SE Office'  as unit_code,coalesce(cm.circle_name,'NA')  as circle_name,'NA' as division_name  ,'NA' as subdivision_name,um.unit_code||' SE Total' as unit_name  from  irparas.paras_master ptirpm inner join (  select coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) as totalparas  from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and irpm.section_id in (1,2)  AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)   ) tot   on (ptirpm.unit_id=tot.unit_id and ptirpm.circle_id=tot.circle_id )   left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) sectiona from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.section_id=1   AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  )seca   on (ptirpm.unit_id=seca.unit_id and ptirpm.circle_id=seca.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.section_id=2    AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  ) secb   on (ptirpm.unit_id=secb.unit_id and ptirpm.circle_id=secb.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) replysent  from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=1   group by irpm.unit_id,coalesce(circle_id,0) ) replysent   on (ptirpm.unit_id=replysent.unit_id and ptirpm.circle_id=replysent.circle_id )   left join     ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=2   group by irpm.unit_id,coalesce(circle_id,0)  ) replyna   on (ptirpm.unit_id=replyna.unit_id and ptirpm.circle_id=replyna.circle_id )    left join     (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) transfer from irparas.paras_master  irpm  where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true      AND irpm.circle_id<>0 group by irpm.unit_id,coalesce(circle_id,0)   ) transfer   on (ptirpm.unit_id=transfer.unit_id  and ptirpm.circle_id=transfer.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) dropped from irparas.paras_master  irpm  where  irpm.delete_flag=false   and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.paras_status_id =3   AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  ) dropped   on (ptirpm.unit_id=dropped.unit_id and ptirpm.circle_id=dropped.circle_id )    left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ptirpm.circle_id=cm.circle_id and cm.delete_flag=false) 

#select distinct ptirpm.unit_id,ptirpm.circle_id,case when (ptirpm.division_id=0 or ptirpm.division_id is null) then -1 when (ptirpm.division_id!=0 or ptirpm.division_id is not null) then ptirpm.division_id end as division_id ,coalesce(ptirpm.subdivision_id,0) as subdivision_id ,coalesce(tot.totalparas,0) as totalparas,coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb, coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' SE Office' as unit_code,coalesce(cm.circle_name,'0')  as circle_name,coalesce(dm.division_name,'0') as division_name  ,coalesce(sm.subdivision_name,'0') as subdivision_name , um.unit_code|| ' SE Office' as unit_name  from irparas.paras_master ptirpm     inner join      (  select coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) as totalparas    from irparas.paras_master  irpm    where  irpm.delete_flag=false    and irpm.is_latest=true and transfer_flag=false  and irpm.section_id in (1,2)   and irpm.unit_id<>0  and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )      group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) tot     on (ptirpm.unit_id=tot.unit_id and ptirpm.circle_id=tot.circle_id and coalesce(ptirpm.division_id,0)=tot.division_id and coalesce(ptirpm.subdivision_id,0)=tot.subdivision_id)      left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) sectiona from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and transfer_flag=false and  irpm.section_id=1   and irpm.unit_id<>0  and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0))seca   on (ptirpm.unit_id=seca.unit_id and ptirpm.circle_id=seca.circle_id and coalesce(ptirpm.division_id,0)=seca.division_id and coalesce(ptirpm.subdivision_id,0)=seca.subdivision_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and transfer_flag=false and  irpm.section_id=2  and irpm.unit_id<>0   and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) secb   on (ptirpm.unit_id=secb.unit_id and ptirpm.circle_id=secb.circle_id and (coalesce(ptirpm.division_id,0)=secb.division_id) and coalesce(ptirpm.subdivision_id,0)=secb.subdivision_id)  left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) replysent from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and transfer_flag=false  and  irpm.paras_status_id=1  and irpm.unit_id<>0   and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replysent   on (ptirpm.unit_id=replysent.unit_id and ptirpm.circle_id=replysent.circle_id and coalesce(ptirpm.division_id,0)=replysent.division_id and coalesce(ptirpm.subdivision_id,0)=replysent.subdivision_id)   left join     ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and transfer_flag=false and  irpm.paras_status_id=2  and irpm.unit_id<>0  and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replyna   on (ptirpm.unit_id=replyna.unit_id and ptirpm.circle_id=replyna.circle_id and coalesce(ptirpm.division_id,0)=replyna.division_id and coalesce(ptirpm.subdivision_id,0)=replyna.subdivision_id)   left join    (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) transfer from irparas.paras_master  irpm  where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true    and irpm.unit_id<>0   and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) transfer   on (ptirpm.unit_id=transfer.unit_id and ptirpm.circle_id=transfer.circle_id and coalesce(ptirpm.division_id,0)=transfer.division_id and coalesce(ptirpm.subdivision_id,0)=transfer.subdivision_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) dropped from irparas.paras_master  irpm  where  irpm.delete_flag=false   and irpm.is_latest=true and transfer_flag=false and  irpm.paras_status_id =3  and irpm.unit_id<>0   and irpm.circle_id<>0 and (irpm.division_id =0 or irpm.division_id is null ) and  (irpm.subdivision_id =0 or irpm.subdivision_id is null )   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) dropped   on (ptirpm.unit_id=dropped.unit_id and ptirpm.circle_id=dropped.circle_id and coalesce(ptirpm.division_id,0)=dropped.division_id and coalesce(ptirpm.subdivision_id,0)=dropped.subdivision_id)   left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ptirpm.circle_id=cm.circle_id and cm.delete_flag=false)   left join  division_master dm on (ptirpm.division_id=dm.division_id and um.delete_flag=false)   left join  subdivision_master sm on (ptirpm.subdivision_id=sm.subdivision_id and um.delete_flag=false) 
SELECT_PARAS_ABSTRACT_DIVISION_BYDIVISION=select distinct ptirpm.unit_id,ptirpm.circle_id,ptirpm.division_id,ptirpm.subdivision_id,coalesce(tot.totalparas,0) as totalparas,coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb,  coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent ,coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' EE Office' as unit_code,coalesce(cm.circle_name,'0')  as circle_name,coalesce(dm.division_name,'0') as division_name  ,coalesce(sm.subdivision_name,'0') as subdivision_name,um.unit_code as unit_name  from   irparas.paras_master ptirpm  inner join  (  select coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,'-2') as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) as totalparas from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false  and irpm.section_id in (1,2)  and irpm.unit_id<>0 and irpm.circle_id<>0  and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)    group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,-2),coalesce(subdivision_id,0)) tot   on (ptirpm.unit_id=tot.unit_id and ptirpm.circle_id=tot.circle_id and ptirpm.division_id=tot.division_id and coalesce(ptirpm.subdivision_id,0)=tot.subdivision_id)   left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) sectiona  from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.section_id=1   and irpm.unit_id<>0 and irpm.circle_id<>0  and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0))seca   on (ptirpm.unit_id=seca.unit_id and ptirpm.circle_id=seca.circle_id and ptirpm.division_id=seca.division_id and coalesce(ptirpm.subdivision_id,0)=seca.subdivision_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.section_id=2    and irpm.unit_id<>0 and irpm.circle_id<>0  and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) secb   on (ptirpm.unit_id=secb.unit_id and ptirpm.circle_id=secb.circle_id and ptirpm.division_id=secb.division_id and coalesce(ptirpm.subdivision_id,0)=secb.subdivision_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) replysent from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=1    and irpm.unit_id<>0 and irpm.circle_id<>0  and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replysent   on (ptirpm.unit_id=replysent.unit_id and ptirpm.circle_id=replysent.circle_id and ptirpm.division_id=replysent.division_id and coalesce(ptirpm.subdivision_id,0)=replysent.subdivision_id)   left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=2    and irpm.unit_id<>0 and irpm.circle_id<>0 and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) replyna   on (ptirpm.unit_id=replyna.unit_id and ptirpm.circle_id=replyna.circle_id and ptirpm.division_id=replyna.division_id and ptirpm.subdivision_id=replyna.subdivision_id)   left join     (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) transfer from irparas.paras_master  irpm where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true      and irpm.unit_id<>0 and irpm.circle_id<>0  and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)    group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) transfer   on (ptirpm.unit_id=transfer.unit_id and ptirpm.circle_id=transfer.circle_id and ptirpm.division_id=transfer.division_id and coalesce(ptirpm.subdivision_id,0)=transfer.subdivision_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) dropped from irparas.paras_master  irpm  where  irpm.delete_flag=false   and irpm.is_latest=true and transfer_flag=false and  irpm.paras_status_id =3     and irpm.unit_id<>0 and irpm.circle_id<>0 and irpm.division_id<>0 and  (irpm.subdivision_id =0 or irpm.subdivision_id is null)   group by irpm.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0)) dropped   on (ptirpm.unit_id=dropped.unit_id and ptirpm.circle_id=dropped.circle_id and ptirpm.division_id=dropped.division_id and coalesce(ptirpm.subdivision_id,0)=dropped.subdivision_id) left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ptirpm.circle_id=cm.circle_id and cm.delete_flag=false)   left join  division_master dm on (ptirpm.division_id=dm.division_id and um.delete_flag=false)   left join  subdivision_master sm on (ptirpm.subdivision_id=sm.subdivision_id and um.delete_flag=false)


##select cag_para,para_sequence,cag_gist_id,cag_para_id,coalesce(para_title,'--') as para_title,sub_para_number,sub_para_unit_id,para_status_id, CASE   WHEN (icm.discuss_pac =true)  THEN 'YES'   WHEN (icm.discuss_pac =false)  THEN 'NO'   END AS discuss_pac,ips.parastatus  from irparas.cag_master icm inner join irparas.para_status ips  on (icm.para_status_id=ips.parastatus_id and ips.delete_flag=false)  where icm.delete_flag=false and icm.is_latest=true  order by cag_gist_id,para_sequence

##select cag_para,para_sequence,cag_gist_id,cag_para_id,coalesce(para_title,'--') as para_title from irparas.cag_master  icm where icm.delete_flag=false and icm.is_latest=true order by cag_gist_id,para_sequence

REPLY_ALL=select para_reply_id,ipr.para_id,TRIM(reply),ipr.reply_remarks,to_char(reply_date,'dd/mm/yyyy') as replydate,ipr.para_sub_id from irparas.para_replys ipr, (select max(reply_date) as replymax,para_id,ipr.para_sub_id from irparas.para_replys ipr where ipr.delete_flag=false and is_latest=true  group by para_id,para_sub_id ) maxdate where ipr.delete_flag=false and is_latest=true  and reply_date =maxdate.replymax and  ipr.para_id=maxdate.para_id order by ipr.para_id,ipr.para_sub_id


REPLY_ALL_BY_OFFICE=select para_reply_id,ipr.para_id,TRIM(reply),ipr.reply_remarks,to_char(reply_date,'dd/mm/yyyy') as replydate,ipr.para_sub_id from irparas.para_replys ipr inner join (select max(reply_date) as replymax,para_id,ipr.para_sub_id from irparas.para_replys ipr where ipr.delete_flag=false and is_latest=true  group by para_id,para_sub_id ) maxdate on (ipr.reply_date =maxdate.replymax and  ipr.para_id=maxdate.para_id ) inner join irparas.paras_master ipm  on (ipr.para_id=ipm.para_id and ipm.delete_flag=false and ipm.is_latest=true)  where ipr.delete_flag=false and ipr.is_latest=true  and ipm.unit_id=? and ipm.circle_id=? and ipm.division_id=?   order by ipr.para_id,ipr.para_sub_id


REPLY_ALL_WITH_ALL_REPLY= select ipr.para_id,coalesce(string_agg(  TRIM(reply), '  '  ORDER BY iprms.sub_category_id, ipr.reply_date ),'<p>NO</p>')  as reply,coalesce(string_agg(ipr.reply_remarks,',' ORDER BY iprms.sub_category_id, ipr.reply_date ),'<p>NO</p>')  as  reply_remarks  from irparas.para_replys ipr  inner join irparas.paras_master_sub iprms  on (ipr.para_sub_id=iprms.para_sub_id and iprms.delete_flag=false and iprms.is_latest=true ) where ipr.delete_flag=false and ipr.is_latest=true  group by ipr.para_id,iprms.sub_category_id   order by para_id ,iprms.sub_category_id 
#21082021select para_reply_id,ipr.para_id,coalesce(TRIM(reply),'<P>NO</P>') as reply,coalesce(TRIM(ipr.reply_remarks),'<P>NO</P>') as reply_remarks,to_char(reply_date,'dd/mm/yyyy') as replydate,para_sub_id from irparas.para_replys ipr where ipr.delete_flag=false and is_latest=true   order by para_id ,para_sub_id,replydate 
#select para_reply_id,para_id,reply_title,TRIM(reply),reply_remarks,to_char(reply_date,'dd/mm/yyyy') as replydate from irparas.para_replys ipr where ipr.delete_flag=false and is_latest=true order by para_id;

DOCS_ALL_PARAS=select doc_id,doc_original_name,para_id,doc_name,para_sub_id  from irparas.irparas_documents ipd where ipd.delete_flag=false and ipd.is_latest=true order by para_id;
#select distinct ptirpm.unit_id,ptirpm.circle_id,ptirpm.division_id,ptirpm.subdivision_id,  coalesce(reply.replysent,0) as replysent ,coalesce(tr.transferred,0)as transferred,coalesce(replynotsent.replynotsent,0) as replynotsent ,  um.unit_name,coalesce(cm.circle_name,'--') as circle_name,coalesce(dm.division_name,'--') as division_name  ,coalesce(sm.subdivision_name,'--') as subdivision_name,ptirpm.paras_status_id  from irparas.paras_master ptirpm  left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id,  coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,coalesce(count (para_id),0) as replysent,  paras_status_id from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.status_id=1   group by irpm.unit_id,irpm.circle_id ,irpm.division_id ,irpm.subdivision_id ,paras_status_id) reply on (ptirpm.unit_id=reply.unit_id and ptirpm.circle_id=reply.circle_id and ptirpm.division_id=reply.division_id and ptirpm.subdivision_id=reply.subdivision_id and ptirpm.paras_status_id=reply.paras_status_id  ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,   coalesce(count (para_id),0) as transferred,paras_status_id from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.status_id=2   group by irpm.unit_id,irpm.circle_id ,irpm.division_id ,irpm.subdivision_id,paras_status_id ) tr   on (ptirpm.unit_id=tr.unit_id and ptirpm.circle_id=tr.circle_id and ptirpm.division_id=tr.division_id and ptirpm.subdivision_id=tr.subdivision_id and ptirpm.paras_status_id=tr.paras_status_id )   left  join   ( select   coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(irpm.division_id,0) as division_id ,coalesce(irpm.subdivision_id,0) as subdivision_id ,  coalesce(count (para_id),0) as replynotsent,paras_status_id from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.status_id=3   group by irpm.unit_id,irpm.circle_id ,irpm.division_id ,irpm.subdivision_id ,paras_status_id) replynotsent    on (ptirpm.unit_id=replynotsent.unit_id and ptirpm.circle_id=replynotsent.circle_id and ptirpm.division_id=replynotsent.division_id and ptirpm.subdivision_id=replynotsent.subdivision_id and ptirpm.paras_status_id=replynotsent.paras_status_id)      left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ptirpm.circle_id=cm.circle_id and cm.delete_flag=false)   left join  division_master dm on (ptirpm.division_id=dm.division_id and um.delete_flag=false)   left join  subdivision_master sm on (ptirpm.subdivision_id=sm.subdivision_id and um.delete_flag=false)     order by unit_name,circle_name,division_name,subdivision_name 


DOCS_ALL_PARAS_BY_OFFICE=select doc_id,doc_original_name,ipd.para_id,doc_name,para_sub_id  from irparas.irparas_documents ipd   inner join irparas.paras_master ipm  on (ipd.para_id=ipm.para_id and ipm.delete_flag=false and ipm.is_latest=true)  where ipd.delete_flag=false and ipd.is_latest=true   and ipm.unit_id=?   and ipm.circle_id=?  and ipm.division_id=?   order by para_id;


