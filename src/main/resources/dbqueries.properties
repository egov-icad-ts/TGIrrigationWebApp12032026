GET_RES_ANN2_MST2_INSPECTDATA=  select distinct irdam2.res_ann2_mst2_id,irdam2.res_ann2_mst1_id,irdam2.res_code,irdam2.res_rec_check_id, irdam2.res_rec_category_id,irdam2.designation,coalesce(to_char(irdam2.inspect_date,'dd/mm/yyyy'),'NA') as inspect_date,irdam2.approv_status_id,   irdam2.create_user_id,irdam2.create_user_name,irdam2.user_emp_id,coalesce(irdam2.remarks,'NA') as remarks   from invom.invom_res_dam_ann2_mst2 irdam2 inner join invom.invom_res_dam_ann2_mst1 irdam1   on(irdam1.res_ann2_mst1_id=irdam2.res_ann2_mst1_id and irdam1.delete_flag=false and irdam1.is_latest=true)   where irdam2.res_code=? and irdam1.freq_operation=? and irdam1.freq_year=?    and irdam2.delete_flag=false and irdam2.is_latest=true ORDER BY  irdam2.res_rec_category_id , irdam2.res_rec_check_id asc

SELECT_RES_HEALTH=SELECT res_dam_health_id, irdh.res_code, irdh.category_id, irdh.designation, to_char( inspect_date,'dd/mm/yyyy') as inspect_date, irdh.deficiencies_noted, create_user_name,user_emp_id, coalesce(irdh.unit_id,0) as unit_id, coalesce(irdh.circle_id,0) as circle_id, coalesce(irdh.division_id,0) as division_id , coalesce(irdh.subdivision_id,0) as subdivision_id,  coalesce(irdh.project_id,0) as project_id,level_id,res_name as res_name , coalesce(um.unit_code,'NA') as unit_code, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name,coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(pm.project_name,'NA') as project_name, coalesce(tdm.designation_name,'NA') as designation_name   FROM invom.invom_res_dam_health irdh  inner join invom.invom_reservoirs imr on (imr.res_code=irdh.res_code and imr.delete_flag=false and imr.is_latest=true )   left join unit_master um on ( irdh.unit_id =um.unit_id and um.delete_flag=false)  left join circle_master cm on (irdh.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (irdh.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master sdvm on (irdh.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)  left join project_mst pm on ( irdh.project_id=pm.project_id and (pm.delete_flag=false)) left join taskmanagement.designation_mst  tdm on (irdh.designation=tdm.designation_id and tdm.delete_flag=false)  where irdh.delete_flag=false and irdh.is_latest=true    and    irdh.inspect_date between CURRENT_DATE -interval '2 year' and CURRENT_DATE AND irdh.res_code=? order by irdh.inspect_date ;

SELECT_RES_RECOMMEND=SELECT res_dam_recommend_id,irdr.res_dam_health_id, irdr.res_code, irdr.designation_id, to_char( irdr.inspect_date,'dd/mm/yyyy') as inspect_date, irdr.recommendations,irdr.create_user_id,irdr.create_user_name,irdr.user_emp_id, coalesce(irdr.unit_id,0) as unit_id, coalesce(irdr.circle_id,0) as circle_id, coalesce(irdr.division_id,0) as division_id ,coalesce(irdr.subdivision_id,0) as subdivision_id,  coalesce(irdr.project_id,0) as project_id,irdr.level_id,res_name as res_name , coalesce(um.unit_code,'NA') as unit_code, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name,coalesce(sdvm.subdivision_name,'NA') as subdivision_name,  coalesce(pm.project_name,'NA') as project_name, coalesce(tdm.designation_name,'NA') as designation_name  ,irdh.deficiencies_noted , irdh.category_id,irrt.res_repair  FROM invom.invom_res_dam_recommendations irdr  inner join invom.invom_reservoirs imr on (imr.res_code=irdr.res_code and imr.delete_flag=false and imr.is_latest=true ) left join unit_master um on ( irdr.unit_id =um.unit_id and um.delete_flag=false) left join circle_master cm on (irdr.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (irdr.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master sdvm on (irdr.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false) left join project_mst pm on ( irdr.project_id=pm.project_id and (pm.delete_flag=false)) left join taskmanagement.designation_mst  tdm on (irdr.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join invom.invom_res_dam_health irdh on (irdr.res_dam_health_id=irdh.res_dam_health_id and irdh.delete_flag=false and irdh.is_latest=true)   inner join invom.invom_res_repair_type irrt on (irdh.category_id=irrt.res_repair_type_id and irrt.delete_flag=false and irrt.is_latest=true)  where irdr.delete_flag=false and irdr.is_latest=true   and    irdr.inspect_date between CURRENT_DATE -interval '2 year' and CURRENT_DATE AND irdr.res_code=? order by irdr.inspect_date desc;

SELECT_RES_ACTION_TAKEN=SELECT res_dam_action_id, irdat.res_dam_health_id, irdat.res_code, irdat.inspect_date, action_taken, reasons, irdat.designation_id, irdat.create_user_id, irdat.create_user_name, irdat.user_emp_id,  coalesce(irdat.unit_id,0) as unit_id, coalesce(irdat.circle_id,0) as circle_id, coalesce(irdat.division_id,0) as division_id ,coalesce(irdat.subdivision_id,0) as subdivision_id,coalesce(irdat.project_id,0) as project_id,irdat.level_id,res_name as res_name , coalesce(um.unit_code,'NA') as unit_code, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name,coalesce(sdvm.subdivision_name,'NA') as subdivision_name,coalesce(pm.project_name,'NA') as project_name, coalesce(tdm.designation_name,'NA') as designation_name  ,irdh.deficiencies_noted ,  irdh.category_id,irrt.res_repair,recommend_id,action_complete,irdr.recommendations FROM invom.invom_res_dam_action_taken  irdat  inner join invom.invom_reservoirs imr  on (imr.res_code=irdat.res_code and imr.delete_flag=false and imr.is_latest=true )  left join unit_master um on ( irdat.unit_id =um.unit_id and um.delete_flag=false)  left join circle_master cm on (irdat.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (irdat.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master sdvm on (irdat.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false) left join project_mst pm on ( irdat.project_id=pm.project_id and (pm.delete_flag=false)) left join taskmanagement.designation_mst  tdm on (irdat.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join invom.invom_res_dam_health irdh on (irdat.res_dam_health_id=irdh.res_dam_health_id and irdh.delete_flag=false and irdh.is_latest=true)  inner join invom.invom_res_repair_type irrt on (irdh.category_id=irrt.res_repair_type_id and irrt.delete_flag=false and irrt.is_latest=true)  inner join invom.invom_res_dam_recommendations irdr  on (irdr.res_dam_recommend_id=irdat.recommend_id and irdr.delete_flag=false and irdr.is_latest=true) where irdat.delete_flag=false and  irdat.is_latest=true  and irdat.res_code=?

SELECT_LATEST_RECOMMENDATION=SELECT  res_code, to_char(max(inspect_date),'dd/mm/yyyy')  as inspect_date, recommendations   FROM invom.invom_res_dam_recommendations where delete_flag=false and is_latest=true   and res_code=?   group by   res_code, inspect_date, recommendations

SELECT_LATEST_HEALTH=select pirdh.category_id,deficiencies_noted, pirdh.res_code,to_char(max(inspect_date),'dd/mm/yyyy') as inspect_date,irrt.res_repair from  invom.invom_res_dam_health pirdh inner join invom.invom_res_repair_type irrt on(pirdh.category_id=irrt.res_repair_type_id and irrt.delete_flag=false and irrt.is_latest=true) where  pirdh.res_code=?  and    pirdh.delete_flag=false and pirdh.is_latest=true    group by   res_code, inspect_date, deficiencies_noted,category_id,irrt.res_repair

INSERT_TANK_FEED_DETAIL=INSERT INTO invom.invom_mi_tank_feed_details(tank_id, can_fed, chain_link_id, source_type_id, source_comp_type_id, source_comp_id, inspect_date, source_details, create_user_id, create_user_name,is_latest, delete_flag, user_emp_id, create_date, unit_id, circle_id, division_id, subdivision_id, project_id, designation_id, level_id,ot_location_km,section_id)   VALUES ( ?, ?, ?, ?, ?, ?, ?, ?, ?, ?,  true, false, ?, now(), ?, ?, ?, ?, ?, ?, ?,?,?) returning mi_feed_detail_id;

GET_TANK_FEED_DATA= SELECT imtfd.mi_feed_detail_id, imtfd.tank_id, imtfd.can_fed, imtfd.chain_link_id, imtfd.source_type_id,imtfd.source_comp_type_id, imtfd.source_comp_id, to_char(imtfd.inspect_date,'dd/mm/yyyy') as inspect_date, imtfd.source_details, create_user_name,user_emp_id,coalesce(imtfd.unit_id,0) as unit_id, coalesce(imtfd.circle_id) as circle_id, coalesce(imtfd.division_id,0) as division_id , coalesce(imtfd.subdivision_id,0) as subdivision_id, coalesce(imtfd.project_id,0) as project_id, coalesce(imtfd.designation_id,0) as designation_id ,level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(pm.project_name,'NA') as project_name, coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name,mm.mandal_name, vm.village_name ,coalesce(imtl.link_name,'NA') as link_name,imst.source_type,imsct.component_type,ic.component_name,ic.component_code,coalesce(ot_location_km,'0.0') as ot_location_km  FROM invom.invom_mi_tank_feed_details imtfd inner join invom.invom_mi_tanks imt on (imtfd.tank_id=imt.tank_id and imt.delete_flag=false and imt.is_latest=true ) left join unit_master um on ( imtfd.unit_id =um.unit_id and um.delete_flag=false)  left join circle_master cm on (imtfd.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (imtfd.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master sdvm on (imtfd.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)  left join project_mst pm on ( imtfd.project_id=pm.project_id and (pm.delete_flag=false))  left join taskmanagement.designation_mst  tdm on (imtfd.designation_id=tdm.designation_id and tdm.delete_flag=false)  inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false) inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false)  inner join village_mst vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int and vm.delete_flag=false)  left join invom.invom_mi_tank_links imtl on (imt.link_id=imtl.mi_tank_link_id and imtl.delete_flag=false and imtl.is_latest=true)   inner join invom.invom_mi_source_types imst on(imtfd.source_type_id=imst.source_type_id and imst.delete_flag=false and imst.is_latest=true) inner join invom.invom_source_comp_types imsct on (imtfd.source_comp_type_id= imsct.component_type_id and imsct.delete_flag=false and imsct.is_latest=true)  inner join invom.invom_components ic on (imtfd.source_comp_id=ic.component_id and ic.delete_flag=false and ic.is_latest=true)  where imtfd.delete_flag=false and imtfd.is_latest=true  and    imtfd.inspect_date between CURRENT_DATE -interval '4 month' and   CURRENT_DATE  AND imtfd.tank_id=? order by imtfd.inspect_date ;


