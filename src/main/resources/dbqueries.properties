 SELECT_TANK_ABSTRACT_EMBINFO=select imt2.mi_inpsect_mst1_id,mi_inpsect_mst2_id, remarks,imt2.mi_comp_check_map_id,to_char(inspect_date,'dd/mm/yyyy') as  inspect_date ,water_level_inspect,inspect_complete,action_req_id,imt2.wier_sluice_id,action_req,mi_tank_inspect_aprov_id, imt2.mi_inspect_type_id,imt2.invom_mi_comps_id,imtc.mi_inspect_type_name,imc.invom_mi_comps,imc.invom_mi_parent_comp_id,coalesce(inspectdata.empdesignation,'NA')  as inspectioncompletedby,imt2.tab_id , coalesce(imtws.tank_wier_sluice_name,'NA') as weirsluicename  from invom.invom_mi_tank_inspect_mst2 imt2  inner join invom.invom_mi_tank_cheks imtc on(imt2.mi_inspect_type_id=imtc.mi_inspect_type_id and imtc.delete_flag=false and imtc.is_latest=true)  inner join invom.invom_mi_comps imc on(imt2.invom_mi_comps_id=imc.invom_mi_comps_id and imc.delete_flag=false and imc.is_latest=true  )  left join ( select distinct mstl.tank_id, mstl.mi_inpsect_mst1_id,level_id,      mstl.designation_id,mstl.post_id,tem.employeename||'('||tdm.designation_name||')' as empdesignation,mstl.tab_id,mstl.wier_sluice_id   from invom.invom_mi_tank_inspect_mst1_remarks mstl   inner join   (  select max(create_date) as cdate,  tank_id,mi_inpsect_mst1_id, tab_id,wier_sluice_id   from invom.invom_mi_tank_inspect_mst1_remarks chl group by tank_id,mi_inpsect_mst1_id,tab_id , wier_sluice_id) maxdate   on (mstl.tank_id=maxdate.tank_id and mstl.mi_inpsect_mst1_id=maxdate.mi_inpsect_mst1_id  and mstl.tab_id=maxdate.tab_id and mstl.create_date=maxdate.cdate and mstl.wier_sluice_id=maxdate.wier_sluice_id )   inner join taskmanagement.subposts tsp  on(mstl.post_id=tsp.postid and tsp.post_status='ACTIVE')  inner  join (select emp_id::int, post  from  taskmanagement.present_post_emp  ppe where ppe.delete_flag=false and ppe.is_latest=true   union    select emp_id::int ,post  from taskmanagement.additional_charge  tac  where ((tac.to_date is null ) or (to_date>=now() ))) postdata  on ( postdata.post=mstl.post_id ) inner join taskmanagement.employee_mst tem  on (empid=postdata.emp_id and tem.employee_status::int=1) inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp.designation and tdm.delete_flag=false)  where mstl.delete_flag=false   ) inspectdata  on (imt2.mi_inpsect_mst1_id=inspectdata.mi_inpsect_mst1_id and imt2.tank_id=inspectdata.tank_id  and imt2.tab_id=inspectdata.tab_id and imt2.wier_sluice_id=inspectdata.wier_sluice_id )   left join invom.invom_mi_tank_wier_sluice  imtws on (imt2.wier_sluice_id=imtws.tank_wier_sluice_id and imtws.delete_flag=false and imtws.is_latest=true )  where imt2.tank_id=? and imt2.mi_inpsect_mst1_id=? and imt2.delete_flag=false and imt2.is_latest=true  order by tab_id,wier_sluice_id;
 #select imt2.mi_inpsect_mst1_id,mi_inpsect_mst2_id, remarks,imt2.mi_comp_check_map_id,to_char(inspect_date,'dd/mm/yyyy') as  inspect_date ,water_level_inspect,inspect_complete,action_req_id,imt2.wier_sluice_id,action_req,mi_tank_inspect_aprov_id,imt2.mi_inspect_type_id,imt2.invom_mi_comps_id,imtc.mi_inspect_type_name,imc.invom_mi_comps,imc.invom_mi_parent_comp_id,coalesce(inspectdata.empdesignation,'NA')  as inspectioncompletedby,imt2.tab_id , coalesce(imtws.tank_wier_sluice_name,'NA') as weirsluicename  from invom.invom_mi_tank_inspect_mst2 imt2 inner join invom.invom_mi_tank_cheks imtc on(imt2.mi_inspect_type_id=imtc.mi_inspect_type_id and imtc.delete_flag=false and imtc.is_latest=true) inner join invom.invom_mi_comps imc on(imt2.invom_mi_comps_id=imc.invom_mi_comps_id and imc.delete_flag=false and imc.is_latest=true  )  left join ( select distinct mstl.tank_id, mstl.mi_inpsect_mst1_id,level_id,mstl.designation_id,mstl.create_user_name,tem.first_name||' '||tem.last_name||'('||tdm.designation_name||')' as empdesignation,mstl.tab_id,mstl.wier_sluice_id   from invom.invom_mi_tank_inspect_mst1_remarks mstl inner join   (  select max(create_date) as cdate,  tank_id,mi_inpsect_mst1_id, tab_id,wier_sluice_id from invom.invom_mi_tank_inspect_mst1_remarks chl group by tank_id,mi_inpsect_mst1_id,tab_id , wier_sluice_id) maxdate    on (mstl.tank_id=maxdate.tank_id and mstl.mi_inpsect_mst1_id=maxdate.mi_inpsect_mst1_id and mstl.tab_id=maxdate.tab_id and mstl.create_date=maxdate.cdate  and mstl.wier_sluice_id=maxdate.wier_sluice_id )   inner join taskmanagement.emp_mst tem  on(SUBSTRING ( mstl.create_user_name ,5 , 8)::int=tem.emp_id and tem.delete_flag=false)   inner join taskmanagement.designation_mst tdm on(mstl.designation_id=tdm.designation_id and tdm.delete_flag=false)   where mstl.delete_flag=false    ) inspectdata on (imt2.mi_inpsect_mst1_id=inspectdata.mi_inpsect_mst1_id and imt2.tank_id=inspectdata.tank_id  and imt2.tab_id=inspectdata.tab_id and imt2.wier_sluice_id=inspectdata.wier_sluice_id )  left join invom.invom_mi_tank_wier_sluice  imtws on (imt2.wier_sluice_id=imtws.tank_wier_sluice_id and imtws.delete_flag=false and imtws.is_latest=true )  where imt2.tank_id=? and imt2.mi_inpsect_mst1_id=? and imt2.delete_flag=false and imt2.is_latest=true  order by tab_id,wier_sluice_id;
 #29012021select mi_inpsect_mst2_id,imt2.mi_inpsect_mst1_id, remarks,imt2.mi_comp_check_map_id,to_char(inspect_date,'dd/mm/yyyy') as  inspect_date ,water_level_inspect,inspect_complete,action_req_id,wier_sluice_id,action_req,mi_tank_inspect_aprov_id,imt2.mi_inspect_type_id,imt2.invom_mi_comps_id,imtc.mi_inspect_type_name,imc.invom_mi_comps,imc.invom_mi_parent_comp_id,inspectdata.empdesignation  as inspectioncompletedby,imt2.tab_id , coalesce(imtws.tank_wier_sluice_name,'NA') as weirsluicename  from invom.invom_mi_tank_inspect_mst2 imt2 inner join invom.invom_mi_tank_cheks imtc on(imt2.mi_inspect_type_id=imtc.mi_inspect_type_id and imtc.delete_flag=false and imtc.is_latest=true) inner join invom.invom_mi_comps imc on(imt2.invom_mi_comps_id=imc.invom_mi_comps_id and imc.delete_flag=false and imc.is_latest=true  )  left join (select distinct tank_id, mi_inpsect_mst1_id,level_id,mstl.designation_id,mstl.create_user_name,tem.first_name||' '||tem.last_name||'('||tdm.designation_name||')' as empdesignation,mstl.tab_id  from invom.invom_mi_tank_inspect_mst1_remarks mstl  inner join taskmanagement.emp_mst tem  on(SUBSTRING ( mstl.create_user_name ,5 , 8)::int=tem.emp_id and tem.delete_flag=false)   inner join taskmanagement.designation_mst tdm on(mstl.designation_id=tdm.designation_id and tdm.delete_flag=false)  where mstl.delete_flag=false and mstl.is_latest=true  and mstl.level_id =( select max(level_id)  from invom.invom_mi_tank_inspect_mst1_remarks chl where mstl.mi_inpsect_mst1_id=chl.mi_inpsect_mst1_id and mstl.tank_id=chl.tank_id  and chl.tab_id=mstl.tab_id) ) inspectdata on (imt2.mi_inpsect_mst1_id=inspectdata.mi_inpsect_mst1_id and imt2.tank_id=inspectdata.tank_id  and imt2.tab_id=inspectdata.tab_id)  left join invom.invom_mi_tank_wier_sluice  imtws on (imt2.wier_sluice_id=imtws.tank_wier_sluice_id and imtws.delete_flag=false and imtws.is_latest=true )  where imt2.tank_id=? and imt2.mi_inpsect_mst1_id=? and imt2.delete_flag=false and imt2.is_latest=true  order by tab_id,wier_sluice_id;
