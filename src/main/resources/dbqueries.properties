SELECT_CONST_MST_BYOLDDIST=select constituency_id,constituency_name from constituency_mst_new cmn  inner join constituency_mandal_mapping cmm on(cmn.ac_code::int=acode::int) where dcode::int=? and mcode::int=?

#select constituency_id,constituency_name   from constituency_mst where delete_flag=false and  old_districtid=?
SELECT_MANDAL_AYACUT= select pa.const_id,cm.constituency_name,pa.district_id,pa.mandal_id, pa.ayacut_created,pa.stableayacut, pa.remarks ,pmt.project_name,pmu.unit_name, packs.package_name,dm.district_name, coalesce(mm.mandal_name,'NA') as mandal_name ,  pa.irrigated_ayacut,pa.contemplated_ayacut  from   (select pat.const_id,pat.district_id,pat.mandal_id, round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created , string_agg(pat.remarks, ' ,') as remarks  , round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut, round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut , round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut  from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true  group by pat.const_id,pat.district_id,pat.mandal_id) pa  inner join (select t.const_id,t.district_id,t.mandal_id, string_agg(pm.project_name, '  ,')  as project_name  from ( select distinct const_id, district_id ,mandal_id,projectid  from  components.project_ayacut   cpachild where delete_flag=false and is_latest=true ) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false) group by t.const_id ,t.district_id,t.mandal_id) pmt  on (pa.const_id=pmt.const_id   and pa.district_id=pmt.district_id and pa.mandal_id=pmt.mandal_id) inner join (select t2.const_id,t2.district_id,t2.mandal_id, string_agg(um.unit_name, ' , ') as unit_name from ( select distinct const_id,district_id,mandal_id, cpachild2.unit_id from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true) t2 inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false) group by t2.const_id,t2.district_id,t2.mandal_id) pmu on (pa.const_id=pmu.const_id and pa.district_id=pmu.district_id and pa.mandal_id=pmu.mandal_id ) inner join (select t3.const_id,t3.district_id,t3.mandal_id, string_agg(cps.pkg_name, ' ,') as package_name from ( select distinct const_id,district_id,mandal_id, cpachild3.pack_id from   components.project_ayacut   cpachild3 where delete_flag=false and is_latest=true) t3 left join package_mst cps  on (t3.pack_id=cps.pkg_id and cps.deleteflag=false) group by t3.const_id,district_id ,mandal_id) packs on (pa.const_id=packs.const_id and pa.district_id=packs.district_id and pa.mandal_id=packs.mandal_id) inner join (select t4.const_id,t4.district_id,t4.mandal_id, string_agg(dms.district_name, '  ,') as district_name from ( select distinct const_id,cpachild4.district_id,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4 inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false) group by t4.const_id ,t4.district_id,t4.mandal_id) dm  on (pa.const_id=dm.const_id  and pa.district_id=dm.district_id and pa.mandal_id=dm.mandal_id) inner join ( select t4.const_id,t4.district_id,t4.mandal_id, string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name from ( select distinct const_id,cpachild4.district_id,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int and mms.delete_flag=false) group by t4.const_id ,t4.district_id,t4.mandal_id ) mm   on (pa.const_id=mm.const_id  and pa.district_id=mm.district_id and pa.mandal_id=mm.mandal_id) inner join constituency_mst_new  cm  on (pa.const_id=cm.constituency_id and cm.delete_flag=false )  where pa.const_id in (select distinct constituency_id from  constituency_mst_new cmn inner join constituency_mandal_mapping  cmm  on (cmn.ac_code::int=cmm.acode::int) where dcode::int=?) union all select pa.const_id,cm.constituency_name||' '||'Total Ayacut',-3,-3, pa.ayacut_created,pa.stableayacut, pa.reamarks,'NA', 'NA', 'NA','NA','NA', pa.irrigated_ayacut,pa.contemplated_ayacut from  ( select pat.const_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created , round(sum(coalesce(pat.contemplated_ayacut,0))) a