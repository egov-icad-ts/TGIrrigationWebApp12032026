SELECT_COMP_DISCHARGE= SELECT comp_discharge_id, ccd.unit_id, ccd.project_id, ccd.component_id, season_id, season_year, season_month, discharge, ccd.ayacut, ccd.remarks,pm.project_name,um.unit_name,cc.component_name FROM components.component_discharge ccd inner join project_mst pm on  (ccd.project_id=pm.project_id and pm.delete_flag=false)   inner join  unit_master um on (ccd.unit_id=um.unit_id and um.delete_flag=false)   inner join components.components cc on (ccd.component_id=cc.component_id and cc.delete_flag=false)   where ccd.delete_flag=false and ccd.is_latest=true and ccd.component_id=?
SELECT_COMP_EDIT_DISCHARGE= SELECT comp_discharge_id, ccd.unit_id, ccd.project_id, ccd.component_id, season_id,   season_year, season_month, discharge, ccd.ayacut, ccd.remarks,pm.project_name,um.unit_name,cc.component_name,coalesce(season_month||'/'||season_year,'N/A' ) as seasonnow   FROM components.component_discharge ccd inner join project_mst pm on  (ccd.project_id=pm.project_id and pm.delete_flag=false)   inner join  unit_master um on (ccd.unit_id=um.unit_id and um.delete_flag=false)   inner join components.components cc on (ccd.component_id=cc.component_id and cc.delete_flag=false)   where ccd.delete_flag=false and ccd.is_latest=true and ccd.comp_discharge_id=?

SELECT_POWER_BILL_DELETE=SELECT comp_power_bill_id, um.unit_id, ccpb.project_id, ccpb.component_id, bill_due_date,  bill_date, disconnection_date, consumed_units, energy_charges_rate, energy_charges_kvah, electricity_duty_rate, electricity_duty, eletricityduty_interest, demand_chrages_rate, demand_charges_kva, customer_charges, late_payment_charges, delay_surchrage_rate,acd_surcharges, interest_security_deposit, total_amount, paid_date, paid_amount, asd_charges, pending_amount, paid_status, ccpb.remarks,year_comp, month_comp, lift_mtrs, unit_rate, quantity, document_number, document_name, document_path, bill_number,pm.project_name,um.unit_name,cc.component_name,coalesce(ccpb.fixed_charges,0.0) as fixed_charges,coalesce(ccpb.variable_charges,0.0) as variable_charges  FROM components.component_power_bill ccpb inner join project_mst pm   on( ccpb.project_id=pm.project_id and pm.delete_flag=false)   inner join unit_master um on (ccpb.unit_id=um.unit_id and um.delete_flag=false)   inner join components.components cc   on (ccpb.component_id=cc.component_id and cc.delete_flag=false) where ccpb.component_id=? and ccpb.delete_flag=false and ccpb.is_latest=true 

SELECT_POWER_BILL_EDIT=SELECT comp_power_bill_id, um.unit_id, ccpb.project_id, ccpb.component_id, to_char(bill_due_date,'dd/mm/yyyy') as  bill_due_date,  to_char(bill_date,'dd/mm/yyyy') as bill_date , to_char(disconnection_date,'dd/mm/yyyy'), coalesce(consumed_units,0.0) as consumed_units, coalesce(energy_charges_rate,'0.0') as energy_charges_rate, coalesce(energy_charges_kvah,'0.0') as energy_charges_kvah, coalesce(electricity_duty_rate,'0.0') as electricity_duty_rate, coalesce(electricity_duty,'0.0') as electricity_duty, coalesce(eletricityduty_interest,0.0) as eletricityduty_interest, coalesce(demand_chrages_rate,'0.0') as demand_chrages_rate , coalesce(demand_charges_kva,'0.0') as demand_charges_kva , coalesce(customer_charges,0.0) as  customer_charges, coalesce(late_payment_charges,0.0) as late_payment_charges, coalesce(delay_surchrage_rate,0.0) as delay_surchrage_rate , coalesce(acd_surcharges,'0.0'), coalesce(interest_security_deposit,0.0) as interest_security_deposit, coalesce(total_amount,0.0) as  total_amount, to_char(paid_date,'dd/mm/yyyy') as paid_date,coalesce(paid_amount,0.0) as paid_amount, coalesce(asd_charges,0.0) as asd_charges , coalesce(pending_amount,0.0) as pending_amount , paid_status, ccpb.remarks,year_comp, month_comp, lift_mtrs, unit_rate, quantity, document_number, document_name, document_path, bill_number,pm.project_name,um.unit_name,cc.component_name,coalesce(ccpb.fixed_charges,0.0) as fixed_charges,coalesce(ccpb.variable_charges,0.0) as variable_charges  FROM components.component_power_bill ccpb inner join project_mst pm   on( ccpb.project_id=pm.project_id and pm.delete_flag=false)   inner join unit_master um on (ccpb.unit_id=um.unit_id and um.delete_flag=false)   inner join components.components cc   on (ccpb.component_id=cc.component_id and cc.delete_flag=false) where ccpb.comp_power_bill_id=? and ccpb.delete_flag=false and ccpb.is_latest=true

