GET_PROJ_SEASON_AYACUT_INFO=SELECT proj_season_ayacut_id, psa.proj_season_cap_id, psa.project_id, psa.season_id,  p_ayacutid, crop_id, irrigated_ayacut, proposed_ayacut, to_char(psa.obs_date,'dd/mm/yyyy') as obs_date, psa.remarks, psa.unit_id, psa.circle_id, psa.division_id, psa.subdivision_id,coalesce(crop_names,'NA') as crop_names   FROM components.project_season_ayacut  psa   WHERE psa.p_ayacutid=? AND psa.delete_flag=false  and  psa.is_latest=true and psa.proj_season_cap_id=?


REPORT_PROJ_SEASON_CAP_ALL=  select coalesce(present_water_level_m,0.0) as present_water_level_m , coalesce(present_water_cap_tmc,0.0) as present_water_cap_tmc ,  coalesce(bal_water_req_tmckh,0.0) as bal_water_req_tmckh, coalesce(water_req_tmc,0.0) as water_req_tmc, khnew.projid,  khnew.obs_datekh,  coalesce(khnew.no_wettings,0) as no_wettingskh,  khnew.proj_season_cap_idkh as proj_season_cap_idkh,   khnew.actyear as act_plan_yearkh, coalesce(khnew.proposed_ayacutkhid,0.0) as proposed_ayacutkhid,  coalesce(khnew.proposed_ayacutkhwet,0.0) as proposed_ayacutkhwet,          coalesce(khnew.proposed_ayacutkhid,0.0)+coalesce(khnew.proposed_ayacutkhwet,0.0)   as khtotal,  coalesce(rabinew.water_util_tmc,0.0) as water_util_tmc ,  coalesce(rabinew.bal_water_req_tmcrabi,0.0) as bal_water_req_tmcrabi, rabinew.projidrabi,   rabinew.obs_daterabi as obs_daterabi, rabinew.act_plan_year  as act_plan_yearrabi,  rabinew.proj_season_cap_idrabi,  coalesce(rabinew.irrigated_ayacutrabiid,0.0) as irrigated_ayacutrabiid,  coalesce(rabinew.irrigated_ayacutrabiwet,0.0) as irrigated_ayacutrabiwet ,coalesce(rabinew.irrigated_ayacutrabiid,0.0)+coalesce(rabinew.irrigated_ayacutrabiwet,0.0)    as rabitotal, coalesce('Vanakalam Crops ( Id: ' || khnew.crop_nameskhid ||'  Wet: '||khnew.crop_nameskhwet||' )    Yasangi Crops ( Id: '|| rabinew.crop_namesrabiid || ' Wet :' ||rabinew.crop_namesrabiwet || ') ' ,'NA')  as crops,  coalesce(' Remarks of CE Office ( vanakalam: ' || khnew.remarks || ' Yasangi : ' || rabinew.remarksrabi  ||' )  Remarks of vanakalam ( ID: ' ||  khnew.remarkskhid ||'   Wet: ' || khnew.remarkskhwet ||'  )   Remarks of Yasangi(  ID: ' ||rabinew.remarksrabiid || '  Wet: ' ||rabinew.remarksrabiwet || ' )' ,'NA') as remarks,       pm.project_name,       coalesce(ayacutdata.contemplated_ayacut,0.0) as contemplated_ayacut, coalesce(ayacutdata.ayacut_created,0.0) as ayacut_created    from  (select * from (( select  coalesce(present_water_level_m,0) as  present_water_level_m, coalesce(present_water_cap_tmc,0) as present_water_cap_tmc , coalesce(bal_water_req_tmc,0) as  bal_water_req_tmckh, coalesce(water_req_tmc,0) as water_req_tmc,  project_id as projid, to_char(obs_date,'dd/mm/yyyy') as obs_datekh,  coalesce(no_wettings,0) as no_wettings,   remarks  as remarks,    proj_season_cap_id as  proj_season_cap_idkh,  act_plan_year actyear from components.project_season_capacity  where season_id=1  and delete_flag=false and is_latest=true ) khcapacity  left join  (select      psc.project_id,  psc.act_plan_year as act_plan_yearkhid,  sum(coalesce(proposed_ayacut,0)) as proposed_ayacutkhid, string_agg( coalesce(psa.crop_names),',')	 as 	crop_nameskhid,  string_agg( coalesce(psa.remarks),',')	 as 	remarkskhid   from components.project_season_ayacut psa		 inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id   and  psc.delete_flag=false and psc.is_latest=true)   where psa.delete_flag=false and psa.is_latest=true  and crop_id=1      and psc.season_id=1    group by psc.project_id,psc.act_plan_year  )khid   on (khcapacity.projid=khid.project_id and khcapacity.actyear=khid.act_plan_yearkhid)  left join   ( select     psc.project_id, sum(coalesce(proposed_ayacut,0)) as proposed_ayacutkhwet, string_agg( coalesce(psa.crop_names),',')	 as 	crop_nameskhwet, psc.act_plan_year as act_plan_yearkhwet,  string_agg( coalesce(psa.remarks),',')	 as 	remarkskhwet  from components.project_season_ayacut psa inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true) where psa.delete_flag=false and psa.is_latest=true  and crop_id=2 and psc.season_id=1  group by psc.project_id,psc.act_plan_year) khwet  on (khcapacity.projid=khwet.project_id and khcapacity.actyear=khwet.act_plan_yearkhwet)  ) khtable  ) khnew   left join  (select * from (  ( select coalesce(water_util_tmc,0) as water_util_tmc, coalesce(bal_water_req_tmc,0) as bal_water_req_tmcrabi,  project_id as projidrabi,  to_char(obs_date,'dd/mm/yyyy') as obs_daterabi,  act_plan_year as act_plan_year ,  proj_season_cap_id as proj_season_cap_idrabi,  remarks  as remarksrabi  from components.project_season_capacity   where season_id=2  and delete_flag=false and is_latest=true) rabicapacity  left join  (select psc.project_id,  sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacutrabiid,   string_agg( coalesce(psa.crop_names),',')	 as 	crop_namesrabiid,    psc.act_plan_year	   as act_plan_yearrabiid,   string_agg( coalesce(psa.remarks),',')	 as 	remarksrabiid  from components.project_season_ayacut psa   inner join components.project_season_capacity psc    on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)   where psa.delete_flag=false and psa.is_latest=true  and crop_id=1  and psc.season_id=2    group by psc.project_id,psc.act_plan_year)rabiid  on (rabicapacity. projidrabi=rabiid.project_id and rabicapacity.act_plan_year=rabiid.act_plan_yearrabiid) left join   (select       psc.project_id, sum(coalesce(irrigated_ayacut,0))  as irrigated_ayacutrabiwet,  string_agg( coalesce(psa.crop_names),',')	 as 	crop_namesrabiwet,  psc. act_plan_year as act_plan_yearrabiwet,  string_agg( coalesce(psa.remarks),',')	 as 	remarksrabiwet  from components.project_season_ayacut psa  inner join components.project_season_capacity psc   on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)      where psa.delete_flag=false and psa.is_latest=true and crop_id=2  and psc.season_id=2   group by psc.project_id,psc.act_plan_year )rabiwet    on (rabicapacity. projidrabi=rabiwet.project_id and rabicapacity.act_plan_year=rabiwet.act_plan_yearrabiwet) ) rabitable ) rabinew   on (khnew.projid=rabinew.projidrabi)    inner join project_mst pm   on (khnew.projid=pm.project_id and rabinew.projidrabi=pm.project_id and pm.delete_flag=false )  left join  (select pa.projectid, pa.ayacut_created,pa.stableayacut,pa.contemplated_ayacut,pa.irrigated_ayacut  from (select pat.projectid,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut , round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true  group by pat.projectid) pa  ) ayacutdata   on (khnew.projid=  ayacutdata.projectid)   where khnew.actyear=? and rabinew.act_plan_year=?
#17062022 select khcapacity.project_id, khcapacity.remarks,  khcapacity.present_water_level_m, khcapacity.present_water_cap_tmc, khcapacity.bal_water_req_tmckh, khcapacity.water_req_tmc, khcapacity.obs_datekh, khcapacity.act_plan_year as act_plan_yearkh, rabicapacity.water_util_tmc, rabicapacity.bal_water_req_tmcrabi, rabicapacity.obs_daterabi, rabicapacity.act_plan_year as act_plan_yearrabi, pm.project_name,  coalesce(croptable.irrigated_ayacutkhrifid,0.0) as irrigated_ayacutkhrifid,coalesce(croptable.irrigated_ayacutkhwet,0.0) as irrigated_ayacutkhwet,coalesce(croptable.irrigated_ayacutrabiid,0.0) as irrigated_ayacutrabiid ,coalesce(croptable.irrigated_ayacutrabiwet,0.0) as irrigated_ayacutrabiwet,coalesce(croptable.proposed_ayacutkhrifid,0.0) as proposed_ayacutkhrifid,coalesce(croptable.proposed_ayacutkhwet,0.0) as proposed_ayacutkhwet,coalesce(croptable.proposed_ayacutrabiid,0.0) as proposed_ayacutrabiid, coalesce(croptable.proposed_ayacutrabiwet,0.0) as proposed_ayacutrabiwet,   coalesce(croptable.crop_nameskhid||'--'||croptable.crop_nameskhwet,'NA') as crop_names, coalesce(khcapacity.no_wettings,'0') as no_wettings  from  ( select  coalesce(present_water_level_m,0) as  present_water_level_m, coalesce(present_water_cap_tmc,0) as present_water_cap_tmc , coalesce(bal_water_req_tmc,0) as  bal_water_req_tmckh, coalesce(water_req_tmc,0) as water_req_tmc,  project_id,to_char(obs_date,'dd/mm/yyyy') as obs_datekh, act_plan_year, coalesce(no_wettings,0) as no_wettings,  remarks  as remarks,   proj_season_cap_id   from components.project_season_capacity  where season_id=1  and delete_flag=false and is_latest=true ) khcapacity  left join  ( select coalesce(water_util_tmc,0) as water_util_tmc, coalesce(bal_water_req_tmc,0) as bal_water_req_tmcrabi, project_id, to_char(obs_date,'dd/mm/yyyy') as obs_daterabi, 			  act_plan_year, proj_season_cap_id   from components.project_season_capacity  where season_id=2  and delete_flag=false and is_latest=true) rabicapacity  on (khcapacity.project_id=rabicapacity.project_id )  inner join project_mst  pm  on (khcapacity.project_id=pm.project_id and pm.delete_flag=false)  left join ( select psamain.project_id, psamain.proj_season_cap_id,khid.irrigated_ayacut as irrigated_ayacutkhrifid, khwet.irrigated_ayacut as irrigated_ayacutkhwet,rabiid.irrigated_ayacut as irrigated_ayacutrabiid, rabiwet.irrigated_ayacut as irrigated_ayacutrabiwet, khid.proposed_ayacut  as proposed_ayacutkhrifid, khwet.proposed_ayacut  as proposed_ayacutkhwet, rabiid.proposed_ayacut  as proposed_ayacutrabiid, rabiwet.proposed_ayacut as proposed_ayacutrabiwet, coalesce( khid.crop_names,'NA') as 	crop_nameskhid,  coalesce( khwet.crop_names,'NA')as    crop_nameskhwet, coalesce( rabiid.crop_names,'NA' ) as crop_namesrabiid,  coalesce( rabiwet.crop_names,'NA') as 	crop_namesrabiwet  from   (select distinct project_id,proj_season_cap_id,string_agg(coalesce(remarks,'NA'),',') as remarks  from  components.project_season_ayacut  where delete_flag=false and is_latest=true  group by project_id,proj_season_cap_id ) psamain  left join  ( select psc.project_id, psa.proj_season_cap_id as  proj_season_cap_id,  sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut, sum(coalesce(proposed_ayacut,0)) as proposed_ayacut, string_agg( coalesce(psa.crop_names),',')	 as 	crop_names  from components.project_season_ayacut psa   inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id   and  psc.delete_flag=false and psc.is_latest=true)  where psa.delete_flag=false and psa.is_latest=true  and crop_id=1      and psc.season_id=1  group by psc.project_id,psa.proj_season_cap_id )khid   on (psamain.project_id=khid.project_id  and psamain.proj_season_cap_id=khid.proj_season_cap_id )  left join  ( select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut,  sum(coalesce(proposed_ayacut,0)) as proposed_ayacut,  string_agg( coalesce(psa.crop_names),',')	 as 	crop_names, psa.proj_season_cap_id  from components.project_season_ayacut psa  inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true) where psa.delete_flag=false and psa.is_latest=true  and crop_id=2 and psc.season_id=1   group by psc.project_id,psa.proj_season_cap_id) khwet  on (psamain.project_id=khwet.project_id  and psamain.proj_season_cap_id=khwet.proj_season_cap_id ) left join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut, sum(coalesce(proposed_ayacut,0)) as proposed_ayacut,  string_agg( coalesce(psa.crop_names),',')	 as 	crop_names, psa.proj_season_cap_id  from components.project_season_ayacut psa  inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true) where psa.delete_flag=false and psa.is_latest=true  and crop_id=1  and psc.season_id=2  group by psc.project_id,psa.proj_season_cap_id)rabiid  on (psamain.project_id=rabiid.project_id and psamain.proj_season_cap_id=rabiid.proj_season_cap_id  ) left join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0))  as irrigated_ayacut,  sum(coalesce(proposed_ayacut,0)) as proposed_ayacut,  string_agg( coalesce(psa.crop_names),',')	 as 	crop_names,  psa. proj_season_cap_id  from components.project_season_ayacut psa  inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)  where psa.delete_flag=false and psa.is_latest=true and crop_id=2  and psc.season_id=2  group by psc.project_id,psa.proj_season_cap_id)rabiwet  on (psamain.project_id=rabiwet.project_id and psamain.proj_season_cap_id=rabiid.proj_season_cap_id  ) ) croptable  on (khcapacity.project_id=croptable.project_id 	and ((khcapacity.proj_season_cap_id= croptable.proj_season_cap_id )  or (rabicapacity.proj_season_cap_id= croptable.proj_season_cap_id ) ))  where   khcapacity.act_plan_year=? 	and rabicapacity.act_plan_year=?

#select present_water_level_m,present_water_cap_tmc,bal_water_req_tmckh, water_req_tmc,khcapacity.project_id,obs_datekh,khcapacity.act_plan_year as act_plan_yearkh,  water_util_tmc,bal_water_req_tmcrabi,obs_daterabi,rabicapacity.act_plan_year as act_plan_yearrabi,  pm.project_name, coalesce(croptable.irrigated_ayacutkhrifid,0) as irrigated_ayacutkhrifid, coalesce(croptable.proposed_ayacutkhrifid,0) as  proposed_ayacutkhrifid, coalesce(croptable.irrigated_ayacutrabiid,0) as  irrigated_ayacutrabiid, coalesce(croptable.proposed_ayacutrabiid,0) as  proposed_ayacutrabiid, coalesce(croptable.irrigated_ayacutkhwet,0) as  irrigated_ayacutkhwet, coalesce(croptable.proposed_ayacutkhwet,0) as proposed_ayacutkhwet, coalesce(croptable.irrigated_ayacutrabiwet,0) as  irrigated_ayacutrabiwet, coalesce(croptable.proposed_ayacutrabiwet,0)  as proposed_ayacutrabiwet  from (select distinct project_id from components.project_season_capacity   where delete_flag=false and is_latest=true ) pscmain  inner join  (select  coalesce(present_water_level_m,0) as  present_water_level_m, coalesce(present_water_cap_tmc,0) as present_water_cap_tmc , coalesce(bal_water_req_tmc,0) as  bal_water_req_tmckh, coalesce(water_req_tmc,0) as water_req_tmc, project_id, to_char(obs_date,'dd/mm/yyyy') as obs_datekh, act_plan_year  from components.project_season_capacity where season_id=1 and delete_flag=false and is_latest=true ) khcapacity on (pscmain.project_id=khcapacity.project_id) left join  ( select coalesce(water_util_tmc,0) as water_util_tmc, coalesce(bal_water_req_tmc,0) as bal_water_req_tmcrabi, project_id, to_char(obs_date,'dd/mm/yyyy') as obs_daterabi, act_plan_year from components.project_season_capacity where season_id=2  and delete_flag=false and is_latest=true) rabicapacity  on (pscmain.project_id=rabicapacity.project_id) inner join project_mst  pm  on (pm.project_id=khcapacity.project_id and pm.delete_flag=false) left join ( select psamain.project_id, khid.irrigated_ayacut as irrigated_ayacutkhrifid, khid.proposed_ayacut  as proposed_ayacutkhrifid, khwet.irrigated_ayacut as irrigated_ayacutkhwet, khwet.proposed_ayacut  as proposed_ayacutkhwet, rabiid.irrigated_ayacut as irrigated_ayacutrabiid, rabiid.proposed_ayacut  as proposed_ayacutrabiid, rabiwet.irrigated_ayacut as irrigated_ayacutrabiwet, rabiwet.proposed_ayacut as proposed_ayacutrabiwet   from  (select distinct project_id from  components.project_season_ayacut where delete_flag=false and is_latest=true) psamain  inner join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut,  sum(coalesce(proposed_ayacut,0)) as proposed_ayacut  from components.project_season_ayacut psa inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)  where psa.delete_flag=false and psa.is_latest=true  and crop_id=1      and psc.season_id=1  group by psc.project_id)khid   on (psamain.project_id=khid.project_id)  left join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut, sum(coalesce(proposed_ayacut,0)) as proposed_ayacut  from components.project_season_ayacut psa inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)  where psa.delete_flag=false and psa.is_latest=true  and crop_id=1  and psc.season_id=2  group by psc.project_id)rabiid  on (psamain.project_id=rabiid.project_id) left join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut, sum(coalesce(proposed_ayacut,0)) as proposed_ayacut from components.project_season_ayacut psa inner join components.project_season_capacity psc on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true) where psa.delete_flag=false and psa.is_latest=true  and crop_id=2 and psc.season_id=1  group by psc.project_id) khwet on (psamain.project_id=khwet.project_id)  left join  (select psc.project_id,sum(coalesce(irrigated_ayacut,0)) as irrigated_ayacut, sum(coalesce(proposed_ayacut,0)) as proposed_ayacut  from components.project_season_ayacut psa inner join components.project_season_capacity psc  on (psa.proj_season_cap_id=psc.proj_season_cap_id and  psc.delete_flag=false and psc.is_latest=true)                   where psa.delete_flag=false and psa.is_latest=true and crop_id=2  and psc.season_id=2 group by psc.project_id)rabiwet on (psamain.project_id=rabiwet.project_id) ) croptable on (pscmain.project_id=croptable.project_id)  where khcapacity.act_plan_year=? and rabicapacity.act_plan_year=?
