 packs  on (pa.unit_id=packs.unit_id and pa.district_id=packs.district_id  )  inner join (select t4.unit_id,t4.district_id,string_agg(dms.district_name, '  ,') as district_name   from ( select distinct unit_id,district_id   from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.unit_id ,t4.district_id) dm  on (pa.unit_id=dm.unit_id  and pa.district_id=dm.district_id )  inner join ( select t4.unit_id,t4.district_id,string_agg(coalesce(mms.mandal_name,'NA'), ' ,') as mandal_name   from ( select distinct unit_id,district_id,mandal_id  from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4   inner join mandal_mst mms on (t4.mandal_id=mms.mcode::int  and t4.district_id=mms.dcode::int and mms.delete_flag=false)   group by t4.unit_id ,t4.district_id ) mm   on (pa.unit_id=mm.unit_id  and pa.district_id=mm.district_id )  inner join ( select t4.unit_id,t4.district_id,string_agg(coalesce(cms.constituency_name,'NA'), ' ,') as constituency_name   from ( select distinct unit_id,district_id,const_id from  components.project_ayacut   cpachild4  where delete_flag=false and is_latest=true) t4  inner join constituency_mst_new cms on (t4.const_id=cms.constituency_id and cms.delete_flag=false)  group by t4.unit_id ,t4.district_id) cm   on (pa.unit_id=cm.unit_id  and pa.district_id=cm.district_id )   union all  select pa.unit_id,-3, pa.ayacut_created,pa.irrigated_ayacut,pa.stableayacut,pa.reamarks,  pmu.unit_name||' '||'Total Ayacut' as unit_name,  'NA','NA','NA','NA','NA' ,pa.contemplated_ayacut  from  ( select pat.unit_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,   round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,string_agg(pat.remarks, 