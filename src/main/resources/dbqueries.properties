_id and sdm.delete_flag=false ) inner join taskmanagement.priority tp  on  (ttd.priority_id=tp.priority_id  and  tp.delete_flag=false) inner join taskmanagement.emp_mst tem  on (ttd.responsible_person=tem.emp_id  and   tem.delete_flag=false and tem.is_latest=true) inner join taskmanagement.designation_mst tdm  on (tem.designation_id=tdm.designation_id and   tdm.delete_flag=false ) inner join taskmanagement.task_status tts  on (ttd.t_status_id=tts.t_status_id and tts.delete_flag=false) inner join taskmanagement.task_type ttt  on (ttd.t_type_id=ttt.t_type_id and ttt.delete_flag=false)  where ttd.delete_flag=false and ttd.is_latest=true and ttd.t_type_id=? 

