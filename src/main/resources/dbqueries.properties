SELECT_COUNT_PETADV_COURT=select main.*,cc.court_id_name,pam.p_advocate_name,coalesce((main.case_date_filing-main.counter_date_file),0) as tobefile from ( select coalesce(a.unit_id,0) as unit_id,coalesce(a.case_date_filing,0) as case_date_filing,coalesce(a.advocate_id,0) as advocate_id,coalesce(a.case_court_id,0) as case_court_id ,coalesce(b.counter_date_file,0) as counter_date_file , coalesce(c.case_date_judgement,0) as case_date_judgement ,coalesce(d.draft_count_togp,0) as draft_count_togp ,coalesce(e.counternotfile,0) as counternotfile from ( (select  distinct unit_id ,coalesce(count(case_date_filing),0) as case_date_filing,coalesce(cpa.advocate_id,0) as advocate_id ,coalesce(cm.case_court_id,0) as case_court_id  from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )  and cm.delete_flag=false   and cm.case_date_filing is not null   and cm.case_id=cpa.case_id   group by unit_id , cm.case_court_id,cpa.advocate_id) a left join   (select  distinct unit_id ,coalesce(count(counter_date_file),0) as counter_date_file ,cpa.advocate_id ,cm.case_court_id  from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )  and cm.delete_flag=false  and cm.counter_date_file is not null   and cm.case_id=cpa.case_id   group by unit_id , cm.case_court_id,cpa.advocate_id ) b  on (a.unit_id=b.unit_id and  a.case_court_id=b.case_court_id and a.advocate_id=b.advocate_id) left join  (select  distinct coalesce(unit_id,0)  as unit_id,coalesce(count(case_date_judgement),0) as case_date_judgement,coalesce(cpa.advocate_id,0) as advocate_id ,coalesce(cm.case_court_id,0) as case_court_id  from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.case_date_judgement is not null  and cm.case_id=cpa.case_id   group by unit_id , cm.case_court_id,cpa.advocate_id  ) c  on (b.unit_id=c.unit_id and b.case_court_id=c.case_court_id and b.advocate_id=c.advocate_id) left join   (select  distinct coalesce(unit_id,0) as  unit_id ,coalesce(count(draft_count_togp),0) as draft_count_togp ,coalesce(cpa.advocate_id,0)as advocate_id ,coalesce(cm.case_court_id,0) as case_court_id  from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.draft_count_togp is not null   and cm.case_id=cpa.case_id   group by unit_id , cm.case_court_id,cpa.advocate_id ) d  on (d.unit_id=c.unit_id and d.case_court_id=c.case_court_id and d.advocate_id=c.advocate_id) left join    (select  distinct coalesce(unit_id,0) as unit_id  ,coalesce(count(counter_date_file),0) as counternotfile,coalesce(cpa.advocate_id,0) as advocate_id ,coalesce(cm.case_court_id,0) as case_court_id  from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.counter_date_file is null  and cm.case_id=cpa.case_id  group by unit_id , cm.case_court_id,cpa.advocate_id )e  on(e.unit_id=d.unit_id and e.case_court_id=d.case_court_id and e.advocate_id=d.advocate_id)) )main   inner join cases_courts cc on (main.case_court_id=cc.court_id and cc.court_id_delete_flag=false)   inner join petitioner_advocate_mst  pam on (pam.p_advocate_id=main.advocate_id and pam.delete_flag=false)  where  main.advocate_id=? and  main.case_court_id=?  order by main.unit_id;
#select distinct cm.unit_id, coalesce(cf.casef,0),coalesce(contf.contf,0),coalesce(jf.jf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(dctf.dctf,0), cm.case_court_id,coalesce(cc.court_id_name,'NA') as court_id_name,cpadv.advocate_id, pam. p_advocate_name from cases_master cm left join (select distinct  unit_id ,count(case_date_filing) as casef,coalesce(cpa.advocate_id,0) as  advocate_id ,cm.case_court_id    from cases_master cm,cases_pet_advocates cpa   where cm.case_id=cpa.case_id and cpa.delete_flag=false and cpa.is_latest=true and cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cpa.advocate_id, cm.case_court_id) cf on(cm.unit_id=cf.unit_id and cm.delete_flag=false and cm.case_is_latest=true and cm.case_court_id=cf.case_court_id) left join  (select distinct  unit_id ,count(counter_date_file) as contf,coalesce(cpa.advocate_id,0) as  advocate_id ,cm.case_court_id    from cases_master cm,cases_pet_advocates cpa   where cm.case_id=cpa.case_id and cpa.delete_flag=false and cpa.is_latest=true and cm.delete_flag=false and cm.counter_date_file     is not null  group by unit_id, cpa.advocate_id, cm.case_court_id ) contf on(cm.unit_id=contf.unit_id and cm.delete_flag=false and cm.case_is_latest=true and cm.case_court_id=contf.case_court_id and cf.advocate_id=contf.advocate_id) left join  (select distinct  unit_id ,count(case_date_judgement) as jf,coalesce(cpa.advocate_id,0) as  advocate_id ,cm.case_court_id    from cases_master cm,cases_pet_advocates cpa   where cm.case_id=cpa.case_id and cpa.delete_flag=false and cpa.is_latest=true and cm.delete_flag=false and cm.case_date_judgement     is not null  group by unit_id, cpa.advocate_id, cm.case_court_id)jf on(cm.unit_id=jf.unit_id and cm.delete_flag=false and cm.case_is_latest=true and cm.case_court_id=jf.case_court_id and cf.advocate_id=jf.advocate_id) left join  (select distinct  unit_id ,count(draft_count_togp) as dctf,coalesce(cpa.advocate_id,0) as  advocate_id ,cm.case_court_id    from cases_master cm,cases_pet_advocates cpa   where cm.case_id=cpa.case_id and cpa.delete_flag=false and cpa.is_latest=true and cm.delete_flag=false and cm.draft_count_togp     is not null  group by unit_id, cpa.advocate_id, cm.case_court_id) dctf on(cm.unit_id=dctf.unit_id and cm.delete_flag=false and cm.case_is_latest=true and cm.case_court_id=dctf.case_court_id and cf.advocate_id=dctf.advocate_id)  inner join cases_courts cc on (cm.case_court_id=cc.court_id and cc.court_id_delete_flag=false)  inner join cases_pet_advocates cpadv on (cm.case_id=cpadv.case_id and cpadv.delete_flag=false and cpadv.is_latest=true ) inner join petitioner_advocate_mst  pam on (pam.p_advocate_id=cpadv.advocate_id and pam.delete_flag=false)  where  cpadv.advocate_id=? and  cm.case_court_id=?  order by cm.unit_id;
SELECT_COUNT_PETADV_ALL=select main.*,pam.p_advocate_name,coalesce((main.case_date_filing-main.counter_date_file),0) as tobefile  from ( select coalesce(a.unit_id,0) as unit_id,coalesce(a.case_date_filing,0) as case_date_filing,coalesce(a.advocate_id,0) as advocate_id ,coalesce(b.counter_date_file,0) as counter_date_file , coalesce(c.case_date_judgement,0) as case_date_judgement ,coalesce(d.draft_count_togp,0) as draft_count_togp ,coalesce(e.counternotfile,0) as counternotfile from ( (select  distinct unit_id ,coalesce(count(case_date_filing),0) as case_date_filing,coalesce(cpa.advocate_id,0) as advocate_id   from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )  and cm.delete_flag=false   and cm.case_date_filing is not null   and cm.case_id=cpa.case_id   group by unit_id ,cpa.advocate_id) a left join   (select  distinct unit_id ,coalesce(count(counter_date_file),0) as counter_date_file ,cpa.advocate_id   from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )  and cm.delete_flag=false  and cm.counter_date_file is not null   and cm.case_id=cpa.case_id   group by unit_id ,cpa.advocate_id ) b  on (a.unit_id=b.unit_id and   a.advocate_id=b.advocate_id) left join  (select  distinct coalesce(unit_id,0)  as unit_id,coalesce(count(case_date_judgement),0) as case_date_judgement,coalesce(cpa.advocate_id,0) as advocate_id   from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.case_date_judgement is not null  and cm.case_id=cpa.case_id   group by unit_id ,cpa.advocate_id  ) c  on (b.unit_id=c.unit_id  and b.advocate_id=c.advocate_id) left join   (select  distinct coalesce(unit_id,0) as  unit_id ,coalesce(count(draft_count_togp),0) as draft_count_togp ,coalesce(cpa.advocate_id,0)as advocate_id   from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.draft_count_togp is not null   and cm.case_id=cpa.case_id   group by unit_id ,cpa.advocate_id ) d  on (d.unit_id=c.unit_id  and d.advocate_id=c.advocate_id) left join    (select  distinct coalesce(unit_id,0) as unit_id  ,coalesce(count(counter_date_file),0) as counternotfile,coalesce(cpa.advocate_id,0) as advocate_id   from cases_master cm, cases_pet_advocates cpa  where cm.case_id in( select distinct case_id from cases_pet_advocates where  delete_flag=false and is_latest=true  )   and cm.delete_flag=false   and cm.counter_date_file is null  and cm.case_id=cpa.case_id  group by unit_id ,cpa.advocate_id )e  on(e.unit_id=d.unit_id  and e.advocate_id=d.advocate_id)) )main  inner join petitioner_advocate_mst  pam on (pam.p_advocate_id=main.advocate_id and pam.delete_flag=false)  where  main.advocate_id=?    order by main.unit_id;	
 
