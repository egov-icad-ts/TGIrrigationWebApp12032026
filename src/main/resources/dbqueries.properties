SELECT_CASE_ALL_PET_TOT_CNTF=select cm.case_id,case_type_name||' '||case_wp_number,case_year,cp.petitioner,cpa.petadv,cr.respondent,cra.resadv,case_status_name,cstm.case_stages_name,remarks,coalesce(cc.court_id_name,'--')||'   '||coalesce(court_address,'--') as court_name,case_breif_prayer,coalesce(to_char(case_date_filing,'dd/mm/yy'),'--') as case_date_filing ,coalesce(to_char(counter_date_file,'dd/mm/yy'),'--') as counter_date_file ,coalesce(to_char(case_date_judgement,'dd/mm/yy'),'--') as case_date_judgement,cm.unit_id,cm.circle_id,cm.division_id,coalesce(pm.project_name,'NA') as project_name,coalesce(pkm.pkg_name,'NA') as pkg_name ,cgs.case_gen_sub_name,coalesce(to_char(cm.draft_count_togp,'dd/mm/yy'),'--') as draft_count_togp,ccp.case_contact_name,ccp.case_contact_phone,coalesce(to_char(cm.hearing_date,'dd/mm/yy'),'--') as hearing_date    from cases_master  cm left join project_mst pm  on ( cm.project_id = pm.project_id and  pm.delete_flag=false ) left join  package_mst pkm  on  ( pm.project_id=pkm.project_id and  pkm.deleteflag=false  and cm.package_id=pkm.pkg_id)  inner join cases_courts cc  on (cm.case_court_id =cc.court_id and   cc.court_id_delete_flag = false ) inner join  cases_types ct on (cm.case_type_id=ct.case_type_id and  cm.delete_flag=false) inner join  cases_status_master csm  on  (cm.case_status_id=csm.case_status_id and csm.case_delete_flag=false) inner join cases_stages_master cstm on (cm.case_stage_id=cstm.case_stages_id   and cstm.case_delete_flag=false )  inner join cases_gen_sub cgs  on (cm.case_gen_sub_id=cgs.case_gen_sub_id   and cgs.delete_flag=false)  inner join  (select   case_id, array_to_string(array_agg((coalesce(petitioner_name,'NO Name')||' '||coalesce(petitioner_address,'--')))  , '-')    as petitioner from cases_petitioners   cp , petitioner_mst ptm    where cp.petitioner_id=ptm.petitioner_id and cp.delete_flag=false    and ptm.delete_flag=false group by case_id) cp   on (cm.case_id=cp.case_id)  inner join    ( select   cpa.case_id, array_to_string(array_agg(p_advocate_name)  , '-')   as petadv    from cases_pet_advocates   cpa , petitioner_advocate_mst ptam where cpa.advocate_id=ptam.p_advocate_id and cpa.delete_flag=false    and ptam.delete_flag=false group by case_id) cpa   on (cm.case_id=cpa.case_id)inner join   (select   case_id, array_to_string(array_agg((coalesce(respondent_name,'--')||' '||coalesce(respondent_address,'--')))  , '-')      as respondent from cases_respondents   cr , respondent_mst rm  where cr.respondent_id=rm.respondent_id   and cr.delete_flag=false and rm.delete_flag=false group by case_id ) cr    on (cm.case_id=cr.case_id) inner join    (select   cra.case_id, array_to_string(array_agg((r_advocate_name||' '||coalesce(r_advocate_address,'--')))  , '-')   as resadv    from cases_res_advocates   cra , respondent_advocate_mst ram  where cra.r_advocate_id=ram.r_advocate_id and cra.delete_flag=false    and ram.delete_flag=false group by case_id) cra  on (cm.case_id=cra.case_id)  left join (select   case_id, array_to_string(array_agg((coalesce(case_contact_name,'--')))  , '-')      as case_contact_name,array_to_string(array_agg((coalesce(case_contact_phone,'--')))  , '-')      as case_contact_phone from cases_contact_person   cp   where  cp.delete_flag=false and case_is_latest=true group by case_id ) as ccp on (ccp.case_id=cm.case_id)   where   cm.delete_flag=false     and cm.counter_date_file is null  and   cm.case_id in (select distinct case_id from  cases_petitioners where petitioner_id=? and is_latest=true and delete_flag=false )   order by case_id ;
	  		  
SELECT_PET_BY_CASECOUNT=select pm.petitioner_id,pm.petitioner_name  from  petitioner_mst  pm,(select count(case_id) as casecount, petitioner_id from cases_petitioners where delete_flag=false and is_latest=true group by petitioner_id order by casecount desc) cp where delete_flag=false  and pm.petitioner_id =cp.petitioner_id order by cp.casecount desc

SELECT_PETADV_BY_CASECOUNT=select pam.p_advocate_id,pam.p_advocate_name from  petitioner_advocate_mst  pam, (select count(case_id) as casecount, advocate_id from cases_pet_advocates where delete_flag=false and is_latest=true group by advocate_id order by casecount desc) cp where delete_flag=false  and pam.p_advocate_id =cp.advocate_id order by cp.casecount desc





