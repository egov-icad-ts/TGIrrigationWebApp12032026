tid )  inner join (select t4.const_id,t4.projectid,string_agg(dms.district_name, ' ,') as district_name  from ( select distinct const_id, projectid,cpachild4.district_id  from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false) group by t4.const_id ,t4.projectid) dm  on (pa.const_id=dm.const_id  and pa.projectid=dm.projectid) inner join constituency_mst_new  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) where pa.const_id=?
