FORM20_CANAL_UPDATE_LOCATION=	UPDATE invom.invom_canals_location   SET canal_id=?,  update_user_name=?, update_date=now(),  district_id=?, mandal_id=?, village_id=?, village_name=? ,chainage_fromkm=? ,  chainage_tokm=?  WHERE  canal_loc_id=?

FROM20_GET_CANAL_LOCATION_BYLOCID=	SELECT canal_loc_id,icl.canal_id  ,icl.district_id, icl.mandal_id, icl.village_id, icl.village_name as remarksVillage,dm.district_name,mm.mandal_name,vm.vname,ic.canal_name,coalesce(icl.chainage_fromkm,0.0) as chainage_fromkm , coalesce(icl.chainage_tokm,0.0) as chainage_tokm  FROM invom.invom_canals_location icl    inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)     inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)    left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )    inner join  invom.invom_canals ic   on (ic.canal_id=icl.canal_id and ic.delete_flag=false and ic.is_latest=true)     where icl.canal_loc_id=? and icl.delete_flag=false and icl.is_latest=true

FORM20_RESLOC_UPDATE=UPDATE invom.invom_reservoirs    SET  update_user_name=?, update_date=now(),   district_id=?, mandal_id=?, village_id=?, village_name=?  WHERE res_id=?
 
FORM20_RESLOC_INSERT_UNIT= INSERT INTO invom.invom_res_unit_map( unit_id, circle_id, division_id, subdivision_id, reservoir_id, project_id, package_id, delete_flag, is_latest,  post_id,section_id)  VALUES ( ?, ?, ?, ?,  ?, ?, 0, false, true,  ?,?);

FORM20_RESLOC_SELECT_BYRESID= SELECT res_id, res_name, coalesce(ir.district_id,0) as  district_id, coalesce(ir.mandal_id,0) as mandal_id , coalesce(ir.village_id,0) as village_id , coalesce(village_name,'--') as remarks_village,coalesce(dm.district_name,'--') as district_name  , coalesce(mm.mandal_name,'--') as mandal_name ,coalesce(vm.vname,'--') as  vname,coalesce(irum.project_id,0) as project_id,irum.unit_id,irum.circle_id,coalesce(irum.division_id,0) as division_id,coalesce(irum.subdivision_id,0) as  subdivision_id,coalesce(irum.section_id,0) as section_id ,coalesce(irum.post_id,0) as post_id , coalesce(is_nrld,false) as is_nrld, coalesce(nrld_code,'0') as nrld_code FROM invom.invom_reservoirs  ir  inner join invom.invom_res_unit_map irum on (ir.res_id=irum.reservoir_id and irum.delete_flag=false and irum.is_latest=true) inner join   districts_mst  dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) inner join mandal_mst mm  on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and ir.village_id=vm.vcode::int)  where ir.delete_flag=false  and ir.res_id=?

FORM20_CANALLOC_SELECT_BYCANID=  SELECT ic.canal_id, canal_name, icl.district_id, icl.mandal_id, coalesce(icl.village_id,0) as village_id , coalesce(icl.village_name,'NA') as remarks_village, canal_typ_id,dm.district_name,mm.mandal_name,vm.vname,icum.unit_id,coalesce(icum.circle_id,0) as circle_id ,coalesce(icum.division_id,0) as division_id,coalesce(icum.subdivision_id,0) as subdivision_id,coalesce(post_id,0) as post_id ,icum.project_id,coalesce(ic.res_id,0) as res_id,icl.canal_loc_id, coalesce(icl.chainage_fromkm,0) as  chainage_fromkm , coalesce(icl.chainage_tokm,0)  as chainage_tokm ,  ict.canal_type   FROM invom.invom_canals ic inner join invom.invom_canals_location icl on (ic.canal_id=icl.canal_id and icl.delete_flag=false and icl.is_latest=true)   inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)   left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )  inner join  invom.invom_canal_unit_map icum on ( ic.canal_id=icum.canal_id and icum.delete_flag=false and icum.is_latest=true )   inner join invom.invom_canal_types ict on (ic.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false)  where ic.delete_flag=false  and ic.is_latest=true and icl.canal_id=?  and icl.canal_loc_id=?
