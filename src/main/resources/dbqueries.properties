SELECT_PARAS_ABSTRACT_COUNT= select distinct ptirpm.unit_id,0,0,0,coalesce(tot.totalparas,0) as totalparas,  coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb,coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent ,coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped ,um.unit_code,'NA','NA','NA',um.unit_name  from  irparas.paras_master ptirpm inner join (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) totalparas from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and irpm.section_id in (1,2)  group by irpm.unit_id) tot on (ptirpm.unit_id=tot.unit_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) sectiona from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.transfer_flag=false   and  irpm.section_id=1   group by irpm.unit_id )seca    on (ptirpm.unit_id=seca.unit_id)  left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) sectionb  from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.transfer_flag=false   and  irpm.section_id=2   group by irpm.unit_id ) secb   on (ptirpm.unit_id=secb.unit_id)  left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) replysent from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.paras_status_id=1   group by irpm.unit_id) replysent   on (ptirpm.unit_id=replysent.unit_id)   left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.transfer_flag=false   and  irpm.paras_status_id=2   group by irpm.unit_id) replyna   on (ptirpm.unit_id=replyna.unit_id)   left join     (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) transfer from irparas.paras_master  irpm   where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true    group by irpm.unit_id ) transfer   on (ptirpm.unit_id=transfer.unit_id) left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) dropped from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false   and  irpm.paras_status_id = 3   group by irpm.unit_id) dropped   on (ptirpm.unit_id=dropped.unit_id)   inner join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)  

TOTAL_PARAS=select irpm.para_id,TRIM (gist_para),financial_year,remarks,um.unit_name,irpm.unit_id,coalesce(cm.circle_name,'NA') as circle_name,irpm.circle_id,coalesce(dm.division_name,'NA') as division_name,irpm.division_id,paras_status_id,ips.parastatus,ism.section,irpm.section_id, CASE   WHEN (print_cag =true)  THEN 'YES'   WHEN (print_cag =false)  THEN 'NO'   END AS printcag,irpm.category_id,irpm.para_number,to_char(auditdate_from,'dd/mm/yyyy') as auditdate_from,to_char(auditdate_to,'dd/mm/yyyy') as auditdate_from,coalesce(irpm.file_number_ag,'NA') as file_number_ag ,coalesce(irpm.lar_number,'NA') as lar_number,paraseca.para_number as paraSectionA,parasecb.para_number as paraSectionB,irpm.transfer_flag, coalesce(irpm.old_para_id,0) as old_para_id,  trfrom.unit_name,trfrom.circle_name, trfrom.division_name   from irparas.paras_master irpm inner join unit_master um on (irpm.unit_id=um.unit_id and um.delete_flag=false ) left join circle_master cm on (irpm.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm  on (irpm.division_id=dm.division_id and dm. delete_flag=false) inner join irparas.para_status ips on (irpm.paras_status_id=ips.parastatus_id and ips.delete_flag=false) inner join irparas.sections_master ism on (irpm.section_id=ism.section_id and ism.delete_flag=false) left join  (select para_id,para_number,unit_id from irparas.paras_master irpm2 where irpm2.section_id=1 and  irpm2.delete_flag=false and irpm2.is_latest=true ) paraseca on ( paraseca.unit_id=irpm.unit_id  and irpm.para_id=paraseca.para_id) left join  (select para_id,para_number,unit_id from irparas.paras_master irpm2 where irpm2.section_id=2 and  irpm2.delete_flag=false and irpm2.is_latest=true ) parasecb on ( parasecb.unit_id=irpm.unit_id  and irpm.para_id=parasecb.para_id)  left join (select irpm3.para_id, um2.unit_name ,cm2.circle_name, dm2.division_name from irparas.paras_master irpm3  inner join unit_master um2  on (irpm3.unit_id=um2.unit_id and um2.delete_flag=false) left join circle_master cm2 on (irpm3.circle_id=cm2.circle_id and cm2.delete_flag=false)  left join division_master dm2  on (irpm3.division_id=dm2.division_id and dm2. delete_flag=false) where irpm3.delete_flag=true and irpm3.is_latest=false )  trfrom on( trfrom.para_id=irpm.old_para_id  )     where irpm.delete_flag=false and irpm.is_latest=true  

TOTAL_PARAS_DOC_PDF=select irpm.para_id,TRIM (gist_para),TRIM (irpms.para),financial_year,remarks,um.unit_name,irpm.unit_id,coalesce(cm.circle_name,'NA') as circle_name,irpm.circle_id,coalesce(dm.division_name,'NA') as division_name,irpm.division_id,paras_status_id,ips.parastatus,ism.section,irpm.section_id, CASE   WHEN (print_cag =true)  THEN 'YES'   WHEN (print_cag =false)  THEN 'NO'   END AS printcag,irpm.category_id,irpm.para_number,to_char(auditdate_from,'dd/mm/yyyy') as auditdate_from,to_char(auditdate_to,'dd/mm/yyyy') as auditdate_from,coalesce(irpm.file_number_ag,'NA') as file_number_ag ,coalesce(irpm.lar_number,'NA') as lar_number,paraseca.para_number as paraSectionA,parasecb.para_number as paraSectionB,irpm.transfer_flag  from irparas.paras_master irpm  inner join (SELECT STRING_AGG (  coalesce(sub_category_id,'--') || ' ' || coalesce(para,'--'),  ',' ORDER BY sub_category_id  )  Para,para_id, STRING_AGG ( sub_category_id || ' ' || reasons_delay,  ',' ORDER BY sub_category_id ) reasons_delay FROM  irparas.paras_master_sub where  delete_flag=false  and is_latest=true GROUP BY  para_id)  irpms  on (irpm.para_id=irpms.para_id  ) inner join unit_master um on (irpm.unit_id=um.unit_id and um.delete_flag=false ) left join circle_master cm on (irpm.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm  on (irpm.division_id=dm.division_id and dm. delete_flag=false) inner join irparas.para_status ips on (irpm.paras_status_id=ips.parastatus_id and ips.delete_flag=false) inner join irparas.sections_master ism on (irpm.section_id=ism.section_id and ism.delete_flag=false) left join  (select para_id,para_number,unit_id from irparas.paras_master irpm2 where irpm2.section_id=1 and  irpm2.delete_flag=false and irpm2.is_latest=true ) paraseca on ( paraseca.unit_id=irpm.unit_id  and irpm.para_id=paraseca.para_id) left join  (select para_id,para_number,unit_id from irparas.paras_master irpm2 where irpm2.section_id=2 and  irpm2.delete_flag=false and irpm2.is_latest=true ) parasecb on ( parasecb.unit_id=irpm.unit_id  and irpm.para_id=parasecb.para_id) where irpm.delete_flag=false and irpm.is_latest=true

