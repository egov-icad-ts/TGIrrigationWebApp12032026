nit_id and ircag.circle_id=replysent.circle_id and ircag.division_id=replysent.division_id and ircag.subdivision_id=replysent.subdivision_id)   left join     ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) replyna from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false  and  ircag.paras_status_id=2    and ircag.division_id<>0 and  ircag.subdivision_id <>0 and ircag.circle_id<>0 and ircag.unit_id<>0   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) replyna    on (ircag.unit_id=replyna.unit_id and ircag.circle_id=replyna.circle_id and ircag.division_id=replyna.division_id and ircag.subdivision_id=replyna.subdivision_id)   left join    (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true      and ircag.division_id<>0 and  ircag.subdivision_id <>0 and ircag.circle_id<>0 and ircag.unit_id<>0   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) transfer   on (ircag.unit_id=transfer.unit_id and ircag.circle_id=transfer.circle_id and ircag.division_id=transfer.division_id and ircag.subdivision_id=transfer.subdivision_id) left join   ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(ircag.division_id,0) as division_id ,coalesce(ircag.subdivision_id,0) as subdivision_id ,coalesce(count (cag_gist_id),0) dropped from irparas.cag_master_gist  ircag where  ircag.delete_flag=false   and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id =3     and ircag.division_id<>0 and  ircag.subdivision_id <>0 and ircag.circle_id<>0 and ircag.unit_id<>0   group by ircag.unit_id,coalesce(circle_id,0) ,coalesce(division_id,0),coalesce(subdivision_id,0) ) dropped   on (ircag.unit_id=dropped.unit_id and ircag.circle_id=dropped.circle_id and ircag.division_id=dropped.division_id  and ircag.subdivision_id=dropped.subdivision_id)  left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ircag.circle_id=cm.circle_id and cm.delete_flag=false)   left join  division_master dm on (ircag.division_id=dm.division_id and um.delete_flag=false)   left join  subdivision_master sm on (ircag.subdivision_id=sm.subdivision_id and um.delete_flag=false) where ircag.unit_id=?

SELECT_CAG_ABSTRACT_CIRCLE_TOT=select distinct ircag.unit_id,case when (ircag.circle_id=0 or ircag.circle_id is null ) then -2      when (ircag.circle_id!=0 or ircag.circle_id is not null ) then ircag.circle_id end as circle_id ,-2 as division_id,-2 as subdivision_id,coalesce(tot.totalparas,0) as totalparas,  coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' SE Office'  as unit_code,coalesce(cm.circle_name,'NA')  as circle_name,'NA' as division_name  ,'NA' as subdivision_name,um.unit_code||' SE Total' as unit_name  from  irparas.cag_master_gist ircag inner join (  select coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(count (cag_gist_id),0) as totalparas  from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and   ircag.circle_id<>0  group by ircag.unit_id,coalesce(circle_id,0)   ) tot   on (ircag.unit_id=tot.unit_id and ircag.circle_id=tot.circle_id )    left join    ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(count (cag_gist_id),0) replysent  from irparas.cag_master_gist  ircag where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id=4   group by ircag.unit_id,coalesce(circle_id,0) ) replysent   on (ircag.unit_id=replysent.unit_id and ircag.circle_id=replysent.circle_id )   left join     ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id,coalesce(count (cag_gist_id),0) replyna from irparas.cag_master_gist  ircag where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id=2   group by ircag.unit_id,coalesce(circle_id,0)  ) replyna   on (ircag.unit_id=replyna.unit_id and ircag.circle_id=replyna.circle_id )    left join     (select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true      AND ircag.circle_id<>0 group by ircag.unit_id,coalesce(circle_id,0)   ) transfer   on (ircag.unit_id=transfer.unit_id  and ircag.circle_id=transfer.circle_id ) left join    ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(ircag.circle_id,0) as circle_id, coalesce(count (cag_gist_id),0) dropped from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false   and ircag.is_latest=true and transfer_flag=false  and  ircag.paras_status_id =3   AND ircag.circle_id<>0  group by ircag.unit_id,coalesce(circle_id,0)  ) dropped   on (ircag.unit_id=dropped.unit_id and ircag.circle_id=dropped.circle_id )    left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ircag.circle_id=cm.circle_id and cm.delete_flag=false) where ircag.unit_id=?


SELECT_CAG_ABSTRACT_UNIT_TOTAL=select distinct ircag.unit_id,-1 as circle_id ,-1 as division_id,-1 as subdivision_id,coalesce(tot.totalparas,0) as totalparas, coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped,  um.unit_code||' Unit Total'  as unit_code,'NA'  as circle_name,'NA' as division_name  ,'NA' as subdivision_name, um.unit_code as unit_name from  irparas.cag_master_gist ircag  inner join  (  select coalesce(ircag.unit_id,0) as unit_id, coalesce(count (cag_gist_id),0) as totalparas from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false  group by ircag.unit_id  ) tot   on (ircag.unit_id=tot.unit_id  )    left join    ( select  coalesce(ircag.unit_id,0) as unit_id, coalesce(count (cag_gist_id),0) replysent from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id=4   group by ircag.unit_id ) replysent   on (ircag.unit_id=replysent.unit_id  )   left join     ( select  coalesce(ircag.unit_id,0) as unit_id,coalesce(count (cag_gist_id),0) replyna from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id=2   group by ircag.unit_id ) replyna   on (ircag.unit_id=replyna.unit_id  )    left join     (select  coalesce(ircag.unit_id,0) as unit_id, coalesce(count (cag_gist_id),0) transfer from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and ircag.transfer_flag=true    group by ircag.unit_id ) transfer    on (ircag.unit_id=transfer.unit_id   ) left join   ( select  coalesce(ircag.unit_id,0) as unit_id, coalesce(count (cag_gist_id),0) dropped  from irparas.cag_master_gist  ircag  where  ircag.delete_flag=false  and ircag.is_latest=true and transfer_flag=false and  ircag.paras_status_id =3  group by ircag.unit_id ) dropped   on (ircag.unit_id=dropped.unit_id )  left join  unit_master um on (ircag.unit_id=um.unit_id and um.delete_flag=false)  where ircag.unit_id=?  order by unit_code ,circle_name,division_name    


TOTAL_CAG_PARAS=select icmg.cag_gist_id,TRIM (cag_gist_para),icmg.financial_year,um.unit_name,icum.unit_id,icm.para_status_id,ips.parastatus, CASE   WHEN (icm.discuss_pac =true)  THEN 'YES'   WHEN (icm.discuss_pac =false)  THEN 'NO'   END AS discuss_pac,icmg.para_number,icm.sub_para_number,icm.cag_para_id  from irparas.cag_master icm inner join irparas.cag_master_gist icmg on (icm.cag_gist_id=icmg.cag_gist_id and icmg.delete_flag=false and icmg.is_latest=true) inner join irparas.cagpara_unit_map icum on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true) inner join unit_master um on (icum.unit_id=um.unit_id and um.delete_flag=false ) inner join irparas.para_status ips on (icum.para_status_id_byunit=ips.parastatus_id and ips.delete_flag=false)    where icm.delete_flag=false and icm.is_latest=true

