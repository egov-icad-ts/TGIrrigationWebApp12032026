VIEW_MST1_REMARKS_EMPID=SELECT mi_mst1_review_id,mi_inpsect_mst1_id, mtim.tank_id,  mtim.is_latest, coalesce(review_remarks,'NA') as remarks, tab_id,post_id,next_post_id,tem.employeename||'('||tdm.designation_name||')' as  submittedto ,tem2.employeename||'('||tdm2.designation_name||')' as submitted_by, tdm.designation_id ,tdm2.designation_id ,  coalesce(wier_sluice_id,0) as wier_sluice_id,  coalesce(tank_wier_sluice_name,'NA') as tank_wier_sluice_name, to_char(mtim.create_date, 'dd-mm-yyyy') as remarks_date_bws  FROM invom.invom_mi_tank_inspect_mst1_remarks mtim  inner join taskmanagement.subposts tsp1  on(mtim.next_post_id=tsp1.postid and tsp1.post_status='ACTIVE')   inner join taskmanagement.employee_mst tem  on (empid=mtim.next_emp_id and tem.employee_status::int=1) inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp1.designation and tdm.delete_flag=false) inner join taskmanagement.subposts tsp2  on(mtim.post_id=tsp2.postid and tsp1.post_status='ACTIVE')  inner join taskmanagement.employee_mst tem2  on (tem2.empid=mtim.emp_id and tem2.employee_status::int=1)  inner join taskmanagement.designation_mst tdm2  on (tdm2.designation_id=tsp2.designation and tdm2.delete_flag=false) left join invom.invom_mi_tank_wier_sluice  imtws  on (imtws.tank_wier_sluice_id=mtim.wier_sluice_id and mtim.delete_flag=false  ) where  mi_inpsect_mst1_id=? and mtim.delete_flag=false order by mtim.create_date desc ,mtim.is_latest

