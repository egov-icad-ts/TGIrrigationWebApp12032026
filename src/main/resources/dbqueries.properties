#here year of tsfc date is shown SELECT_TANK_FORM20_ABSTRACT_DETAIL=select distinct mtf.tank_id_mk,  imt.tank_name ,imt.district_id,dm.district_name,imt.mandal_id,coalesce(mm.mandal_name,'NA') as mandal_name, imt.village_id, coalesce(vmn.vname,'NA') as village_name ,imt.ac_id,cmn.constituency_name, coalesce(mtf.unit_id,0) as unit_id, um.unit_code, coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name, coalesce(mtf.subdivision_id,0) as subdivision_id , coalesce(sdm.subdivision_name,'NA') as subdivision_name,EXTRACT(YEAR FROM mtf.form_data_sentdate)::int as fyear,  mtf.form_data_id,mtf.post_id,tsp.post_name from  invom.mi_tank_form20data mtf  inner join invom.invom_mi_tanks  imt on (mtf.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)  inner join districts_mst dm  on  (imt.district_id=dm.district_id and dm.delete_flag=false ) inner join constituency_mst_new cmn  on  (imt.ac_id=cmn.ac_code and cmn.delete_flag=false ) left join villages_mst_new vmn on  (imt.district_id=vmn.dcode::int and imt.mandal_id = vmn.mcode::int and imt.village_id=vmn.vcode::int  ) inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' ) inner join mandal_mst mm  on  (imt.district_id=mm.district_id and imt.mandal_id = mm.mcode::int and  mm.delete_flag=false ) inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master divm  on (mtf.division_id=divm.division_id and divm.delete_flag=false) left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false) where mtf.delete_flag=false  and mtf.is_latest=true  and EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?
