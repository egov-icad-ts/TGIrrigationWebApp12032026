GET_CAG_PARAS_TOTAL_DETAIL=SELECT distinct coalesce(cag_para,'NA'), coalesce(para_sequence,0) as para_sequence,  icm.cag_gist_id, coalesce(para_title,'NA') as para_title,coalesce(sub_para_number,'NA'),para_status_id,ips.parastatus,CASE   WHEN (icm.discuss_pac =true)  THEN 'YES'   WHEN (icm.discuss_pac =false)  THEN 'NO'   END AS discuss_pac,icm.cag_para_id  FROM irparas.cag_master icm inner join irparas.cagpara_unit_map icum on (icm.cag_para_id=icum.cag_para_id and icum.delete_flag=false and icum.is_latest=true)  inner join unit_master um on (icum.unit_id=um.unit_id and um.delete_flag=false) inner join irparas.para_status ips on (icm.para_status_id=ips.parastatus_id and ips.delete_flag=false)  where  icm.delete_flag=false and  icm.is_latest=true   order by para_sequence , icm.cag_gist_id
#11092019SELECT distinct coalesce(cag_para,'NA'), coalesce(para_sequence,0),  icm.cag_gist_id, coalesce(para_title,'NA') as para_title,coalesce(sub_para_number,'NA'),para_status_id,ips.parastatus,CASE   WHEN (icm.discuss_pac =true)  THEN 'YES'   WHEN (icm.discuss_pac =false)  THEN 'NO'   END AS discuss_pac,icm.para_sequence  FROM irparas.cag_master icm  inner join unit_master um on (icm.sub_para_unit_id=um.unit_id and um.delete_flag=false) inner join irparas.para_status ips on (icm.para_status_id=ips.parastatus_id and ips.delete_flag=false)  where  icm.delete_flag=false and  icm.is_latest=true   order by icm.para_sequence , icm.cag_gist_id  
