SELECT_PARAS_ABSTRACT_CIRCLE_TOT=select distinct ptirpm.unit_id,case when (ptirpm.circle_id=0 or ptirpm.circle_id is null ) then -2      when (ptirpm.circle_id!=0 or ptirpm.circle_id is not null ) then ptirpm.circle_id end as circle_id ,-2 as division_id,-2 as subdivision_id,coalesce(tot.totalparas,0) as totalparas,coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb,  coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped, um.unit_code||' SE Office'  as unit_code,coalesce(cm.circle_name,'NA')  as circle_name,'NA' as division_name  ,'NA' as subdivision_name,um.unit_code||' SE Total' as unit_name  from  irparas.paras_master ptirpm inner join (  select coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) as totalparas  from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and irpm.section_id in (1,2)  AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)   ) tot   on (ptirpm.unit_id=tot.unit_id and ptirpm.circle_id=tot.circle_id )   left join   ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) sectiona from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.section_id=1   AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  )seca   on (ptirpm.unit_id=seca.unit_id and ptirpm.circle_id=seca.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.section_id=2    AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  ) secb   on (ptirpm.unit_id=secb.unit_id and ptirpm.circle_id=secb.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) replysent  from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=1   group by irpm.unit_id,coalesce(circle_id,0) ) replysent   on (ptirpm.unit_id=replysent.unit_id and ptirpm.circle_id=replysent.circle_id )   left join     ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=2   group by irpm.unit_id,coalesce(circle_id,0)  ) replyna   on (ptirpm.unit_id=replyna.unit_id and ptirpm.circle_id=replyna.circle_id )    left join     (select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) transfer from irparas.paras_master  irpm  where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true      AND irpm.circle_id<>0 group by irpm.unit_id,coalesce(circle_id,0)   ) transfer   on (ptirpm.unit_id=transfer.unit_id  and ptirpm.circle_id=transfer.circle_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(irpm.circle_id,0) as circle_id, coalesce(count (para_id),0) dropped from irparas.paras_master  irpm  where  irpm.delete_flag=false   and irpm.is_latest=true and irpm.transfer_flag=false  and  irpm.paras_status_id =3   AND irpm.circle_id<>0  group by irpm.unit_id,coalesce(circle_id,0)  ) dropped   on (ptirpm.unit_id=dropped.unit_id and ptirpm.circle_id=dropped.circle_id )    left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)   left join  circle_master cm on (ptirpm.circle_id=cm.circle_id and cm.delete_flag=false) where ptirpm.unit_id=?


SELECT_PARAS_ABSTRACT_UNIT_TOTAL=select distinct ptirpm.unit_id,-1 as circle_id ,-1 as division_id,-1 as subdivision_id,coalesce(tot.totalparas,0) as totalparas,coalesce(seca.sectiona,0) as sectiona,coalesce(secb.sectionb,0) as sectionb, coalesce((coalesce(tot.totalparas,0)-coalesce(dropped.dropped,0)),0) as balance, coalesce(replysent.replysent,0) as replysent , coalesce(replyna.replyna,0) as replyna,coalesce(transfer.transfer,0) as transfer,coalesce(dropped.dropped,0) as dropped,  um.unit_code||' Unit Total'  as unit_code,'NA'  as circle_name,'NA' as division_name  ,'NA' as subdivision_name, um.unit_code as unit_name from  irparas.paras_master ptirpm  inner join  (  select coalesce(irpm.unit_id,0) as unit_id, coalesce(count (para_id),0) as totalparas from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and irpm.section_id in (1,2) group by irpm.unit_id  ) tot   on (ptirpm.unit_id=tot.unit_id  )   left join   ( select  coalesce(irpm.unit_id,0) as unit_id, coalesce(count (para_id),0) sectiona from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.section_id=1   group by irpm.unit_id )seca   on (ptirpm.unit_id=seca.unit_id  ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id ,coalesce(count (para_id),0) sectionb from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true  and irpm.transfer_flag=false and  irpm.section_id=2    group by irpm.unit_id ) secb    on (ptirpm.unit_id=secb.unit_id ) left join    ( select  coalesce(irpm.unit_id,0) as unit_id, coalesce(count (para_id),0) replysent from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=1   group by irpm.unit_id ) replysent   on (ptirpm.unit_id=replysent.unit_id  )   left join     ( select  coalesce(irpm.unit_id,0) as unit_id,coalesce(count (para_id),0) replyna from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id=2   group by irpm.unit_id ) replyna   on (ptirpm.unit_id=replyna.unit_id  )    left join     (select  coalesce(irpm.unit_id,0) as unit_id, coalesce(count (para_id),0) transfer from irparas.paras_master  irpm  where  irpm.delete_flag=true  and irpm.is_latest=false and irpm.transfer_flag=true    group by irpm.unit_id ) transfer    on (ptirpm.unit_id=transfer.unit_id   ) left join   ( select  coalesce(irpm.unit_id,0) as unit_id, coalesce(count (para_id),0) dropped  from irparas.paras_master  irpm  where  irpm.delete_flag=false  and irpm.is_latest=true and irpm.transfer_flag=false and  irpm.paras_status_id =3  group by irpm.unit_id ) dropped   on (ptirpm.unit_id=dropped.unit_id )  left join  unit_master um on (ptirpm.unit_id=um.unit_id and um.delete_flag=false)  where ptirpm.unit_id=?  order by unit_code ,circle_name,division_name  


