GET_TANK_RES_CANAL_REPEATED_DAMAGE=select * from (select count(mtf.tank_id_mk),mtf.tank_id_mk as tankrescanal,imt.tank_name as tanknamerescanal, comp_cat_id,damage_type from invom.mi_tank_form20data  mtf inner join invom.invom_mi_tanks imt on(mtf.tank_id_mk=imt.tank_id_mk and imt.delete_flag=false) where comp_cat_id=1 and mtf.tank_id_mk>0  and res_id=0 and canal_id=0 and mtf.delete_flag=false and mtf.is_latest=true and mtf.damage_type=2 group by mtf.tank_id_mk,comp_cat_id,imt.tank_name,damage_type having count(mtf.tank_id_mk)>1  union select count(mtf.res_id),mtf.res_id as tankrescanal,ir.res_name,comp_cat_id,mtf.damage_type from invom.mi_tank_form20data mtf inner join  invom.invom_reservoirs ir on(mtf.res_id=ir.res_id and ir.delete_flag=false and ir.is_latest=true) where comp_cat_id=2 and mtf.res_id>0  and tank_id_mk=0    and canal_id=0 and mtf.delete_flag=false and mtf.is_latest=true and mtf.damage_type=2 group by mtf.res_id,comp_cat_id,ir.res_name,damage_type having count(mtf.res_id)>1  union select count(mtf.canal_id),mtf.canal_id as tankrescanal,ic.canal_name,comp_cat_id,damage_type from invom.mi_tank_form20data mtf inner join invom.invom_canals  ic on(mtf.canal_id=ic.canal_id  and ic.delete_flag=false and ic.is_latest=true) where comp_cat_id=3 and mtf.canal_id>0  and mtf.tank_id_mk=0   and mtf.res_id=0 and mtf.delete_flag=false and mtf.is_latest=true and damage_type=2 group by mtf.canal_id,mtf.comp_cat_id,ic.canal_name,damage_type having count(mtf.canal_id)>1) data  order by  count desc  , comp_cat_id  asc  limit 20
