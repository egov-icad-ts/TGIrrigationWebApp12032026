SELECT_HABITATION=select hname,mandal_id,dcode::int,mcode::int,vcode::int,hcode::int from habitation_mst where dcode::int=? and mcode::int=? and vcode::int=? ;

SECTION_TANK_MAPP=select distinct imt.tank_id_mk, imt.district_id,imt.mandal_id,imt.village_id,imt.hcode,imt.ac_id,imt.tank_code,ts.unit_id, coalesce(ts.circle_id,0) as circle_id ,coalesce(ts.division_id,0) as  division_id,coalesce(ts.subdivision_id,0) as subdivision_id,coalesce(ts.section_id,0) as section_id,tank_name,dm.district_name,mm.mandal_name,vm.vname,hm.hname,cmn.constituency_name,source_id,coalesce(is_nrld,false) as is_nrld , coalesce(nrld_code,'0') as nrld_code   from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')    inner join districts_mst dm on (imt.district_id=dm.district_id and dm.delete_flag=false) inner join mandal_mst mm on (imt.district_id=mm.dcode::int and imt.mandal_id=mm.mcode::int and mm.delete_flag=false) inner join villages_mst_new vm  on (imt.district_id = vm.dcode::int and imt.mandal_id=vm.mcode::int  and imt.village_id=vm.vcode::int and mm.delete_flag=false) inner join habitation_mst hm on (imt.district_id = hm.dcode::int and imt.mandal_id=hm.mcode::int and imt.village_id=hm.vcode::int and imt.hcode=hm.hcode::int) inner join constituency_mst_new  cmn on (imt.ac_id=cmn.ac_code and  cmn.delete_flag=false)   where    imt.delete_flag=false and imt.is_latest=true 


SECTION_TANK_MAPP_NRLD=select distinct imt.tank_id_mk, imt.district_id,imt.mandal_id,imt.village_id,imt.hcode,imt.ac_id,imt.tank_code,ts.unit_id, coalesce(ts.circle_id,0) as circle_id ,coalesce(ts.division_id,0) as  division_id,coalesce(ts.subdivision_id,0) as subdivision_id,coalesce(ts.section_id,0) as section_id,tank_name,dm.district_name,mm.mandal_name,vm.vname,hm.hname,cmn.constituency_name,source_id,coalesce(is_nrld,false) as is_nrld , coalesce(nrld_code,'0') as nrld_code   from invom.invom_mi_tanks  imt  inner join taskmanagement.subposts ts  on (ts.postid=imt.post_id and ts.post_status='ACTIVE')    inner join districts_mst dm on (imt.district_id=dm.district_id and dm.delete_flag=false) inner join mandal_mst mm on (imt.district_id=mm.dcode::int and imt.mandal_id=mm.mcode::int and mm.delete_flag=false) inner join villages_mst_new vm  on (imt.district_id = vm.dcode::int and imt.mandal_id=vm.mcode::int  and imt.village_id=vm.vcode::int and mm.delete_flag=false) inner join habitation_mst hm on (imt.district_id = hm.dcode::int and imt.mandal_id=hm.mcode::int and imt.village_id=hm.vcode::int and imt.hcode=hm.hcode::int) inner join constituency_mst_new  cmn on (imt.ac_id=cmn.ac_code and  cmn.delete_flag=false)   where    imt.delete_flag=false and imt.is_latest=true 	and imt.is_nrld=true									 
#select distinct imt.tank_id_mk, imt.district_id,imt.mandal_id,imt.village_id,imt.hcode,imt.ac_id,imt.tank_code,imtu.unit_id,imtu.circle_id,imtu.division_id,imtu.subdivision_id,imtu.section_id,tank_name,dm.district_name,mm.mandal_name,vm.vname,hm.hname,cmn.constituency_name  from invom.invom_mi_tanks  imt   inner join invom.invom_mi_tank_unit_mapping imtu  on (imt.tank_id_mk=imtu.mitank_tank_id and imtu.delete_flag=false and imtu.is_latest=true)  inner join districts_mst dm on (imt.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (imt.district_id=mm.dcode::int and imt.mandal_id=mm.mcode::int and mm.delete_flag=false)  inner join villages_mst_new vm  on (imt.district_id = vm.dcode::int and imt.mandal_id=vm.mcode::int  and imt.village_id=vm.vcode::int and mm.delete_flag=false)   inner join habitation_mst hm on (imt.district_id = hm.dcode::int and imt.mandal_id=hm.mcode::int and imt.village_id=hm.vcode::int and imt.hcode=hm.hcode::int) inner join constituency_mst_new  cmn on (imt.ac_id=cmn.ac_code and  cmn.delete_flag=false)   where   imt.is_new_checkdam=false 

#select distinct  imt.tank_id_mk,imt.district_id,imt.mandal_id,imt.village_id,imt.hcode,imt.ac_id,imt.tank_id,imtu.unit_id,imtu.circle_id,imtu.division_id,imtu.subdivision_id,imtu.section_id,tank_name, dm.district_name,mm.mandal_name from invom.invom_mi_tanks  imt  inner join invom.invom_mi_tank_unit_mapping imtu on (imt.tank_id_mk=imtu.mitank_tank_id and imtu.delete_flag=false and imtu.is_latest=true) inner join districts_mst dm on (imt.district_id=dm.district_id and dm.delete_flag=false) inner join mandal_mst mm on (imt.district_id=mm.dcode::int and imt.mandal_id=mm.mcode::int and mm.delete_flag=false) inner join villages_mst_new vm  on (imt.district_id = vm.dcode::int and imt.mandal_id=mm.mcode::int and imt.village_id=vm.vcode::int and mm.delete_flag=false)  inner join habitation_mst hm on (imt.district_id = hm.dcode::int and imt.mandal_id=hm.mcode::int and imt.village_id=hm.vcode::int and imt.hcode=hm.hcode::int)   where imtu.section_id=? and imt.is_new_checkdam=false

