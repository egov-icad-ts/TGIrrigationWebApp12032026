VIEW_REPAIRS_REMARKS=SELECT mi_repair_review_id,mi_inspect_repair_id,tank_id, mtirr.is_latest, tem.employeename||'('||tdm.designation_name||')' as  submittedto ,   coalesce(review_remarks,'NA') as remarks,  tem2.employeename||'('||tdm2.designation_name||')' as submitted_by,  tdm.designation_id ,tdm2.designation_id,mtirr.emp_id,mtirr.post_id,mtirr.next_post_id, to_char(mtirr.create_date, 'dd/mm/yyyy') as repair_remarks_date  FROM  invom.invom_mi_tank_inspect_repairs_remarks mtirr   inner join taskmanagement.subposts tsp1  on(mtirr.next_post_id=tsp1.postid and tsp1.post_status='ACTIVE')    left join (select emp_id::int, post  from  taskmanagement.present_post_emp  ppe  where ppe.delete_flag=false and ppe.is_latest=true        union      select emp_id::int ,post    from taskmanagement.additional_charge  tac   where ((tac.to_date is null ) or (to_date>=now() ))) postdata1  on ( postdata1.post=mtirr.next_post_id )  inner join taskmanagement.employee_mst tem  on (empid=postdata1.emp_id and tem.employee_status::int=1)  inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp1.designation and tdm.delete_flag=false)   inner join taskmanagement.subposts tsp2  on(mtirr.post_id=tsp2.postid and tsp1.post_status='ACTIVE')  left join (select emp_id::int, post  from  taskmanagement.present_post_emp  ppe  where ppe.delete_flag=false and ppe.is_latest=true   union   select emp_id::int ,post  from taskmanagement.additional_charge  tac  where ((tac.to_date is  null ) or (to_date>=now() ))) postdata2 on ( postdata2.post=mtirr.post_id )   inner join taskmanagement.employee_mst tem2  on (tem2.empid=postdata2.emp_id and tem2.employee_status::int=1)  inner join taskmanagement.designation_mst tdm2   on (tdm2.designation_id=tsp2.designation and tdm2.delete_flag=false)  where  mi_inspect_repair_id=?  and mtirr.delete_flag=false order by mtirr.designation_id,mtirr.is_latest

