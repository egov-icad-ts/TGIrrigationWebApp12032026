GET_CAG_DOCS_BY_PARAID=SELECT cag_gist_id, cag_para_id, doc_name, doc_location, doc_original_name,  coalesce(create_user_name,'NA')as create_user_name , coalesce( update_user_name,'NA') as update_user_name,  cag_doc_id ,icd.create_by_unit_id,um.unit_name,doc_title,to_char(doc_date,'dd/mm/yyyy') as  doc_date  FROM irparas.cag_docs icd ,  unit_master um  where cag_para_id=? and icd.create_by_unit_id=um.unit_id and um.delete_flag=false and icd.delete_flag=false and icd.is_latest=true 

GET_CAG_DOCS=SELECT cag_gist_id, cag_para_id, doc_name, doc_location, doc_original_name,  coalesce(create_user_name,'NA')as create_user_name , coalesce( update_user_name,'NA') as update_user_name,  cag_doc_id ,icd.create_by_unit_id,um.unit_name,doc_title,to_char(doc_date,'dd/mm/yyyy') as  doc_date  FROM irparas.cag_docs icd ,  unit_master um  where   icd.create_by_unit_id=um.unit_id and um.delete_flag=false and icd.delete_flag=false and icd.is_latest=true


UPDATE_CAG_MASTER_GIST=UPDATE irparas.cag_master_gist   SET cag_gist_para=?,  financial_year=?,para_number=?, edit_flag=true,  edit_date=now(),  edit_user_name=?  WHERE  cag_gist_id=? 
UPDATE_CAG_MASTER= UPDATE irparas.cag_master   SET cag_para=?, para_sequence=?,    update_user_name=?,      update_date=now(),      edit_flag=true, para_title=? ,sub_para_number=?, discuss_pac=?, pac_incl=?  WHERE cag_para_id=?

