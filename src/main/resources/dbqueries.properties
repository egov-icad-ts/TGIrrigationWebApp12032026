GET_TANK_ABSTRACT_AYACUT_CAPACITY=select  distinct  coalesce(grossayacut.grossayacut,0.0) as grossayacut, coalesce(availayacut.ayacut_acres,0.0) as availayacut, coalesce(grosscapacity.grosscapacity,0.0) as grosscapacity,coalesce(availcapacity.availcapacity,0.0) as availcapacity,mtic.unit_id,um.unit_code,0,'NA', 0,'NA', 0,'NA', EXTRACT(YEAR FROM mtic.inspect_date)::int as iyear,0,'NA',0,'NA' ,coalesce(  grossayacut.cnt,0) as cnt from invom.invom_mi_tank_inspect_capacity mtic inner join (select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(imt.ayacut_acres) as grossayacut ,unit_id from  invom.invom_mi_tank_inspect_capacity   mtic  inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id ) group by unit_id,yr)grossayacut on (mtic.unit_id=grossayacut.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =grossayacut.yr) inner join ( select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(mtic.ayacut_acres) as ayacut_acres ,unit_id from  invom.invom_mi_tank_inspect_capacity   mtic inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)  where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id ) group by unit_id ,yr) availayacut on (mtic.unit_id=availayacut.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =availayacut.yr) inner join (select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(imt.capacity) as grosscapacity ,unit_id  from  invom.invom_mi_tank_inspect_capacity   mtic  inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id ) group by      unit_id,yr) grosscapacity  on (mtic.unit_id=grosscapacity.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =grosscapacity.yr) inner join (select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(available_capacity) as availcapacity ,unit_id from  invom.invom_mi_tank_inspect_capacity   mtic inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true)  where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id ) group by      unit_id,yr ) availcapacity  on (mtic.unit_id =availcapacity.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =availcapacity.yr ) inner join   unit_master  um on (mtic.unit_id=um.unit_id and um.delete_flag=false)  where mtic.delete_flag=false and mtic.is_latest=true  and  EXTRACT(YEAR FROM mtic.inspect_date)::int=?
GET_TANK_UNIT_ABSTRACT_AYACUT_CAPACITY=select  distinct coalesce(grossayacut.grossayacut,0.0) as grossayacut, coalesce(availayacut.ayacut_acres,0.0) as availayacut, coalesce(grosscapacity.grosscapacity,0.0) as grosscapacity, coalesce(availcapacity.availcapacity,0.0) as availcapacity, mtic.unit_id,um.unit_code, 0,'NA', 0,'NA', 0,'NA',EXTRACT(YEAR FROM mtic.inspect_date)::int as iyear,0,'NA',0,'NA',coalesce(  grossayacut.cnt,0) as cnt from invom.invom_mi_tank_inspect_capacity mtic inner join (select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(imt.ayacut_acres) as grossayacut , coalesce(unit_id,0) as unit_id 	from  invom.invom_mi_tank_inspect_capacity   mtic  inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id  and EXTRACT(YEAR FROM mtic.inspect_date)=EXTRACT(YEAR FROM mtic2.inspect_date) and EXTRACT(YEAR FROM mtic2.inspect_date)::int=?) group by mtic.unit_id,yr) grossayacut on (mtic.unit_id=grossayacut.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =grossayacut.yr) inner join ( select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(mtic.ayacut_acres) as ayacut_acres , coalesce(unit_id,0) as unit_id from  invom.invom_mi_tank_inspect_capacity   mtic  inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id and EXTRACT(YEAR FROM mtic.inspect_date)=EXTRACT(YEAR FROM mtic2.inspect_date) and EXTRACT(YEAR FROM mtic2.inspect_date)::int=? ) group by mtic.unit_id,yr) availayacut on (mtic.unit_id=availayacut.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =availayacut.yr) inner join (select count (distinct mtic.tank_id) as cnt, EXTRACT(YEAR FROM mtic.inspect_date)::int as yr,sum(imt.capacity) as grosscapacity ,coalesce(unit_id,0) as unit_id from  invom.invom_mi_tank_inspect_capacity   mtic inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2  where mtic.tank_id=mtic2.tank_id  and EXTRACT(YEAR FROM mtic.inspect_date)=EXTRACT(YEAR FROM mtic2.inspect_date) and EXTRACT(YEAR FROM mtic2.inspect_date)::int=?) group by  mtic.unit_id,yr) grosscapacity    on (mtic.unit_id=grosscapacity.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =grosscapacity.yr) inner join (select count (distinct mtic.tank_id) as cnt,EXTRACT(YEAR FROM mtic.inspect_date)::int as yr, sum(available_capacity) as availcapacity ,coalesce(unit_id,0) as unit_id from  invom.invom_mi_tank_inspect_capacity   mtic inner join invom.invom_mi_tanks imt on (mtic.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true) where mtic.delete_flag=false and mtic.is_latest=true and inspect_date=(select max(inspect_date) from invom.invom_mi_tank_inspect_capacity mtic2 where mtic.tank_id=mtic2.tank_id  and EXTRACT(YEAR FROM mtic.inspect_date)=EXTRACT(YEAR FROM mtic2.inspect_date) and EXTRACT(YEAR FROM mtic2.inspect_date)::int=?) group by  mtic.unit_id,yr) availcapacity  on (mtic.unit_id =availcapacity.unit_id and EXTRACT(YEAR FROM mtic.inspect_date)::int =availcapacity.yr ) inner join circle_master cm  on (mtic.circle_id=cm.circle_id and cm.delete_flag=false ) inner join unit_master um  on (mtic.unit_id=um.unit_id and um.delete_flag=false ) where mtic.delete_flag=false and mtic.is_latest=true and  EXTRACT(YEAR FROM mtic.inspect_date)::int=?
