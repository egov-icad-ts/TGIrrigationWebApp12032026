eflag=false)   group by t3.unit_id,t3.circle_id,division_id )   packs    on (pa.unit_id=packs.unit_id  and pa.circle_id=packs.circle_id  and pa.division_id=packs.division_id)   inner join   (select t4.unit_id,coalesce(circle_id,0) as circle_id,coalesce(division_id,0) as division_id,string_agg(dms.district_name, '   ,') as district_name   from ( select distinct unit_id,coalesce(circle_id,0) as circle_id,cpachild4.district_id,coalesce(division_id,0) as division_id  from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true ) t4    inner join districts_mst dms   on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.unit_id,t4.circle_id,t4.division_id) dm   on (pa.unit_id=dm.unit_id  and pa.circle_id=dm.circle_id and pa.division_id=dm.division_id  )   inner join   ( select t4.unit_id,coalesce(circle_id,0) as circle_id,coalesce(t4.division_id,0) as division_id  ,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name   from ( select distinct unit_id,coalesce(circle_id,0) as circle_id,coalesce(division_id,0) as division_id ,mandal_id ,district_id  from  components.project_ayacut   cpachild4   where delete_flag=false and is_latest=true) t4    inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)   group by t4.unit_id,t4.circle_id,t4.division_id) mm    on (pa.unit_id=mm.unit_id and pa.circle_id=mm.circle_id and pa.division_id=mm.division_id)  inner join  ( select t4.unit_id,coalesce(circle_id,0) as circle_id,  coalesce(division_id,0) as division_id,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name   from   ( select distinct unit_id,coalesce(circle_id,0) as circle_id,coalesce(division_id,0) as division_id,const_id   from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4   inner join constituency_mst_new cps   on (t4.const_id=cps.constituency_id and cps.delete_flag=false)  group by t4.un