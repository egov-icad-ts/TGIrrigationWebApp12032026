GET_SUBDIVISIONS_ON_DIVISION=select distinct coalesce(SP.POSTID,0) as POSTID,coalesce(DM.DESIGNATION_NAME,'NA') as DESIGNATION_NAME,coalesce(DM.DIVISION_ID,0) as DIVISION_ID,coalesce(SDM.SUB_DIVISION_NAME,'NA') as SUB_DIVISION_NAME,coalesce(SDM.SUB_DIVISION_ID,0) as SUB_DIVISION_ID from SUBPOSTS SP inner join PRESENT_POST_EMP PPE on SP.POSTID=PPE.POST inner join DESIGNATION_MST DM on SP.DESIGNATION=DM.DESIGNATION_ID left join DIVISION_MST DM on SP.DIVISION_ID=DM.DIVISION_ID left join SUB_DIVISION_MST SDM on SP.SUBDIVISION_ID=SDM.SUB_DIVISION_ID left join ADDITIONAL_CHARGE AC on SP.POSTID=AC.POST where SP.POST_STATUS='ACTIVE'and DM.DIVISION_ID=? and DM.DESIGNATION_ID in (4,113)
GET_SUBDIVISION_NAME=select distinct coalesce(SDM.SUB_DIVISION_NAME,'NA') as SUB_DIVISION_NAME,coalesce(SDM.SUB_DIVISION_ID,0) as SUB_DIVISION_ID from SUBPOSTS SP inner join PRESENT_POST_EMP PPE on SP.POSTID=PPE.POST inner join DESIGNATION_MST DM on SP.DESIGNATION=DM.DESIGNATION_ID left join DIVISION_MST DM on SP.DIVISION_ID=DM.DIVISION_ID left join SUB_DIVISION_MST SDM on SP.SUBDIVISION_ID=SDM.SUB_DIVISION_ID left join ADDITIONAL_CHARGE AC on SP.POSTID=AC.POST where SP.POST_STATUS='ACTIVE'and SDM.SUB_DIVISION_ID=? and DM.DESIGNATION_ID in (4,113)


