GET_DAM_MST1_REMARKS= SELECT res_ann_review_id, irdamr.res_ann1_mst1_id, irdam.reservoir_id,    irdamr.is_latest, irdamr.unit_id, irdamr.circle_id, irdamr.division_id, irdamr.subdivision_id,        irdamr.project_id, irdamr.designation_id, irdamr.level_id, irdamr.submitted_to_empid, review_remarks, irdamr.tab_id, irdamr.emp_id, irdamr.post_id, irdamr.next_post_id, irdamr.section_id,        irdamr.next_emp_id,  irdio.inspect_office_name||'('|| to_char(irdii.inspect_date,'dd/mm/yyyy') ||')'  as inspect_office_name,remarks_incl  FROM  invom.invom_res_dam_ann_remarks  irdamr inner join invom.invom_res_dam_ann1_mst1 irdam    on (irdamr.res_ann1_mst1_id = irdam.res_ann1_mst1_id     and irdam.delete_flag=false and irdam.is_latest=true)     inner join invom.invom_res_dam_inspect_info irdii  on (irdii.res_dam_inspect_info_id=irdamr.res_dam_inspect_info_id and irdii.delete_flag=false) inner join   invom.invom_res_dam_inspect_office irdio  on (irdii.inspect_office_id=irdio.inspect_office_id and irdio.delete_flag=false)     where  irdam.reservoir_id=? and irdam.freq_year=? and irdam.freq_operation=? and irdam.tank_id=? and irdamr.delete_flag=false


GET_DAM_MST1_REMARKS_BY_REVIEWID= SELECT res_ann_review_id, irdamr.res_ann1_mst1_id, irdam.reservoir_id,    irdamr.is_latest, irdamr.unit_id, irdamr.circle_id, irdamr.division_id, irdamr.subdivision_id,        irdamr.project_id, irdamr.designation_id, irdamr.level_id, irdamr.submitted_to_empid, review_remarks, irdamr.tab_id, irdamr.emp_id, irdamr.post_id, irdamr.next_post_id, irdamr.section_id,        irdamr.next_emp_id,  irdio.inspect_office_name||'('|| to_char(irdii.inspect_date,'dd/mm/yyyy') ||')'  as inspect_office_name,remarks_incl , irdamr.res_dam_inspect_info_id  FROM  invom.invom_res_dam_ann_remarks  irdamr inner join invom.invom_res_dam_ann1_mst1 irdam    on (irdamr.res_ann1_mst1_id = irdam.res_ann1_mst1_id     and irdam.delete_flag=false and irdam.is_latest=true)     inner join invom.invom_res_dam_inspect_info irdii  on (irdii.res_dam_inspect_info_id=irdamr.res_dam_inspect_info_id and irdii.delete_flag=false) inner join   invom.invom_res_dam_inspect_office irdio  on (irdii.inspect_office_id=irdio.inspect_office_id and irdio.delete_flag=false)     where   irdamr.res_ann_review_id=? and  irdamr.delete_flag=false

GET_DAM_INSPECT_PHOTOS=SELECT dam_doc_id , irdd.res_ann1_mst1_id, irdd.res_dam_inspect_info_id, doc_original_name,  doc_name, doc_path, irdd.is_latest,   doc_title,irdio.inspect_office_name || ' ( '|| to_char(irdii.inspect_date,'dd/mm/yyyy') || ' ) '    as inspect_office_name ,coalesce(irdd.post_id,0) as post_id   FROM invom.invom_res_dam_docs  irdd inner join invom.invom_res_dam_inspect_info irdii   on (irdd.res_dam_inspect_info_id=irdii.res_dam_inspect_info_id and irdii.delete_flag=false)   inner join invom.invom_res_dam_inspect_office irdio   on (irdii.inspect_office_id=irdio.inspect_office_id and irdio.delete_flag=false) inner join invom.invom_res_dam_ann1_mst1 irdam on (irdii.res_ann1_mst1_id=irdam.res_ann1_mst1_id and irdam.delete_flag=false and irdam.is_latest=true) where irdd.delete_flag=false  and irdam.reservoir_id=? and irdam.freq_year=?  and irdam.freq_operation=? and irdam.tank_id=?

GET_RES_DAM_INFO=SELECT res_id, res_name, coalesce(type_dam_id,0) as type_of_dam,  coalesce(owner_dam,'NA') as owner_dam	, coalesce(dam_operator,'NA') as dam_operator , coalesce(to_char(commission_date,'dd/mm/yyyy'),'NA') as commission_date, 	coalesce(hazard_class_id,0) as hazard_class , coalesce(dam_purpose_id,0) as dam_purpose_id,  change_flag  FROM invom.invom_reservoirs where delete_flag=false and is_latest=true and res_id=?

GET_RES_IMP_LEVELS_INFO=  SELECT res_id, res_name, coalesce(deepestfoundation_level,0.0) as deepestfoundation_level ,  coalesce(frl_level,0.0) as frl_level, coalesce(gross_storage_at_frl,0.0) as gross_storage_at_frl, coalesce(mwl_level,0.0) as mwl_level, coalesce(mddl_level,0.0) as mddl_level, coalesce(live_storage_above_mddl,0.0) as live_storage_above_mddl, coalesce(dead_storage_below_mddl,0.0) as dead_storage_below_mddl, coalesce(max_flood_discharge,0.0) as max_flood_discharge,  res_latitude_d, res_latitude_m, res_latitude_s, res_longitude_d, res_longitude_m, res_longitude_s,  change_flag,coalesce(trl_level,0.0) as trl_level, coalesce(spillwaycrest_level,0.0) as spillwaycrest_level, coalesce(lowest_riverbed,0.0) as lowest_riverbed,  coalesce(type_dam_id,0) as type_of_dam, coalesce(to_char(commission_date,'dd/mm/yyyy'),'NA') as commission_date, 	coalesce(hazard_class_id,0) as hazard_class , coalesce(dam_purpose_id,0) as dam_purpose_id,  change_flag FROM invom.invom_reservoirs  where delete_flag=false and is_latest=true and res_id=?

GET_RES_DAMINF_LEVELS_INFO= SELECT res_id, res_name, coalesce(type_dam_id, 0) as type_dam_id,   coalesce(to_char(commission_date,'dd/mm/yyyy'),'NA') as commission_date, 	coalesce(hazard_class_id, 0) as hazard_class_id ,  coalesce(deepestfoundation_level,0.0) as deepestfoundation_level ,  coalesce(frl_level,0.0) as frl_level, coalesce(gross_storage_at_frl,0.0) as gross_storage_at_frl, coalesce(mwl_level,0.0) as mwl_level, coalesce(mddl_level,0.0) as mddl_level, coalesce(live_storage_above_mddl,0.0) as live_storage_above_mddl, coalesce(dead_storage_below_mddl,0.0) as dead_storage_below_mddl, coalesce(max_flood_discharge,0.0) as max_flood_discharge,  res_latitude_d, res_latitude_m, res_latitude_s, res_longitude_d, res_longitude_m, res_longitude_s,  change_flag,coalesce(trl_level,0.0) as trl_level, coalesce(spillwaycrest_level,0.0) as spillwaycrest_level, coalesce(lowest_riverbed,0.0) as lowest_riverbed, coalesce(ir.nrld_code,'NA') as nrldcode,ir.district_id, ir.mandal_id, ir.village_id , dm.district_name, mm.mandal_name, coalesce(vm.vname) as vname, coalesce(ir.village_name,'NA') as village_name,irdam.res_ann1_mst1_id, irdam.freq_operation,irdam.freq_year,coalesce(irdam.condition_dam_id,0) as condition_dam_id, coalesce(dam_purpose_id,0) as dam_purpose_id  FROM invom.invom_reservoirs ir inner join  invom.invom_res_dam_ann1_mst1 irdam on (ir.res_id=irdam.reservoir_id and ir.delete_flag=false and ir.is_latest=true)   inner join districts_mst dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) inner join mandal_mst mm on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and ir.village_id=vm.vcode::int )  where irdam.delete_flag=false and irdam.is_latest=true and irdam.res_ann1_mst1_id=?


GET_RES_DAMSAL_INFO=SELECT res_id, res_name,   coalesce(emergency_action_shared,'NA') as emergency_action_shared,       coalesce(emergency_action_plan_prepared_id,0) as emergency_action_plan_prepared_id ,    coalesce(disaster_manage_prepared,'NA') as disaster_manage_prepared,  coalesce(damretrofit_meausre_adopted,'NA') as damretrofit_meausre_adopted,   coalesce(damretrofit_time,'NA') as damretrofit_time, coalesce(damretrofit_status,'NA') as damretrofit_status, coalesce(damfound_safe,'NA') as damfound_safe,       coalesce(peak_water_leakage,0.0) as peak_water_leakage, coalesce(lost_percentage_reservoir_capacity,0.0) as lost_percentage_reservoir_capacity,    coalesce(oanm_manual_prepared_time,'NA') as oanm_manual_prepared_time, coalesce(oanm_manual_prepared_id,0) as oanm_manual_prepared_id,  coalesce(gallery_dry_status,'NA') as gallery_dry_status, coalesce(gallery_elevation,'NA') as gallery_elevation,  coalesce(unusual_dam_design_id,0) as unusual_dam_design_id,  coalesce(unusual_dam_designdetails,'NA') as unusual_dam_designdetails,  coalesce(special_difficult_foundation_issues,'NA') as special_difficult_foundation_issues, coalesce(mfdobserved_flood,0.0) as mfdobserved_flood, coalesce(mfddesign_flood,0.0) as mfddesign_flood,         coalesce(capacity_deadstorage,0.0) as capacity_deadstorage,  coalesce(salient_topwidth,0.0) as salient_topwidth,        coalesce(salient_bottomwidth,0.0) as salient_bottomwidth, coalesce(salient_lengthcrest,0.0) as salient_lengthcrest, coalesce(salient_heightdfl,0.0) as salient_heightdfl,        coalesce(dambreak_analysis_id,0) as dambreak_analysis_id, coalesce(structural_safety_performed_id,0) as structural_safety_performed_id , coalesce(reservoir_silted_id,0.0) as reservoir_silted_id,        coalesce(gate_operation_method_id,0.0) as gate_operation_method_id, coalesce(gross_capacity_mwl,0.0) as gross_capacity_mwl,coalesce(res_gates_size,'NA') as res_gates_size, coalesce(res_gates_number,'NA') as res_gates_number,coalesce(dam_gallery_number,'NA') as dam_gallery_number, coalesce(dam_gates_number_fine,0) as dam_gates_number_fine , coalesce(capacity_activestorage,0.0) as capacity_activestorage FROM invom.invom_reservoirs where res_id=? and delete_flag=false and is_latest=true and is_nrld=true


GET_TANK_DAMSAL_INFO=SELECT tank_id_mk, tank_name,  coalesce(emergency_action_shared,'NA') as emergency_action_shared, coalesce(emergency_action_plan_prepared_id,0) as emergency_action_plan_prepared_id ,  coalesce(disaster_manage_prepared,'NA') as disaster_manage_prepared,  coalesce(damretrofit_meausre_adopted,'NA') as damretrofit_meausre_adopted,  coalesce(damretrofit_time,'NA') as damretrofit_time, coalesce(damretrofit_status,'NA') as damretrofit_status,  coalesce(damfound_safe,'NA') as damfound_safe,       coalesce(peak_water_leakage,0.0) as peak_water_leakage,  coalesce(lost_percentage_reservoir_capacity,0.0) as lost_percentage_reservoir_capacity,  coalesce(oanm_manual_prepared_time,'NA') as oanm_manual_prepared_time, coalesce(oanm_manual_prepared_id,0) as oanm_manual_prepared_id, coalesce(gallery_dry_status,'NA') as gallery_dry_status, coalesce(gallery_elevation,'NA') as gallery_elevation,  coalesce(unusual_dam_design_id,0) as unusual_dam_design_id,  coalesce(unusual_dam_designdetails,'NA') as unusual_dam_designdetails, coalesce(special_difficult_foundation_issues,'NA') as special_difficult_foundation_issues, coalesce(mfdobserved_flood,0.0) as mfdobserved_flood, coalesce(mfddesign_flood,0.0) as mfddesign_flood,   coalesce(capacity_deadstorage,0.0) as capacity_deadstorage,  coalesce(salient_topwidth,0.0) as salient_topwidth, coalesce(salient_bottomwidth,0.0) as salient_bottomwidth, coalesce(salient_lengthcrest,0.0) as salient_lengthcrest, coalesce(salient_heightdfl,0.0) as salient_heightdfl,        coalesce(dambreak_analysis_id,0) as dambreak_analysis_id,  coalesce(structural_safety_performed_id,0) as structural_safety_performed_id , coalesce(reservoir_silted_id,0.0) as reservoir_silted_id, coalesce(gate_operation_method_id,0.0) as gate_operation_method_id, coalesce(gross_capacity_mwl,0.0) as gross_capacity_mwl,coalesce(res_gates_size,'NA') as res_gates_size, coalesce(res_gates_number,'NA') as res_gates_number,coalesce(dam_gallery_number,'NA') as dam_gallery_number,coalesce(dam_gates_number_fine,0) as dam_gates_number_fine, coalesce(capacity_activestorage,0.0) as capacity_activestorage   FROM invom.invom_mi_tanks where tank_id_mk=? and delete_flag=false and is_latest=true and is_nrld=true

GET_TANK_DAM_INFO=SELECT  tank_id_mk,tank_name, coalesce(dam_type,'NA'), coalesce(owner_dam,'NA'), coalesce(operator_dam,'NA'), coalesce(to_char(comm_date,'dd/mm/yyyy'),'NA'), coalesce(hazard_class,'NA')  FROM invom.invom_mi_tanks where delete_flag=false and is_latest=true and tank_id_mk=?

GET_TANK_IMP_CONTROL=  SELECT tank_id_mk, coalesce(tbl_level,0.0) as tbl_level , coalesce(mwl_level,0.0) as mwl_level,  coalesce(frl_level,0.0) as frl_level, coalesce(spillway_crest_level,0.0) as spillway_crest_level, coalesce(mddl_level,0.0) as mddl_level, coalesce(lowest_river_bed,0.0) as lowest_river_bed,  coalesce(deepest_foundation_level,0.0) as deepest_foundation_level, coalesce(capacity,0.0) as capacity,tank_name, coalesce(dam_type_id,0) as dam_type_id,   coalesce(to_char(comm_date,'dd/mm/yyyy'),'NA'), coalesce(hazard_class_id,0)  as hazard_class_id, coalesce(dam_purpose_id,0) as dam_purpose_id  from  invom.invom_mi_tanks  where delete_flag=false and is_latest=true and tank_id_mk=?


GET_TANK_DAMINF_LEVELS_INFO  =SELECT  tank_id_mk,tank_name, coalesce(dam_type_id,0) as dam_type,  coalesce(owner_dam,'NA') as owner_dam, coalesce(operator_dam,'NA') as operator_dam,  coalesce(to_char(comm_date,'dd/mm/yyyy'),'NA') as comm_date ,  coalesce(hazard_class_id,0) as hazard_class, coalesce(tbl_level,0.0) as tbl_level , coalesce(mwl_level,0.0) as mwl_level,  coalesce(frl_level,0.0) as frl_level, coalesce(spillway_crest_level,0.0) as spillway_crest_level, coalesce(mddl_level,0.0) as mddl_level, coalesce(lowest_river_bed,0.0) as lowest_river_bed,  coalesce(deepest_foundation_level,0.0) as deepest_foundation_level, coalesce(capacity,0.0) as grossstorageatfrl ,  coalesce(imt.nrld_code,'NA') as nrldcode,imt.district_id, imt.mandal_id, imt.village_id , dm.district_name, mm.mandal_name, coalesce(vm.vname) as vname, irdam.res_ann1_mst1_id, irdam.freq_operation,irdam.freq_year,coalesce(irdam.condition_dam_id,0) as condition_dam_id, coalesce(dam_purpose_id,0) as dam_purpose_id,coalesce(latitude,'NA') as latitude, coalesce(longitude,'NA') as longitude   FROM invom.invom_mi_tanks imt inner join  invom.invom_res_dam_ann1_mst1 irdam on (imt.tank_id_mk=irdam.tank_id and imt.delete_flag=false and imt.is_latest=true)   inner join districts_mst dm on (imt.district_id=dm.district_id and dm.delete_flag=false ) inner join mandal_mst mm on (imt.district_id=mm.district_id and imt.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (imt.district_id=vm.dcode::int and imt.mandal_id=vm.mcode::int and imt.village_id=vm.vcode::int )  where irdam.delete_flag=false and irdam.is_latest=true and irdam.res_ann1_mst1_id=?

