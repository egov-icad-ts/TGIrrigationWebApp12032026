#07082021VIEW_MST1_REMARKS=SELECT mi_mst1_review_id,mi_inpsect_mst1_id, mtim.tank_id,  mtim.is_latest, coalesce(review_remarks,'NA') as remarks, tab_id,post_id,next_post_id,tem.employeename||'('||tdm.designation_name||')' as  submittedto ,tem2.employeename||'('||tdm2.designation_name||')' as submitted_by, tdm.designation_id ,tdm2.designation_id ,  coalesce(wier_sluice_id,0) as wier_sluice_id,  coalesce(tank_wier_sluice_name,'NA') as tank_wier_sluice_name, to_char(mtim.create_date, 'dd-mm-yyyy') as remarks_date_bws    FROM invom.invom_mi_tank_inspect_mst1_remarks mtim    inner join taskmanagement.subposts tsp1  on(mtim.next_post_id=tsp1.postid and tsp1.post_status='ACTIVE')   left join (select emp_id::int, post  from  taskmanagement.present_post_emp  ppe where ppe.delete_flag=false and ppe.is_latest=true      union     select emp_id::int ,post from taskmanagement.additional_charge  tac where ((tac.to_date is null ) or (to_date>=now() ))) postdata1  on ( postdata1.post=mtim.next_post_id )    inner join taskmanagement.employee_mst tem  on (empid=postdata1.emp_id and tem.employee_status::int=1) inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp1.designation and tdm.delete_flag=false)  inner join taskmanagement.subposts tsp2  on(mtim.post_id=tsp2.postid and tsp1.post_status='ACTIVE')   left join (select emp_id::int, post  from  taskmanagement.present_post_emp  ppe  where ppe.delete_flag=false and ppe.is_latest=true      union  select emp_id::int ,post   from taskmanagement.additional_charge  tac   where ((tac.to_date is  null ) or (to_date>=now() ))) postdata2  on ( postdata2.post=mtim.post_id ) inner join taskmanagement.employee_mst tem2  on (tem2.empid=postdata2.emp_id and tem2.employee_status::int=1)  inner join taskmanagement.designation_mst tdm2  on (tdm2.designation_id=tsp2.designation and tdm2.delete_flag=false) left join invom.invom_mi_tank_wier_sluice  imtws  on (imtws.tank_wier_sluice_id=mtim.wier_sluice_id and mtim.delete_flag=false  )   where  mi_inpsect_mst1_id=? and mtim.delete_flag=false order by tab_id,mtim.designation_id,mtim.is_latest 
