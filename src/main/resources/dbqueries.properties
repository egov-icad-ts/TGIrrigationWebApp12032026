SELECT_PROJ_TOTAL=select pa.projectid,cp.constituency_name, pa.ayacut_created,pa.stableayacut,pa.remarks , pmt.project_name, pmu.unit_name, packs.package_name,dm.district_name, coalesce(mm.mandal_name,'NA') as mandal_name , pa.contemplated_ayacut,pa.irrigated_ayacut  from (select pat.projectid,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut , round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut,  round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut, string_agg(pat.remarks, ' ,') as remarks   from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true  group by pat.projectid) pa  inner join ( select distinct projectid,coalesce(pm.project_name,'NA') as project_name  from  components.project_ayacut   t  inner join project_mst pm  on (t.projectid=pm.project_id and pm.delete_flag=false)   where t.delete_flag=false and t.is_latest=true   ) pmt  on (pa.projectid=pmt.projectid)  inner join (select t2.projectid,string_agg(um.unit_name, ' ,') as unit_name  from ( select distinct projectid, cpachild2.unit_id  from  components.project_ayacut   cpachild2 where delete_flag=false and is_latest=true ) t2   inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)  group by t2.projectid) pmu  on (pa.projectid=pmu.projectid  )  inner join (select projectid, string_agg(cps.pkg_name, ' , ') as package_name   from ( select distinct projectid, cpachild3.pack_id   from  components.project_ayacut   cpachild3 where delete_flag=false and is_latest=true ) t3  left join package_mst cps on (t3.pack_id=cps.pkg_id and cps.deleteflag=false)  group by t3.projectid) packs  on (pa.projectid=packs.projectid  )  inner join (select t4.projectid,string_agg(dms.district_name, '   ,') as district_name  from ( select distinct projectid,cpachild4.district_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true ) t4   inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)  group by t4.projectid) dm  on (pa.projectid=dm.projectid   )  inner join ( select t4.projectid,string_agg(coalesce(mms.mandal_name,'NA'), '   ,') as mandal_name  from ( select distinct projectid,district_id,mandal_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4  inner join mandal_mst mms on (t4.district_id=mms.district_id and t4.mandal_id=mms.mcode::int and mms.delete_flag=false)  group by t4.projectid) mm   on (pa.projectid=mm.projectid )   inner join  ( select t4.projectid,string_agg(coalesce(cps.constituency_name,'NA'), '   ,') as constituency_name  from ( select distinct projectid,const_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true) t4   inner join constituency_mst_new cps on (t4.const_id=cps.constituency_id and cps.delete_flag=false) group by t4.projectid ) cp   on (pa.projectid=cp.projectid ) order by project_name

SELECT_AYACUT_JURISDICTION=select pa.unit_id,pa.circle_id,cp.constituency_name, pa.ayacut_created,pa.stableayacut,pa.remarks , pmt.project_name, pmu.unit_name, coalesce( packs.package_name,'NA') as package_name,dm.district_name,  coalesce(mm.mandal_name,'NA') as mandal_name ,  pa.contemplated_ayacut,pa.irrigated_ayacut,pa.division_id ,  coalesce(pcu.circle_name,'NA') as circle_name,   coalesce(pdu.division_name,'NA') as division_name  from   ( select distinct pat.unit_id,  coalesce(pat.circle_id,0) as circle_id,   coalesce(pat.division_id,0) as division_id,    round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created ,  round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,  round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut,  round(sum(coalesce(pat.irrigated_ayacut,0)))   as irrigated_ayacut, string_agg(pat.remarks, ' ,') as remarks   from components.project_ayacut  pat   where pat.delete_flag=false and pat.is_latest=true   group by pat.unit_id, pat.circle_id, pat.division_id    ) pa  inner join (  select distinct unit_id,  coalesce(circle_id,0) as circle_id,    coalesce(division_id,0) as division_id,   string_agg(pm.project_name, ' ,') as project_name   from   ( select distinct unit_id, coalesce(circle_id,0) as circle_id   ,coalesce(division_id,0) as division_id,projectid  from  components.project_ayacut   cpachild2   where delete_flag=false and is_latest=true ) t   inner join project_mst pm  on (t.projectid=pm.project_id and pm.delete_flag=false)   group by unit_id,circle_id,division_id ) pmt   on (pa.unit_id=pmt.unit_id and pa.circle_id=pmt.circle_id and pa.division_id=pmt.division_id)   inner join ( select t2.unit_id,coalesce(t2.circle_id,0) as circle_id,coalesce(division_id,0) as division_id,  string_agg(um.unit_name, ' ,') as unit_name   from ( select distinct  cpachild2.unit_id ,coalesce(circle_id,0) as circle_id,coalesce(division_id,0) as division_id  from  components.project_ayacut   cpachild2   where delete_flag=false and i