SELECT_SUB_PARA_BY_SUBPARAID=select irpm.para_id,REGEXP_REPLACE(REGEXP_REPLACE(para, '<p style=text-align:justify> </p>', ''),'\s+$', '') as para ,paras_status_id,ips.parastatus, irpm.transfer_flag, para_sub_id,coalesce(sub_category_id,'NA') as sub_category_id, reasons_delay  from irparas.paras_master_sub irpm   inner join irparas.para_status ips on (irpm.paras_status_id=ips.parastatus_id and ips.delete_flag=false)  where irpm.delete_flag=false and irpm.is_latest=true and irpm.para_sub_id=?

