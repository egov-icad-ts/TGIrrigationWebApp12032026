ction_length,0.0) as homogeneous_section_length, coalesce(m_f_d,0.0) as m_f_d,coalesce(irum.user_id,0) as user_id,coalesce( irum.user_name,'NA'), coalesce(irs.res_status,'NA') as res_status   FROM inventory.reservoirs ir  inner join inventory.reservoir_unit_map  irum   on (ir.res_code=irum.res_code and irum.delete_flag=false and irum.is_latest=true)   inner join inventory.reservoir_status irs    on (ir.res_status_id=irs.res_status_id and irs.delete_flag=false)  where ir.delete_flag=false and ir.is_latest=true   and ir.res_status_id=2  and irum.unit_id=?

SELECT_RES_RESCODE_PDF= select distinct irum.res_code,irum.unit_id, unit_name,circlenames.circle_name,divisionnames.division_name, subdivisionnames.subdivision_name,projnames.project_name,packnames.package_name from  inventory.reservoir_unit_map  irum  inner join   unit_master um  on ( irum.unit_id=um.unit_id and um.delete_flag=false)  left join (  select distinct res_code,array_to_string(array_agg((coalesce(circle_name,'0'))) , ',') as circle_name from  inventory.reservoir_unit_map  irum   left join circle_master cm  on(irum.circle_id=cm.circle_id and cm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) circlenames  on (irum.res_code=circlenames.res_code) left  join(  select distinct res_code,array_to_string(array_agg((coalesce(division_name,'0'))) , ',') as division_name from  inventory.reservoir_unit_map  irum  left join division_master dm  on ( irum.division_id=dm.division_id and dm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) divisionnames  on (irum.res_code=divisionnames.res_code)  left join(   select distinct res_code,array_to_string(array_agg((coalesce(subdivision_name,'0'))) , ',') as subdivision_name from  inventory.reservoir_unit_map  irum    left join subdivision_master sdm  on (irum.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false ) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) subdivisionnames   on (irum.res_code=subdivisionnames.res_code)   left join(   select distinct res_code,array_to_string(array_agg((coalesce(project_name,'0'))) , ',') as project_name from  inventory.reservoir_unit_map  irum  left join project_mst pm  on (irum.project_id=pm.project_id and pm.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) projnames   on (irum.res_code=projnames.res_code)   left join(   select distinct res_code,array_to_string(array_agg((coalesce(package_name,'0'))) , ',') as package_name from  inventory.reservoir_unit_map  irum  left join components.packs cp  on (irum.package_id=cp.pack_id and cp.delete_flag=false) where irum.delete_flag=false and irum.is_latest=true  group by res_code ) packnames   on (irum.res_code=packnames.res_code)

SELECT_RES_REG=SELECT distinct res_regulator_code , regulator_name  FROM inventory.reservoir_regulator where delete_flag=false and is_latest=true  and res_code=?
SELECT_RES_REG_BYCODE=SELECT  res_regulator_code , regulator_name  FROM inventory.reservoir_regulator where delete_flag=false and is_latest=true  and res_regulator_code=?
 
 SELECT_RES_GATES_BYRES=SELECT res_gate_id, irg.res_regulator_code, irg.res_code, gate_type_id, gate_discharge,gate_sill_level, gate_top_level, gate_operating_id, gate_weight, gate_hoist_motor,gate_size, irg.user_id, irg.user_name,irr.regulator_name,coalesce(igt.gate_types,'NA') as  gate_types ,coalesce(igos.gate_system,'NA') as gate_system,ir.res_name,coalesce(irg.gate_no,0) as gate_no FROM inventory.reservoir_gate irg inner join inventory.reservoir_regulator irr  on (irg.res_regulator_code=irr.res_regulator_code and irr.delete_flag=false and irr.is_latest=true)  inner join inventory.reservoirs  ir   on(irg.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  left join inventory.gates_types igt  on(irg.gate_type_id=igt.gate_id and igt.delete_flag=false )  left join inventory.gate_operation_system igos  on(irg.gate_operating_id=igos.gate_operate_id and igos.delete_flag=false) where irg.delete_flag=false and irg.is_latest=true and irg.res_code=?
 
 SELECT_RES_AYACUT_BY_RES=SELECT  ira.reg_code,ira.res_code, ayacut_contemplated, ira.user_id, ira.user_name,   res_ayacut_id, ir.res_name,irr.regulator_name   FROM inventory.res_ayacut ira   inner join  inventory.reservoirs ir    on (ira.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true)  inner join inventory.reservoir_regulator irr   on (ira.reg_code=irr.res_regulator_code and irr.delete_flag=false and irr.is_latest=true ) where ira.delete_flag=false and ira.is_latest=true and ira.res_code=?
 
 SELECT_RES_AYACUT_BY_ID=SELECT reg_code, res_code, COALESCE(ayacut_contemplated,0.0) AS ayacut_contemplated,res_ayacut_id  FROM inventory.res_ayacut where  res_ayacut_id=?
 
 SELECT_RES_GATE_BY_ID=SELECT res_regulator_code, res_code, gate_type_id, gate_discharge, gate_sill_level, gate_top_level, gate_operating_id, gate_weight, gate_hoist_motor,  gate_size, gate_no,res_gate_id FROM inventory.reservoir_gate where res_gate_id=?
 
 SELECT_RES_REG_BY_REGCODE=SELECT  irr.res_code, regulator_name, irr.user_id, irr.user_name,ir.res_name  FROM inventory.reservoir_regulator irr inner join inventory.reservoirs ir   on(irr.res_code=ir.res_code and ir.delete_flag=false and ir.is_latest=true) WHERE res_regulator_code=?
 
 
 
 
 
 
