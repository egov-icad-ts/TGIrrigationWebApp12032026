SELECT_CANAL_BYPROJECTIDEDIT=select distinct ic.canal_name as canal_name,ic.canal_id,canal_type,ic.canal_typ_id,icum.project_id,icum.unit_id,icum.circle_id,icum.division_id, icum.subdivision_id,icum.post_id ,coalesce(ir.res_name,'NA') as res_name    from invom.invom_canal_unit_map icum    inner join invom.invom_canals  ic on (ic.canal_id=icum.canal_id and icum.delete_flag=false and icum.is_latest=true)   inner join invom.invom_canal_types ict   on (ic.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false )  left join invom.invom_reservoirs ir on (ic.res_id=ir.res_id and ir.delete_flag=false and ir.is_latest=true)     where  icum.project_id=? and ic.delete_flag=false and ic.is_latest=true    order by canal_name

SELECT_CANAL_BYCANALIDEDIT=select distinct ic.canal_name as canal_name,ic.canal_id,canal_type,ic.canal_typ_id,icum.project_id,icum.unit_id,icum.circle_id,icum.division_id, icum.subdivision_id,icum.post_id ,coalesce(ir.res_name,'NA') as res_name,coalesce(ic.res_id,0) as res_id   from invom.invom_canal_unit_map icum    inner join invom.invom_canals  ic on (ic.canal_id=icum.canal_id and icum.delete_flag=false and icum.is_latest=true)   inner join invom.invom_canal_types ict   on (ic.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false )  left join invom.invom_reservoirs ir on (ic.res_id=ir.res_id and ir.delete_flag=false and ir.is_latest=true)     where  ic.canal_id=?  and ic.delete_flag=false and ic.is_latest=true    order by canal_name

SELECT_CANAL_BYPROJECTIDNOTINLOC=select distinct ic.canal_name as canal_name,ic.canal_id,canal_type,ic.canal_typ_id,icum.project_id,icum.unit_id,icum.circle_id,icum.division_id, icum.subdivision_id,icum.post_id ,coalesce(ir.res_name,'NA') as res_name    from invom.invom_canal_unit_map icum    inner join invom.invom_canals  ic on (ic.canal_id=icum.canal_id and icum.delete_flag=false and icum.is_latest=true)   inner join invom.invom_canal_types ict   on (ic.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false )  left join invom.invom_reservoirs ir on (ic.res_id=ir.res_id and ir.delete_flag=false and ir.is_latest=true)     where  icum.project_id=?   and  ic.delete_flag=false and ic.is_latest=true  order by canal_name


