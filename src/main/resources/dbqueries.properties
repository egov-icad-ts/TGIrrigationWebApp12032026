nit_id   )  inner join ( select t4.unit_id,string_agg(coalesce(cms.constituency_name,'NA'), ' ,') as constituency_name  from ( select distinct unit_id,const_id from  components.project_ayacut   cpachild4 where delete_flag=false and is_latest=true ) t4   inner join constituency_mst_new cms on (t4.const_id=cms.constituency_id and cms.delete_flag=false)   group by t4.unit_id ) cm   on (pa.unit_id=cm.unit_id  )  order by unit_name,district_name

