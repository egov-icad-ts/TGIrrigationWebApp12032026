SOURCE_PMS_INV_RES_BASIC_DATA=SELECT res_id, coalesce(res_name,'NA') as res_name , coalesce(res_latitude,'NA') as res_latitude , coalesce(res_longitude,'NA') as res_longitude, coalesce(res_status_id,0) as res_status_id,        coalesce(river_basin,0) as river_basin , coalesce(sub_basin,'NA') as sub_basin , coalesce(year_of_construction_from,0) as year_of_construction_from         , coalesce(year_of_construction_to,0) as year_of_construction_to ,        coalesce(year_of_impounding,0) as year_of_impounding, coalesce(catchment_area,'NA') as catchment_area,     coalesce(water_spread_area,0.0) as water_spread_area, coalesce(deepestfoundation_level,0.0) as deepestfoundation_level,       coalesce(type_of_dam,'NA') as type_of_dam , coalesce(frl_level,0.0) as frl_level, coalesce(gross_storage_at_frl,0.0) as gross_storage_at_frl        , coalesce(mwl_level,0.0) as mwl_level , coalesce(mddl_level,0.0) as mddl_level ,        coalesce( live_storage_above_mddl,0.0) as live_storage_above_mddl, coalesce(dead_storage_below_mddl,0.0) as dead_storage_below_mddl,        coalesce(max_flood_discharge,0.0) as max_flood_discharge,        coalesce(land_acquistion,0.0) as land_acquistion , coalesce(irrigationpotential_created_wet,0.0) as irrigationpotential_created_wet,         coalesce(irrigationpotential_created_dry,0.0) as irrigationpotential_created_dry ,         coalesce(irigationpotential_contemplated,0.0) as  irigationpotential_contemplated,        coalesce( major_crops,'NA') as major_crops, coalesce(allocation_of_water,'NA') as  allocation_of_water,         coalesce(project_id,0) as project_id, coalesce(post_id,'0') as post_id, coalesce(delete_flag,true) as delete_flag, coalesce(is_latest,true) as is_latest,        coalesce( edit_flag,true) as edit_flag, coalesce(created_user_name,'NA') as created_user_name ,        to_char(coalesce(create_date,'01/12/1900'),'dd/mm/yyyy') as create_date, coalesce(update_user_name,'NA') as  update_user_name,        to_char( coalesce(update_date,'01/12/1900'),'dd/mm/yyyy') as update_date, coalesce(status_id,0) as status_id , coalesce(old_unit_id,0) as old_unit_id,         coalesce(old_circle_id,0) as old_circle_id, coalesce(old_division_id,0) as old_division_id, coalesce(old_sub_division_id,0) as old_sub_division_id,         coalesce(file_path,'NA') as file_path,        coalesce(res_latitude_d,0.0) as res_latitude_d ,coalesce( res_latitude_m,0.0) as res_latitude_m,        coalesce(res_latitude_s,0.0) as res_latitude_s , coalesce( res_longitude_d ,0.0) as res_longitude_d,        coalesce(res_longitude_m,0.0) as res_longitude_m , coalesce(res_longitude_s,0.0) as res_longitude_s,        coalesce( free_catchment,0.0) as free_catchment ,coalesce( intercepted,0.0) as intercepted,        coalesce(agriculture,0.0) as  agriculture, coalesce(drinking,0.0) as drinking,        coalesce(industrial,0.0) as industrial, coalesce(other_benifits,0.0) as other_benifits, coalesce(evaporation,0.0) as evaporation,        coalesce(approved_username,'NA')  as approved_username ,        coalesce(deleted_by,'NA') as deleted_by , to_char(coalesce(deleted_time,'01/12/1900'),'dd/mm/yyyy') as deleted_time,        coalesce(unit_id,0) as unit_id, coalesce(circle_id,0) as circle_id,         coalesce(division_id,0) as division_id , coalesce(sub_division_id,0) as sub_division_id, coalesce(is_reassigned,'NA') as is_reassigned   FROM  inv_reservoir_basic_data 

