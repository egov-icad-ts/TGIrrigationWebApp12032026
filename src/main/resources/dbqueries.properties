ete_flag=false ) where islatest='Y' and isdelete='N' and (cancelled_on is null and  (od_to_date is null or  od_to_date>=now() ))  ) fulldata  on (fulldata.emp_id::int=tue.emp_id::int and tue.delete_flag=false and tue.is_latest=true)  where tue.user_id =? and tue.password=? union    select userid::text,username,password,0,'NA','NA','0',0,coalesce(tu.unit_id , 0) as unitid,  coalesce(tu.circle_id,0) as circleid,         coalesce(tu.division_id,0)as divisionid,  coalesce(tu.subdivision_id,0)as subdivisionid  , coalesce(tu.section_id,0)as section_id,0,0,'NA', coalesce(um.unit_name,'--') as unitname, coalesce(cm.circle_name,'--') as circlename, coalesce(dm.division_name,'--')  as divisionname,coalesce(sdm.subdivision_name,'--')  as subdivisionname,coalesce(sm.section_name,'--')  as sectionname,3 as usercat,'NA' as od_type  from taskmanagement.users  tu inner join unit_master um        on (um.unit_id=tu.unit_id and um.delete_flag=false) left join circle_master cm  on ( cm.circle_id=tu.circle_id and cm.delete_flag=false) left join division_master dm   on ( dm.division_id=tu.division_id and dm.delete_flag=false ) left join subdivision_master sdm   on (sdm.subdivision_id=tu.subdivision_id and sdm.division_id=tu.division_id and sdm.delete_flag=false) left join section_master sm  on (tu.section_id=sm.section_id and tu.subdivision_id=sm.sub_division_id and tu.division_id=sm.division_id and sm.delete_flag=false )  where tu.username=? and tu.password=?
  


