SELECT_COUNTER_ALL=select distinct cm.unit_id,coalesce(cf.casef,0),coalesce(jf.judgf,0),coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(cdraft.cdraft,0)   from  cases_master cm    left join (select unit_id ,count(counter_date_file) as contf    from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id)contf    on (cm.unit_id=contf.unit_id )    left join (select unit_id ,count(case_date_judgement) as judgf  from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id )jf on ( cm.unit_id=jf.unit_id )   left join (select unit_id ,count(case_date_filing) as casef  from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id   )cf on (cm.unit_id=cf.unit_id     )  left join (select unit_id ,count(draft_count_togp) as cdraft  from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id) cdraft       on (cm.unit_id=cdraft.unit_id  )  order by cm.unit_id  
SELECT_COUNTER_COURT_GEN=select distinct cm.unit_id,coalesce(cf.casef,0),coalesce(jf.judgf,0),coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(cdraft.cdraft,0),cm.case_gen_id,coalesce(cg.case_gen_name,'NA') as case_gen_name, cm.case_court_id,coalesce(cc.court_id_name,'NA') as court_id_name   from  cases_master cm    left join (select unit_id ,count(counter_date_file) as contf,coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id    from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id, cm.case_gen_id,cm.case_court_id)contf    on (cm.unit_id=contf.unit_id and cm.case_gen_id=contf.casegenid and cm.case_court_id=contf.case_court_id)    left join (select unit_id ,count(case_date_judgement) as judgf,coalesce(case_gen_id,0) as  casegenid  , cm.case_court_id   from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id, cm.case_gen_id,cm.case_court_id)jf on ( cm.unit_id=jf.unit_id and  cm.case_gen_id=jf.casegenid and cm.case_court_id=jf.case_court_id)   left join (select unit_id ,count(case_date_filing) as casef,coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id    from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cm.case_gen_id, cm.case_court_id)cf on (cm.unit_id=cf.unit_id     and cm.case_gen_id=cf.casegenid and cm.case_court_id=cf.case_court_id)  left join (select unit_id ,count(draft_count_togp) as cdraft,    coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id, cm.case_gen_id,cm.case_court_id) cdraft       on (cm.unit_id=cdraft.unit_id and cm.case_gen_id=cdraft.casegenid  and cm.case_court_id=cdraft.case_court_id ) inner join cases_courts cc on (cm.case_court_id=cc.court_id and cc.court_id_delete_flag=false) inner join cases_general cg on (cm.case_gen_id=cg.case_gen_id and cg.case_gen_delete_flag=false )    where  cm.case_gen_id=? and  cm.case_court_id=?  order by cm.unit_id  ;
SELECT_COUNTER_GEN=select distinct cm.unit_id, coalesce(cf.casef,0),coalesce(jf.judgf,0),coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(cdraft.cdraft,0),cm.case_gen_id, coalesce(cg.case_gen_name,'NA') as case_gen_name   from  cases_master cm    left join (select unit_id ,count(counter_date_file) as contf,coalesce(case_gen_id,0) as  casegenid     from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id, cm.case_gen_id )contf    on (cm.unit_id=contf.unit_id and cm.case_gen_id=contf.casegenid )    left join (select unit_id ,count(case_date_judgement) as judgf,coalesce(case_gen_id,0) as  casegenid     from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id, cm.case_gen_id)jf on ( cm.unit_id=jf.unit_id and  cm.case_gen_id=jf.casegenid )   left join (select unit_id ,count(case_date_filing) as casef,coalesce(case_gen_id,0) as  casegenid    from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cm.case_gen_id )cf on (cm.unit_id=cf.unit_id     and cm.case_gen_id=cf.casegenid )  left join (select unit_id ,count(draft_count_togp) as cdraft,    coalesce(case_gen_id,0) as  casegenid  from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id, cm.case_gen_id ) cdraft       on (cm.unit_id=cdraft.unit_id and cm.case_gen_id=cdraft.casegenid   ) inner join cases_general cg on (cm.case_gen_id=cg.case_gen_id and cg.case_gen_delete_flag=false )   where  cm.case_gen_id=?   order by cm.unit_id  ;    
SELECT_COUNTER_COURT=select distinct cm.unit_id, coalesce(cf.casef,0),coalesce(jf.judgf,0),coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(cdraft.cdraft,0),cm.case_court_id, coalesce(cc.court_id_name,'NA') as court_id_name    from  cases_master cm   left join (select unit_id ,count(counter_date_file) as contf,cm.case_court_id    from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id,cm.case_court_id)contf    on (cm.unit_id=contf.unit_id  and cm.case_court_id=contf.case_court_id)    left join (select unit_id ,count(case_date_judgement) as judgf ,cm.case_court_id   from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id,cm.case_court_id)jf on ( cm.unit_id=jf.unit_id and cm.case_court_id=jf.case_court_id)   left join (select unit_id ,count(case_date_filing) as casef ,cm.case_court_id    from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cm.case_court_id)cf on (cm.unit_id=cf.unit_id      and cm.case_court_id=cf.case_court_id)  left join (select unit_id ,count(draft_count_togp) as cdraft ,cm.case_court_id from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id,cm.case_court_id) cdraft       on (cm.unit_id=cdraft.unit_id  and cm.case_court_id=cdraft.case_court_id ) inner join cases_courts cc on (cm.case_court_id=cc.court_id and cc.court_id_delete_flag=false)   where   cm.case_court_id=?   order by cm.unit_id ;
#select distinct um.unit_id, um.unit_name,coalesce(cf.casef,0),coalesce(jf.judgf,0),coalesce(contf.contf,0),coalesce((coalesce(cf.casef,0))-(coalesce(contf.contf,0)))  tobefile, coalesce(cdraft.cdraft,0),cm.case_gen_id,cm.case_court_id   from  cases_master cm inner join unit_master um on (cm.unit_id=um.unit_id)   left join (select unit_id ,count(counter_date_file) as contf,coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id    from cases_master cm where cm.delete_flag=false    and cm.counter_date_file  is not null     group by unit_id, cm.case_gen_id,cm.case_court_id)contf    on (cm.unit_id=contf.unit_id and cm.case_gen_id=contf.casegenid and cm.case_court_id=contf.case_court_id)    left join (select unit_id ,count(case_date_judgement) as judgf,coalesce(case_gen_id,0) as  casegenid  , cm.case_court_id   from cases_master cm where cm.delete_flag=false    and cm.case_date_judgement  is not null    group by unit_id, cm.case_gen_id,cm.case_court_id)jf on ( cm.unit_id=jf.unit_id and  cm.case_gen_id=jf.casegenid and cm.case_court_id=jf.case_court_id)   left join (select unit_id ,count(case_date_filing) as casef,coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id    from cases_master cm where cm.delete_flag=false and cm.case_date_filing     is not null  group by unit_id, cm.case_gen_id, cm.case_court_id)cf on (cm.unit_id=cf.unit_id     and cm.case_gen_id=cf.casegenid and cm.case_court_id=cf.case_court_id)  left join (select unit_id ,count(draft_count_togp) as cdraft,    coalesce(case_gen_id,0) as  casegenid ,cm.case_court_id from cases_master cm     where cm.delete_flag=false and cm.draft_count_togp  is not null      group by unit_id, cm.case_gen_id,cm.case_court_id) cdraft       on (cm.unit_id=cdraft.unit_id and cm.case_gen_id=cdraft.casegenid  and cm.case_court_id=cdraft.case_court_id )  where   cm.case_court_id=?;


