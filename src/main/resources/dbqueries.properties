VIEW_CAPACITY_REMARKS=SELECT mi_capacity_review_id,mi_inspect_capacity_id,tank_id,  mticr.is_latest,tem.employeename||'('||tdm.designation_name||')' as  submittedto ,  coalesce(review_remarks,'NA') as remarks, tem2.employeename||'('||tdm2.designation_name||')' as submitted_by,  tdm.designation_id ,tdm2.designation_id, mticr.emp_id ,mticr.post_id,mticr.next_post_id, to_char(mticr.create_date, 'dd/mm/yyyy') as remarks_date FROM  invom.invom_mi_tank_inspect_capacity_remarks mticr   inner join taskmanagement.subposts tsp1  on(mticr.next_post_id=tsp1.postid and tsp1.post_status='ACTIVE') inner join taskmanagement.employee_mst tem    on (empid=mticr.next_emp_id and tem.employee_status::int=1)  inner join taskmanagement.designation_mst tdm  on (tdm.designation_id=tsp1.designation and tdm.delete_flag=false)  inner join taskmanagement.subposts tsp2  on(mticr.post_id=tsp2.postid and tsp1.post_status='ACTIVE')  inner join taskmanagement.employee_mst tem2  on (tem2.empid=mticr.emp_id and tem2.employee_status::int=1)  inner join taskmanagement.designation_mst tdm2  on (tdm2.designation_id=tsp2.designation and tdm2.delete_flag=false) where  mi_inspect_capacity_id=? and mticr.delete_flag=false  order by mticr.designation_id,mticr.is_latest ;
