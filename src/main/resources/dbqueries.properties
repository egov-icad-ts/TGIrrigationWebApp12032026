SELECT_PROJ_COMPONENTS= select pm.project_id as component_id, project_name as component_name,project_code as component_desc,0 as component_parent_id,0 as level_id,0 as offtake_chainage,1 as component_direction,ccom.complen as component_length,d.status_list  as progress from project_mst pm, (select project_id, sum(component_length) complen from components.components group by project_id ) ccom , (select project_id ,string_agg(status, ',') AS status_list from (select offtake_chainage||'-'||comp_category||'-'||status_id||'-'||component_name||'-'||component_length  as status ,project_id  from components.components where delete_flag=false  order by offtake_chainage ) b  group by project_id) d where pm.project_id=ccom.project_id and  ccom.project_id= d.project_id and pm.project_id=?

SELECT_PROJ_LIFT_DATA=select cc.component_id,cc.component_name,cc.component_desc,cc.component_parent_id,cc.level_id,comp_category,offtake_chainage,component_length,component_from_km,component_to_km,cc.location,discharge_cusecs,pipe_dia_meters, length_pressuremain_kms,no_of_rows,status_id,static_head_mts, dynamic_head_mts,total_power_motor,d.*,cc.total_liftting_period_days,coalesce(cc.from_location,'NA') as from_location,coalesce(to_location,'NA') as to_location  from components.components cc,project_mst pm, (Select m.component_id,m.total, c.pump_motor_make_name as pumpmake,  c.pump_motor_type_name  as pumptype,   c.pump_motor_type_name as motortype, c.pump_motor_make_name  as motormake,   coalesce(c.pmr,0)   as rpm  from  ( select sum(no_motors_pumps) as total, component_id   from  components.component_info ci     group by component_id ) m,  ( select distinct  component_id ,stage_id,phase_id,pump_motor_make_name,pump_motor_type_name,pump_motor_rpm pmr    from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm  where( ci.motor_pump_make_id=pmmm.pump_motor_make_id  ) and( ci.motor_pump_type_id=pmtm.pump_motor_type_id )  and type_motor_pump='P'  and comp_info_id in ( select   comp_info_id  from ( select comp_info_id ,  row_number()  OVER (PARTITION BY  component_id ORDER BY comp_info_id DESC) as ronum  FROM  components.component_info ci ) foo  where  foo.ronum=1 )   union  select distinct  component_id ,stage_id,phase_id,pump_motor_type_name,pump_motor_make_name,pump_motor_rpm pmr   from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm where( ci.motor_pump_make_id=pmmm.pump_motor_make_id )  and( ci.motor_pump_type_id=pmtm.pump_motor_type_id ) and  type_motor_pump='M'     and comp_info_id in ( select   comp_info_id  from ( select comp_info_id , row_number()  OVER (PARTITION BY  component_id ORDER BY comp_info_id DESC) as ronum  FROM  components.component_info ci ) foo where  foo.ronum=1 )) c  where m.component_id=c.component_id ) d  where cc.project_id=pm.project_id and cc.component_id=d.component_id and pm.project_id=? order by offtake_chainage;

SELECT_COMP_POWER_INFO=select cc.component_id,cc.component_name,cc.component_desc,cc.component_parent_id,cc.level_id,comp_category,offtake_chainage,component_length,component_from_km,component_to_km,cc.location,discharge_cusecs,pipe_dia_meters, length_pressuremain_kms,no_of_rows,status_id, static_head_mts, dynamic_head_mts,total_power_motor, d.*,cc.total_liftting_period_days,coalesce(cc.from_location,'NA') as from_location,coalesce(to_location,'NA') as to_location, cc.pipe_dia_meters,cc.length_pressuremain_kms,cc.no_of_rows,cc.total_lift_mts,cc.total_liftting_period_days,cc.total_lifting_tmc, cc.mddl_mts,cc.delivery_level,cc.power_each_motor,cc.total_power_motor,cc.auxilary_power,cc.total_power_with_auxilary,cc.sub_station_cap_hv||'/'||cc.sub_station_cap_lv as sub_station_capacity  from components.components cc,project_mst pm, (Select m.component_id,m.total,c.pump_motor_make_name as pumpmake,c.pump_motor_type_name  as pumptype ,c.pump_motor_type_name as motortype,  c.pump_motor_make_name  as motormake,coalesce(c.pmr,0)   as rpm  from  ( select sum(no_motors_pumps) as total, component_id  from  components.component_info ci group by component_id ) m,  ( select distinct  component_id ,  stage_id,phase_id,pump_motor_make_name, pump_motor_type_name,pump_motor_rpm pmr from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm where( ci.motor_pump_make_id=pmmm.pump_motor_make_id  )  and( ci.motor_pump_type_id=pmtm.pump_motor_type_id ) and type_motor_pump='P'  and comp_info_id in ( select   comp_info_id  from ( select comp_info_id , row_number()  OVER (PARTITION BY  component_id ORDER BY comp_info_id DESC) as ronum FROM  components.component_info ci ) foo  where  foo.ronum=1 ) union select distinct  component_id ,stage_id,phase_id,pump_motor_type_name,pump_motor_make_name,pump_motor_rpm pmr  from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm  where( ci.motor_pump_make_id=pmmm.pump_motor_make_id ) and( ci.motor_pump_type_id=pmtm.pump_motor_type_id ) and  type_motor_pump='M'  and comp_info_id in ( select   comp_info_id  from ( select comp_info_id , row_number()  OVER (PARTITION BY  component_id ORDER BY comp_info_id DESC) as ronum FROM  components.component_info ci ) foo where  foo.ronum=1 )) c   where m.component_id=c.component_id ) d     where cc.project_id=pm.project_id and cc.component_id=d.component_id   and pm.project_id=?  order by offtake_chainage;


####select cc.component_id,cc.component_name,cc.component_desc,cc.component_parent_id,cc.level_id,comp_category,offtake_chainage,component_length,component_from_km, component_to_km,cc.location,discharge_cusecs,pipe_dia_meters,length_pressuremain_kms,no_of_rows,status_id,static_head_mts,dynamic_head_mts,total_power_motor,d.*,cc.total_liftting_period_days  from components.components cc,project_mst pm,(Select m.component_id,m.total, b.pump_motor_make_name as pumpmake, b.pump_motor_type_name  as pumptype, c.pump_motor_type_name as motortype, c.pump_motor_make_name  as motormake  from  ( select sum(no_pumps)+sum(no_motors) as total,component_id  from  components.component_info ci group by component_id ) m,  ( select distinct  component_id ,stage_or_phase_id,pump_motor_make_name,pump_motor_type_name  from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm  where( ci.pump_make_id=pmmm.pump_motor_make_id )  and( ci.pump_type_id=pmtm.pump_motor_type_id )) b,  (select distinct  component_id ,stage_or_phase_id,pump_motor_type_name,pump_motor_make_name  from components.component_info ci ,components.pump_motor_make_mst pmmm,components.pump_motor_type_mst pmtm  where( ci.motor_make_id=pmmm.pump_motor_make_id )  and( ci.motor_type_id=pmtm.pump_motor_type_id )) c   where m.component_id=b.component_id  and b.component_id=c.component_id) d  where cc.project_id=pm.project_id and cc.component_id=d.component_id  and pm.project_id=? order by offtake_chainage 

