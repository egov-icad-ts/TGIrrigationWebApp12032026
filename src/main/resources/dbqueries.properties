SELECT_RESERVOIR_ABSTRACT_DETAIL=  select distinct mtf.res_id,  imr.res_name ,imr.district_id,dm.district_name,imr.mandal_id, coalesce(mm.mandal_name,'NA') as mandal_name, imr.village_id,  coalesce(vmn.vname,'NA') as village_name ,  0,'NA', coalesce(mtf.unit_id,0) as unit_id, um.unit_code,  coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name,  coalesce(mtf.subdivision_id,0) as subdivision_id ,   coalesce(sdm.subdivision_name,'NA') as subdivision_name,  to_char( mtf.form_data_sentdate, 'dd/mm/YYYY') as tsfcFormDate,   mtf.form_data_id,mtf.post_id,tsp.post_name,coalesce(mtf.damage_type,0) as damage_type ,  mtf.comp_cat_id , coalesce(imr.village_name,'NA')    from  invom.mi_tank_form20data mtf  inner join invom.invom_reservoirs  imr on (mtf.res_id=imr.res_id and imr.delete_flag=false and imr.is_latest=true)   inner join districts_mst dm  on  (imr.district_id=dm.district_id and dm.delete_flag=false )   left join villages_mst_new vmn  on  (imr.district_id=vmn.dcode::int and imr.mandal_id = vmn.mcode::int and imr.village_id=vmn.vcode::int  )  inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' )  inner join mandal_mst mm  on  (imr.district_id=mm.district_id and imr.mandal_id = mm.mcode::int and  mm.delete_flag=false ) inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master divm   on (mtf.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false)  where mtf.delete_flag=false  and mtf.is_latest=true  and  (  (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?) or (( mtf.form_data_sentdate >=to_date(?,'DD/MM/YYYY')  ) and  ( mtf.form_data_sentdate  <= to_date(?,'DD/MM/YYYY')))  )  and  mtf.comp_cat_id=?

SELECT_CANAL_FORM20_ABSTRACT_DETAIL= select distinct mtf.canal_id,  imc.canal_name ||'@' ||canal_type||' Canal' || '@ch.From'|| coalesce(chainage_fromkm,0.0)||'km@ch.To'|| coalesce(chainage_tokm,0.0) ,icl.district_id,dm.district_name,icl.mandal_id, coalesce(mm.mandal_name,'NA') as mandal_name, icl.village_id,  coalesce(vm.vname,'NA') as village_name ,  0,'NA', coalesce(mtf.unit_id,0) as unit_id, um.unit_code,  coalesce(mtf.circle_id,0) as circle_id, coalesce(cm.circle_name,'NA') as circle_name,coalesce(mtf.division_id,0) as division_id , coalesce(divm.division_name,'NA') as division_name,  coalesce(mtf.subdivision_id,0) as subdivision_id ,  coalesce(sdm.subdivision_name,'NA') as subdivision_name,   to_char( mtf.form_data_sentdate, 'dd/mm/YYYY') as tsfcFormDate,   mtf.form_data_id,mtf.post_id,tsp.post_name,coalesce(mtf.damage_type,0) as damage_type ,  mtf.comp_cat_id , coalesce(icl.village_name,'NA')   from  invom.mi_tank_form20data mtf  inner join invom.invom_canals  imc on (mtf.canal_id=imc.canal_id and imc.delete_flag=false and imc.is_latest=true)  inner join invom.invom_canals_location icl on (mtf.canal_loc_id=icl.canal_loc_id and icl.delete_flag=false and icl.is_latest=true)   inner join districts_mst dm on (icl.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (icl.mandal_id=mm.mcode::int and icl.district_id=mm.dcode::int and mm.delete_flag=false)   left join villages_mst_new vm on (icl.village_id=vm.vcode::int and icl.mandal_id=vm.mcode::int and icl.district_id=vm.dcode::int )   inner join taskmanagement.subposts tsp on (mtf.post_id=tsp.postid and tsp.post_status='ACTIVE' )    inner join unit_master um  on (mtf.unit_id=um.unit_id and um.delete_flag=false)  left join circle_master cm  on (mtf.circle_id=cm.circle_id and cm.delete_flag=false)  left join division_master divm   on (mtf.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master  sdm  on (mtf.subdivision_id=sdm.subdivision_id and sdm.delete_flag=false) inner join invom.invom_canal_types  ict on (imc.canal_typ_id=ict.invom_canal_type_id and ict.delete_flag=false)  where mtf.delete_flag=false  and mtf.is_latest=true  and  (  (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=?) or (( mtf.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( mtf.form_data_sentdate  <= to_date(?,'DD/MM/YYYY')))  )  and  mtf.comp_cat_id=?

