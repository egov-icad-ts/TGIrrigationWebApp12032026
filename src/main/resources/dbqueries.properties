ircle_id=restanktotal.circle_id and  irdam1.division_id=restanktotal.division_id  and irdam1.subdivision_id=restanktotal.subdivision_id)  left  join  ( select sum (restotal) as restankstotal  , unit_id,circle_id ,division_id,subdivision_id,freq_operation,freq_year from ( (select count(distinct irdam1.reservoir_id) as restotal, irdam1.unit_id ,irdam1.circle_id,irdam1.division_id,irdam1.subdivision_id, irdam1.freq_operation,irdam1.freq_year from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true   group by irdam1.unit_id ,irdam1.circle_id,irdam1.division_id, irdam1.subdivision_id,irdam1.freq_operation,irdam1.freq_year) union all  (select count(distinct irdam1.tank_id) as restotal, irdam1.unit_id ,irdam1.circle_id,irdam1.division_id,irdam1.subdivision_id, irdam1.freq_operation,irdam1.freq_year   from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)      where irdam1.delete_flag=false and irdam1.is_latest=true    group by irdam1.unit_id ,irdam1.circle_id,irdam1.division_id,irdam1.subdivision_id, irdam1.freq_operation,irdam1.freq_year ) ) restankssub group by  unit_id , circle_id,division_id,subdivision_id, freq_operation,freq_year ) ressub    on(irdam1.unit_id=ressub.unit_id and irdam1.circle_id=ressub.circle_id and irdam1.division_id=ressub.division_id and  irdam1.subdivision_id=ressub.subdivision_id and irdam1.freq_operation=ressub.freq_operation and irdam1.freq_year=ressub.freq_year )  left join ( select sum (restotalunsat) as restankstotalunsat  , unit_id,circle_id ,division_id,subdivision_id,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalunsat, irdam1.unit_id ,irdam1.circle_id,irdam1.di