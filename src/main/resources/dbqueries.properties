lse)  group by t4.const_id ,t4.projectid) dm  on (pa.const_id=dm.const_id  and pa.projectid=dm.projectid) inner join constituency_mst  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) union all  select pa.const_id,cm.constituency_name||' '||'Total Ayacut',-3, pa.ayacut,pa.stableayacut,pa.reamarks ,pmt.project_name, pmu.unit_name, packs.package_name,dm.district_name from  (  select pat.const_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut ,round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut ,string_agg(pat.remarks, '  ,') as reamarks  from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true   group by pat.const_id)pa 	 inner join (select t.const_id,string_agg(pm.project_name, ' ,') as project_name  from ( select distinct const_id, cpachild.projectid  from  components.project_ayacut   cpachild ) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false)   group by t.const_id ) pmt   on (pa.const_id=pmt.const_id )   inner join (select t2.const_id,string_agg(um.unit_code, ' ,') as unit_name from ( select distinct const_id, cpachild2.unit_id  from  components.project_ayacut   cpachild2) t2  inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)  group by t2.const_id ) pmu   on (pa.const_id=pmu.const_id ) inner join (select t3.const_id,string_agg(cps.package_name, ' ,') as package_name from ( select distinct const_id, cpachild3.pack_id  from  components.project_ayacut   cpachild3) t3   left join components.packs cps on (t3.pack_id=cps.pack_id and cps.delete_flag=false)      group by t3.const_id ) packs  on (pa.const_id=packs.const_id )    inner join (select t4.const_id,string_agg(dms.district_name, ' ,') as district_name from ( select distinct const_id, cpachild4.district_id  from  components.project_ayacut   cpachild4) t4   inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.const_id ) dm  on (pa.const_id=dm.const_id ) inner join constituency_mst  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) order by constituency_name

