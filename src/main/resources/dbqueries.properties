SELECT_DAILY_EDITINFO=select comp_input_id,cdi.component_id,component_info_id,cdi.unit_id,cdi.project_id,discharge,energy_consumed,cdi.remarks, start_time,end_time,start_date,cci.pump_name from components.component_daily_input  cdi inner join components.component_info cci on (cdi.component_info_id=cci.comp_info_id and cci.delete_flag=false) where cdi.delete_flag=false and cdi.is_latest=true and cdi.comp_input_id=?



