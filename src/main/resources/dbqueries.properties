SELECT_CONST_TOTAL=select pa.const_id,cm.constituency_name, pa.ayacut_created,pa.stableayacut,pa.reamarks ,pmt.project_name, pmu.unit_name, packs.package_name,dm.district_name,pa.irrigated_ayacut,pa.contemplated_ayacut  from  (  select pat.const_id,round(sum(coalesce(pat.ayacut_created,0))) as ayacut_created , round(sum(coalesce(pat.stabilized_ayacut,0))) as stableayacut , round(sum(coalesce(pat.irrigated_ayacut,0))) as irrigated_ayacut , round(sum(coalesce(pat.contemplated_ayacut,0))) as contemplated_ayacut ,string_agg(pat.remarks, '  ,') as reamarks  from components.project_ayacut  pat  where pat.delete_flag=false and pat.is_latest=true   group by pat.const_id )pa  inner join ( select t.const_id,string_agg(pm.project_name, ' ,') as project_name  from ( select distinct const_id, cpachild.projectid  from  components.project_ayacut   cpachild where  delete_flag=false and is_latest=true  ) t  inner join project_mst pm on (t.projectid=pm.project_id and pm.delete_flag=false)   group by t.const_id ) pmt on (pa.const_id=pmt.const_id )   inner join (select t2.const_id,string_agg(um.unit_name, ' ,') as unit_name  from ( select distinct const_id, cpachild2.unit_id  from  components.project_ayacut   cpachild2 where  delete_flag=false and is_latest=true) t2  inner join unit_master um on (t2.unit_id=um.unit_id and um.delete_flag=false)  group by t2.const_id ) pmu  on (pa.const_id=pmu.const_id )  inner join (select t3.const_id,string_agg(cps.pkg_name, ' ,') as package_name  from ( select distinct const_id, cpachild3.pack_id  from  components.project_ayacut   cpachild3  where  delete_flag=false and is_latest=true) t3  left join package_mst cps on (t3.pack_id=cps.pkg_id and cps.deleteflag=false)      group by t3.const_id ) packs  on (pa.const_id=packs.const_id )  inner join (select t4.const_id,string_agg(dms.district_name, ' ,') as district_name  from ( select distinct const_id, cpachild4.district_id  from  components.project_ayacut   cpachild4  where  delete_flag=false and is_latest=true) t4  inner join districts_mst dms on (t4.district_id=dms.district_id and dms.delete_flag=false)   group by t4.const_id ) dm   on (pa.const_id=dm.const_id ) inner join constituency_mst_new  cm on (pa.const_id=cm.constituency_id and cm.delete_flag=false ) order by cm.constituency_name
