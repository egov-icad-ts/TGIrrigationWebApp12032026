true  and mtf1.damage_type=2  group by mtf1.unit_id, yr,mtf1.comp_cat_id ) damagecnt  on (mtf.unit_id=damagecnt.unit_id  and EXTRACT(YEAR FROM mtf.form_data_sentdate)::int =damagecnt.yr and mtf.comp_cat_id=damagecnt.comp_cat_id)  where mtf.delete_flag=false and mtf.is_latest=true  and  ( (EXTRACT(YEAR FROM mtf.form_data_sentdate)::int=? ) or  ((  mtf.form_data_sentdate >= ? ::date)  and  ( mtf.form_data_sentdate  <= ?  ::date ))   )
