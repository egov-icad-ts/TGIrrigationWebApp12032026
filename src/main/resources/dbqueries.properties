ra_id,para_number,unit_id from irparas.paras_master irpm2 where irpm2.section_id=2 ) parasecb on ( parasecb.unit_id=irpm.unit_id  and irpm.para_id=parasecb.para_id)   left join (select irpm3.para_id, um2.unit_name ,cm2.circle_name, dm2.division_name from irparas.paras_master irpm3  inner join unit_master um2  on (irpm3.unit_id=um2.unit_id and um2.delete_flag=false) left join circle_master cm2 on (irpm3.circle_id=cm2.circle_id and cm2.delete_flag=false)  left join division_master dm2  on (irpm3.division_id=dm2.division_id and dm2. delete_flag=false) where irpm3.delete_flag=true and irpm3.is_latest=false )  trfrom on( trfrom.para_id=irpm.old_para_id  )   where irpm.delete_flag=false and irpm.is_latest=true and irpm.para_id=?
