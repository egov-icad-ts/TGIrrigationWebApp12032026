lesce(dam_gallery_number,'NA') as dam_gallery_number,coalesce(dam_gates_number_fine,0) as dam_gates_number_fine, coalesce(capacity_activestorage,0.0)::text as capacity_activestorage  FROM invom.invom_reservoirs ir inner join  invom.invom_res_dam_ann1_mst1 irdam on (ir.res_id=irdam.reservoir_id and ir.delete_flag=false and ir.is_latest=true) where irdam.delete_flag=false and irdam.is_latest=true and irdam.res_ann1_mst1_id=?



