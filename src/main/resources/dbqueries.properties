 SELECT_INVOM_RESERVOIRS= select distinct ir.res_name,ir.res_id,irum.unit_id,coalesce(irum.project_id,0), coalesce(ir.district_id,0) as district_id,coalesce(ir.mandal_id,0) as mandal_id , coalesce(ir.village_id,0) as village_id ,village_name as remarks_village,coalesce(dm.district_name,'NA') as district_name,coalesce(mm.mandal_name,'--') as mandal_name,coalesce(vm.vname,'--') as vname,coalesce(ir.is_nrld,false) as is_nrld , coalesce(ir.nrld_code,'0') as nrld_code   from invom.invom_res_unit_map irum inner join invom.invom_reservoirs  ir on (ir.res_id=irum.reservoir_id and irum.delete_flag=false and irum.is_latest=true)  left join   districts_mst  dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) left join mandal_mst mm on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and  ir.village_id=vm.vcode::int)   inner join  project_unit_mapping pum on (irum.project_id=pum.project_id and pum.delete_flag=false and pum.is_latest=true)  where ir.delete_flag=false  and  pum.unit_id=?
 
 
 SELECT_INVOM_RESERVOIRS_ADMIN= select distinct ir.res_name,ir.res_id,irum.unit_id,coalesce(irum.project_id,0), coalesce(ir.district_id,0) as district_id,coalesce(ir.mandal_id,0) as mandal_id , coalesce(ir.village_id,0) as village_id ,village_name as remarks_village,coalesce(dm.district_name,'NA') as district_name,coalesce(mm.mandal_name,'--') as mandal_name,coalesce(vm.vname,'--') as vname,coalesce(ir.is_nrld,false) as is_nrld , coalesce(ir.nrld_code,'0') as nrld_code   from invom.invom_res_unit_map irum inner join invom.invom_reservoirs  ir on (ir.res_id=irum.reservoir_id and irum.delete_flag=false and irum.is_latest=true)  left join   districts_mst  dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) left join mandal_mst mm on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and  ir.village_id=vm.vcode::int)   inner join  project_unit_mapping pum on (irum.project_id=pum.project_id and pum.delete_flag=false and pum.is_latest=true)  where ir.delete_flag=false  
 
  SELECT_INVOM_NRLD_RESERVOIRS= select distinct ir.res_name,ir.res_id,irum.unit_id,coalesce(irum.project_id,0), coalesce(ir.district_id,0) as district_id,coalesce(ir.mandal_id,0) as mandal_id , coalesce(ir.village_id,0) as village_id ,village_name as remarks_village,coalesce(dm.district_name,'NA') as district_name,coalesce(mm.mandal_name,'--') as mandal_name,coalesce(vm.vname,'--') as vname,coalesce(ir.is_nrld,false) as is_nrld , coalesce(ir.nrld_code,'0') as nrld_code   from invom.invom_res_unit_map irum inner join invom.invom_reservoirs  ir on (ir.res_id=irum.reservoir_id and irum.delete_flag=false and irum.is_latest=true)  left join   districts_mst  dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) left join mandal_mst mm on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and  ir.village_id=vm.vcode::int)     where ir.delete_flag=false   and ir.is_nrld=true
             
  SELECT_IRDAM1_NRLD_RESERVOIRS= select distinct ir.res_name,ir.res_id,irdam1.unit_id, coalesce(irdam1.project_id,0),  coalesce(ir.district_id,0) as district_id,  coalesce(ir.mandal_id,0) as mandal_id ,  coalesce(ir.village_id,0) as village_id ,  village_name as remarks_village,  coalesce(dm.district_name,'NA') as district_name,  coalesce(mm.mandal_name,'--') as mandal_name,  coalesce(vm.vname,'--') as vname,  coalesce(ir.is_nrld,false) as is_nrld ,  coalesce(ir.nrld_code,'0') as nrld_code  from invom.invom_res_dam_ann1_mst1 irdam1 inner join invom.invom_reservoirs  ir on (ir.res_id=irdam1.reservoir_id and irdam1.delete_flag=false and irdam1.is_latest=true)  left join   districts_mst  dm on (ir.district_id=dm.district_id and dm.delete_flag=false ) left join mandal_mst mm on (ir.district_id=mm.district_id and ir.mandal_id=mm.mcode::int and mm.delete_flag=false)  left join villages_mst_new vm on (ir.district_id=vm.dcode::int and ir.mandal_id=vm.mcode::int and  ir.village_id=vm.vcode::int)     where ir.delete_flag=false   and ir.is_nrld=true
   
 UPDATE_NRLD_CODE=UPDATE invom.invom_reservoirs    SET    is_nrld=true, nrld_code=?  WHERE   res_id=? 
 
 GET_RES_POST_EMP=select invom_res_unit_map_id,irum.unit_id, irum.circle_id, irum.division_id, irum.subdivision_id, irum.reservoir_id, irum.project_id, irum.post_id, irum.section_id, um.unit_name, cm.circle_name, dm.division_name, coalesce(sdm.subdivision_name,'NA') as subdivision_name, ir.res_name, fullempinfo.post_name, fullempinfo.employeename  from  invom.invom_res_unit_map irum   inner join unit_master um on (irum.unit_id=um.unit_id and um.delete_flag=false)   inner join circle_master cm on  (irum.circle_id=cm.circle_id and irum.unit_id=cm.unit_id and cm.delete_flag=false)  inner join division_master dm on (irum.division_id=dm.division_id and irum.circle_id=dm.circle_id  and dm.delete_flag=false)  left join subdivision_master sdm on (irum.subdivision_id=sdm.subdivision_id and irum.division_id = sdm.division_id and sdm.delete_flag=false )  inner join invom.invom_reservoirs ir on (irum.reservoir_id=ir.res_id and ir.delete_flag=false and ir.is_latest=true)  inner join (select postId as post_id,empid,tem.employeename,post_name  from  ( select ppe.post as postId,                     ppe.emp_id::int,sp.post_name	   from taskmanagement.present_post_emp ppe    inner join taskmanagement.subposts  sp   on (ppe.post=sp.postid and sp.post_status='ACTIVE')    where ppe.delete_flag=false and ppe.is_latest=true     union      select tac.post as postId,tac.emp_id::int,sp.post_name   from taskmanagement.additional_charge tac    inner join taskmanagement.subposts  sp  on (tac.post=sp.postid and sp.post_status='ACTIVE')    where (tac.to_date is null or tac.to_date>=now() )     union     select teod.post_id as postId,teod.emp_id::int,sp.post_name   from taskmanagement.employee_on_diversion teod     inner join taskmanagement.subposts  sp  on (teod.post_id=sp.postid and sp.post_status='ACTIVE')  			   where islatest='Y' and isdelete='N' and (cancelled_on is null and  (od_to_date is null or  od_to_date>=now() )) 			   ) fulldata inner join  taskmanagement.employee_mst tem  			   on (fulldata.emp_id::int=tem.empid::int and tem.delete_flag=false and tem.is_latest=true)  ) fullempinfo 			   on ( fullempinfo.post_id=irum.post_id)  where irum.delete_flag=false and irum.is_latest=true  and ir.res_id=?
 
 DELETE_RES_POST_ACCESS= UPDATE invom.invom_res_unit_map    SET   delete_flag=true, is_latest=false  WHERE invom_res_unit_map_id=?
 
 INSERT_RES_POST_ACCESS=INSERT INTO invom.invom_res_unit_map(unit_id, circle_id, division_id, subdivision_id, reservoir_id, project_id, package_id, delete_flag, is_latest, post_id, section_id)  VALUES ( ?, ?, ?, ?, ?, ?, 0, false, true, ?, ?);
 
 EMP_DATA_BY_UNIT_CI_DI_SUB= select postId,emp_id,post_name,unit_id,circle_id,division_id,subdivision_id,tem.employeename,fulldata.designation  from (select ppe.post as postId,              ppe.emp_id::int,sp.post_name,sp.unit_id,sp.circle_id,sp.division_id,sp.subdivision_id,sp.designation                 from taskmanagement.present_post_emp ppe  inner join taskmanagement.subposts  sp  on (ppe.post=sp.postid and sp.post_status='ACTIVE')  where ppe.delete_flag=false and ppe.is_latest=true     union    select tac.post as postId,tac.emp_id::int,sp.post_name ,sp.unit_id,sp.circle_id,sp.division_id,sp.subdivision_id,sp.designation from taskmanagement.additional_charge tac   inner join taskmanagement.subposts  sp  on (tac.post=sp.postid and sp.post_status='ACTIVE') where (tac.to_date is null or tac.to_date>=now() )    union     select teod.post_id as postId,teod.emp_id::int,sp.post_name ,sp.unit_id,sp.circle_id,sp.division_id,sp.subdivision_id,sp.designation                          from taskmanagement.employee_on_diversion teod  inner join taskmanagement.subposts  sp   on (teod.post_id=sp.postid and sp.post_status='ACTIVE')  where islatest='Y' and isdelete='N' and (cancelled_on is null and  (od_to_date is null or  od_to_date>=now() ))  ) fulldata                                   inner join  taskmanagement.employee_mst tem  	 on (fulldata.emp_id::int=tem.empid::int and tem.delete_flag=false and tem.is_latest=true)   where fulldata.unit_id=? and circle_id=? and division_id=? and subdivision_id=?   and (fulldata.designation=2 or fulldata.designation=4 or fulldata.designation=8 or fulldata.designation=9 or fulldata.designation=10)
 
