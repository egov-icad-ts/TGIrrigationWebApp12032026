GET_CAG_REPLYS_ALL=SELECT icr.cag_gist_id, icr.cag_para_id, coalesce(cag_reply,'NA') as cag_reply, coalesce(cag_remarks,'NA') as cag_remarks,to_char(icr.cag_reply_date,'dd/mm/yyyy') as cag_reply_date  , cag_reply_id ,coalesce(icr.update_user_id,0),  coalesce(icr.update_user_name,'NA'),  coalesce(icr.create_user_id,0) as create_user_id, coalesce(icr.create_user_name,'NA') as create_user_name , coalesce(icm.para_sequence,0) as para_sequence,coalesce(icm.sub_para_number,'0.0.0') as sub_para_number,icr.unit_id	  FROM irparas.cag_replys icr , irparas.cag_master icm ,(select max(cag_reply_date) as cag_reply_date, cag_para_id  from irparas.cag_replys where delete_flag=false and is_latest=true  group by cag_para_id) maxdate where icr.cag_para_id=icm.cag_para_id and  icr.delete_flag=false and   icr.is_latest=true  and icr.cag_reply_date= maxdate.cag_reply_date and icr.cag_para_id=maxdate.cag_para_id  order by icm.para_sequence, cag_reply_date

TOTAL_CAGPARAS_DTAIL_PDF=select icmg.cag_gist_id,coalesce(TRIM (cag_gist_para),'--') as cag_gist_para,coalesce(financial_year,'--'),um.unit_name,icmg.unit_id,cm.circle_name,icmg.circle_id,dm.division_name,icmg.division_id,paras_status_id,ips.parastatus,CASE   WHEN (discuss_pac =true)  THEN 'YES'   WHEN (discuss_pac =false)  THEN 'NO'   END AS discuss_pac,icmg.para_number,to_char(auditdate_from,'dd/mm/yyyy') as auditdate_from,to_char(auditdate_to,'dd/mm/yyyy') as auditdate_from, coalesce(pr.reply,'<P>NO </P>') as replyaction,coalesce(pd.docoriginalname,'NO') as paradocs,cagparas.cag_para,cagparas.para_sequence,cagparas.para_title  from irparas.cag_master_gist icmg inner join unit_master um on (icmg.unit_id=um.unit_id and um.delete_flag=false )  left join circle_master cm on (icmg.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm   on (icmg.division_id=dm.division_id and dm. delete_flag=false) inner join irparas.para_status ips   on (icmg.paras_status_id=ips.parastatus_id and ips.delete_flag=false)   inner join (    select coalesce(cag_para,'--') as cag_para, coalesce(para_sequence,'0') as para_sequence, para_sequence ||' '||coalesce(para_title,'--') as para_title , icm.cag_para_id,icm.cag_gist_id     from irparas.cag_master icm where icm.delete_flag=false and icm.is_latest=true ) cagparas   on (icmg.cag_gist_id=cagparas.cag_gist_id)   left join (select cag_reply_id,icr.cag_para_id,TRIM(cag_reply) as reply,icr.cag_remarks,to_char(cag_reply_date,'dd/mm/yyyy') as replydate   from irparas.cag_replys icr, (select max(cag_reply_date) as replymax,cag_para_id   from irparas.cag_replys icr2  where icr2.delete_flag=false and is_latest=true  group by cag_para_id ) maxdate   where icr.delete_flag=false and is_latest=true  and cag_reply_date =maxdate.replymax    and  icr.cag_para_id=maxdate.cag_para_id order by cag_para_id ) pr  on (cagparas.cag_para_id=pr.cag_para_id )   left join ( SELECT cag_para_id,string_agg( doc_original_name, ' ,' ) AS docoriginalname   FROM irparas.cag_docs where delete_flag=false and is_latest=true group by cag_para_id) pd    on (cagparas.cag_para_id=pd.cag_para_id )  where icmg.delete_flag=false and icmg.is_latest=true 

GET_CAG_GIST_BYGISTID=select icmg.cag_gist_id,TRIM (cag_gist_para),financial_year,um.unit_name,icmg.unit_id,cm.circle_name,icmg.circle_id,dm.division_name,icmg.division_id,paras_status_id,ips.parastatus,ism.section,icmg.section_id, CASE   WHEN (discuss_pac =true)  THEN 'YES'   WHEN (discuss_pac =false)  THEN 'NO'   END AS discuss_pac,icmg.para_number,to_char(auditdate_from,'dd/mm/yyyy') as auditdate_from,to_char(auditdate_to,'dd/mm/yyyy') as auditdate_from, icmg.transfer_flag,icmg.transfer_unit_id,icmg.transfer_circle_id,icmg.transfer_division_id,icmg.transfer_subdivision_id  from irparas.cag_master_gist icmg inner join unit_master um on (icmg.unit_id=um.unit_id and um.delete_flag=false ) left join circle_master cm on (icmg.circle_id=cm.circle_id and cm.delete_flag=false) left join division_master dm  on (icmg.division_id=dm.division_id and dm. delete_flag=false) inner join irparas.para_status ips on (icmg.paras_status_id=ips.parastatus_id and ips.delete_flag=false) inner join irparas.sections_master ism on (icmg.section_id=ism.section_id and ism.delete_flag=false)   where icmg.delete_flag=false and icmg.is_latest=true and icmg.transfer_flag=false  and icmg.cag_gist_id=?

CAG_DOCS_ALL_PARAS=select cag_doc_id,doc_original_name,cag_para_id,cag_gist_id,doc_name,doc_title,to_char(doc_date,'dd/mm/yyyy') as  doc_date,create_by_unit_id,'document by'||' '||um.unit_name as unit_name from irparas.cag_docs cad inner join unit_master um  on (cad.create_by_unit_id=um.unit_id)where cad.delete_flag=false and cad.is_latest=true  and cag_gist_id=? order by doc_date

