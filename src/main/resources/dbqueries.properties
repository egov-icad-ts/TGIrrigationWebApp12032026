tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)    where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=1   group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) as restanksub1 group by  unit_id ,circle_id, freq_operation,freq_year,condition_dam_id  )ressub1   on(irdam1.unit_id=ressub1.unit_id  and  irdam1.circle_id=ressub1.circle_id and irdam1.freq_operation=ressub1.freq_operation and irdam1.freq_year=ressub1.freq_year )      left join ( select sum (restotalpoor) as restankstotalpoor  , unit_id ,circle_id,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalpoor, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year , irdam1.condition_dam_id   from invom.invom_res_dam_ann1_mst1 irdam1    inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=2  group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id  ) union all ( select count(distinct irdam1.tank_id) as restotalpoor, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id   from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=2   group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub2 group by  unit_id ,circle_id, freq_operation,freq_year,condition_dam_id  ) ressub2    on(irdam1.unit_id=ressub2.unit_id and irdam1.circle_id=ressub2.circle_id and irdam1.freq_operation=ressub2.freq_operation and irdam1.freq_year=ressub2.freq_year )    left join ( select sum (restotalfair) as restankstotalfair  , unit_id ,circle_id,freq_operation,freq_year,condition_dam_id from ( ( select count(distinct irdam1.reservoir_id) as restotalfair, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year, irdam1.condition_dam_id    from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)  where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=3  group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) union all (select count(distinct irdam1.tank_id) as restotalfair, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year, irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1  inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)    where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=3   group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub3 group by  unit_id ,circle_id, freq_operation,freq_year,condition_dam_id )  ressub3    on(irdam1.unit_id=ressub3.unit_id and  irdam1.circle_id=ressub3.circle_id and irdam1.freq_operation=ressub3.freq_operation and irdam1.freq_year=ressub3.freq_year )     left join ( select sum (restotalsat) as restankstotalsat  , unit_id ,circle_id,freq_operation,freq_year,condition_dam_id  from (( select count(distinct irdam1.reservoir_id) as restotalsat, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,  irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1   inner join   invom.invom_reservoirs ir   on(irdam1.reservoir_id=ir.res_id   and ir.delete_flag=false and ir.is_latest=true and ir.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=4  group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id  ) union all (select count(distinct irdam1.tank_id) as restotalsat, irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year, irdam1.condition_dam_id  from invom.invom_res_dam_ann1_mst1 irdam1    inner join   invom.invom_mi_tanks imt     on(irdam1.tank_id=imt.tank_id_mk   and imt.delete_flag=false and imt.is_latest=true and imt.is_nrld=true)   where irdam1.delete_flag=false and irdam1.is_latest=true and condition_dam_id=4   group by irdam1.unit_id ,irdam1.circle_id, irdam1.freq_operation,irdam1.freq_year,irdam1.condition_dam_id ) ) restanksub4 group by  unit_id ,circle_id, freq_operation,freq_year,condition_dam_id )  ressub4  on(irdam1.unit_id=ressub4.unit_id and irdam1.circle_id=ressub4.circle_id  and irdam1.freq_operation=ressub4.freq_operation and irdam1.freq_year=ressub4.freq_year )    inner join unit_master um   on (restanktotal.unit_id=um.unit_id and um.delete_flag=false)    inner join circle_master cm on (restanktotal.unit_id=cm.unit_id and restanktotal.circle_id=cm.circle_id and cm.delete_flag=false )  where  irdam1.freq_year=? and irdam1.freq_operation=?  

