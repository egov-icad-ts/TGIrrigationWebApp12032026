GET_TANK_SUB_DIV_FORM20_ABSTRACT=select  distinct round(coalesce(Sum(totbv.fbv)/100000,0.0),2) as fbv, totbv.unit_id,um.unit_name, totbv.circle_id,cm.circle_name,  totbv.division_id,dm.division_name, totbv.subdivision_id,sm.subdivision_name,    0,'NA',0,'NA',sum(coalesce(  totbv.cnt,0)) as cnt, round((sum(coalesce( totbv.pca,0.0) )/100000),2)as pcatot, round((sum(coalesce(  totbv.tca,0.0))/100000),2) as tcatot,  round((sum(coalesce((totbv.pca + totbv.tca),0.0)) /100000),2) as reptot,sum(coalesce(breachcnt.brcnt,0)) as brcnt, sum( coalesce(damagecnt.dmcnt,0)) as dmcnt,totbv.comp_cat_id,string_agg(to_char(totbv.form_data_sentdate,'dd/mm/yyyy'), ' ,') as datemonth  from   (   select count (distinct mtf1.form_data_id) as cnt,mtf1.form_data_sentdate,sum(mtf1.form_data_book_value) as fbv , sum(mtf1.approx_cost_permanent   ) as pca, sum(mtf1.approx_cost_temporary) as tca, coalesce(unit_id,0) as unit_id ,coalesce(mtf1.circle_id,0) as circle_id ,coalesce(division_id,0) as division_id , coalesce(subdivision_id,0) as subdivision_id, mtf1.comp_cat_id  from  invom.mi_tank_form20data  mtf1   where mtf1.delete_flag=false and mtf1.is_latest=true  group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id, mtf1.form_data_sentdate ,comp_cat_id ) totbv  left join (   select count (distinct mtf1.form_data_id) as brcnt, mtf1.form_data_sentdate,   coalesce(unit_id,0) as unit_id  , coalesce(mtf1.circle_id,0) as circle_id ,coalesce(division_id,0) as division_id, coalesce(subdivision_id,0) as subdivision_id, mtf1.comp_cat_id  from  invom.mi_tank_form20data  mtf1  where mtf1.delete_flag=false and mtf1.is_latest=true  and mtf1.damage_type=1  group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.form_data_sentdate, mtf1.comp_cat_id ) breachcnt  on (totbv.unit_id=breachcnt.unit_id and totbv.circle_id=breachcnt.circle_id  and totbv.division_id=breachcnt.division_id  and totbv.subdivision_id=breachcnt.subdivision_id and totbv.form_data_sentdate=breachcnt.form_data_sentdate and totbv.comp_cat_id=breachcnt.comp_cat_id )   left join (  select count (distinct mtf1.form_data_id) as dmcnt, mtf1.form_data_sentdate,  coalesce(unit_id,0) as unit_id ,coalesce(mtf1.circle_id,0) as circle_id  ,coalesce(mtf1.division_id,0) as  division_id,coalesce(subdivision_id,0) as subdivision_id, mtf1.comp_cat_id  from  invom.mi_tank_form20data  mtf1   where mtf1.delete_flag=false and mtf1.is_latest=true   and mtf1.damage_type=2   group by mtf1.unit_id,mtf1.circle_id,mtf1.division_id,mtf1.subdivision_id,mtf1.form_data_sentdate,mtf1.comp_cat_id ) damagecnt   on (totbv.unit_id=damagecnt.unit_id and totbv.circle_id=damagecnt.circle_id  and totbv.division_id=damagecnt.division_id and totbv.subdivision_id=damagecnt.subdivision_id and totbv.form_data_sentdate=damagecnt.form_data_sentdate  and totbv.comp_cat_id=damagecnt.comp_cat_id)  inner join unit_master um   on (totbv.unit_id=um.unit_id and um.delete_flag=false )  inner join circle_master cm  on (totbv.circle_id=cm.circle_id and cm.delete_flag=false )  inner join division_master dm  on (totbv.division_id=dm.division_id and totbv.circle_id=dm.circle_id and dm.delete_flag=false ) inner join subdivision_master sm  on (totbv.subdivision_id=sm.subdivision_id and totbv.division_id=sm.division_id and sm.delete_flag=false ) where   ((extract (year from totbv.form_data_sentdate ) =? )  or  ( ( totbv.form_data_sentdate >= to_date(?,'DD/MM/YYYY')  ) and  ( totbv.form_data_sentdate  <= to_date(?,'DD/MM/YYYY'))   )    )

