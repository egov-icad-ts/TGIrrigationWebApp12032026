nout.is_latest=true    and    ominout.inspect_date between CURRENT_DATE -interval '4 month' and CURRENT_DATE +interval '2 month'  AND ominout.tank_id=? order by ominout.inspect_date ;

GET_MI_REPAIR=SELECT mi_inspect_repair_id, omrepair.tank_id, omrepair.comp_id, imtrd.description, omrepair.rate,omrepair.unit_measure_id,omrepair.quantity,omrepair.amount,imtrd.scheme_taken,omrepair.create_user_name, coalesce(omrepair.unit_id,0) as unit_id, coalesce(omrepair.circle_id,0) as circle_id , coalesce(omrepair.division_id,0) as division_id , coalesce(omrepair.subdivision_id,0) as subdivision_id,  coalesce(omrepair.designation_id,0) as designation_id , omrepair.level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name,coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(tdm.designation_name,'NA') as designation_name,  dm.district_name,mm.mandal_name,vm.vname,imc.invom_mi_comps,to_char(imtrd.start_date,'dd/mm/yyyy') as start_date, to_char(imtrd.end_date,'dd/mm/yyyy') as end_date,omrepair.emp_id,omrepair.post_id  FROM invom.invom_mi_tank_inspect_repairs omrepair  inner join invom.invom_mi_tank_repairs_description imtrd  on(omrepair.mi_repair_desc_id=imtrd.mi_repair_desc_id and imtrd.delete_flag=false and imtrd.is_latest=true)  inner join invom.invom_mi_tanks imt  on (omrepair.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( omrepair.unit_id =um.unit_id and um.delete_flag=false) left join circle_master cm on (omrepair.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (omrepair.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master sdvm on (omrepair.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)  left join taskmanagement.designation_mst  tdm on (omrepair.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false) inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false) inner join villages_mst_new vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int ) inner join invom.invom_mi_comps imc on (omrepair.comp_id=imc.invom_mi_comps_id and imc.delete_flag=false) where omrepair.delete_flag=false and omrepair.is_latest=true   and    imtrd.start_date between CURRENT_DATE -interval '3 year' and CURRENT_DATE +interval '2 month'  AND omrepair.tank_id=? order by  imtrd.start_date ;

####19112020SELECT mi_inspect_repair_id, omrepair.tank_id, omrepair.comp_id, omrepair.description, omrepair.rate,  to_char(omrepair.inspect_date,'dd/mm/yyyy') as inspect_date, omrepair.unit_measure_id,omrepair.quantity,omrepair.amount,omrepair.scheme_taken, create_user_name,user_emp_id, coalesce(omrepair.unit_id,0) as unit_id, coalesce(omrepair.circle_id,0) as circle_id , coalesce(omrepair.division_id,0) as division_id , coalesce(omrepair.subdivision_id,0) as subdivision_id, coalesce(omrepair.project_id,0) as project_id, coalesce(omrepair.designation_id,0) as designation_id , level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name,coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(pm.project_name,'NA') as project_name,coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name,mm.mandal_name,vm.village_name,imc.invom_mi_comps  FROM invom.invom_mi_tank_inspect_repairs omrepair inner join invom.invom_mi_tanks imt  on (omrepair.tank_id=imt.tank_id and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( omrepair.unit_id =um.unit_id and um.delete_flag=false)   left join circle_master cm on (omrepair.circle_id = cm.circle_id and  cm.delete_flag=false)   left join division_master divm on (omrepair.division_id=divm.division_id and divm.delete_flag=false)   left join subdivision_master sdvm on (omrepair.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)   left join project_mst pm on ( omrepair.project_id=pm.project_id and (pm.delete_flag=false))   left join taskmanagement.designation_mst  tdm on (omrepair.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false)   inner join village_mst vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int and vm.delete_flag=false)  inner join invom.invom_mi_comps imc on (omrepair.comp_id=imc.invom_mi_comps_id and imc.delete_flag=false)   where omrepair.delete_flag=false and omrepair.is_latest=true    and    omrepair.inspect_date between CURRENT_DATE -interval '4 month' and CURRENT_DATE +interval '2 month'  AND omrepair.tank_id=? order by omrepair.inspect_date ;

GET_MI_CAPACITY= SELECT mi_inspect_capacity_id, omcapacity.tank_id, coalesce(imt.capacity,0.0), omcapacity.available_capacity, omcapacity.surplus,  to_char(omcapacity.inspect_date,'dd/mm/yyyy') as inspect_date, create_user_name, coalesce(omcapacity.unit_id,0) as unit_id, coalesce(omcapacity.circle_id) as circle_id, coalesce(omcapacity.division_id,0) as division_id , coalesce(omcapacity.subdivision_id,0) as subdivision_id, coalesce(omcapacity.designation_id,0) as designation_id , level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name,mm.mandal_name, vm.vname , coalesce(omcapacity.available_capacity,0.0)/(CASE WHEN coalesce(imt.capacity,1.0)<> 0  THEN  coalesce(imt.capacity,1.0) ELSE 1 END ) AS capacity,coalesce(omcapacity.inflow_cusecs,0.0) as inflow_cusecs, coalesce(omcapacity.outflow_cusecs,0.0) as outflow_cusecs, coalesce(omcapacity.ayacut_acres,0.0) as ayacut_acres , coalesce(omcapacity.tank_level,0.0) as tank_level  FROM invom.invom_mi_tank_inspect_capacity omcapacity inner join invom.invom_mi_tanks imt on (omcapacity.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( omcapacity.unit_id =um.unit_id and um.delete_flag=false)  left join circle_master cm on (omcapacity.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (omcapacity.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master sdvm on (omcapacity.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false) left join project_mst pm on ( omcapacity.project_id=pm.project_id and (pm.delete_flag=false))  left join taskmanagement.designation_mst  tdm on (omcapacity.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false)  inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false) inner join villages_mst_new vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int )  where omcapacity.delete_flag=false and omcapacity.is_latest=true  and    omcapacity.inspect_date between CURRENT_DATE -interval '3 year' and CURRENT_DATE  AND omcapacity.tank_id=? order by omcapacity.inspect_date ;
  
GET_INOUT_BY_TANKID_YEAR=SELECT mi_inspect_in_out_flow_id, ominout.tank_id, inflow, outfow, ayacut, to_char( inspect_date,'dd/mm/yyyy') as inspect_date,  create_user_name,user_emp_id, coalesce(ominout.unit_id,0) as unit_id, coalesce(ominout.circle_id,0) as circle_id, coalesce(ominout.division_id,0) as division_id , coalesce(ominout.subdivision_id,0) as subdivision_id, coalesce(ominout.project_id,0) as project_id, ominout.designation_id, level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name,coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(pm.project_name,'NA') as project_name, coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name, mm.mandal_name, vm.village_name  FROM invom.invom_mi_tank_inspect_in_out_flow ominout inner join invom.invom_mi_tanks imt on (ominout.tank_id=imt.tank_id and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( ominout.unit_id =um.unit_id and um.delete_flag=false)   left join circle_master cm on (ominout.circle_id = cm.circle_id and  cm.delete_flag=false)   left join division_master divm on (ominout.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master sdvm on (ominout.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)  left join project_mst pm on ( ominout.project_id=pm.project_id and (pm.delete_flag=false)) left join taskmanagement.designation_mst  tdm on (ominout.designation_id=tdm.designation_id and tdm.delete_flag=false)   inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false)    inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false)   inner join village_mst vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int and vm.delete_flag=false)    where ominout.delete_flag=false and ominout.is_latest=true    and    ominout.inspect_date between CURRENT_DATE -interval '4 month' and CURRENT_DATE AND ominout.tank_id=? and EXTRACT(YEAR FROM ominout.inspect_date)::int=? order by ominout.inspect_date ;

GET_MI_REPAIR_BY_TANKID_YEAR=SELECT mi_inspect_repair_id, omrepair.tank_id, omrepair.comp_id, imtrd.description, omrepair.rate, omrepair.unit_measure_id, 'NA',omrepair.quantity,omrepair.amount,imtrd.scheme_taken, omrepair.create_user_name, coalesce(omrepair.unit_id,0) as unit_id, coalesce(omrepair.circle_id,0) as circle_id , coalesce(omrepair.division_id,0) as division_id , coalesce(omrepair.subdivision_id,0) as subdivision_id, coalesce(omrepair.designation_id,0) as designation_id , omrepair.level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name,coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name, coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name,mm.mandal_name,vm.vname,imc.invom_mi_comps, to_char(imtrd.start_date,'dd/mm/yyyy') as start_date,to_char(imtrd.end_date,'dd/mm/yyyy') as end_date, imtrd.mi_repair_desc_id   FROM invom.invom_mi_tank_inspect_repairs omrepair inner join invom.invom_mi_tank_repairs_description imtrd    on(omrepair.mi_repair_desc_id=imtrd.mi_repair_desc_id and imtrd.delete_flag=false and imtrd.is_latest=true) inner join invom.invom_mi_tanks imt  on (omrepair.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( omrepair.unit_id =um.unit_id and um.delete_flag=false)   left join circle_master cm on (omrepair.circle_id = cm.circle_id and  cm.delete_flag=false)   left join division_master divm on (omrepair.division_id=divm.division_id and divm.delete_flag=false)   left join subdivision_master sdvm on (omrepair.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false)    left join taskmanagement.designation_mst  tdm on (omrepair.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false)   inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false)   inner join villages_mst_new vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int )  inner join invom.invom_mi_comps imc on (omrepair.comp_id=imc.invom_mi_comps_id and imc.delete_flag=false)   where omrepair.delete_flag=false and omrepair.is_latest=true    and    imtrd.start_date between CURRENT_DATE -interval '2 year' and CURRENT_DATE AND omrepair.tank_id=?  and EXTRACT(YEAR FROM imtrd.start_date)::int=? order by imtrd.mi_repair_desc_id, imtrd.start_date ;


GET_MI_CAPACITY_BY_TANKID_YEAR= SELECT mi_inspect_capacity_id, omcapacity.tank_id, coalesce(imt.capacity,0.0), omcapacity.available_capacity, omcapacity.surplus,  to_char(omcapacity.inspect_date,'dd/mm/yyyy') as inspect_date,'NA', create_user_name, coalesce(omcapacity.unit_id,0) as unit_id, coalesce(omcapacity.circle_id) as circle_id, coalesce(omcapacity.division_id,0) as division_id , coalesce(omcapacity.subdivision_id,0) as subdivision_id,  coalesce(omcapacity.designation_id,0) as designation_id , level_id,tank_name as tank_name , coalesce(um.unit_name,'NA') as unit_name, coalesce(cm.circle_name,'NA') as circle_name, coalesce(divm.division_name,'NA') as division_name, coalesce(sdvm.subdivision_name,'NA') as subdivision_name,  coalesce(tdm.designation_name,'NA') as designation_name, dm.district_name,mm.mandal_name, vm.vname,coalesce(omcapacity.inflow_cusecs,0.0) as inflow_cusecs, coalesce(omcapacity.outflow_cusecs,0.0) as outflow_cusecs, coalesce(omcapacity.ayacut_acres) as ayacut_acres , coalesce(omcapacity.tank_level) as tank_level FROM invom.invom_mi_tank_inspect_capacity omcapacity inner join invom.invom_mi_tanks imt on (omcapacity.tank_id=imt.tank_id_mk and imt.delete_flag=false and imt.is_latest=true )  left join unit_master um on ( omcapacity.unit_id =um.unit_id and um.delete_flag=false)  left join circle_master cm on (omcapacity.circle_id = cm.circle_id and  cm.delete_flag=false) left join division_master divm on (omcapacity.division_id=divm.division_id and divm.delete_flag=false)  left join subdivision_master sdvm on (omcapacity.subdivision_id=sdvm.subdivision_id  and sdvm.delete_flag=false) left join project_mst pm on ( omcapacity.project_id=pm.project_id and (pm.delete_flag=false))  left join taskmanagement.designation_mst  tdm on (omcapacity.designation_id=tdm.designation_id and tdm.delete_flag=false) inner join districts_mst dm on(imt.district_id=dm.district_id and dm.delete_flag=false)  inner join mandal_mst mm on (imt.mandal_id=mm.mcode::int and imt.district_id=mm.dcode::int and mm.delete_flag=false) inner join villages_mst_new vm on (imt.village_id=vm.vcode::int and imt.mandal_id=vm.mcode::int and imt.district_id=vm.dcode::int )  where omcapacity.delete_flag=false and omcapacity.is_latest=true  and    omcapacity.inspect_date between CURRENT_DATE -interval '3 year' and CURRENT_DATE  AND omcapacity.tank_id=? and EXTRACT(YEAR FROM omcapacity.inspect_date)::int=? order by omcapacity.inspect_date ;

GET_TANK_CAPACITY_BY_TANK=SELECT tank_id_mk,tank_code, tank_geo_tag,  coalesce(capacity,0.0) as capacity ,coalesce(ayacut_acres,0.0) as ayacut_acres ,coalesce(latitude, '0') as latitude , coalesce(longitude,'0') as longitude  FROM invom.invom_mi_tanks where delete_flag=false and is_latest=true and tank_id_mk=? ;


######Approval process for all forms############
SELECT_CE_ENC=((select empid,employeename||'-'||tdm.designation_name as name,ppe.designation,ppe.unit,ppe.circle,ppe.division,ppe.sub_division, ppe.post  from taskmanagement.employee_mst em inner join taskmanagement.present_post_emp ppe on (em.empid= ppe.emp_id::int ) inner join taskmanagement.designation_mst tdm on(ppe.designation=tdm.designation_id and tdm.delete_flag=false)  where em.delete_flag=false and em.is_latest=true and ((ppe.sub_division=? and ppe.division=? and ppe.circle=? and ppe.unit=?) )and (ppe.designation=9 or ppe.designation=10 ) and ppe.delete_flag=false and ppe.is_latest=true) union  (select empid,employeename||'-'||tdm.designation_name as name,tsp.designation,tac.unit,tac.circle,tac.division,tac.sub_division, tac.post  from taskmanagement.employee_mst em inner join taskmanagement.additional_charge tac on (em.empid= tac.emp_id::int and (to_date is null or to_date>now()) ) inner join taskmanagement.subposts tsp on (tac.post=tsp.postid and tsp.post_status='ACTIVE') inner join taskmanagement.designation_mst tdm on(tsp.designation=tdm.designation_id and tdm.delete_flag=false) where em.delete_flag=false and em.is_latest=true and ((tac.sub_division=? and tac.division=? and tac.circle=? and tac.unit=?) )and (tsp.designation=9 or  tsp.designation=10 ) )  union (  select empid,employeename||'-'||tdm.designation_name as name,   eod.designation_id,  eod.unit_id,eod.circle_id,  eod.division_id,eod.sub_division_id,  eod.post_id  from taskmanagement.employee_mst em  inner join taskmanagement.employee_on_diversion eod   on (em.empid= eod.emp_id::int and (islatest='Y' and isdelete='N') )  inner join taskmanagement.subposts tsp  on (eod.post_id=tsp.postid and tsp.post_status='ACTIVE')  inner join taskmanagement.designation_mst tdm  on(eod.designation_id=tdm.designation_id and tdm.delete_flag=false)  where em.delete_flag=false  and em.is_latest=true and ((eod.sub_division_id=? and eod.division_id=? and eod.circle_id=? and eod.unit_id=?) )and (tsp.designation=9 or tsp.designation=10  ) ) )
#select emp_id,first_name||' '||last_name||'-'||tdm.designation_name as name, em.designation_id,em.unit_id,em.circle_id,em.division_id,em.subdivision_id from taskmanagement.emp_mst  em inner join taskmanagement.designation_mst tdm on(em.designation_id=tdm.designation_id and tdm.delete_flag=false) where em.delete_flag=false and em.is_latest=true and ((em.subdivision_id=? and em.division_id=? and em.circle_id=? and em.unit_id=?) )and (em.designation_id=9 or em.designation_id=10)

